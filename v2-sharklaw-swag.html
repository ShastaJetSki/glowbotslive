<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Swag</title>
  <script>
    (function() {
      var theme = localStorage.getItem('app-theme') || 'dark-blue';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="themes.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="dark-blue"]{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="blue-light"]{--bg-primary:#f0f5ff;--bg-secondary:#e0eaff;--bg-card:#ffffff;--bg-hover:#d0e0ff;--border-default:#b0c8f0;--text-primary:#1a2744;--text-secondary:#4a5a74;--accent-primary:#2563eb;--accent-light:#3b82f6;}
    [data-theme="slate-dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#273549;--bg-hover:#334155;--border-default:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent-primary:#64748b;--accent-light:#94a3b8;}
    [data-theme="slate-light"]{--bg-primary:#f8fafc;--bg-secondary:#f1f5f9;--bg-card:#ffffff;--bg-hover:#e2e8f0;--border-default:#cbd5e1;--text-primary:#0f172a;--text-secondary:#475569;--accent-primary:#475569;--accent-light:#64748b;}
    [data-theme="ocean-dark"]{--bg-primary:#0a1214;--bg-secondary:#0e181c;--bg-card:#152228;--bg-hover:#1c2d35;--border-default:#243842;--text-primary:#e5f0f3;--text-secondary:#8faab5;--accent-primary:#14b8a6;--accent-light:#2dd4bf;}
    [data-theme="ocean-light"]{--bg-primary:#f0fdfa;--bg-secondary:#e0f7f4;--bg-card:#ffffff;--bg-hover:#ccfbf1;--border-default:#99f6e4;--text-primary:#134e4a;--text-secondary:#2d6a66;--accent-primary:#0d9488;--accent-light:#14b8a6;}
    [data-theme="midnight-dark"],[data-theme="midnight"]{--bg-primary:#09090b;--bg-secondary:#0f0f12;--bg-card:#18181d;--bg-hover:#222228;--border-default:#27272f;--text-primary:#eeeef0;--text-secondary:#9898a4;--accent-primary:#8b5cf6;--accent-light:#a78bfa;}
    [data-theme="lavender-light"],[data-theme="lavender"]{--bg-primary:#faf5ff;--bg-secondary:#f3e8ff;--bg-card:#ffffff;--bg-hover:#ede4ff;--border-default:#d8b4fe;--text-primary:#3b1d5c;--text-secondary:#6b4d8a;--accent-primary:#9333ea;--accent-light:#a855f7;}
    [data-theme="forest-dark"],[data-theme="forest"]{--bg-primary:#071209;--bg-secondary:#0c1f10;--bg-card:#132a18;--bg-hover:#1a3820;--border-default:#234428;--text-primary:#e5f5e8;--text-secondary:#8fb898;--accent-primary:#22c55e;--accent-light:#4ade80;}
    [data-theme="mint-light"],[data-theme="mint"]{--bg-primary:#f0fdf4;--bg-secondary:#dcfce7;--bg-card:#ffffff;--bg-hover:#bbf7d0;--border-default:#86efac;--text-primary:#14532d;--text-secondary:#3d6b4f;--accent-primary:#16a34a;--accent-light:#22c55e;}
    [data-theme="crimson-dark"],[data-theme="crimson"]{--bg-primary:#0f0708;--bg-secondary:#1a0c0e;--bg-card:#261214;--bg-hover:#331a1c;--border-default:#442225;--text-primary:#fee2e2;--text-secondary:#c9a3a5;--accent-primary:#dc2626;--accent-light:#ef4444;}
    [data-theme="coral-light"],[data-theme="coral"]{--bg-primary:#fff5f5;--bg-secondary:#fee2e2;--bg-card:#ffffff;--bg-hover:#fecaca;--border-default:#fca5a5;--text-primary:#7f1d1d;--text-secondary:#a04444;--accent-primary:#ef4444;--accent-light:#f87171;}
    [data-theme="amber-dark"],[data-theme="amber"]{--bg-primary:#0f0c05;--bg-secondary:#1a1508;--bg-card:#26200c;--bg-hover:#332a10;--border-default:#443815;--text-primary:#fef3c7;--text-secondary:#c9b896;--accent-primary:#f59e0b;--accent-light:#fbbf24;}
    [data-theme="honey-light"],[data-theme="honey"]{--bg-primary:#fffbeb;--bg-secondary:#fef3c7;--bg-card:#ffffff;--bg-hover:#fde68a;--border-default:#fcd34d;--text-primary:#78350f;--text-secondary:#a06020;--accent-primary:#d97706;--accent-light:#f59e0b;}
    [data-theme="rose-dark"],[data-theme="rose"]{--bg-primary:#0f070a;--bg-secondary:#1a0c12;--bg-card:#26121a;--bg-hover:#331a24;--border-default:#44222e;--text-primary:#ffe4ec;--text-secondary:#c9a3b0;--accent-primary:#ec4899;--accent-light:#f472b6;}
    [data-theme="sky-light"],[data-theme="sky"]{--bg-primary:#f0f9ff;--bg-secondary:#e0f2fe;--bg-card:#ffffff;--bg-hover:#bae6fd;--border-default:#7dd3fc;--text-primary:#0c4a6e;--text-secondary:#3a6a8a;--accent-primary:#0284c7;--accent-light:#0ea5e9;}
    [data-theme="cyber-dark"],[data-theme="cyber"]{--bg-primary:#0a0a0f;--bg-secondary:#0f0f18;--bg-card:#151522;--bg-hover:#1c1c2e;--border-default:#2a2a44;--text-primary:#e0e0ff;--text-secondary:#9090c0;--accent-primary:#00ff88;--accent-light:#44ffaa;}
    [data-theme="sand-light"],[data-theme="sand"]{--bg-primary:#fefcf8;--bg-secondary:#faf6ee;--bg-card:#ffffff;--bg-hover:#f5efe0;--border-default:#e8dcc8;--text-primary:#44402a;--text-secondary:#6a6550;--accent-primary:#a89060;--accent-light:#c4aa78;}

    *{margin:0;padding:0;box-sizing:border-box;}
    html{background:var(--bg-primary);min-height:100%;}
    body{font-family:system-ui;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}

    .theme-toggle-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .theme-toggle-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .theme-toggle-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;}
    .theme-toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border-default);color:var(--text-primary);padding:12px 20px;border-radius:10px;font-size:14px;z-index:1000;display:none;white-space:nowrap;}
    .theme-toast.show{display:block;}

    .mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .mobile-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px;gap:12px;}
    .mobile-menu-toggle{background:transparent;border:none;color:var(--text-secondary);font-size:20px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .mobile-header-center{flex:1;}
    .mobile-header-title{font-size:18px;font-weight:600;}
    .business-name{font-size:12px;color:var(--accent-light);}
    .mobile-menu-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:var(--bg-primary);border-top:1px solid var(--border-default);}
    .mobile-menu-content.expanded{max-height:200px;}
    .mobile-header-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 12px;}
    .mobile-header-actions button{padding:10px;font-size:13px;background:color-mix(in srgb,var(--accent-primary) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent-primary) 30%,transparent);color:var(--accent-light);border-radius:8px;cursor:pointer;}
    .desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border-default);}

    /* KPI BAR */
    .kpi-bar{display:flex;gap:6px;padding:10px 12px;overflow-x:auto;scrollbar-width:none;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .kpi-bar::-webkit-scrollbar{display:none;}
    .kpi-pill{padding:6px 14px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border-default);white-space:nowrap;text-align:center;}
    .kpi-val{font-size:16px;font-weight:700;color:var(--accent-light);}
    .kpi-lbl{font-size:10px;color:var(--text-secondary);}

    /* TOOLBAR */
    .toolbar{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);flex-wrap:wrap;}
    .search-wrap{position:relative;flex:1;min-width:160px;}
    .search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none;}
    .search-input{width:100%;padding:10px 12px 10px 36px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:14px;}
    .search-input:focus{outline:none;border-color:var(--accent-primary);}
    .add-btn{padding:10px 16px;border-radius:8px;border:none;background:var(--accent-primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
    .add-btn:hover{background:var(--accent-light);}
    .tb-select{padding:6px 10px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:12px;}

    /* TABS */
    .tab-bar{display:flex;gap:0;border-bottom:1px solid var(--border-default);background:var(--bg-secondary);}
    .tab-btn{padding:10px 20px;font-size:13px;font-weight:600;color:var(--text-secondary);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;}
    .tab-btn:hover{color:var(--text-primary);}
    .tab-btn.active{color:var(--accent-primary);border-bottom-color:var(--accent-primary);}

    /* INVENTORY GRID */
    .inv-grid{padding:12px;display:grid;gap:10px;grid-template-columns:1fr;}
    @media(min-width:600px){.inv-grid{grid-template-columns:repeat(auto-fill,minmax(280px,1fr));}}

    .inv-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:10px;padding:14px;cursor:pointer;transition:border-color .15s,transform .1s;}
    .inv-card:hover{border-color:var(--accent-primary);transform:translateY(-2px);}
    .inv-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;}
    .inv-card-name{font-size:14px;font-weight:600;}
    .inv-card-sku{font-size:11px;color:var(--text-secondary);}
    .inv-card-value{font-size:15px;font-weight:700;color:var(--accent-light);}
    .inv-card-row{display:flex;justify-content:space-between;align-items:center;margin-top:6px;}
    .inv-qty{font-size:13px;font-weight:600;}
    .inv-qty.low{color:#f59e0b;}
    .inv-qty.out{color:#ef4444;}
    .inv-qty.good{color:#22c55e;}
    .inv-cat{font-size:11px;color:var(--text-secondary);background:var(--bg-hover);padding:2px 8px;border-radius:10px;}
    .inv-progress{margin-top:8px;height:4px;background:var(--border-default);border-radius:2px;overflow:hidden;}
    .inv-progress-bar{height:100%;border-radius:2px;background:var(--accent-primary);}

    /* GIVEN LOG */
    .given-list{padding:8px 12px 20px;}
    .given-item{background:var(--bg-card);border:1px solid var(--border-default);border-radius:8px;padding:12px;margin-bottom:8px;display:flex;align-items:center;gap:12px;}
    .given-item:hover{border-color:var(--accent-primary);}
    .given-avatar{width:36px;height:36px;border-radius:50%;background:var(--bg-hover);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--accent-light);flex-shrink:0;}
    .given-info{flex:1;min-width:0;}
    .given-name{font-size:14px;font-weight:600;}
    .given-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .given-right{text-align:right;flex-shrink:0;}
    .given-val{font-size:14px;font-weight:700;color:var(--accent-light);}
    .given-date{font-size:11px;color:var(--text-secondary);margin-top:2px;}

    .empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);font-size:14px;}
    .result-count{font-size:12px;color:var(--text-secondary);padding:6px 12px 2px;}

    /* MODAL */
    .modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px;}
    .modal-bg.active{display:flex;}
    .modal-box{background:var(--bg-secondary);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-default);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-default);}
    .modal-title{font-size:18px;font-weight:600;}
    .modal-x{background:transparent;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;}
    .modal-body{padding:20px;}
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;}
    .req{color:#ef4444;}
    .fi,.fsel,.fta{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:14px;}
    .fta{min-height:80px;resize:vertical;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-p{padding:10px 20px;border-radius:6px;border:none;background:var(--accent-primary);color:#fff;font-size:14px;font-weight:500;cursor:pointer;width:100%;}
    .btn-p:hover{background:var(--accent-light);}
    .btn-s{padding:10px 20px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:14px;cursor:pointer;width:100%;}
    .btn-s:hover{background:var(--bg-hover);}
    .btn-d{padding:10px 20px;border-radius:6px;border:none;background:#dc2626;color:#fff;font-size:14px;cursor:pointer;width:100%;}
    .sec{margin-bottom:16px;}
    .sec-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px;}

    /* MOBILE BOTTOM NAV */
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);padding:8px;z-index:100;border-top:1px solid var(--border-default);}
    .mobile-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
    .mobile-nav-row:last-child{margin-bottom:0;}
    .mobile-nav-row.three-col{grid-template-columns:1fr 1fr 1fr;}
    .mobile-nav-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:44px;}
    .mobile-nav-btn.active{background:color-mix(in srgb,var(--accent-primary) 60%,transparent);border-color:var(--accent-primary);color:var(--text-primary);}
    .mobile-nav-btn.action-btn{background:color-mix(in srgb,var(--accent-primary) 20%,transparent);border-color:color-mix(in srgb,var(--accent-primary) 50%,transparent);color:var(--accent-light);}

    @media(max-width:768px){
      .desktop-header{display:none!important;}
      .mobile-top-header{display:block;}
      .mobile-bottom-nav{display:block!important;}
      body{padding-bottom:120px;}
      .fr{grid-template-columns:1fr;}
      .modal-bg{align-items:flex-end;padding:0;}
      .modal-box{border-radius:20px 20px 0 0;max-height:92vh;}
    }
    @media(min-width:769px){
      .mobile-top-header{display:none!important;}
      .mobile-bottom-nav{display:none!important;}
    }
  </style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-top-header">
  <div class="mobile-header-bar">
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-header-center">
      <div class="mobile-header-title">Swag</div>
      <div class="business-name" id="mBiz">Loading...</div>
    </div>
    <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
  </div>
  <div class="mobile-menu-content" id="mobileMenuContent">
    <div class="mobile-header-actions">
      <button onclick="location.href='sharklaw-settings.html'">Settings</button>
      <button onclick="location.href='v2-sharklaw-contacts.html'">Contacts</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div style="padding:16px 24px 8px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <h1 style="margin:0;font-size:32px;font-weight:600;">Swag</h1>
      <div class="business-name" id="dBiz">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
      <a onclick="logout()" style="color:var(--text-secondary);cursor:pointer;font-size:14px;">Logout</a>
    </div>
  </div>
  <div style="padding:0 24px 12px;">
    <nav style="display:flex;gap:24px;align-items:center;">
      <a href="v2-sharklaw-dashboard.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Dashboard</a>
      <a href="v2-sharklaw-scheduler.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Scheduler</a>
      <a href="v2-sharklaw-contacts.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Contacts</a>
      <a href="v2-sharklaw-pipeline.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Pipeline</a>
      <a href="v2-sharklaw-swag.html" style="padding:12px 0;color:var(--accent-primary);text-decoration:none;font-size:14px;border-bottom:2px solid var(--accent-primary);">Swag</a>
      <a href="sharklaw-settings.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Settings</a>
    </nav>
  </div>
</div>

<!-- KPI BAR -->
<div class="kpi-bar" id="kpiBar">
  <div class="kpi-pill"><div class="kpi-val" id="kTotalItems">—</div><div class="kpi-lbl">Items</div></div>
  <div class="kpi-pill"><div class="kpi-val" id="kTotalQty">—</div><div class="kpi-lbl">In Stock</div></div>
  <div class="kpi-pill"><div class="kpi-val" id="kTotalValue">—</div><div class="kpi-lbl">Total Value</div></div>
  <div class="kpi-pill"><div class="kpi-val" id="kGivenOut">—</div><div class="kpi-lbl">Given Out</div></div>
  <div class="kpi-pill"><div class="kpi-val" id="kLowStock">—</div><div class="kpi-lbl">Low Stock</div></div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab-btn active" id="tabInv" onclick="setTab('inventory')">📦 Inventory</button>
  <button class="tab-btn" id="tabGiven" onclick="setTab('given')">🎁 Given Log</button>
</div>

<!-- TOOLBAR -->
<div class="toolbar">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="searchBox" placeholder="Search swag..." oninput="renderCurrent()">
  </div>
  <select class="tb-select" id="catFilter" onchange="renderCurrent()"><option value="">All Categories</option></select>
  <button class="add-btn" id="addBtn" onclick="openAddItem()">+ Add Item</button>
</div>

<!-- CONTENT -->
<div id="invSection">
  <div class="result-count" id="invCount"></div>
  <div class="inv-grid" id="invGrid"><div class="empty-state">Loading inventory...</div></div>
</div>

<div id="givenSection" style="display:none">
  <div class="result-count" id="givenCount"></div>
  <div class="given-list" id="givenList"><div class="empty-state">Loading...</div></div>
</div>

<!-- ITEM MODAL (add/edit inventory) -->
<div class="modal-bg" id="itemModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title" id="itemModalTitle">New Swag Item</div>
      <button class="modal-x" onclick="closeItemModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="sec"><div class="sec-title">Item Details</div>
        <div class="fg"><label class="fl">Item Name <span class="req">*</span></label><input type="text" class="fi" id="iName" placeholder="e.g. T-Shirt, Hat, Sticker Pack"></div>
        <div class="fr">
          <div class="fg"><label class="fl">SKU / Code</label><input type="text" class="fi" id="iSku" placeholder="Optional"></div>
          <div class="fg"><label class="fl">Category</label><input type="text" class="fi" id="iCat" placeholder="e.g. Apparel, Accessories"></div>
        </div>
        <div class="fr">
          <div class="fg"><label class="fl">Unit Value ($) <span class="req">*</span></label><input type="number" class="fi" id="iValue" placeholder="0.00" step="0.01" min="0"></div>
          <div class="fg"><label class="fl">Quantity <span class="req">*</span></label><input type="number" class="fi" id="iQty" placeholder="0" min="0"></div>
        </div>
        <div class="fg"><label class="fl">Low Stock Alert (qty)</label><input type="number" class="fi" id="iLow" placeholder="5" min="0"></div>
        <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="iNotes" placeholder="Any notes about this item..."></textarea></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn-p" onclick="saveItem()">Save Item</button>
        <button class="btn-d" id="deleteItemBtn" style="display:none" onclick="deleteItem()">Delete Item</button>
        <button class="btn-s" onclick="closeItemModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<!-- GIVE SWAG MODAL -->
<div class="modal-bg" id="giveModal">
  <div class="modal-box">
    <div class="modal-head">
      <div class="modal-title">Give Swag</div>
      <button class="modal-x" onclick="closeGiveModal()">&times;</button>
    </div>
    <div class="modal-body">
      <div class="sec"><div class="sec-title">Give to Contact</div>
        <div class="fg"><label class="fl">Contact <span class="req">*</span></label><select class="fsel" id="gContact"><option value="">-- Select Contact --</option></select></div>
        <div class="fg"><label class="fl">Item <span class="req">*</span></label><select class="fsel" id="gItem" onchange="updateGiveValue()"><option value="">-- Select Item --</option></select></div>
        <div class="fr">
          <div class="fg"><label class="fl">Quantity</label><input type="number" class="fi" id="gQty" value="1" min="1" oninput="updateGiveValue()"></div>
          <div class="fg"><label class="fl">Total Value ($)</label><input type="number" class="fi" id="gValue" placeholder="0.00" step="0.01"></div>
        </div>
        <div class="fg"><label class="fl">Notes</label><textarea class="fta" id="gNotes" placeholder="Optional notes..."></textarea></div>
      </div>
      <div style="display:flex;flex-direction:column;gap:10px;">
        <button class="btn-p" onclick="saveGive()">Give Swag</button>
        <button class="btn-s" onclick="closeGiveModal()">Cancel</button>
      </div>
    </div>
  </div>
</div>

<div class="mobile-bottom-nav">
  <div class="mobile-nav-row">
    <a href="v2-sharklaw-dashboard.html" class="mobile-nav-btn">Dashboard</a>
    <a href="v2-sharklaw-scheduler.html" class="mobile-nav-btn">Scheduler</a>
  </div>

    <a href="v2-sharklaw-pipeline.html" class="mobile-nav-btn">Funnel</a>
    <a href="v2-sharklaw-swag.html" class="mobile-nav-btn active">Swag</a>
  </div>
</div>
<div class="theme-toast" id="themeToast"></div>

<script>
var SB_URL='https://wiwbmvmgrutjfbnqhfnb.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
var sb=window.supabase.createClient(SB_URL,SB_KEY);

var currentTenantId=null,currentUserId=null,currentUserRole=null;
var allItems=[],allGiven=[],allContacts=[];
var curTab='inventory',editItemId=null;

var THEME_NAMES={'dark-blue':'Dark Blue','blue-light':'Blue Light','slate-dark':'Slate Dark','slate-light':'Slate Light','ocean-dark':'Ocean Dark','ocean-light':'Ocean Light','midnight-dark':'Midnight','lavender-light':'Lavender','forest-dark':'Forest','mint-light':'Mint','crimson-dark':'Crimson','coral-light':'Coral','amber-dark':'Amber','honey-light':'Honey','rose-dark':'Rose','sky-light':'Sky','cyber-dark':'Cyber','sand-light':'Sand'};
var userThemeBank=['dark-blue'],themeIndex=0;
function loadTheme(){var t=localStorage.getItem('app-theme')||'dark-blue';document.documentElement.setAttribute('data-theme',t);themeIndex=userThemeBank.indexOf(t);if(themeIndex<0)themeIndex=0;}
function cycleTheme(){if(userThemeBank.length<=1){showToast('Unlock more themes in Settings!');return;}themeIndex=(themeIndex+1)%userThemeBank.length;var t=userThemeBank[themeIndex];document.documentElement.setAttribute('data-theme',t);localStorage.setItem('app-theme',t);showToast(THEME_NAMES[t]||t);}
async function loadUserThemeBank(){if(!currentUserId)return;try{var r=await sb.from('user_theme_bank').select('theme_key').eq('member_id',currentUserId);if(r.data&&r.data.length>0){userThemeBank=['dark-blue'].concat(r.data.map(function(t){return t.theme_key;}));userThemeBank=[...new Set(userThemeBank)];}loadTheme();}catch(e){}}
loadTheme();

function showToast(msg){var t=document.getElementById('themeToast');t.textContent=msg;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2000);}
async function logout(){await sb.auth.signOut();localStorage.clear();location.replace('login.html');}
function toggleMobileMenu(){document.getElementById('mobileMenuContent').classList.toggle('expanded');}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function contactName(id){var c=allContacts.find(function(x){return x.contact_id===id;});if(!c)return'Unknown';return((c.first_name||'')+' '+(c.last_name||'')).trim();}
function contactInitials(id){var c=allContacts.find(function(x){return x.contact_id===id;});if(!c)return'?';return(((c.first_name||'')[0]||'')+((c.last_name||'')[0]||'')).toUpperCase()||'?';}
function itemName(id){var i=allItems.find(function(x){return x.item_id===id;});return i?i.name:'Unknown';}

/* ===== TABS ===== */
function setTab(t){
  curTab=t;
  document.getElementById('tabInv').classList.toggle('active',t==='inventory');
  document.getElementById('tabGiven').classList.toggle('active',t==='given');
  document.getElementById('invSection').style.display=t==='inventory'?'':'none';
  document.getElementById('givenSection').style.display=t==='given'?'':'none';
  document.getElementById('addBtn').textContent=t==='inventory'?'+ Add Item':'+ Give Swag';
  document.getElementById('addBtn').onclick=t==='inventory'?openAddItem:openGiveModal;
  document.getElementById('catFilter').style.display=t==='inventory'?'':'none';
  renderCurrent();
}

function renderCurrent(){if(curTab==='inventory')renderInventory();else renderGiven();}

/* ===== KPI ===== */
function renderKpis(){
  document.getElementById('kTotalItems').textContent=allItems.length;
  var totalQty=allItems.reduce(function(s,i){return s+(i.quantity||0);},0);
  document.getElementById('kTotalQty').textContent=totalQty;
  var totalVal=allItems.reduce(function(s,i){return s+((i.value||0)*(i.quantity||0));},0);
  document.getElementById('kTotalValue').textContent='$'+totalVal.toFixed(0);
  var givenVal=allGiven.reduce(function(s,g){return s+(parseFloat(g.value)||0);},0);
  document.getElementById('kGivenOut').textContent='$'+givenVal.toFixed(0);
  var low=allItems.filter(function(i){return(i.quantity||0)<=(i.low_stock_alert||5)&&(i.quantity||0)>0;}).length;
  document.getElementById('kLowStock').textContent=low;
}

/* ===== INVENTORY ===== */
function renderInventory(){
  var q=(document.getElementById('searchBox').value||'').trim().toLowerCase();
  var cat=document.getElementById('catFilter').value;
  var list=allItems.filter(function(i){
    if(cat&&(i.category||'')!==cat)return false;
    if(!q)return true;
    return(i.name||'').toLowerCase().includes(q)||(i.sku||'').toLowerCase().includes(q)||(i.category||'').toLowerCase().includes(q);
  });
  document.getElementById('invCount').textContent=list.length+' item'+(list.length!==1?'s':'');
  if(!list.length){document.getElementById('invGrid').innerHTML='<div class="empty-state">No items found</div>';return;}
  document.getElementById('invGrid').innerHTML=list.map(function(item){
    var qty=item.quantity||0;
    var low=item.low_stock_alert||5;
    var qtyClass=qty===0?'out':qty<=low?'low':'good';
    var qtyLabel=qty===0?'Out of Stock':qty<=low?qty+' — Low Stock':qty+' in stock';
    var maxQty=Math.max(item.initial_quantity||qty*2||10,1);
    var pct=Math.min(100,Math.round((qty/maxQty)*100));
    return '<div class="inv-card" onclick="openEditItem(\''+item.item_id+'\')">'+
      '<div class="inv-card-header">'+
        '<div><div class="inv-card-name">'+esc(item.name)+'</div>'+(item.sku?'<div class="inv-card-sku">SKU: '+esc(item.sku)+'</div>':'')+'</div>'+
        '<div class="inv-card-value">$'+parseFloat(item.value||0).toFixed(2)+'</div>'+
      '</div>'+
      '<div class="inv-card-row">'+
        '<span class="inv-qty '+qtyClass+'">'+qtyLabel+'</span>'+
        (item.category?'<span class="inv-cat">'+esc(item.category)+'</span>':'')+
      '</div>'+
      '<div class="inv-progress"><div class="inv-progress-bar" style="width:'+pct+'%;background:'+(qty===0?'#ef4444':qty<=low?'#f59e0b':'var(--accent-primary)')+'"></div></div>'+
      (item.notes?'<div style="font-size:11px;color:var(--text-secondary);margin-top:6px;">'+esc(item.notes)+'</div>':'')+
    '</div>';
  }).join('');
}

/* ===== GIVEN LOG ===== */
function renderGiven(){
  var q=(document.getElementById('searchBox').value||'').trim().toLowerCase();
  var list=allGiven.filter(function(g){
    if(!q)return true;
    var cn=contactName(g.contact_id).toLowerCase();
    var iname=(itemName(g.item_id)||'').toLowerCase();
    return cn.includes(q)||iname.includes(q);
  });
  list.sort(function(a,b){return(b.given_at||'').localeCompare(a.given_at||'');});
  document.getElementById('givenCount').textContent=list.length+' record'+(list.length!==1?'s':'');
  if(!list.length){document.getElementById('givenList').innerHTML='<div class="empty-state">No swag given yet</div>';return;}
  document.getElementById('givenList').innerHTML=list.map(function(g){
    var ini=contactInitials(g.contact_id);
    var cn=contactName(g.contact_id);
    var iname=itemName(g.item_id);
    var dt=g.given_at?new Date(g.given_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}):'';
    var val=parseFloat(g.value||0);
    var qty=g.quantity||1;
    return '<div class="given-item">'+
      '<div class="given-avatar">'+esc(ini)+'</div>'+
      '<div class="given-info">'+
        '<div class="given-name">'+esc(cn)+'</div>'+
        '<div class="given-sub">'+esc(iname)+(qty>1?' × '+qty:'')+(g.notes?' · '+esc(g.notes):'')+'</div>'+
      '</div>'+
      '<div class="given-right">'+
        '<div class="given-val">$'+val.toFixed(2)+'</div>'+
        '<div class="given-date">'+dt+'</div>'+
      '</div>'+
    '</div>';
  }).join('');
}

/* ===== ITEM MODAL ===== */
function openAddItem(){
  editItemId=null;
  document.getElementById('itemModalTitle').textContent='New Swag Item';
  document.getElementById('deleteItemBtn').style.display='none';
  ['iName','iSku','iCat','iNotes'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('iValue').value='';
  document.getElementById('iQty').value='';
  document.getElementById('iLow').value='5';
  document.getElementById('itemModal').classList.add('active');
}

function openEditItem(id){
  var item=allItems.find(function(x){return x.item_id===id;});if(!item)return;
  editItemId=id;
  document.getElementById('itemModalTitle').textContent='Edit Item';
  document.getElementById('deleteItemBtn').style.display='block';
  document.getElementById('iName').value=item.name||'';
  document.getElementById('iSku').value=item.sku||'';
  document.getElementById('iCat').value=item.category||'';
  document.getElementById('iValue').value=item.value||'';
  document.getElementById('iQty').value=item.quantity||'';
  document.getElementById('iLow').value=item.low_stock_alert||5;
  document.getElementById('iNotes').value=item.notes||'';
  document.getElementById('itemModal').classList.add('active');
}

function closeItemModal(){document.getElementById('itemModal').classList.remove('active');}

async function saveItem(){
  var name=document.getElementById('iName').value.trim();
  var value=parseFloat(document.getElementById('iValue').value)||0;
  var qty=parseInt(document.getElementById('iQty').value)||0;
  if(!name){alert('Item name is required.');return;}
  var payload={tenant_id:currentTenantId,name:name,sku:document.getElementById('iSku').value.trim()||null,category:document.getElementById('iCat').value.trim()||null,value:value,quantity:qty,initial_quantity:qty,low_stock_alert:parseInt(document.getElementById('iLow').value)||5,notes:document.getElementById('iNotes').value.trim()||null};
  if(editItemId){
    var r=await sb.from('swag_inventory').update(payload).eq('item_id',editItemId);
    if(r.error){alert('Error: '+r.error.message);return;}
    var idx=allItems.findIndex(function(x){return x.item_id===editItemId;});
    if(idx>=0)Object.assign(allItems[idx],payload);
  } else {
    var r=await sb.from('swag_inventory').insert(payload).select().single();
    if(r.error){alert('Error: '+r.error.message);return;}
    allItems.push(r.data);
    updateCatFilter();
  }
  closeItemModal();renderKpis();renderInventory();showToast('Saved!');
}

async function deleteItem(){
  if(!confirm('Delete this item? This cannot be undone.'))return;
  var r=await sb.from('swag_inventory').delete().eq('item_id',editItemId);
  if(r.error){alert('Error: '+r.error.message);return;}
  allItems=allItems.filter(function(x){return x.item_id!==editItemId;});
  closeItemModal();renderKpis();renderInventory();updateCatFilter();showToast('Deleted');
}

/* ===== GIVE MODAL ===== */
function openGiveModal(){
  document.getElementById('gContact').value='';
  document.getElementById('gItem').value='';
  document.getElementById('gQty').value='1';
  document.getElementById('gValue').value='';
  document.getElementById('gNotes').value='';
  document.getElementById('giveModal').classList.add('active');
}
function closeGiveModal(){document.getElementById('giveModal').classList.remove('active');}

function updateGiveValue(){
  var itemId=document.getElementById('gItem').value;
  var qty=parseInt(document.getElementById('gQty').value)||1;
  var item=allItems.find(function(x){return x.item_id===itemId;});
  if(item){document.getElementById('gValue').value=(parseFloat(item.value||0)*qty).toFixed(2);}
}

async function saveGive(){
  var contactId=document.getElementById('gContact').value;
  var itemId=document.getElementById('gItem').value;
  var qty=parseInt(document.getElementById('gQty').value)||1;
  var value=parseFloat(document.getElementById('gValue').value)||0;
  if(!contactId||!itemId){alert('Contact and item are required.');return;}
  // Check stock
  var item=allItems.find(function(x){return x.item_id===itemId;});
  if(item&&(item.quantity||0)<qty){if(!confirm('Only '+item.quantity+' in stock. Give anyway?'))return;}
  var payload={tenant_id:currentTenantId,contact_id:contactId,item_id:itemId,quantity:qty,value:value,given_by:currentUserId,given_at:new Date().toISOString(),notes:document.getElementById('gNotes').value.trim()||null};
  var r=await sb.from('swag_given').insert(payload).select().single();
  if(r.error){alert('Error: '+r.error.message);return;}
  allGiven.push(r.data);
  // Decrement inventory
  if(item){
    var newQty=Math.max(0,(item.quantity||0)-qty);
    await sb.from('swag_inventory').update({quantity:newQty}).eq('item_id',itemId);
    item.quantity=newQty;
  }
  closeGiveModal();renderKpis();renderInventory();renderGiven();showToast('Swag given!');
}

function updateCatFilter(){
  var cats=[...new Set(allItems.map(function(i){return i.category||'';}).filter(Boolean))].sort();
  var sel=document.getElementById('catFilter');
  var cur=sel.value;
  sel.innerHTML='<option value="">All Categories</option>'+cats.map(function(c){return'<option value="'+esc(c)+'"'+(c===cur?' selected':'')+'>'+esc(c)+'</option>';}).join('');
}

/* ===== AUTH & INIT ===== */
async function checkAuth(){
  var r=await sb.auth.getSession(),s=r.data.session;
  if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.href='login.html';return null;}}
  return s;
}

async function init(){
  var s=await checkAuth();if(!s)return;
  var email=s.user?.email;
  if(email){
    var r=await sb.from('team_members').select('member_id,tenant_id,role,is_active,first_name,last_name').eq('email',email).single();
    if(r.data){
      if(r.data.is_active===false){await sb.auth.signOut();localStorage.clear();location.replace('login.html?reason=deactivated');return;}
      currentTenantId=r.data.tenant_id;currentUserId=r.data.member_id;currentUserRole=r.data.role;
      var biz=((r.data.first_name||'')+' '+(r.data.last_name||'')).trim()||email;
      document.getElementById('dBiz').textContent=biz;document.getElementById('mBiz').textContent=biz;
    }
  }
  if(!currentTenantId){var r2=await sb.from('business_settings').select('tenant_id').limit(1).single();if(r2.data?.tenant_id)currentTenantId=r2.data.tenant_id;}
  await loadUserThemeBank();

  // Load contacts for dropdowns
  var cr=await sb.from('contacts').select('contact_id,first_name,last_name').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false').order('last_name');
  allContacts=cr.data||[];
  var cSel=document.getElementById('gContact');
  allContacts.forEach(function(c){var n=((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';cSel.innerHTML+='<option value="'+c.contact_id+'">'+esc(n)+'</option>';});

  // Load inventory
  var ir=await sb.from('swag_inventory').select('*').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false').order('name');
  allItems=ir.data||[];
  updateCatFilter();
  var iSel=document.getElementById('gItem');
  allItems.forEach(function(i){iSel.innerHTML+='<option value="'+i.item_id+'">'+esc(i.name)+(i.quantity!==undefined?' ('+i.quantity+' left)':'')+'</option>';});

  // Load given log
  var gr=await sb.from('swag_given').select('*').eq('tenant_id',currentTenantId).order('given_at',{ascending:false});
  allGiven=gr.data||[];

  renderKpis();
  renderInventory();
}

init();
</script>
