<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Goals & Dreams — Life Logic</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg-primary:#f4f5f7;--bg-secondary:#ebedf1;--bg-card:#ffffff;--bg-hover:#f0f0f3;
  --border:#e2e4e8;--text-primary:#1a1a1a;--text-secondary:#6b7280;
  --accent:#4F46E5;--accent-hover:#4338CA;
  --accent-glow:rgba(79,70,229,.10);
  --shadow:0 2px 12px rgba(0,0,0,.06);--input-bg:#fafafa;--modal-overlay:rgba(0,0,0,.45);
  --green:#16A34A;--red:#DC2626;--yellow:#D97706;--orange:#EA580C;--purple:#7C3AED;--blue:#2563EB;
}
body.dark{
  --bg-primary:#111;--bg-secondary:#1a1a1a;--bg-card:#222;--bg-hover:#2a2a2a;
  --border:#333;--text-primary:#f0f0f0;--text-secondary:#999;
  --accent:#6366F1;--accent-hover:#818CF8;
  --accent-glow:rgba(99,102,241,.15);
  --shadow:0 2px 12px rgba(0,0,0,.3);--input-bg:#1a1a1a;--modal-overlay:rgba(0,0,0,.75);
}
html{background:var(--bg-primary);}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);padding-bottom:140px;}

.desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border);}
.header-top{padding:10px 24px;display:flex;justify-content:space-between;align-items:center;}
.header-left{display:flex;align-items:center;gap:16px;}
.brand-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-titles h1{font-size:24px;font-weight:700;}
.header-titles .sub{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.header-right{display:flex;gap:10px;align-items:center;}
.dark-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dark-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.settings-link,.logout-link{font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.settings-link:hover,.logout-link:hover{color:var(--text-primary);background:var(--bg-hover);}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:0 24px;border-top:1px solid var(--border);}
.nav-left{display:flex;gap:4px;}
.nav-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;border-radius:8px;}
.nav-btn:hover{color:var(--text-primary);background:var(--bg-hover);}
.nav-btn.active{color:var(--accent);font-weight:600;}
.nav-right-controls{display:flex;gap:8px;padding:6px 0;}
.btn-add{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-add:hover{background:var(--accent-hover);}

.mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border);}
.m-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.m-title{font-size:17px;font-weight:700;}
.m-sub{font-size:10px;color:var(--accent);font-weight:600;}
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 12px 20px;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.m-nav-top{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.m-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:10px;text-decoration:none;color:var(--text-secondary);font-size:10px;font-weight:500;}
.m-nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.m-nav-btn.active{color:var(--accent);}
.m-nav-btn.active svg{stroke:var(--accent);}

.fab{position:fixed;bottom:90px;right:20px;z-index:300;width:52px;height:52px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.4);display:none;align-items:center;justify-content:center;}
@media(max-width:768px){.fab{display:flex;}}

.page-wrap{max-width:1000px;margin:0 auto;padding:20px 24px;}

/* TABS */
.goal-tabs{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none;}
.goal-tabs::-webkit-scrollbar{display:none;}
.goal-tab{flex-shrink:0;padding:9px 18px;border-radius:20px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-secondary);font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;}
.goal-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:600;}
.goal-tab-count{background:rgba(255,255,255,.3);padding:1px 6px;border-radius:8px;font-size:11px;font-weight:700;}

/* GOALS GRID */
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px;}
.goal-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .2s;box-shadow:var(--shadow);}
.goal-card:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.1);}
.goal-card-header{padding:16px 16px 12px;position:relative;}
.goal-type-banner{position:absolute;top:0;left:0;right:0;height:3px;}
.goal-header-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:8px;}
.goal-icon{font-size:28px;line-height:1;}
.goal-status-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:10px;text-transform:uppercase;letter-spacing:.3px;}
.status-dreaming{background:rgba(124,58,237,.1);color:var(--purple);}
.status-planning{background:rgba(37,99,235,.1);color:var(--blue);}
.status-booked{background:rgba(22,163,74,.1);color:var(--green);}
.status-done{background:rgba(107,114,128,.1);color:var(--text-secondary);}
.status-in_progress{background:rgba(79,70,229,.1);color:var(--accent);}
.goal-name{font-size:16px;font-weight:700;margin-bottom:4px;}
.goal-desc{font-size:13px;color:var(--text-secondary);line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.goal-card-footer{padding:10px 16px 14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.goal-meta{font-size:12px;color:var(--text-secondary);}
.goal-meta strong{color:var(--text-primary);font-weight:600;}
.goal-cost{font-size:13px;font-weight:700;color:var(--green);}

/* ADD CARD */
.goal-add-card{background:var(--bg-card);border:2px dashed var(--border);border-radius:16px;padding:32px;text-align:center;cursor:pointer;color:var(--text-secondary);font-size:13px;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:8px;}
.goal-add-card:hover{border-color:var(--accent);color:var(--accent);}
.goal-add-card .add-icon{font-size:32px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-content{background:var(--bg-card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.modal-content{border-radius:16px;margin-bottom:20px;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:72px;font-family:inherit;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.btn-primary{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{padding:12px 20px;background:var(--bg-hover);color:var(--text-primary);border:1px solid var(--border);border-radius:10px;font-size:15px;cursor:pointer;}
.btn-danger{padding:10px 16px;background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2);border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;}

/* TYPE ICONS */
.type-icons{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.type-icon-opt{padding:10px;border-radius:10px;border:2px solid var(--border);text-align:center;cursor:pointer;transition:all .15s;}
.type-icon-opt:hover{border-color:var(--accent);}
.type-icon-opt.selected{border-color:var(--accent);background:var(--accent-glow);}
.type-icon-opt .ti-icon{font-size:20px;margin-bottom:3px;}
.type-icon-opt .ti-label{font-size:10px;font-weight:600;color:var(--text-secondary);}

#toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
body.dark #toast{background:#f0f0f0;color:#111;}

.empty-state{text-align:center;padding:60px 20px;color:var(--text-secondary);}
.empty-state-icon{font-size:56px;margin-bottom:14px;}
.empty-state-title{font-size:17px;font-weight:600;color:var(--text-primary);margin-bottom:6px;}

@media(max-width:768px){
  .desktop-header{display:none;}
  .mobile-top-header{display:block;}
  .mobile-bottom-nav{display:block;}
  .page-wrap{padding:12px 12px;}
  .goals-grid{grid-template-columns:1fr;}
  .form-row{grid-template-columns:1fr;}
}
@media(min-width:769px){
  .mobile-top-header{display:none;}
  .mobile-bottom-nav{display:none;}
  .fab{display:none;}
}
  </style>
</head>

<script>
var SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
var userId = null;
var allGoals = [], allCategories = [];
var editingGoalId = null, selectedType = 'goal';
var activeTab = 'all';

var isDark = localStorage.getItem('ll_dark_mode') === 'true';
if (isDark) document.body.classList.add('dark');
function applyDarkIcons() {
  var d = document.body.classList.contains('dark');
  ['dMoon','mMoon'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=d?'none':'block'; });
  ['dSun','mSun'].forEach(function(id){ var el=document.getElementById(id); if(el) el.style.display=d?'block':'none'; });
}
applyDarkIcons();
function toggleDark() { document.body.classList.toggle('dark'); isDark=document.body.classList.contains('dark'); localStorage.setItem('ll_dark_mode',isDark); applyDarkIcons(); }
function toast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); clearTimeout(t._t); t._t=setTimeout(function(){ t.classList.remove('show'); },2400); }
async function doLogout() { await sb.auth.signOut(); localStorage.removeItem('sb_access_token'); localStorage.removeItem('sb_refresh_token'); location.replace('/'); }
async function checkAuth() {
  var r=await sb.auth.getSession(); var s=r.data.session;
  if(!s){ var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token'); if(t&&rf){ var sr=await sb.auth.setSession({access_token:t,refresh_token:rf}); s=sr.data?.session; } if(!s){ location.replace('/'); return null; } }
  return s;
}
function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatDate(d){ if(!d) return ''; var dt=new Date(d+'T00:00:00'); return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'}); }

var TYPE_CONFIG = {
  goal:       { icon:'🎯', label:'Goal',        color:'#4F46E5', bgColor:'rgba(79,70,229,.08)' },
  vacation:   { icon:'✈️', label:'Vacation',    color:'#2563EB', bgColor:'rgba(37,99,235,.08)' },
  bucket_list:{ icon:'🪣', label:'Bucket List', color:'#7C3AED', bgColor:'rgba(124,58,237,.08)' },
  someday:    { icon:'🌙', label:'Someday',     color:'#D97706', bgColor:'rgba(217,119,6,.08)' }
};
var STATUS_LABELS = { dreaming:'🌟 Dreaming', planning:'📋 Planning', in_progress:'🔄 In Progress', booked:'✅ Booked', done:'🎉 Done' };

function switchTab(btn) {
  document.querySelectorAll('.goal-tab').forEach(function(b){ b.classList.remove('active'); });
  btn.classList.add('active');
  activeTab = btn.dataset.type;
  renderGoals();
}

function updateCounts() {
  var types = ['goal','vacation','bucket_list','someday','done'];
  var total = allGoals.filter(function(g){ return g.is_active; });
  document.getElementById('cnt-all').textContent = total.length;
  types.forEach(function(t){
    var el = document.getElementById('cnt-' + t);
    if (!el) return;
    if (t === 'done') el.textContent = total.filter(function(g){ return g.status==='done'; }).length;
    else el.textContent = total.filter(function(g){ return g.type===t && g.status!=='done'; }).length;
  });
}

function renderGoals() {
  updateCounts();
  var goals = allGoals.filter(function(g){ return g.is_active; });
  if (activeTab !== 'all') {
    if (activeTab === 'done') goals = goals.filter(function(g){ return g.status==='done'; });
    else goals = goals.filter(function(g){ return g.type===activeTab && g.status!=='done'; });
  }
  var grid = document.getElementById('goalsGrid');
  if (!goals.length) {
    var emptyMsgs = { all:'Add your first goal or dream!', goal:'Set a goal to work toward.', vacation:'Plan your next adventure!', bucket_list:'What do you want to experience in life?', someday:'What\'s on your "someday" list?', done:'Complete some goals to see them here.' };
    var typeConfig = TYPE_CONFIG[activeTab] || TYPE_CONFIG.goal;
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1;"><div class="empty-state-icon">'+(TYPE_CONFIG[activeTab]?TYPE_CONFIG[activeTab].icon:'🌟')+'</div><div class="empty-state-title">'+esc(emptyMsgs[activeTab]||'Nothing here yet')+'</div></div><div class="goal-add-card" onclick="openGoalModal()"><div class="add-icon">+</div><span>Add a '+activeTab.replace('_',' ')+'</span></div>';
    return;
  }
  grid.innerHTML = goals.map(function(g){
    var tc = TYPE_CONFIG[g.type] || TYPE_CONFIG.goal;
    var cat = allCategories.find(function(c){ return c.id===g.category_id; });
    var statusLabel = STATUS_LABELS[g.status] || g.status;
    var statusClass = 'status-' + (g.status||'dreaming');
    return '<div class="goal-card" onclick="openGoalModal(\''+g.id+'\')">' +
      '<div class="goal-type-banner" style="background:'+tc.color+'"></div>' +
      '<div class="goal-card-header">' +
        '<div class="goal-header-top">' +
          '<div class="goal-icon">'+tc.icon+'</div>' +
          '<span class="goal-status-badge '+statusClass+'">'+esc(statusLabel)+'</span>' +
        '</div>' +
        '<div class="goal-name">'+esc(g.name)+'</div>' +
        (g.description ? '<div class="goal-desc">'+esc(g.description)+'</div>' : '') +
      '</div>' +
      '<div class="goal-card-footer">' +
        '<div class="goal-meta">' +
          (g.target_date ? '<div>📅 <strong>'+formatDate(g.target_date)+'</strong></div>' : '') +
          (cat ? '<div>'+cat.icon+' '+esc(cat.name)+'</div>' : '') +
        '</div>' +
        (g.estimated_cost ? '<div class="goal-cost">$'+Number(g.estimated_cost).toLocaleString()+'</div>' : '') +
      '</div>' +
    '</div>';
  }).join('') + '<div class="goal-add-card" onclick="openGoalModal()"><div class="add-icon">+</div><span>Add new</span></div>';
}

function selectType(el) {
  document.querySelectorAll('.type-icon-opt').forEach(function(x){ x.classList.remove('selected'); });
  el.classList.add('selected');
  selectedType = el.dataset.type;
}

function openGoalModal(goalId) {
  editingGoalId = goalId || null;
  selectedType = 'goal';
  document.getElementById('goalModalTitle').textContent = goalId ? 'Edit Goal' : 'New Goal';
  document.getElementById('goalDeleteBtn').style.display = goalId ? 'block' : 'none';
  document.getElementById('goalName').value = '';
  document.getElementById('goalDesc').value = '';
  document.getElementById('goalStatus').value = 'dreaming';
  document.getElementById('goalDate').value = '';
  document.getElementById('goalCost').value = '';
  document.getElementById('goalCat').value = '';
  // Populate cats
  var catSel = document.getElementById('goalCat');
  catSel.innerHTML = '<option value="">None</option>' + allCategories.map(function(c){ return '<option value="'+c.id+'">'+c.icon+' '+esc(c.name)+'</option>'; }).join('');
  // Reset type grid
  document.querySelectorAll('.type-icon-opt').forEach(function(x){ x.classList.remove('selected'); });
  document.querySelector('.type-icon-opt[data-type="goal"]').classList.add('selected');
  if (goalId) {
    var g = allGoals.find(function(x){ return x.id===goalId; });
    if (g) {
      document.getElementById('goalName').value = g.name||'';
      document.getElementById('goalDesc').value = g.description||'';
      document.getElementById('goalStatus').value = g.status||'dreaming';
      document.getElementById('goalDate').value = g.target_date||'';
      document.getElementById('goalCost').value = g.estimated_cost||'';
      document.getElementById('goalCat').value = g.category_id||'';
      selectedType = g.type||'goal';
      var typeEl = document.querySelector('.type-icon-opt[data-type="'+selectedType+'"]');
      if (typeEl) { document.querySelectorAll('.type-icon-opt').forEach(function(x){ x.classList.remove('selected'); }); typeEl.classList.add('selected'); }
    }
  }
  document.getElementById('goalModal').classList.add('open');
}
function closeGoalModal() { document.getElementById('goalModal').classList.remove('open'); }

async function saveGoal() {
  var name = document.getElementById('goalName').value.trim();
  if (!name) { toast('Please enter a name'); return; }
  var data = {
    name: name,
    description: document.getElementById('goalDesc').value.trim()||null,
    type: selectedType,
    status: document.getElementById('goalStatus').value,
    target_date: document.getElementById('goalDate').value||null,
    estimated_cost: document.getElementById('goalCost').value ? parseFloat(document.getElementById('goalCost').value) : null,
    category_id: document.getElementById('goalCat').value||null,
    user_id: userId,
    is_active: true
  };
  var r;
  if (editingGoalId) {
    r = await sb.from('todo_goals').update(data).eq('id',editingGoalId).select().single();
    if (!r.error) { var idx=allGoals.findIndex(function(g){ return g.id===editingGoalId; }); if(idx>=0) allGoals[idx]=r.data; }
  } else {
    r = await sb.from('todo_goals').insert(data).select().single();
    if (!r.error) allGoals.push(r.data);
  }
  if (r.error) { toast('Error: '+r.error.message); return; }
  toast(editingGoalId ? 'Goal updated!' : '🎯 Goal added!');
  closeGoalModal();
  renderGoals();
}

async function deleteGoal() {
  if (!editingGoalId || !confirm('Delete this goal?')) return;
  await sb.from('todo_goals').update({is_active:false}).eq('id',editingGoalId);
  allGoals = allGoals.filter(function(g){ return g.id!==editingGoalId; });
  closeGoalModal(); renderGoals(); toast('Deleted');
}

async function loadData() {
  var catRes=await sb.from('todo_categories').select('*').eq('user_id',userId).eq('is_active',true);
  allCategories=catRes.data||[];
  var goalRes=await sb.from('todo_goals').select('*').eq('user_id',userId).eq('is_active',true).order('created_at',{ascending:false});
  allGoals=goalRes.data||[];
  renderGoals();
}

async function init() {
  var s=await checkAuth(); if(!s) return;
  userId=s.user.id;
  loadData();
}
init();
</script>
</body>
</html>
