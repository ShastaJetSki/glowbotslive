<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login — Event Logic Pro</title>
  <link rel="icon" href="favicon-eventlogic.ico">
  <link rel="icon" type="image/png" href="favicon-eventlogic-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-eventlogic-192.png">
  <meta name="apple-mobile-web-app-title" content="Event Logic Pro">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f4f5f7;--bg-card:#ffffff;--border:#e2e4e8;--text:#1a1a1a;--text-sec:#6b7280;--accent:#DC2626;--accent-hover:#B91C1C;--input-bg:#fafafa;--shadow:0 4px 24px rgba(0,0,0,.08);}
body.dark{--bg:#111;--bg-card:#1a1a1a;--border:#333;--text:#f0f0f0;--text-sec:#999;--input-bg:#222;--shadow:0 4px 24px rgba(0,0,0,.4);}
html,body{height:100%;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--text);display:flex;align-items:center;justify-content:center;padding:20px;}

.login-card{background:var(--bg-card);border:1px solid var(--border);border-radius:16px;padding:40px 36px;width:100%;max-width:420px;box-shadow:var(--shadow);text-align:center;}
.login-logo{height:80px;margin-bottom:8px;object-fit:contain;}
.login-title{font-size:24px;font-weight:700;margin-bottom:4px;}
.login-sub{font-size:13px;color:var(--text-sec);margin-bottom:28px;}

.form-group{text-align:left;margin-bottom:18px;}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text-sec);margin-bottom:6px;}
.form-input{width:100%;padding:12px 16px;border-radius:10px;border:1px solid var(--border);background:var(--input-bg);color:var(--text);font-size:15px;font-family:inherit;transition:border .2s,box-shadow .2s;}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(220,38,38,.12);}
.form-input::placeholder{color:var(--text-sec);opacity:.6;}

.login-btn{width:100%;padding:14px;border-radius:10px;border:none;background:var(--accent);color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:6px;}
.login-btn:hover{background:var(--accent-hover);}
.login-btn:disabled{opacity:.6;cursor:not-allowed;}

.login-error{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#ef4444;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
.login-error.show{display:block;}

.login-links{margin-top:20px;font-size:12px;color:var(--text-sec);}
.login-links a{color:var(--accent);text-decoration:none;font-weight:600;}
.login-links a:hover{text-decoration:underline;}

.divider{display:flex;align-items:center;gap:12px;margin:18px 0 14px;}.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}.divider span{font-size:12px;color:var(--text-sec);text-transform:uppercase;letter-spacing:1px;}

.google-btn{width:100%;padding:12px;border-radius:10px;border:1px solid var(--border);background:var(--bg-card);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:10px;}
.google-btn:hover{border-color:var(--accent);box-shadow:0 0 0 3px rgba(220,38,38,.08);}
.google-btn:disabled{opacity:.6;cursor:not-allowed;}

.footer-bar{position:fixed;bottom:0;left:0;right:0;text-align:center;padding:12px 16px;background:var(--bg);}
.footer-powered{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:4px;}
.footer-powered span{color:var(--text-sec);font-size:11px;}
.footer-powered img{height:24px;}
.footer-powered a{color:var(--accent);text-decoration:none;font-weight:600;font-size:11px;}
.footer-copy{color:var(--text-sec);font-size:10px;opacity:.6;}

.dark-toggle{position:fixed;top:16px;right:16px;width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-sec);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;z-index:10;}
.dark-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dark-toggle svg{width:16px;height:16px;fill:currentColor;}

.pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-sec);cursor:pointer;padding:4px;font-size:18px;line-height:1;}
.pw-toggle:hover{color:var(--accent);}
.pw-wrap{position:relative;}

@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-6px);}40%,80%{transform:translateX(6px);}}
.shake{animation:shake .4s ease;}

@media(max-width:480px){.login-card{padding:32px 24px;border-radius:14px;}.login-logo{height:64px;}}
  </style>
</head>
<body>

<button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">
  <svg id="moonIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
  <svg id="sunIcon" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
</button>

<div class="login-card">
  <img id="loginLogo" class="login-logo" src="eventlogicpro-logo.png" alt="Event Logic Pro">
  <div class="login-title">Welcome Back</div>
  <div class="login-sub">Sign in to your Event Logic Pro account</div>

  <div class="login-error" id="loginError"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="loginEmail" placeholder="you@example.com" autocomplete="email" autofocus>
  </div>

  <div class="form-group">
    <label class="form-label">Password</label>
    <div class="pw-wrap">
      <input type="password" class="form-input" id="loginPassword" placeholder="Enter your password" autocomplete="current-password">
      <button class="pw-toggle" onclick="togglePw()" type="button" title="Show password" id="pwToggleBtn">&#128065;</button>
    </div>
  </div>

  <button class="login-btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="divider"><span>or</span></div>

  <button class="google-btn" id="googleBtn" onclick="doGoogleLogin()">
    <svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Continue with Google
  </button>

  <div class="login-links">
    <a href="#" onclick="doForgotPassword();return false;">Forgot password?</a>
  </div>
</div>

<div class="footer-bar">
  <div class="footer-powered">
    <span>Powered by</span>
    <img src="glowbot.png" alt="GlowBot">
    <a href="https://glowbotslive.com" target="_blank">GlowBotsLive.com</a>
  </div>
  <div class="footer-copy">&copy; 2026 Event Logic Pro. All rights reserved.</div>
</div>

<script>
/* ===== CONFIG ===== */
var defaultDash = 'eventlogicpro-dashboard.html';
var superAdminDash = 'eventlogicpro-superadmin.html';

/* ===== SUPER ADMIN CHECK ===== */
async function checkSuperAdmin(email, authUid) {
  try {
    // Try by auth_user_id first (works with RLS)
    if (authUid) {
      var r = await sb.from('users').select('is_super_admin').eq('auth_user_id', authUid).single();
      if (r.data && r.data.is_super_admin === true) return true;
    }
    // Fallback: try by email
    var r2 = await sb.from('users').select('is_super_admin').eq('email', email).single();
    return r2.data && r2.data.is_super_admin === true;
  } catch(e) { console.log('Super admin check error:', e); return false; }
}

async function redirectAfterAuth(session) {
  if (!session || !session.user) return;
  var email = session.user.email;
  var authUid = session.user.id;
  localStorage.setItem('sb_access_token', session.access_token);
  localStorage.setItem('sb_refresh_token', session.refresh_token);

  // Check if super admin → go to super admin dashboard
  var isSuper = await checkSuperAdmin(email, authUid);
  if (isSuper) {
    location.replace(superAdminDash);
  } else {
    location.replace(defaultDash);
  }
}

/* ===== GOOGLE OAUTH: auto-fill profile for new users ===== */
async function syncGoogleProfile(session) {
  if (!session || !session.user) return;
  var user = session.user;
  var meta = user.user_metadata || {};
  var email = user.email;
  if (!email) return;

  // Check if user exists in users table
  var r = await sb.from('users').select('user_id, display_name, avatar_url').eq('email', email).single();
  if (r.data) {
    // Existing user: update avatar/name only if blank
    var updates = {};
    if (!r.data.display_name && meta.full_name) updates.display_name = meta.full_name;
    if (!r.data.avatar_url && meta.avatar_url) updates.avatar_url = meta.avatar_url;
    if (Object.keys(updates).length) {
      updates.auth_provider = 'google';
      updates.auth_user_id = user.id;
      await sb.from('users').update(updates).eq('user_id', r.data.user_id);
    }
  } else {
    // New Google user: auto-create user record
    // Find a default tenant or create without one
    var tenantId = null;
    var bs = await sb.from('business_settings').select('tenant_id').limit(1).single();
    if (bs.data) tenantId = bs.data.tenant_id;

    await sb.from('users').insert({
      tenant_id: tenantId,
      email: email,
      first_name: meta.given_name || meta.full_name || '',
      last_name: meta.family_name || '',
      display_name: meta.full_name || '',
      avatar_url: meta.avatar_url || meta.picture || '',
      auth_user_id: user.id,
      auth_provider: 'google',
      role: 'team'
    });
  }
}

/* ===== DARK MODE ===== */
var isDark = localStorage.getItem('elp_dark_mode') === 'true';
if (isDark) document.body.classList.add('dark');
function applyDarkIcons() {
  var d = document.body.classList.contains('dark');
  var moon = document.getElementById('moonIcon');
  var sun = document.getElementById('sunIcon');
  if (moon) moon.style.display = d ? 'none' : 'block';
  if (sun) sun.style.display = d ? 'block' : 'none';
  var logo = document.getElementById('loginLogo');
  if (logo) logo.src = d ? 'eventlogicpro-logo-dark.png' : 'eventlogicpro-logo.png';
}
applyDarkIcons();
function toggleDark() {
  document.body.classList.toggle('dark');
  isDark = document.body.classList.contains('dark');
  localStorage.setItem('elp_dark_mode', isDark);
  applyDarkIcons();
}

/* ===== PASSWORD VISIBILITY ===== */
function togglePw() {
  var inp = document.getElementById('loginPassword');
  var btn = document.getElementById('pwToggleBtn');
  if (inp.type === 'password') {
    inp.type = 'text';
    btn.innerHTML = '&#128064;';
  } else {
    inp.type = 'password';
    btn.innerHTML = '&#128065;';
  }
}

/* ===== SUPABASE ===== */
var SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* ===== ERROR DISPLAY ===== */
function showError(msg) {
  var el = document.getElementById('loginError');
  el.textContent = msg;
  el.classList.add('show');
  var card = document.querySelector('.login-card');
  card.classList.remove('shake');
  void card.offsetWidth;
  card.classList.add('shake');
}
function hideError() {
  document.getElementById('loginError').classList.remove('show');
}

/* ===== CHECK IF ALREADY LOGGED IN ===== */
async function checkExistingSession() {
  try {
    var r = await sb.auth.getSession();
    var s = r.data.session;
    if (!s) {
      var t = localStorage.getItem('sb_access_token');
      var rf = localStorage.getItem('sb_refresh_token');
      if (t && rf) {
        var sr = await sb.auth.setSession({ access_token: t, refresh_token: rf });
        s = sr.data?.session;
      }
    }
    if (s) {
      await redirectAfterAuth(s);
    }
  } catch (e) {}

  // Also handle OAuth redirect callback (Google sign-in returns here)
  if (window.location.hash && window.location.hash.indexOf('access_token') >= 0) {
    var hashSession = await sb.auth.getSession();
    if (hashSession.data.session) {
      await syncGoogleProfile(hashSession.data.session);
      await redirectAfterAuth(hashSession.data.session);
    }
  }
}

/* ===== LOGIN ===== */
async function doLogin() {
  hideError();
  var email = document.getElementById('loginEmail').value.trim();
  var password = document.getElementById('loginPassword').value;
  if (!email) { showError('Please enter your email address.'); return; }
  if (!password) { showError('Please enter your password.'); return; }

  var btn = document.getElementById('loginBtn');
  btn.disabled = true;
  btn.textContent = 'Signing in...';

  try {
    var r = await sb.auth.signInWithPassword({ email: email, password: password });
    if (r.error) {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      var msg = r.error.message || 'Login failed';
      if (msg.toLowerCase().indexOf('invalid') >= 0 || msg.toLowerCase().indexOf('credentials') >= 0) {
        msg = 'Invalid email or password. Please try again.';
      }
      showError(msg);
      return;
    }

    var session = r.data.session;
    if (session) {
      localStorage.setItem('sb_access_token', session.access_token);
      localStorage.setItem('sb_refresh_token', session.refresh_token);
      await redirectAfterAuth(session);
    } else {
      btn.disabled = false;
      btn.textContent = 'Sign In';
      showError('Login failed. Please try again.');
    }
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Sign In';
    showError('Connection error. Please check your internet and try again.');
  }
}

/* ===== FORGOT PASSWORD ===== */
async function doForgotPassword() {
  var email = document.getElementById('loginEmail').value.trim();
  if (!email) {
    showError('Enter your email address first, then click "Forgot password?"');
    document.getElementById('loginEmail').focus();
    return;
  }
  hideError();
  try {
    var r = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/eventlogicpro-settings.html'
    });
    if (r.error) {
      showError(r.error.message || 'Could not send reset email.');
    } else {
      var el = document.getElementById('loginError');
      el.textContent = 'Password reset email sent! Check your inbox.';
      el.style.background = 'rgba(34,197,94,.1)';
      el.style.borderColor = 'rgba(34,197,94,.3)';
      el.style.color = '#22c55e';
      el.classList.add('show');
    }
  } catch (e) {
    showError('Could not send reset email. Please try again.');
  }
}

/* ===== GOOGLE OAUTH LOGIN ===== */
async function doGoogleLogin() {
  hideError();
  var btn = document.getElementById('googleBtn');
  btn.disabled = true;
  btn.textContent = 'Connecting to Google...';

  try {
    var r = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + window.location.pathname,
        queryParams: { prompt: 'select_account' }
      }
    });
    if (r.error) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
      showError(r.error.message || 'Google sign-in failed');
    }
    // OAuth redirects away — if we're still here, something went wrong
  } catch(e) {
    btn.disabled = false;
    btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 01-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg> Continue with Google';
    showError('Could not connect to Google. Please try again.');
  }
}

/* ===== ENTER KEY ===== */
document.getElementById('loginEmail').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { document.getElementById('loginPassword').focus(); }
});
document.getElementById('loginPassword').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') { doLogin(); }
});

/* ===== INIT ===== */
checkExistingSession();
</script>
</body>
</html>
