<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Logic Pro – Login</title>
  <link rel="icon" href="favicon-eventlogic.ico">
  <link rel="icon" type="image/png" href="favicon-eventlogic-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-eventlogic-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Event Logic Pro">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#0d0d0d;--card:#1a1a1a;--border:#2a2a2a;
  --text:#f0f0f0;--text2:#888;
  --accent:#DC2626;--accent-hover:#EF4444;
  --shadow:0 4px 32px rgba(0,0,0,.6);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}

.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 120px;}

.login-card{width:100%;max-width:400px;background:var(--card);border-radius:16px;border:1px solid var(--border);box-shadow:var(--shadow);padding:40px 36px 32px;}

/* BRANDING */
.brand{text-align:center;margin-bottom:28px;}
.brand-name{font-size:26px;font-weight:700;color:var(--text);letter-spacing:-.3px;}
.brand-sub{font-size:14px;color:var(--text2);margin-top:4px;}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:13px;color:var(--text2);margin-bottom:6px;}
.form-input{width:100%;padding:11px 14px;border-radius:8px;border:1px solid var(--border);background:#111;color:var(--text);font-size:14px;font-family:inherit;-webkit-appearance:none;transition:border-color .2s;}
.form-input:focus{outline:none;border-color:var(--accent);}
.form-input::placeholder{color:#555;}

/* PASSWORD EYE */
.pw-wrap{position:relative;}
.pw-wrap .form-input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text2);cursor:pointer;padding:4px;display:flex;align-items:center;}
.pw-eye:hover{color:var(--text);}
.pw-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* BUTTONS */
.btn-primary{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:background .2s;margin-top:4px;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}

.btn-google{width:100%;padding:12px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s;}
.btn-google:hover{border-color:#555;background:#222;}

/* MSG */
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.msg.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.3);color:#f87171;display:block;}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#4ade80;display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider hr{flex:1;border:none;border-top:1px solid var(--border);}
.divider span{font-size:12px;color:var(--text2);}

/* LINKS */
.link-row{text-align:center;margin-top:20px;font-size:13px;color:var(--text2);}
.link-row a{color:var(--accent);text-decoration:none;cursor:pointer;}
.link-row a:hover{text-decoration:underline;}
.forgot{text-align:right;font-size:12px;margin-bottom:16px;}
.forgot a{color:var(--text2);text-decoration:none;cursor:pointer;}
.forgot a:hover{color:var(--accent);}

/* FOOTER INSIDE CARD */
.card-footer{margin-top:28px;padding-top:20px;border-top:1px solid var(--border);text-align:center;}
.powered-row{display:flex;align-items:center;justify-content:center;gap:6px;font-size:12px;color:var(--text2);margin-bottom:6px;}
.powered-row img{height:20px;object-fit:contain;}
.powered-row a{color:var(--text2);font-weight:600;text-decoration:none;}
.powered-row a:hover{color:var(--accent);}
.powered-sub{font-size:11px;color:#555;margin-bottom:10px;}
.footer-links{font-size:11px;color:#555;}
.footer-links a{color:#555;text-decoration:none;}
.footer-links a:hover{color:var(--text2);}
.footer-links span{margin:0 6px;}

@media(max-width:440px){.login-card{padding:32px 24px 28px;border-radius:12px;}}
  </style>
</head>
<body>

<div class="page">
  <div class="login-card">

    <div class="brand">
      <div class="brand-name">Event Logic Pro</div>
      <div class="brand-sub">Sign in to continue</div>
    </div>

    <div class="msg" id="msgBox"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="off">
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-eye" onclick="togglePw()" tabindex="-1" type="button">
          <svg id="eyeShow" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeHide" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>

    <div class="forgot"><a onclick="showReset()">Forgot password?</a></div>

    <button class="btn-primary" id="btnLogin" onclick="doLogin()">Sign In</button>

    <div class="divider"><hr><span>or</span><hr></div>

    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <div class="link-row">Don't have an account? <a href="signup.html">Start free trial</a></div>

    <div class="card-footer">
      <div class="powered-row">
        <span>Powered by</span>
        <img src="glowbot.png" alt="GlowBots">
        <a href="https://glowbotslive.com" target="_blank">GlowBotsLive.com</a>
      </div>
      <div class="powered-sub">AI-Powered Business Solutions</div>
      <div class="footer-links">
        <a href="contact.html">Contact Us</a><span>|</span>
        <a href="privacy.html">Privacy Policy</a><span>|</span>
        <a href="terms.html">Terms of Service</a>
      </div>
    </div>

  </div>
</div>

<!-- Reset Modal -->
<div id="resetModal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.75);z-index:100;align-items:center;justify-content:center;padding:20px;">
  <div style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:16px;padding:32px;width:100%;max-width:380px;">
    <div style="font-size:18px;font-weight:700;margin-bottom:6px;">Reset Password</div>
    <div style="font-size:13px;color:#888;margin-bottom:20px;">We'll send a reset link to your email.</div>
    <div class="msg" id="rstMsg"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input class="form-input" type="email" id="rstEmail" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn-primary" onclick="doReset()" style="margin-bottom:12px;">Send Reset Link</button>
    <button onclick="hideReset()" style="width:100%;padding:12px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;color:#888;font-size:14px;cursor:pointer;font-family:inherit;">Cancel</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAILS  = ['eventlogicpro@gmail.com'];
const ADMIN_URL     = 'eventlogicpro-superadmin.html';
const DASHBOARD_URL = 'eventlogicpro-dashboard.html';

function showMsg(msg, type) {
  var el = document.getElementById('msgBox');
  el.textContent = msg; el.className = 'msg ' + type;
}
function clearMsg() {
  var el = document.getElementById('msgBox');
  el.className = 'msg'; el.textContent = '';
}
function togglePw() {
  var inp = document.getElementById('siPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  document.getElementById('eyeShow').style.display = inp.type === 'password' ? 'block' : 'none';
  document.getElementById('eyeHide').style.display = inp.type === 'text'     ? 'block' : 'none';
}
function showReset() {
  document.getElementById('rstEmail').value = document.getElementById('siEmail').value;
  document.getElementById('rstMsg').className = 'msg';
  document.getElementById('resetModal').style.display = 'flex';
}
function hideReset() { document.getElementById('resetModal').style.display = 'none'; }

async function getRedirectUrl(email) {
  if (ADMIN_EMAILS.includes(email)) return ADMIN_URL;
  try {
    var r = await sb.from('users').select('is_super_admin').eq('email', email).single();
    if (r.data && r.data.is_super_admin) return ADMIN_URL;
  } catch(e) {}
  var landing = localStorage.getItem('elp_landing');
  if (landing === 'tasks')    return 'eventlogicpro.html';
  if (landing === 'calendar') return 'eventlogicpro-calendar.html';
  return DASHBOARD_URL;
}

// Handle Google OAuth return + existing session
async function checkExistingSession() {
  try {
    var r = await sb.auth.getSession();
    var s = r.data.session;
    if (!s) {
      var t = localStorage.getItem('sb_access_token');
      var rf = localStorage.getItem('sb_refresh_token');
      if (t && rf) {
        var sr = await sb.auth.setSession({ access_token: t, refresh_token: rf });
        s = sr.data?.session;
      }
    }
    if (s) {
      localStorage.setItem('sb_access_token', s.access_token);
      localStorage.setItem('sb_refresh_token', s.refresh_token);
      window.location.replace(await getRedirectUrl(s.user.email));
    }
  } catch(e) {}
}
checkExistingSession();

async function doLogin() {
  clearMsg();
  var email    = document.getElementById('siEmail').value.trim();
  var password = document.getElementById('siPassword').value;
  if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
  var btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var r = await sb.auth.signInWithPassword({ email, password });
    if (r.error) {
      showMsg(r.error.message === 'Invalid login credentials' ? 'Incorrect email or password.' : r.error.message, 'error');
      btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    var s = r.data.session;
    localStorage.setItem('sb_access_token', s.access_token);
    localStorage.setItem('sb_refresh_token', s.refresh_token);
    window.location.replace(await getRedirectUrl(email));
  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

async function doGoogleLogin() {
  clearMsg();
  try {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  } catch(e) {
    showMsg('Google sign-in error. Please try again.', 'error');
  }
}

async function doReset() {
  var email = document.getElementById('rstEmail').value.trim();
  var msgEl = document.getElementById('rstMsg');
  if (!email) { msgEl.textContent = 'Please enter your email.'; msgEl.className = 'msg error'; return; }
  var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset.html' });
  if (r.error) {
    msgEl.textContent = r.error.message; msgEl.className = 'msg error';
  } else {
    msgEl.textContent = 'Check your email for a reset link!'; msgEl.className = 'msg success';
  }
}
</script>
</body>
</html>
