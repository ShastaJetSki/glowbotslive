<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Event Logic Pro – Login</title>
  <link rel="icon" href="favicon-eventlogic.ico">
  <link rel="icon" type="image/png" href="favicon-eventlogic-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-eventlogic-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Event Logic Pro">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{min-height:100%;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}
body{background:#0d0f14;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px 16px;}



/* CARD */
.login-card{background:#fff;border-radius:16px;box-shadow:0 4px 48px rgba(0,0,0,.35),0 0 0 1px rgba(220,38,38,.08);padding:36px 32px 24px;width:100%;max-width:460px;}

/* BRANDING */
.brand{text-align:center;margin-bottom:20px;}
.brand-logo{height:72px;object-fit:contain;display:block;margin:0 auto 8px;}
.brand-tagline{font-size:13px;color:#6b7280;font-style:italic;}

/* TABS */
.tabs{display:flex;border:1.5px solid #e2e4e8;border-radius:8px;overflow:hidden;margin-bottom:24px;}
.tab{flex:1;padding:10px;text-align:center;font-size:14px;font-weight:600;color:#6b7280;cursor:pointer;background:#fff;border:none;font-family:inherit;transition:all .2s;}
.tab.active{color:#DC2626;background:#fff;box-shadow:inset 0 -2px 0 #DC2626;}
.tabs .tab:first-child{border-right:1.5px solid #e2e4e8;}

/* MSG */
.msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;display:none;}
.msg.error{background:#fee2e2;border:1px solid #fca5a5;color:#b91c1c;display:block;}
.msg.success{background:#dcfce7;border:1px solid #86efac;color:#15803d;display:block;}

/* FORM */
.form-group{margin-bottom:16px;}
.form-label{display:block;font-size:11px;font-weight:700;color:#6b7280;margin-bottom:6px;letter-spacing:.5px;text-transform:uppercase;}
.form-input{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid #e2e4e8;background:#f1f5fb;color:#1a1a1a;font-size:14px;font-family:inherit;-webkit-appearance:none;transition:border-color .2s;}
.form-input:focus{outline:none;border-color:#DC2626;background:#fff;}

/* PASSWORD EYE */
.pw-wrap{position:relative;}
.pw-wrap .form-input{padding-right:44px;}
.pw-eye{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#9ca3af;cursor:pointer;padding:4px;display:flex;align-items:center;}
.pw-eye:hover{color:#6b7280;}
.pw-eye svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}

/* FORGOT */
.forgot{text-align:right;font-size:12px;margin-bottom:16px;}
.forgot a{color:#6b7280;text-decoration:none;cursor:pointer;}
.forgot a:hover{color:#DC2626;}

/* BUTTONS */
.btn-primary{width:100%;padding:14px;border-radius:8px;border:none;background:#DC2626;color:#fff;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s;letter-spacing:.2px;}
.btn-primary:hover{background:#b91c1c;}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}

.btn-google{width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid #e2e4e8;background:#fff;color:#1a1a1a;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,box-shadow .2s;}
.btn-google:hover{border-color:#9ca3af;box-shadow:0 2px 8px rgba(0,0,0,.08);}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:18px 0;}
.divider hr{flex:1;border:none;border-top:1px solid #e2e4e8;}
.divider span{font-size:12px;color:#9ca3af;}

/* FOOTER INSIDE CARD */
.card-footer{text-align:center;margin-top:20px;font-size:12px;color:#9ca3af;}
.card-footer a{color:#DC2626;text-decoration:none;}
.card-footer a:hover{text-decoration:underline;}

/* SIGNUP LINK */
.signup-row{text-align:center;margin-top:14px;font-size:13px;color:#6b7280;}
.signup-row a{color:#DC2626;font-weight:600;text-decoration:none;}
.signup-row a:hover{text-decoration:underline;}



@media(max-width:480px){
  .login-card{padding:28px 20px 20px;}
  
}
  </style>
</head>
<body>


<div class="login-card">

  <!-- Logo -->
  <div class="brand">
    <img class="brand-logo" src="eventlogicpro-logo.png" alt="Event Logic Pro" id="brandLogo">
    <div class="brand-tagline">Plan smarter. Execute flawlessly.</div>
  </div>

  <!-- Tabs -->
  <div class="tabs">
    <button class="tab active" id="tabSignIn" onclick="showTab('signin')">Sign In</button>
    <button class="tab" id="tabReset" onclick="showTab('reset')">Reset Password</button>
  </div>

  <!-- Message -->
  <div class="msg" id="msgBox"></div>

  <!-- SIGN IN FORM -->
  <div id="formSignIn">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="siEmail" placeholder="you@example.com"
        autocomplete="off" autocapitalize="off" autocorrect="off" spellcheck="false">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input class="form-input" type="password" id="siPassword" placeholder="••••••••"
          autocomplete="new-password" onkeydown="if(event.key==='Enter')doLogin()">
        <button class="pw-eye" onclick="togglePw()" tabindex="-1" type="button">
          <svg id="eyeShow" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg id="eyeHide" viewBox="0 0 24 24" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div class="forgot"><a onclick="showTab('reset')">Forgot password?</a></div>
    <button class="btn-primary" id="btnLogin" onclick="doLogin()">Sign In</button>
    <div class="divider"><hr><span>or</span><hr></div>
    <button class="btn-google" onclick="doGoogleLogin()">
      <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"/>
      </svg>
      Continue with Google
    </button>

    <!-- Sign Up link -->
    <div class="signup-row">
      Don't have an account? <a href="eventlogicpro-register.html">Sign up free</a>
    </div>
  </div>

  <!-- RESET PASSWORD FORM -->
  <div id="formReset" style="display:none;">
    <div class="form-group">
      <label class="form-label">Email Address</label>
      <input class="form-input" type="email" id="rstEmail" placeholder="you@example.com"
        autocomplete="off" onkeydown="if(event.key==='Enter')doReset()">
    </div>
    <button class="btn-primary" id="btnReset" onclick="doReset()">Send Reset Link</button>
    <div class="divider"><hr><span>or</span><hr></div>
    <button onclick="showTab('signin')" style="width:100%;padding:12px;border-radius:8px;border:1.5px solid #e2e4e8;background:#fff;color:#6b7280;font-size:14px;cursor:pointer;font-family:inherit;">Back to Sign In</button>
  </div>

  <!-- Footer inside card -->
  <div class="card-footer">
    &copy; 2026 Event Logic Pro &bull; <a href="mailto:support@eventlogicpro.com">Support</a>
  </div>

</div>


<script>
const SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const ADMIN_EMAILS  = ['eventlogicpro@gmail.com'];
const ADMIN_URL     = 'eventlogicpro-superadmin.html';
const DASHBOARD_URL = 'eventlogicpro-dashboard.html';

/* ===== CLEAR FIELDS ON LOAD (prevent browser autofill) ===== */
window.addEventListener('load', function() {
  document.getElementById('siEmail').value    = '';
  document.getElementById('siPassword').value = '';
  document.getElementById('rstEmail').value   = '';
});

/* ===== TABS ===== */
function showTab(tab) {
  var isSignIn = tab === 'signin';
  document.getElementById('formSignIn').style.display = isSignIn ? 'block' : 'none';
  document.getElementById('formReset').style.display  = isSignIn ? 'none'  : 'block';
  document.getElementById('tabSignIn').classList.toggle('active',  isSignIn);
  document.getElementById('tabReset').classList.toggle('active',  !isSignIn);
  clearMsg();
}

/* ===== MSG ===== */
function showMsg(msg, type) {
  var el = document.getElementById('msgBox');
  el.textContent = msg; el.className = 'msg ' + type;
}
function clearMsg() {
  var el = document.getElementById('msgBox');
  el.className = 'msg'; el.textContent = '';
}

/* ===== PASSWORD TOGGLE ===== */
function togglePw() {
  var inp = document.getElementById('siPassword');
  inp.type = inp.type === 'password' ? 'text' : 'password';
  document.getElementById('eyeShow').style.display = inp.type === 'password' ? 'block' : 'none';
  document.getElementById('eyeHide').style.display = inp.type === 'text'     ? 'block' : 'none';
}

/* ===== REDIRECT ===== */
async function getRedirectUrl(email) {
  if (ADMIN_EMAILS.includes(email)) return ADMIN_URL;
  try {
    var r = await sb.from('users').select('is_super_admin').eq('email', email).single();
    if (r.data && r.data.is_super_admin) return ADMIN_URL;
  } catch(e) {}
  var landing = localStorage.getItem('elp_landing');
  if (landing === 'tasks')    return 'eventlogicpro.html';
  if (landing === 'calendar') return 'eventlogicpro-calendar.html';
  return DASHBOARD_URL;
}

/* ===== CHECK EXISTING SESSION (handles Google OAuth return) ===== */
async function checkExistingSession() {
  try {
    var r = await sb.auth.getSession();
    var s = r.data.session;
    if (!s) {
      var t  = localStorage.getItem('sb_access_token');
      var rf = localStorage.getItem('sb_refresh_token');
      if (t && rf) {
        var sr = await sb.auth.setSession({ access_token: t, refresh_token: rf });
        s = sr.data?.session;
      }
    }
    if (s) {
      localStorage.setItem('sb_access_token',  s.access_token);
      localStorage.setItem('sb_refresh_token', s.refresh_token);
      window.location.replace(await getRedirectUrl(s.user.email));
    }
  } catch(e) {}
}
checkExistingSession();

/* ===== EMAIL LOGIN ===== */
async function doLogin() {
  clearMsg();
  var email    = document.getElementById('siEmail').value.trim();
  var password = document.getElementById('siPassword').value;
  if (!email || !password) { showMsg('Please enter your email and password.', 'error'); return; }
  var btn = document.getElementById('btnLogin');
  btn.disabled = true; btn.textContent = 'Signing in...';
  try {
    var r = await sb.auth.signInWithPassword({ email, password });
    if (r.error) {
      showMsg(r.error.message === 'Invalid login credentials' ? 'Incorrect email or password.' : r.error.message, 'error');
      btn.disabled = false; btn.textContent = 'Sign In'; return;
    }
    var s = r.data.session;
    localStorage.setItem('sb_access_token',  s.access_token);
    localStorage.setItem('sb_refresh_token', s.refresh_token);
    window.location.replace(await getRedirectUrl(email));
  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
    btn.disabled = false; btn.textContent = 'Sign In';
  }
}

/* ===== GOOGLE LOGIN ===== */
async function doGoogleLogin() {
  clearMsg();
  try {
    await sb.auth.signInWithOAuth({
      provider: 'google',
      options: { redirectTo: window.location.origin + window.location.pathname }
    });
  } catch(e) {
    showMsg('Google sign-in error. Please try again.', 'error');
  }
}

/* ===== PASSWORD RESET ===== */
async function doReset() {
  var email = document.getElementById('rstEmail').value.trim();
  if (!email) { showMsg('Please enter your email.', 'error'); return; }
  var btn = document.getElementById('btnReset');
  btn.disabled = true; btn.textContent = 'Sending...';
  var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/reset.html' });
  if (r.error) {
    showMsg(r.error.message, 'error');
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  } else {
    showMsg('Check your email for a reset link!', 'success');
    btn.disabled = false; btn.textContent = 'Send Reset Link';
  }
}
</script>
<script src="glow-footer.js"></script>
</body>
</html>
