<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Login — Event Logic Pro</title>
  <link rel="icon" href="favicon-eventlogic.ico">
  <link rel="icon" type="image/png" href="favicon-eventlogic-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-eventlogic-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Event Logic Pro">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--card:#ffffff;--border:#e2e4e8;
  --text:#1a1a1a;--text2:#6b7280;
  --accent:#DC2626;--accent-hover:#B91C1C;
  --accent-glow:rgba(220,38,38,.1);
  --shadow:0 4px 24px rgba(0,0,0,.08);
  --radius:14px;
}
body.dark{
  --bg:#0d0d0d;--card:#1a1a1a;--border:#2a2a2a;
  --text:#f0f0f0;--text2:#888;
  --shadow:0 4px 24px rgba(0,0,0,.5);
}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;}

/* ===== LAYOUT ===== */
.page{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 16px 70px;}

/* ===== CARD ===== */
.login-card{width:100%;max-width:420px;background:var(--card);border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:40px 36px 36px;}

/* ===== BRANDING ===== */
.brand{text-align:center;margin-bottom:32px;}
.brand-logo{height:90px;object-fit:contain;margin-bottom:8px;display:block;margin-left:auto;margin-right:auto;}
.brand-tagline{font-size:13px;color:var(--text2);margin-top:4px;}

/* ===== TABS ===== */
.tabs{display:flex;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:3px;margin-bottom:28px;}
.tab{flex:1;padding:8px;text-align:center;font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;border-radius:6px;transition:all .2s;}
.tab.active{background:var(--card);color:var(--accent);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* ===== FORM ===== */
.form-group{margin-bottom:18px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px;}
.form-input{width:100%;padding:11px 14px;border-radius:8px;border:1.5px solid var(--border);background:var(--bg);color:var(--text);font-size:14px;font-family:inherit;transition:border-color .2s,box-shadow .2s;-webkit-appearance:none;}
.form-input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.form-input::placeholder{color:var(--text2);}

/* ===== BUTTON ===== */
.btn-primary{width:100%;padding:13px;border-radius:8px;border:none;background:var(--accent);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s,transform .1s;letter-spacing:.2px;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-primary:active{transform:scale(.98);}
.btn-primary:disabled{opacity:.6;cursor:not-allowed;}

/* ===== ERROR / SUCCESS ===== */
.msg{padding:10px 14px;border-radius:8px;font-size:13px;font-weight:500;margin-bottom:16px;display:none;}
.msg.error{background:rgba(220,38,38,.1);border:1px solid rgba(220,38,38,.25);color:#b91c1c;display:block;}
.msg.success{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.25);color:#15803d;display:block;}

/* ===== FORGOT / DIVIDER ===== */
.forgot-link{display:block;text-align:right;font-size:12px;color:var(--text2);cursor:pointer;margin-bottom:20px;text-decoration:none;}
.forgot-link:hover{color:var(--accent);}
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider hr{flex:1;border:none;border-top:1px solid var(--border);}
.divider span{font-size:12px;color:var(--text2);}

/* ===== FOOTER ===== */
.login-footer{margin-top:28px;text-align:center;font-size:12px;color:var(--text2);}
.login-footer a{color:var(--accent);text-decoration:none;}
.login-footer a:hover{text-decoration:underline;}

/* ===== DARK TOGGLE ===== */
.dark-toggle-wrap{position:fixed;top:16px;right:16px;}
.dark-toggle{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--text2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.dark-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dark-toggle svg{width:15px;height:15px;fill:currentColor;}

/* ===== LOADING SPINNER ===== */
.spinner{display:none;width:18px;height:18px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto;}
@keyframes spin{to{transform:rotate(360deg);}}
.btn-primary.loading .btn-text{display:none;}
.btn-primary.loading .spinner{display:block;}

/* ===== FOOTER BAR ===== */
.footer-bar{position:fixed;bottom:0;left:0;right:0;background:var(--card);border-top:1px solid var(--border);padding:10px 24px;display:flex;justify-content:space-between;align-items:center;z-index:50;}
.footer-powered{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);}
.footer-powered img{height:20px;object-fit:contain;}
.footer-powered a{color:var(--text2);text-decoration:none;font-weight:600;}
.footer-powered a:hover{color:var(--accent);}
.footer-copy{font-size:11px;color:var(--text2);}
.btn-google{width:100%;padding:12px 16px;border-radius:8px;border:1.5px solid var(--border);background:var(--card);color:var(--text);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;transition:border-color .2s,background .2s;}
.btn-google:hover{border-color:var(--accent);background:var(--bg);}
.btn-google svg{flex-shrink:0;}

/* ===== POWERED BY ===== */
.powered{text-align:center;margin-top:24px;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:6px;}
.powered img{height:20px;vertical-align:middle;}
.powered a{color:var(--text2);text-decoration:none;font-weight:600;}
.powered a:hover{color:var(--accent);}

/* ===== RESPONSIVE ===== */
@media(max-width:480px){.login-card{padding:32px 24px 28px;border-radius:12px;}.brand-logo{height:52px;}}
  </style>
</head>
<body>

<!-- Dark Mode Toggle -->
<div class="dark-toggle-wrap">
  <button class="dark-toggle" onclick="toggleDark()" title="Toggle dark mode">
    <svg id="moonIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"/></svg>
    <svg id="sunIcon" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
  </button>
</div>

<div class="page">
  <div class="login-card">

    <!-- Branding -->
    <div class="brand">
      <img class="brand-logo" src="eventlogicpro-logo.png" alt="Event Logic Pro" id="brandLogo">
      <div class="brand-tagline">Plan smarter. Execute flawlessly.</div>
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <div class="tab active" id="tabSignIn" onclick="showTab('signin')">Sign In</div>
      <div class="tab" id="tabReset" onclick="showTab('reset')">Reset Password</div>
    </div>

    <!-- Message -->
    <div class="msg" id="msgBox"></div>

    <!-- ===== SIGN IN FORM ===== -->
    <div id="formSignIn">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="siEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="off">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input class="form-input" type="password" id="siPassword" placeholder="••••••••" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()">
      </div>
      <a class="forgot-link" onclick="showTab('reset')">Forgot password?</a>
      <button class="btn-primary" id="btnLogin" onclick="doLogin()">
        <span class="btn-text">Sign In</span>
        <div class="spinner"></div>
      </button>

      <div class="divider"><hr><span>or</span><hr></div>

      <button class="btn-google" id="btnGoogle" onclick="doGoogleLogin()">
        <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
          <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
          <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/>
          <path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/>
          <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"/>
        </svg>
        Continue with Google
      </button>
    </div>

    <!-- ===== RESET FORM ===== -->
    <div id="formReset" style="display:none;">
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input class="form-input" type="email" id="rstEmail" placeholder="you@example.com" autocomplete="email" autocapitalize="off" onkeydown="if(event.key==='Enter')doReset()">
      </div>
      <button class="btn-primary" id="btnReset" onclick="doReset()">
        <span class="btn-text">Send Reset Link</span>
        <div class="spinner"></div>
      </button>
      <div class="divider"><hr><span>or</span><hr></div>
      <button class="btn-primary" style="background:var(--bg);color:var(--text2);border:1.5px solid var(--border);" onclick="showTab('signin')">Back to Sign In</button>
    </div>

    <!-- Footer -->
    <div class="login-footer">
      &copy; 2026 Event Logic Pro &bull; <a href="mailto:support@eventlogicpro.com">Support</a>
    </div>

  </div><!-- /login-card -->
</div><!-- /page -->

<!-- FOOTER BAR -->
<div class="footer-bar">
  <div class="footer-powered">
    <span>Powered by</span>
    <img src="glowbot.png" alt="GlowBot">
    <a href="https://glowbotslive.com" target="_blank">GlowBotsLive.com</a>
  </div>
  <div class="footer-copy">&copy; 2026 Event Logic Pro. All rights reserved.</div>
</div>

<script>
/* ==============================================
   EVENTLOGICPRO LOGIN
   Smart redirect:
     eventlogicpro@gmail.com  → superadmin page
     is_super_admin = true    → superadmin page
     everyone else            → dashboard
   ============================================== */

const SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// Admin emails that always go to the superadmin page
const ADMIN_EMAILS = ['eventlogicpro@gmail.com'];
const ADMIN_URL    = 'eventlogicpro-superadmin.html';
const DASHBOARD_URL= 'eventlogicpro-dashboard.html';

/* ===== DARK MODE ===== */
var isDark = localStorage.getItem('elp_dark_mode') === 'true';
function applyDarkIcons() {
  var d = document.body.classList.contains('dark');
  document.getElementById('moonIcon').style.display = d ? 'none' : 'block';
  document.getElementById('sunIcon').style.display  = d ? 'block' : 'none';
  var logo = document.getElementById('brandLogo');
  if (logo) logo.src = d ? 'eventlogicpro-logo-dark.png' : 'eventlogicpro-logo.png';
}
if (isDark) document.body.classList.add('dark');
applyDarkIcons();
function toggleDark() {
  isDark = !isDark;
  document.body.classList.toggle('dark', isDark);
  localStorage.setItem('elp_dark_mode', isDark);
  applyDarkIcons();
}

/* ===== TABS ===== */
function showTab(tab) {
  clearMsg();
  document.getElementById('formSignIn').style.display = tab === 'signin' ? '' : 'none';
  document.getElementById('formReset').style.display  = tab === 'reset'  ? '' : 'none';
  document.getElementById('tabSignIn').classList.toggle('active', tab === 'signin');
  document.getElementById('tabReset').classList.toggle('active',  tab === 'reset');
}

/* ===== MESSAGES ===== */
function showMsg(text, type) {
  var el = document.getElementById('msgBox');
  el.textContent = text;
  el.className = 'msg ' + type;
}
function clearMsg() {
  var el = document.getElementById('msgBox');
  el.className = 'msg';
  el.textContent = '';
}

/* ===== BUTTON LOADING STATE ===== */
function setLoading(btnId, on) {
  var btn = document.getElementById(btnId);
  if (on) btn.classList.add('loading');
  else    btn.classList.remove('loading');
  btn.disabled = on;
}

/* ===== SIGN IN ===== */
async function doLogin() {
  clearMsg();
  var email    = (document.getElementById('siEmail').value || '').trim().toLowerCase();
  var password = document.getElementById('siPassword').value;

  if (!email)    { showMsg('Please enter your email address.', 'error'); return; }
  if (!password) { showMsg('Please enter your password.', 'error'); return; }

  setLoading('btnLogin', true);

  try {
    var r = await sb.auth.signInWithPassword({ email: email, password: password });

    if (r.error) {
      var msg = r.error.message;
      if (msg.includes('Invalid login') || msg.includes('invalid_grant')) {
        msg = 'Incorrect email or password. Please try again.';
      }
      showMsg(msg, 'error');
      setLoading('btnLogin', false);
      return;
    }

    var session = r.data.session;

    // Store tokens for session persistence
    localStorage.setItem('sb_access_token',  session.access_token);
    localStorage.setItem('sb_refresh_token', session.refresh_token);

    // ── Smart redirect logic ─────────────────────────
    var destination = await getRedirectUrl(email, session);
    window.location.replace(destination);

  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
    setLoading('btnLogin', false);
  }
}

/* ===== DETERMINE WHERE TO REDIRECT ===== */
async function getRedirectUrl(email, session) {
  // 1. Hardcoded admin emails always go to admin page
  if (ADMIN_EMAILS.includes(email.toLowerCase())) {
    return ADMIN_URL;
  }

  // 2. Check is_super_admin flag in users table
  try {
    var uid = session.user.id;
    var r1  = await sb.from('users').select('is_super_admin, role').eq('auth_user_id', uid).single();
    if (r1.data) {
      if (r1.data.is_super_admin === true) return ADMIN_URL;
    } else {
      // Fallback: look up by email
      var r2 = await sb.from('users').select('is_super_admin, role').eq('email', email).single();
      if (r2.data && r2.data.is_super_admin === true) return ADMIN_URL;
    }
  } catch(e) {
    // DB lookup failed — fall through to dashboard
    console.warn('Role check failed:', e);
  }

  // 3. Check user's preferred landing page
  try {
    var landing = localStorage.getItem('elp_landing');
    if (landing === 'tasks')    return 'eventlogicpro.html';
    if (landing === 'calendar') return 'eventlogicpro-calendar.html';
  } catch(e) {}

  // 4. Default: go to dashboard
  return DASHBOARD_URL;
}

/* ===== GOOGLE LOGIN ===== */
async function doGoogleLogin() {
  clearMsg();
  var btn = document.getElementById('btnGoogle');
  btn.disabled = true;
  btn.textContent = 'Redirecting to Google...';
  try {
    var r = await sb.auth.signInWithOAuth({
      provider: 'google',
      options: {
        redirectTo: window.location.origin + window.location.pathname
      }
    });
    if (r.error) {
      showMsg('Google sign-in error: ' + r.error.message, 'error');
      btn.disabled = false;
      btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332C2.438 15.983 5.482 18 9 18z"/><path fill="#FBBC05" d="M3.964 10.706A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.706V4.962H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.038l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0 5.482 0 2.438 2.017.957 4.962L3.964 6.294C4.672 4.169 6.656 3.58 9 3.58z"/></svg> Continue with Google';
    }
    // Otherwise Supabase redirects to Google — no further action needed here
  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
    btn.disabled = false;
  }
}


async function doReset() {
  clearMsg();
  var email = (document.getElementById('rstEmail').value || '').trim().toLowerCase();
  if (!email) { showMsg('Please enter your email address.', 'error'); return; }

  setLoading('btnReset', true);

  try {
    var r = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/eventlogicpro-settings.html?tab=password'
    });

    if (r.error) {
      showMsg('Error: ' + r.error.message, 'error');
    } else {
      showMsg('Reset link sent! Check your inbox (and spam folder).', 'success');
      document.getElementById('rstEmail').value = '';
    }
  } catch(e) {
    showMsg('Connection error. Please try again.', 'error');
  }

  setLoading('btnReset', false);
}

/* ===== AUTO-REDIRECT IF ALREADY LOGGED IN (also handles Google OAuth return) ===== */
async function checkExistingSession() {
  try {
    // Supabase puts the session in the URL hash after Google OAuth redirect
    // getSession() picks it up automatically
    var r = await sb.auth.getSession();
    var s = r.data.session;

    if (!s) {
      // Try stored tokens
      var t  = localStorage.getItem('sb_access_token');
      var rf = localStorage.getItem('sb_refresh_token');
      if (t && rf) {
        var sr = await sb.auth.setSession({ access_token: t, refresh_token: rf });
        s = sr.data?.session;
      }
    }

    if (s) {
      // Persist tokens
      localStorage.setItem('sb_access_token',  s.access_token);
      localStorage.setItem('sb_refresh_token', s.refresh_token);
      // Redirect appropriately
      var dest = await getRedirectUrl(s.user.email, s);
      window.location.replace(dest);
    }
  } catch(e) {
    // No valid session — stay on login page
  }
}

// Check for ?logout=1 to skip the auto-redirect
var params = new URLSearchParams(window.location.search);
if (!params.get('logout')) {
  checkExistingSession();
}
</script>
</body>
</html>
