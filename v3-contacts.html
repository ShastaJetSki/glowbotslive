<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Contacts — Event Logic Pro v3</title>
<link rel="icon" href="favicon-eventlogic.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f4f5f7;--bg2:#ebedf1;--card:#fff;--hover:#f0f0f3;--border:#e2e4e8;--t1:#1a1a1a;--t2:#6b7280;--acc:#DC2626;--acc2:#B91C1C;--glow:rgba(220,38,38,.10);--inp:#fafafa;--overlay:rgba(0,0,0,.45);}
body.dark{--bg:#111;--bg2:#1a1a1a;--card:#222;--hover:#2a2a2a;--border:#333;--t1:#f0f0f0;--t2:#999;--acc:#DC2626;--acc2:#EF4444;--glow:rgba(220,38,38,.15);--inp:#1a1a1a;--overlay:rgba(0,0,0,.75);}
html{background:var(--bg);}html.dark{background:#111;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;padding-bottom:100px;min-height:100vh;}
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{padding:8px 24px;display:flex;justify-content:space-between;align-items:center;}
.dh-left{display:flex;align-items:center;gap:16px;}
.dh-logo{height:52px;object-fit:contain;}
.dh-titles h1{font-size:22px;font-weight:700;}
.dh-titles .sub{font-size:11px;color:var(--acc);font-weight:600;}
.dh-right{display:flex;align-items:center;gap:10px;}
.event-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--glow);border:1px solid var(--acc);border-radius:20px;font-size:12px;color:var(--acc);font-weight:600;max-width:200px;}
.event-badge span.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.event-badge-x{opacity:.6;cursor:pointer;font-size:14px;}
.dark-toggle{background:none;border:none;cursor:pointer;padding:6px;color:var(--t2);display:flex;}
.dark-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--t2);cursor:pointer;}
.nav-bar{display:flex;align-items:center;padding:0 24px;border-top:1px solid var(--border);}
.nav-left{display:flex;gap:2px;}
.nav-btn{padding:8px 14px;font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;border-radius:6px;transition:all .15s;}
.nav-btn:hover{color:var(--t1);background:var(--hover);}
.nav-btn.active{color:var(--acc);font-weight:600;}
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-bar{display:flex;align-items:center;padding:10px 16px;gap:10px;}
.mh-logo{height:36px;object-fit:contain;}
.mh-title{font-size:17px;font-weight:700;flex:1;}
.mh-badge{font-size:11px;color:var(--acc);font-weight:600;}
.mbn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom);}
.mbn-inner{display:grid;grid-template-columns:repeat(5,1fr);}
.mbn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--t2);font-size:10px;cursor:pointer;text-decoration:none;}
.mbn-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.mbn-btn.active{color:var(--acc);}
.sheet-overlay{display:none;position:fixed;inset:0;z-index:300;background:var(--overlay);}
.sheet-overlay.open{display:block;}
.more-sheet{position:fixed;bottom:-100%;left:0;right:0;z-index:301;background:var(--card);border-radius:20px 20px 0 0;padding:12px 0 env(safe-area-inset-bottom);transition:bottom .3s cubic-bezier(.4,0,.2,1);}
.more-sheet.open{bottom:0;}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px;}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;color:var(--t1);text-decoration:none;border:none;background:none;width:100%;text-align:left;cursor:pointer;}
.sheet-item:hover{background:var(--hover);}
.sheet-item svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;}
.sheet-item.danger{color:#DC2626;}
.sheet-sep{height:1px;background:var(--border);margin:4px 0;}
/* FILTER BAR */
.filter-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;gap:10px;flex-wrap:wrap;align-items:center;}
.search-input{flex:1;min-width:180px;max-width:300px;padding:8px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.search-input:focus{outline:none;border-color:var(--acc);}
.filter-select{padding:8px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:13px;color:var(--t1);}
.filter-select:focus{outline:none;border-color:var(--acc);}
.btn-primary{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--acc2);}
.btn-secondary{background:var(--bg2);color:var(--t1);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;cursor:pointer;}
.btn-danger{background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;}
/* TABS */
.tab-bar{display:flex;gap:2px;padding:10px 24px 0;background:var(--card);border-bottom:1px solid var(--border);}
.tab{padding:8px 16px;font-size:13px;font-weight:600;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;}
.tab.active{color:var(--acc);border-bottom-color:var(--acc);}
/* CONTENT */
.content{max-width:1100px;margin:0 auto;padding:20px 24px;}
.kpi-row{display:flex;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.kpi-chip{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 16px;}
.kpi-chip .val{font-size:20px;font-weight:700;}
.kpi-chip .lbl{font-size:11px;color:var(--t2);}
/* TABLE */
.table-wrap{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;}
.data-table{width:100%;border-collapse:collapse;}
.data-table th{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;padding:10px 14px;text-align:left;border-bottom:1px solid var(--border);background:var(--bg2);}
.data-table td{padding:12px 14px;font-size:13px;border-bottom:1px solid var(--border);}
.data-table tr:last-child td{border-bottom:none;}
.data-table tr:hover td{background:var(--hover);cursor:pointer;}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0;}
.name-cell{display:flex;align-items:center;gap:10px;}
.role-pill{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--bg2);color:var(--t2);}
.role-admin{background:#fef3c7;color:#92400e;}
.role-owner{background:#dbeafe;color:#1e40af;}
body.dark .role-admin{background:#422006;color:#fde68a;}body.dark .role-owner{background:#1e3a5f;color:#93c5fd;}
.action-btn{background:none;border:none;color:var(--t2);cursor:pointer;font-size:12px;padding:4px 8px;border-radius:4px;}
.action-btn:hover{color:var(--t1);background:var(--hover);}
.action-btn.danger:hover{color:#DC2626;}
.empty-state{text-align:center;padding:40px;color:var(--t2);font-size:14px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:var(--overlay);align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border-radius:16px;width:90%;max-width:480px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 0;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);}
.modal-body{padding:14px 20px;}
.modal-footer{padding:0 20px 16px;display:flex;gap:8px;justify-content:flex-end;}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--acc);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--card);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;}
.toast.show{opacity:1;}
@media(max-width:768px){.dh{display:none!important;}.mh{display:block!important;}.mbn{display:block!important;}.content{padding:14px 16px;}.filter-bar{padding:10px 16px;}.tab-bar{padding:10px 16px 0;}.kpi-row{gap:8px;}.modal-overlay{align-items:flex-end;padding:0;}.modal-box{border-radius:20px 20px 0 0;width:100%;max-height:90vh;}}
@media(min-width:769px){.mh{display:none!important;}.mbn{display:none!important;}}'
</style>
</head>

<script>
var isDark=localStorage.getItem('elp_dark_mode')==='true';
if(isDark){document.body.classList.add('dark');document.documentElement.classList.add('dark');}
function applyDarkIcons(){var d=document.body.classList.contains('dark');document.documentElement.classList.toggle('dark',d);['d','m'].forEach(function(p){var moon=document.getElementById(p+'Moon'),sun=document.getElementById(p+'Sun');if(moon)moon.style.display=d?'none':'block';if(sun)sun.style.display=d?'block':'none';});var logo=document.getElementById('dLogo');if(logo)logo.src=d?'eventlogicpro-logo-dark.png':'eventlogicpro-logo.png';}
applyDarkIcons();
function toggleDark(){document.body.classList.toggle('dark');isDark=document.body.classList.contains('dark');localStorage.setItem('elp_dark_mode',isDark);applyDarkIcons();}
var SUPABASE_URL='https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var tenantId=null,userId=null;
var allMembers=[],allVendors=[],allProjects=[];
var currentTab='members';
var editingMemberId=null,editingVendorId=null;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2400);}
async function doLogout(){await sb.auth.signOut();localStorage.removeItem('sb_access_token');localStorage.removeItem('sb_refresh_token');location.replace('/');}
async function checkAuth(){var r=await sb.auth.getSession();var s=r.data.session;if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.replace('/');return null;}}return s;}
function clearCurrentEvent(){localStorage.removeItem('elp_current_event');localStorage.removeItem('elp_current_event_name');localStorage.removeItem('elp_current_event_date');updateEventBadge();}
function updateEventBadge(){var name=localStorage.getItem('elp_current_event_name')||'';var badge=document.getElementById('dEventBadge'),mBadge=document.getElementById('mEventBadge');if(name){if(badge){document.getElementById('dEventName').textContent=name;badge.style.display='flex';}if(mBadge){mBadge.textContent='📍 '+name;mBadge.style.display='block';}}else{if(badge)badge.style.display='none';if(mBadge)mBadge.style.display='none';}}
function openMoreSheet(){document.getElementById('sheetOverlay').classList.add('open');document.getElementById('moreSheet').classList.add('open');}
function closeMoreSheet(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('moreSheet').classList.remove('open');}

async function init(){
  var session=await checkAuth();if(!session)return;
  userId=session.user.id;
  var email=session.user.email||'';
  var ur=await sb.from('users').select('tenant_id').eq('email',email).maybeSingle();
  if(ur.data)tenantId=ur.data.tenant_id;
  if(!tenantId){var bs=await sb.from('business_settings').select('tenant_id').limit(1).maybeSingle();if(bs.data)tenantId=bs.data.tenant_id;}
  if(!tenantId)return;
  var biz=await sb.from('business_settings').select('business_name,display_name').eq('tenant_id',tenantId).maybeSingle();
  if(biz.data)document.getElementById('dBiz').textContent=biz.data.display_name||biz.data.business_name||'Event Logic Pro';
  updateEventBadge();
  await Promise.all([loadMembers(),loadVendors(),loadProjects()]);
  populateEventFilter();
  // Pre-select event from localStorage
  var savedId=localStorage.getItem('elp_current_event');
  if(savedId){document.getElementById('eventFilter').value=savedId;}
  renderList();
}
async function loadMembers(){var r=await sb.from('event_members').select('*').eq('tenant_id',tenantId).order('first_name');allMembers=r.data||[];}
async function loadVendors(){var r=await sb.from('event_vendors').select('*').eq('tenant_id',tenantId).order('vendor_name');allVendors=r.data||[];}
async function loadProjects(){var r=await sb.from('event_projects').select('event_project_id,event_name,event_date').eq('tenant_id',tenantId).order('event_date');allProjects=r.data||[];}

function populateEventFilter(){var sel=document.getElementById('eventFilter');sel.innerHTML='<option value="">All Events</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name;sel.appendChild(o);});}

function switchTab(tab){currentTab=tab;document.getElementById('tabMembers').classList.toggle('active',tab==='members');document.getElementById('tabVendors').classList.toggle('active',tab==='vendors');document.getElementById('eventFilter').style.display=tab==='vendors'?'block':'none';renderList();}

function renderList(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase();
  var evFilter=document.getElementById('eventFilter').value;
  if(currentTab==='members'){renderMembers(q);}else{renderVendors(q,evFilter);}
}

function renderMembers(q){
  var filtered=allMembers.filter(function(m){var name=((m.first_name||'')+' '+(m.last_name||'')).toLowerCase();return !q||name.includes(q)||(m.email||'').toLowerCase().includes(q);});
  document.getElementById('kpiRow').innerHTML='<div class="kpi-chip"><div class="val">'+filtered.length+'</div><div class="lbl">Members</div></div><div class="kpi-chip"><div class="val">'+filtered.filter(function(m){return m.is_active!==false;}).length+'</div><div class="lbl">Active</div></div>';
  document.getElementById('tableHead').innerHTML='<tr><th>Name</th><th>Email</th><th>Phone</th><th>Role</th><th>Status</th><th></th></tr>';
  if(!filtered.length){document.getElementById('tableBody').innerHTML='<tr><td colspan="6" class="empty-state">No members found</td></tr>';return;}
  document.getElementById('tableBody').innerHTML=filtered.map(function(m){var name=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email||'Member';var initials=((m.first_name||'?')[0]+(m.last_name||'?')[0]).toUpperCase();var role=m.role||m.role_level||'member';var active=m.is_active!==false;var colors=['#DC2626','#EA580C','#D97706','#16A34A','#0284C7','#7C3AED'];var ci=name.charCodeAt(0)%colors.length;return '<tr onclick="openEditMember(\''+m.member_id+'\')">'+'<td><div class="name-cell"><div class="avatar" style="background:'+colors[ci]+'">'+initials+'</div><div><div style="font-weight:600;">'+esc(name)+'</div><div style="font-size:11px;color:var(--t2);">'+esc(m.title||'')+'</div></div></div></td>'+'<td>'+esc(m.email||'—')+'</td>'+'<td>'+esc(m.phone||'—')+'</td>'+'<td><span class="role-pill role-'+role+'">'+role+'</span></td>'+'<td><span style="color:'+(active?'#16a34a':'#9ca3af')+';font-size:12px;font-weight:600;">'+(active?'Active':'Inactive')+'</span></td>'+'<td><button class="action-btn" onclick="event.stopPropagation();openEditMember(\''+m.member_id+'\')">Edit</button></td>'+'</tr>';}).join('');
}

function renderVendors(q,evFilter){
  var filtered=allVendors.filter(function(v){var name=(v.vendor_name||v.company_name||'').toLowerCase();var match=!q||name.includes(q)||(v.contact_name||'').toLowerCase().includes(q);var evMatch=!evFilter||v.event_project_id===evFilter;return match&&evMatch;});
  var totalCost=filtered.reduce(function(s,v){return s+(parseFloat(v.cost)||0);},0);
  document.getElementById('kpiRow').innerHTML='<div class="kpi-chip"><div class="val">'+filtered.length+'</div><div class="lbl">Vendors</div></div><div class="kpi-chip"><div class="val">$'+totalCost.toLocaleString()+'</div><div class="lbl">Total Cost</div></div>';
  document.getElementById('tableHead').innerHTML='<tr><th>Name</th><th>Type</th><th>Event</th><th>Contact</th><th>Phone / Email</th><th>Cost</th><th></th></tr>';
  if(!filtered.length){document.getElementById('tableBody').innerHTML='<tr><td colspan="7" class="empty-state">No vendors found</td></tr>';return;}
  document.getElementById('tableBody').innerHTML=filtered.map(function(v){var proj=allProjects.find(function(p){return p.event_project_id===v.event_project_id;});return '<tr>'+'<td><strong>'+esc(v.vendor_name||v.company_name||'')+'</strong></td>'+'<td><span class="role-pill">'+esc(v.vendor_type||'vendor')+'</span></td>'+'<td style="font-size:12px;color:var(--t2);">'+(proj?esc(proj.event_name):'—')+'</td>'+'<td>'+esc(v.contact_name||'—')+'</td>'+'<td>'+esc(v.phone||'')+(v.email?'<br><small style="color:var(--t2)">'+esc(v.email)+'</small>':'')+'</td>'+'<td>'+(parseFloat(v.cost)>0?'$'+parseFloat(v.cost).toLocaleString():'—')+'</td>'+'<td><button class="action-btn" onclick="openEditVendor(\''+v.vendor_id+'\')">Edit</button></td>'+'</tr>';}).join('');
}

/* MEMBER MODAL */
function openAddModal(){if(currentTab==='members')openAddMember();else openAddVendor();}
function openAddMember(){editingMemberId=null;document.getElementById('memberModalTitle').textContent='Add Member';['mFirst','mLast','mEmail','mPhone','mTitle'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('mRole').value='member';document.getElementById('mDeleteBtn').style.display='none';document.getElementById('memberModal').classList.add('show');}
function openEditMember(id){var m=allMembers.find(function(x){return x.member_id===id;});if(!m)return;editingMemberId=id;document.getElementById('memberModalTitle').textContent='Edit Member';document.getElementById('mFirst').value=m.first_name||'';document.getElementById('mLast').value=m.last_name||'';document.getElementById('mEmail').value=m.email||'';document.getElementById('mPhone').value=m.phone||'';document.getElementById('mTitle').value=m.title||'';document.getElementById('mRole').value=m.role||m.role_level||'member';document.getElementById('mDeleteBtn').style.display='block';document.getElementById('memberModal').classList.add('show');}
function closeMemberModal(){document.getElementById('memberModal').classList.remove('show');}
async function saveMember(){var fn=document.getElementById('mFirst').value.trim();if(!fn){toast('First name required');return;}var data={first_name:fn,last_name:document.getElementById('mLast').value.trim()||null,email:document.getElementById('mEmail').value.trim()||null,phone:document.getElementById('mPhone').value.trim()||null,title:document.getElementById('mTitle').value.trim()||null,role:document.getElementById('mRole').value,role_level:document.getElementById('mRole').value};if(editingMemberId){await sb.from('event_members').update(data).eq('member_id',editingMemberId);}else{data.tenant_id=tenantId;data.is_active=true;await sb.from('event_members').insert(data);}closeMemberModal();toast(editingMemberId?'Member updated':'Member added');await loadMembers();renderList();}
async function deleteMember(){if(!editingMemberId||!confirm('Remove this member?'))return;await sb.from('event_members').update({is_active:false}).eq('member_id',editingMemberId);closeMemberModal();toast('Member removed');await loadMembers();renderList();}

/* VENDOR MODAL */
function openAddVendor(){editingVendorId=null;document.getElementById('vendorModalTitle').textContent='Add Vendor';['vName','vContact','vPhone','vEmail','vNotes'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('vCost').value='';document.getElementById('vType').value='vendor';var sel=document.getElementById('vEvent');sel.innerHTML='<option value="">— No event —</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name;sel.appendChild(o);});var evFilter=document.getElementById('eventFilter').value;if(evFilter)sel.value=evFilter;document.getElementById('vDeleteBtn').style.display='none';document.getElementById('vendorModal').classList.add('show');}
function openEditVendor(id){var v=allVendors.find(function(x){return x.vendor_id===id;});if(!v)return;editingVendorId=id;document.getElementById('vendorModalTitle').textContent='Edit Vendor';document.getElementById('vName').value=v.vendor_name||v.company_name||'';document.getElementById('vContact').value=v.contact_name||'';document.getElementById('vPhone').value=v.phone||'';document.getElementById('vEmail').value=v.email||'';document.getElementById('vCost').value=v.cost||'';document.getElementById('vNotes').value=v.notes||'';document.getElementById('vType').value=v.vendor_type||'vendor';var sel=document.getElementById('vEvent');sel.innerHTML='<option value="">— No event —</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name;if(v.event_project_id===p.event_project_id)o.selected=true;sel.appendChild(o);});document.getElementById('vDeleteBtn').style.display='block';document.getElementById('vendorModal').classList.add('show');}
function closeVendorModal(){document.getElementById('vendorModal').classList.remove('show');}
async function saveVendor(){var name=document.getElementById('vName').value.trim();if(!name){toast('Name required');return;}var data={vendor_name:name,contact_name:document.getElementById('vContact').value.trim()||null,phone:document.getElementById('vPhone').value.trim()||null,email:document.getElementById('vEmail').value.trim()||null,cost:parseFloat(document.getElementById('vCost').value)||0,notes:document.getElementById('vNotes').value.trim()||null,vendor_type:document.getElementById('vType').value,event_project_id:document.getElementById('vEvent').value||null};if(editingVendorId){await sb.from('event_vendors').update(data).eq('vendor_id',editingVendorId);}else{data.tenant_id=tenantId;await sb.from('event_vendors').insert(data);}closeVendorModal();toast(editingVendorId?'Vendor updated':'Vendor added');await loadVendors();renderList();}
async function deleteVendor(){if(!editingVendorId||!confirm('Delete this vendor?'))return;await sb.from('event_vendors').delete().eq('vendor_id',editingVendorId);closeVendorModal();toast('Vendor deleted');await loadVendors();renderList();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
init();
</script>
</body>
</html>
