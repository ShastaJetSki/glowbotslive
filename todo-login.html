
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Life Logic — Sign In</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--card:#ffffff;--border:#e2e4e8;--text:#1a1a1a;--sub:#6b7280;
  --accent:#4F46E5;--accent-hover:#4338CA;--accent-glow:rgba(79,70,229,.12);
  --input-bg:#fafafa;--error:#DC2626;--green:#16A34A;
}
body.dark{
  --bg:#111;--card:#1e1e1e;--border:#2a2a2a;--text:#f0f0f0;--sub:#888;
  --accent:#6366F1;--accent-hover:#818CF8;--accent-glow:rgba(99,102,241,.15);
  --input-bg:#252525;
}
html,body{height:100%;background:var(--bg);}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:var(--text);display:flex;flex-direction:column;min-height:100vh;}

/* BG PATTERN */
.bg-pattern{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none;}
.bg-pattern::before{content:'';position:absolute;width:600px;height:600px;border-radius:50%;background:var(--accent-glow);top:-200px;right:-200px;filter:blur(80px);}
.bg-pattern::after{content:'';position:absolute;width:400px;height:400px;border-radius:50%;background:var(--accent-glow);bottom:-100px;left:-100px;filter:blur(60px);}

/* HEADER */
.top-bar{position:sticky;top:0;z-index:10;display:flex;justify-content:space-between;align-items:center;padding:14px 24px;background:transparent;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;}
.logo-name{font-size:18px;font-weight:800;letter-spacing:-.3px;}
.logo-tag{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-top:-2px;}
.dark-btn{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:var(--card);cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--sub);}
.dark-btn svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}

/* MAIN */
.main{flex:1;display:flex;align-items:center;justify-content:center;padding:24px;position:relative;z-index:1;}
.auth-wrap{width:100%;max-width:420px;}

/* HERO */
.hero{text-align:center;margin-bottom:32px;}
.hero-icon{font-size:52px;margin-bottom:14px;line-height:1;}
.hero-title{font-size:28px;font-weight:800;letter-spacing:-.5px;margin-bottom:8px;}
.hero-sub{font-size:15px;color:var(--sub);line-height:1.5;}

/* CARD */
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;box-shadow:0 8px 40px rgba(0,0,0,.06);}

/* TABS */
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:4px;background:var(--bg);border-radius:10px;padding:3px;margin-bottom:24px;}
.auth-tab{padding:9px;border-radius:8px;border:none;background:transparent;color:var(--sub);font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.1);}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--sub);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.form-input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text);font-size:15px;outline:none;transition:border-color .2s;}
.form-input:focus{border-color:var(--accent);}
.form-input::placeholder{color:var(--sub);opacity:.7;}

.btn-submit{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:11px;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:4px;position:relative;}
.btn-submit:hover{background:var(--accent-hover);transform:translateY(-1px);box-shadow:0 6px 20px rgba(79,70,229,.3);}
.btn-submit:active{transform:translateY(0);}
.btn-submit:disabled{opacity:.6;cursor:not-allowed;transform:none;}

.error-msg{background:rgba(220,38,38,.08);border:1px solid rgba(220,38,38,.2);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--error);margin-bottom:14px;display:none;}
.error-msg.show{display:block;}
.success-msg{background:rgba(22,163,74,.08);border:1px solid rgba(22,163,74,.2);border-radius:9px;padding:10px 14px;font-size:13px;color:var(--green);margin-bottom:14px;display:none;}
.success-msg.show{display:block;}

/* DIVIDER */
.divider{display:flex;align-items:center;gap:12px;margin:20px 0;}
.divider-line{flex:1;height:1px;background:var(--border);}
.divider-text{font-size:12px;color:var(--sub);font-weight:500;}

/* MAGIC LINK */
.btn-magic{width:100%;padding:12px;border:1.5px solid var(--border);background:var(--card);color:var(--text);border-radius:11px;font-size:14px;font-weight:600;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-magic:hover{border-color:var(--accent);color:var(--accent);}

/* FORGOT */
.forgot-link{display:block;text-align:right;font-size:12px;color:var(--accent);cursor:pointer;margin-top:-8px;margin-bottom:14px;font-weight:500;}
.forgot-link:hover{text-decoration:underline;}

/* FOOTER */
.auth-footer{text-align:center;margin-top:20px;font-size:13px;color:var(--sub);}

/* FEATURES */
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-top:24px;}
.feature{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:center;}
.feature-icon{font-size:22px;margin-bottom:6px;}
.feature-label{font-size:11px;font-weight:600;color:var(--sub);}

@media(max-width:480px){
  .hero-title{font-size:24px;}
  .features{grid-template-columns:1fr 1fr;}
  .features .feature:last-child{grid-column:1/-1;}
  .auth-card{padding:20px;}
}
  </style>
</head>
<body>

<div class="bg-pattern"></div>

<div class="top-bar">
  <div class="logo">
    <div class="logo-icon">✅</div>
    <div>
      <div class="logo-name">Life Logic</div>
      <div class="logo-tag">Personal Life Manager</div>
    </div>
  </div>
  <button class="dark-btn" onclick="toggleDark()">
    <svg id="moonIcon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    <svg id="sunIcon" viewBox="0 0 24 24" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" stroke-width="2"/></svg>
  </button>
</div>

<div class="main">
  <div class="auth-wrap">

    <div class="hero">
      <div class="hero-icon">🧠</div>
      <h1 class="hero-title">Your life, organized.</h1>
      <p class="hero-sub">Tasks, goals, and dreams — all in one place.</p>
    </div>

    <div class="auth-card">

      <!-- TABS -->
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabSignIn" onclick="switchTab('signin')">Sign In</button>
        <button class="auth-tab" id="tabSignUp" onclick="switchTab('signup')">Create Account</button>
      </div>

      <!-- ERROR / SUCCESS -->
      <div class="error-msg" id="errorMsg"></div>
      <div class="success-msg" id="successMsg"></div>

      <!-- SIGN IN FORM -->
      <div id="signinForm">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="siEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="siPass" placeholder="••••••••" autocomplete="current-password">
        </div>
        <div class="forgot-link" onclick="forgotPassword()">Forgot password?</div>
        <button class="btn-submit" id="signinBtn" onclick="doSignIn()">Sign In →</button>

        <div class="divider"><div class="divider-line"></div><span class="divider-text">or</span><div class="divider-line"></div></div>

        <button class="btn-magic" onclick="doMagicLink()">
          ✉️ Send me a magic link
        </button>
      </div>

      <!-- SIGN UP FORM -->
      <div id="signupForm" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email</label>
          <input type="email" class="form-input" id="suEmail" placeholder="you@example.com" autocomplete="email">
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="suPass" placeholder="Min. 8 characters" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label class="form-label">Confirm Password</label>
          <input type="password" class="form-input" id="suPass2" placeholder="Repeat password" autocomplete="new-password">
        </div>
        <button class="btn-submit" id="signupBtn" onclick="doSignUp()">Create Account →</button>
      </div>

    </div><!-- /auth-card -->

    <!-- FEATURES -->
    <div class="features">
      <div class="feature">
        <div class="feature-icon">✅</div>
        <div class="feature-label">Tasks & Subtasks</div>
      </div>
      <div class="feature">
        <div class="feature-icon">🎯</div>
        <div class="feature-label">Goals & Dreams</div>
      </div>
      <div class="feature">
        <div class="feature-icon">📅</div>
        <div class="feature-label">Smart Calendar</div>
      </div>
    </div>

    <div class="auth-footer">
      By continuing, you agree to our Terms of Service.
    </div>

  </div>
</div>

<script>
var SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

// DARK MODE
var isDark = localStorage.getItem('ll_dark_mode') === 'true';
if (isDark) document.body.classList.add('dark');
function applyDark() {
  var d = document.body.classList.contains('dark');
  document.getElementById('moonIcon').style.display = d ? 'none' : 'block';
  document.getElementById('sunIcon').style.display = d ? 'block' : 'none';
}
applyDark();
function toggleDark() { document.body.classList.toggle('dark'); isDark = document.body.classList.contains('dark'); localStorage.setItem('ll_dark_mode', isDark); applyDark(); }

// Check if already logged in
(async function() {
  var r = await sb.auth.getSession();
  if (r.data.session) { redirect(); return; }
  var t = localStorage.getItem('sb_access_token'), rf = localStorage.getItem('sb_refresh_token');
  if (t && rf) {
    var sr = await sb.auth.setSession({ access_token: t, refresh_token: rf });
    if (sr.data?.session) { redirect(); }
  }
})();

function redirect() { window.location.replace('todo-dashboard.html'); }

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('successMsg').classList.remove('show');
}
function showSuccess(msg) {
  var el = document.getElementById('successMsg');
  el.textContent = msg; el.classList.add('show');
  document.getElementById('errorMsg').classList.remove('show');
}
function clearMessages() {
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('successMsg').classList.remove('show');
}

function switchTab(tab) {
  clearMessages();
  var isSignIn = tab === 'signin';
  document.getElementById('tabSignIn').classList.toggle('active', isSignIn);
  document.getElementById('tabSignUp').classList.toggle('active', !isSignIn);
  document.getElementById('signinForm').style.display = isSignIn ? 'block' : 'none';
  document.getElementById('signupForm').style.display = isSignIn ? 'none' : 'block';
}

function setLoading(btnId, loading) {
  var btn = document.getElementById(btnId);
  btn.disabled = loading;
  if (loading) {
    btn._orig = btn.textContent;
    btn.textContent = 'Loading…';
  } else {
    btn.textContent = btn._orig || btn.textContent;
  }
}

async function doSignIn() {
  clearMessages();
  var email = document.getElementById('siEmail').value.trim();
  var pass = document.getElementById('siPass').value;
  if (!email || !pass) { showError('Please enter your email and password.'); return; }
  setLoading('signinBtn', true);
  var r = await sb.auth.signInWithPassword({ email: email, password: pass });
  setLoading('signinBtn', false);
  if (r.error) { showError(r.error.message); return; }
  // Store tokens
  if (r.data.session) {
    localStorage.setItem('sb_access_token', r.data.session.access_token);
    localStorage.setItem('sb_refresh_token', r.data.session.refresh_token);
  }
  redirect();
}

async function doSignUp() {
  clearMessages();
  var email = document.getElementById('suEmail').value.trim();
  var pass = document.getElementById('suPass').value;
  var pass2 = document.getElementById('suPass2').value;
  if (!email) { showError('Please enter your email.'); return; }
  if (!pass || pass.length < 8) { showError('Password must be at least 8 characters.'); return; }
  if (pass !== pass2) { showError('Passwords do not match.'); return; }
  setLoading('signupBtn', true);
  var r = await sb.auth.signUp({ email: email, password: pass });
  setLoading('signupBtn', false);
  if (r.error) { showError(r.error.message); return; }
  if (r.data.session) {
    localStorage.setItem('sb_access_token', r.data.session.access_token);
    localStorage.setItem('sb_refresh_token', r.data.session.refresh_token);
    redirect();
  } else {
    showSuccess('✅ Account created! Check your email to confirm, then sign in.');
    switchTab('signin');
  }
}

async function doMagicLink() {
  clearMessages();
  var email = document.getElementById('siEmail').value.trim();
  if (!email) { showError('Enter your email above first.'); return; }
  var r = await sb.auth.signInWithOtp({ email: email, options: { emailRedirectTo: window.location.origin + '/todo-dashboard.html' } });
  if (r.error) { showError(r.error.message); return; }
  showSuccess('✉️ Magic link sent! Check your email.');
}

async function forgotPassword() {
  var email = document.getElementById('siEmail').value.trim();
  if (!email) { showError('Enter your email above, then click "Forgot password".'); return; }
  var r = await sb.auth.resetPasswordForEmail(email, { redirectTo: window.location.origin + '/todo-login.html' });
  if (r.error) { showError(r.error.message); return; }
  showSuccess('📧 Password reset email sent!');
}

// Enter key support
document.addEventListener('keydown', function(e) {
  if (e.key !== 'Enter') return;
  var tab = document.getElementById('tabSignIn').classList.contains('active') ? 'signin' : 'signup';
  if (tab === 'signin') doSignIn(); else doSignUp();
});
</script>
</body>
</html>
