<!-- ══════════════════════════════════════════════════════════
  PASTE 1 — CSS (add inside existing <style> block)
══════════════════════════════════════════════════════════ -->
<style>
/* ── Staff Planner Tab Panel ── */
.staff-panel{display:none;padding:24px;max-width:960px;margin:0 auto;}
.staff-panel.show{display:block;}
.sp-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px;}
.sp-inputs-title{font-size:13px;font-weight:700;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;grid-column:1/-1;margin-bottom:4px;}
.sp-field label{display:block;font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.sp-field input,.sp-field select{width:100%;padding:8px 10px;border:1px solid var(--border);border-radius:7px;background:var(--input-bg);color:var(--text-primary);font-size:13px;font-family:inherit;}
.sp-field input:focus,.sp-field select:focus{outline:none;border-color:var(--accent);}
.sp-table-wrap{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;overflow:hidden;margin-bottom:20px;}
.sp-table{width:100%;border-collapse:collapse;font-size:13px;}
.sp-table th{text-align:left;padding:10px 14px;font-size:10px;font-weight:700;color:var(--text-secondary);border-bottom:1px solid var(--border);background:var(--bg-secondary);text-transform:uppercase;letter-spacing:.5px;}
.sp-table td{padding:10px 14px;border-bottom:1px solid var(--border);vertical-align:middle;}
.sp-table tbody tr:last-child td{border-bottom:none;}
.sp-table tbody tr:hover td{background:var(--bg-hover);}
.sp-table input[type=number]{width:72px;padding:5px 8px;border:1px solid var(--border);border-radius:6px;background:var(--input-bg);color:var(--text-primary);font-size:13px;text-align:center;font-family:inherit;}
.sp-table input:focus{outline:none;border-color:var(--accent);}
.sp-role-name{font-weight:600;color:var(--text-primary);}
.sp-badge{display:inline-block;font-size:10px;padding:2px 7px;border-radius:10px;font-weight:600;margin-left:6px;}
.sp-badge-sec{background:rgba(239,68,68,.1);color:#dc2626;}
.sp-badge-ops{background:rgba(14,165,233,.1);color:#0284c7;}
.sp-badge-med{background:rgba(220,38,38,.12);color:#b91c1c;}
.sp-badge-prod{background:rgba(99,102,241,.1);color:#4f46e5;}
.sp-badge-vol{background:rgba(22,163,74,.1);color:#15803d;}
.sp-summary{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px;}
.sp-sum-card{background:var(--bg-card);border:1px solid var(--border);border-radius:10px;padding:16px 18px;}
.sp-sum-val{font-size:22px;font-weight:800;line-height:1;margin-bottom:4px;color:var(--text-primary);}
.sp-sum-lbl{font-size:11px;color:var(--text-secondary);font-weight:600;text-transform:uppercase;letter-spacing:.4px;}
.sp-footer{display:flex;align-items:center;justify-content:space-between;padding:14px 0 0;border-top:1px solid var(--border);}
.sp-note{font-size:12px;color:var(--text-secondary);}
.sp-add-btn{background:var(--accent);color:#fff;border:none;padding:10px 20px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:background .15s;}
.sp-add-btn:hover{background:var(--accent-hover);}
.sp-settings-link{font-size:12px;color:var(--accent);text-decoration:none;cursor:pointer;}
.sp-settings-link:hover{text-decoration:underline;}
@media(max-width:768px){
  .sp-inputs{grid-template-columns:1fr 1fr;}
  .sp-summary{grid-template-columns:1fr 1fr;}
  .staff-panel{padding:16px;}
}
</style>


<!-- ══════════════════════════════════════════════════════════
  PASTE 2 — HTML

  A) Add this tab button inside .view-tabs (after the Official tab):
      <div class="view-tab" onclick="setViewMode('staff')">Staff Planner</div>

  B) Add this full panel inside .content (after the officialView div):
══════════════════════════════════════════════════════════ -->

<!-- Staff Planner Panel -->
<div class="staff-panel" id="staffPlannerPanel">

  <!-- Event inputs -->
  <div class="sp-inputs">
    <div class="sp-inputs-title">Event parameters</div>
    <div class="sp-field">
      <label>Expected attendance</label>
      <input type="number" id="spAtt" value="500" min="1" oninput="spCalc()">
    </div>
    <div class="sp-field">
      <label>Event duration (hours)</label>
      <input type="number" id="spHrs" value="8" min="1" oninput="spCalc()">
    </div>
    <div class="sp-field">
      <label>Number of performing acts</label>
      <input type="number" id="spActs" value="3" min="0" oninput="spCalc()">
    </div>
    <div class="sp-field">
      <label>Vendor / food booths</label>
      <input type="number" id="spBooths" value="10" min="0" oninput="spCalc()">
    </div>
    <div class="sp-field">
      <label>Entry gates / checkpoints</label>
      <input type="number" id="spGates" value="2" min="1" oninput="spCalc()">
    </div>
    <div class="sp-field">
      <label>Event type</label>
      <select id="spType" onchange="spBuild()">
        <option value="concert">Concert / Festival</option>
        <option value="wedding">Wedding / Private</option>
        <option value="community">Community / Fair</option>
        <option value="conference">Conference / Corporate</option>
        <option value="gala">Gala / Fundraiser</option>
      </select>
    </div>
  </div>

  <!-- Staff table -->
  <div class="sp-table-wrap">
    <table class="sp-table">
      <thead>
        <tr>
          <th>Role</th>
          <th>Recommended</th>
          <th>Actual count</th>
          <th>Rate ($/hr)</th>
          <th>Hours</th>
          <th>Subtotal</th>
        </tr>
      </thead>
      <tbody id="spRows"></tbody>
    </table>
  </div>

  <!-- Summary -->
  <div class="sp-summary">
    <div class="sp-sum-card">
      <div class="sp-sum-val" id="spSumStaff">0</div>
      <div class="sp-sum-lbl">Total staff</div>
    </div>
    <div class="sp-sum-card">
      <div class="sp-sum-val" id="spSumHours">0</div>
      <div class="sp-sum-lbl">Total labor hours</div>
    </div>
    <div class="sp-sum-card">
      <div class="sp-sum-val" id="spSumCost" style="color:var(--accent);">$0</div>
      <div class="sp-sum-lbl">Estimated cost</div>
    </div>
    <div class="sp-sum-card">
      <div class="sp-sum-val" id="spSumPer">$0</div>
      <div class="sp-sum-lbl">Cost per attendee</div>
    </div>
  </div>

  <div class="sp-footer">
    <div>
      <div class="sp-note">Ratios and default rates are configurable in
        <a class="sp-settings-link" href="eventlogicpro-settings.html#sec-staff">Settings &rarr; Staff Planner Defaults</a>
      </div>
    </div>
    <div style="display:flex;gap:10px;align-items:center;">
      <span id="spAddMsg" style="font-size:12px;color:#16a34a;display:none;">Added to budget!</span>
      <button class="sp-add-btn" onclick="spAddToBudget()">+ Add to Budget</button>
    </div>
  </div>

</div>


<!-- ══════════════════════════════════════════════════════════
  PASTE 3 — JS (before closing </script>)
══════════════════════════════════════════════════════════ -->
<script>
/* ═══════════════════════════════════════════
   STAFF PLANNER
═══════════════════════════════════════════ */

var SP_ROLE_DEFS = [
  { id:'security',    label:'Security guards',        badge:'sp-badge-sec',  cat:'Security',    fixed:false, perActs:false, perBooths:false },
  { id:'boxoffice',   label:'Box office / ticketing', badge:'sp-badge-ops',  cat:'Operations',  fixed:false, perActs:false, perBooths:false, perGate:true },
  { id:'stagemanager',label:'Stage manager',          badge:'sp-badge-prod', cat:'Production',  fixed:true,  perActs:false, perBooths:false },
  { id:'prodcrew',    label:'Production crew',        badge:'sp-badge-prod', cat:'Production',  fixed:false, perActs:true,  perBooths:false },
  { id:'emt',         label:'Medical / EMT',          badge:'sp-badge-med',  cat:'Medical',     fixed:false, perActs:false, perBooths:false },
  { id:'parking',     label:'Parking staff',          badge:'sp-badge-ops',  cat:'Operations',  fixed:false, perActs:false, perBooths:false },
  { id:'vendorcoord', label:'Vendor coordinator',     badge:'sp-badge-ops',  cat:'Operations',  fixed:false, perActs:false, perBooths:true  },
  { id:'volunteer',   label:'Volunteers / runners',   badge:'sp-badge-vol',  cat:'Volunteers',  fixed:false, perActs:false, perBooths:false },
  { id:'cleanup',     label:'Cleanup crew',           badge:'sp-badge-ops',  cat:'Operations',  fixed:false, perActs:false, perBooths:false },
  { id:'infobooth',   label:'Info booth staff',       badge:'sp-badge-ops',  cat:'Operations',  fixed:true,  perActs:false, perBooths:false },
];

var SP_DEFAULTS = [
  { id:'security',    ratio:100,  rate:20,  hoursMulti:1.2, min:4  },
  { id:'boxoffice',   ratio:200,  rate:16,  hoursMulti:1.0, min:2  },
  { id:'stagemanager',ratio:1,    rate:28,  hoursMulti:1.3, min:0  },
  { id:'prodcrew',    ratio:3,    rate:22,  hoursMulti:1.3, min:0  },
  { id:'emt',         ratio:500,  rate:30,  hoursMulti:1.0, min:1  },
  { id:'parking',     ratio:50,   rate:15,  hoursMulti:1.1, min:2  },
  { id:'vendorcoord', ratio:8,    rate:18,  hoursMulti:1.0, min:0  },
  { id:'volunteer',   ratio:75,   rate:0,   hoursMulti:1.0, min:4  },
  { id:'cleanup',     ratio:125,  rate:15,  hoursMulti:0.5, min:3  },
  { id:'infobooth',   ratio:1,    rate:15,  hoursMulti:1.0, min:2  },
];

function spGetRatios() {
  try {
    var saved = localStorage.getItem('elp-staff-ratios');
    if (saved) {
      var parsed = JSON.parse(saved);
      // Merge saved values into defaults (in case new roles were added)
      return SP_DEFAULTS.map(function(def) {
        var match = parsed.find(function(s) { return s.id === def.id; });
        return match ? Object.assign({}, def, match) : Object.assign({}, def);
      });
    }
  } catch(e) {}
  return SP_DEFAULTS.map(function(d) { return Object.assign({}, d); });
}

function spGetRecommended(ratios, att, hrs, acts, booths, gates, etype) {
  var r = {};
  var get = function(id) { return (ratios.find(function(x){return x.id===id;})||{ratio:100}).ratio; };
  var min = function(id) { return (SP_DEFAULTS.find(function(x){return x.id===id;})||{min:0}).min; };

  r.security    = Math.max(min('security'),    Math.ceil(att / get('security')));
  r.boxoffice   = Math.max(min('boxoffice'),   Math.ceil(att / get('boxoffice')) * gates);
  r.stagemanager= acts > 0 ? 1 : 0;
  r.prodcrew    = acts > 0 ? Math.max(min('prodcrew'), acts * get('prodcrew')) : 0;
  r.emt         = Math.max(min('emt'),         Math.ceil(att / get('emt')));
  r.parking     = Math.max(min('parking'),     Math.ceil(att * 0.35 / 2.5 / get('parking')));
  r.vendorcoord = booths > 0 ? Math.max(0,    Math.ceil(booths / get('vendorcoord'))) : 0;
  r.volunteer   = Math.max(min('volunteer'),   Math.ceil(att / get('volunteer')));
  r.cleanup     = Math.max(min('cleanup'),     Math.ceil(att / get('cleanup')));
  r.infobooth   = 2;

  // Adjust for event type
  if (etype === 'wedding' || etype === 'gala') {
    r.security  = Math.max(2, Math.ceil(att / (get('security') * 1.5)));
    r.parking   = Math.max(1, Math.ceil(att * 0.7 / 2.5 / get('parking')));
    r.volunteer = Math.max(2, Math.ceil(att / (get('volunteer') * 1.5)));
    r.prodcrew  = acts > 0 ? Math.max(2, acts * 2) : 0;
  }
  if (etype === 'conference') {
    r.prodcrew   = 0;
    r.stagemanager = acts > 0 ? 2 : 1;
    r.boxoffice  = Math.max(2, Math.ceil(att / (get('boxoffice') * 0.5)));
  }
  if (etype === 'community') {
    r.volunteer  = Math.max(6, Math.ceil(att / (get('volunteer') * 0.8)));
  }
  return r;
}

function spBuild() {
  var ratios = spGetRatios();
  var att    = Math.max(1, parseInt(document.getElementById('spAtt').value)    || 500);
  var hrs    = Math.max(1, parseInt(document.getElementById('spHrs').value)    || 8);
  var acts   = parseInt(document.getElementById('spActs').value)   || 0;
  var booths = parseInt(document.getElementById('spBooths').value) || 0;
  var gates  = Math.max(1, parseInt(document.getElementById('spGates').value) || 2);
  var etype  = document.getElementById('spType').value;
  var rec    = spGetRecommended(ratios, att, hrs, acts, booths, gates, etype);
  var tbody  = document.getElementById('spRows');
  tbody.innerHTML = '';

  SP_ROLE_DEFS.forEach(function(role) {
    var cfg       = ratios.find(function(r){return r.id===role.id;}) || {};
    var recommended = rec[role.id] || 0;
    var h         = Math.round(hrs * (cfg.hoursMulti || 1));
    var rate      = cfg.rate !== undefined ? cfg.rate : 0;
    var sub       = recommended * rate * h;
    var tr        = document.createElement('tr');
    if (recommended === 0) tr.style.opacity = '0.4';
    tr.innerHTML =
      '<td><span class="sp-role-name">' + role.label + '</span><span class="sp-badge ' + role.badge + '">' + role.cat + '</span></td>' +
      '<td style="color:var(--text-secondary);font-size:12px;"><span class="spRec">' + recommended + '</span></td>' +
      '<td><input type="number" class="spCount" value="' + recommended + '" min="0" oninput="spCalc()"></td>' +
      '<td><input type="number" class="spRate"  value="' + rate + '" min="0" step="0.5" oninput="spCalc()"></td>' +
      '<td style="color:var(--text-secondary);font-size:12px;" class="spHrs">' + h + '</td>' +
      '<td style="font-weight:700;" class="spSub">' + (sub > 0 ? '$' + Math.round(sub).toLocaleString() : '$0') + '</td>';
    tbody.appendChild(tr);
  });

  spCalc();
}

function spCalc() {
  var hrs = Math.max(1, parseInt(document.getElementById('spHrs').value) || 8);
  var att = Math.max(1, parseInt(document.getElementById('spAtt').value) || 500);
  var ratios = spGetRatios();
  var rows = document.querySelectorAll('#spRows tr');
  var totalStaff = 0, totalCost = 0, totalHours = 0;

  rows.forEach(function(tr, i) {
    var cfg   = ratios[i] || {};
    var count = parseInt(tr.querySelector('.spCount').value)  || 0;
    var rate  = parseFloat(tr.querySelector('.spRate').value) || 0;
    var h     = Math.round(hrs * (cfg.hoursMulti || 1));
    var sub   = count * rate * h;
    tr.querySelector('.spHrs').textContent = h;
    tr.querySelector('.spSub').textContent = sub > 0 ? '$' + Math.round(sub).toLocaleString() : '$0';
    tr.style.opacity = count === 0 ? '0.4' : '1';
    totalStaff  += count;
    totalCost   += sub;
    totalHours  += count * h;
  });

  document.getElementById('spSumStaff').textContent  = totalStaff;
  document.getElementById('spSumHours').textContent  = totalHours.toLocaleString();
  document.getElementById('spSumCost').textContent   = '$' + Math.round(totalCost).toLocaleString();
  document.getElementById('spSumPer').textContent    = att > 0 ? '$' + (totalCost / att).toFixed(2) : '$0';
}

function spAddToBudget() {
  var costEl = document.getElementById('spSumCost');
  var staffEl = document.getElementById('spSumStaff');
  if (!costEl) return;
  var totalCost = parseInt(costEl.textContent.replace(/[^0-9]/g,'')) || 0;
  var totalStaff = parseInt(staffEl.textContent) || 0;
  if (totalCost === 0) { toast('No staff cost to add'); return; }

  // Find or create a 'staffing' expense category and add line item
  var existing = expCats.find(function(c) {
    return c.id === 'staffing' || c.title.toLowerCase().indexOf('staff') >= 0;
  });

  if (existing) {
    existing.items.push({ name: 'Staff planner estimate (' + totalStaff + ' staff)', est: totalCost, act: 0, due: 'pre' });
  } else {
    var newCat = { id: 'staffing_' + Date.now(), color: '#fb923c', title: 'Staffing & Crew',
      items: [{ name: 'Staff planner estimate (' + totalStaff + ' staff)', est: totalCost, act: 0, due: 'pre' }] };
    expCats.push(newCat);
    expandedSet.add(newCat.id);
  }

  markDirty();
  render();

  var msg = document.getElementById('spAddMsg');
  msg.style.display = 'inline';
  setTimeout(function() { msg.style.display = 'none'; }, 2500);
  toast('Staff cost $' + Math.round(totalCost).toLocaleString() + ' added to budget');
}

// Hook into setViewMode to show/hide staff panel
var _origSetViewMode = setViewMode;
setViewMode = function(mode) {
  _origSetViewMode(mode);
  var panel = document.getElementById('staffPlannerPanel');
  if (!panel) return;
  if (mode === 'staff') {
    panel.classList.add('show');
    // Also hide other panels
    document.getElementById('editorView').style.display   = 'none';
    var rv = document.getElementById('reviewPanel');
    if (rv) rv.classList.remove('show');
    var ov = document.getElementById('officialView');
    if (ov) ov.style.display = 'none';
    // Activate correct tab
    document.querySelectorAll('.view-tab').forEach(function(t) {
      t.classList.toggle('active', t.textContent.trim() === 'Staff Planner');
    });
    spBuild();
  } else {
    panel.classList.remove('show');
  }
};
</script>
