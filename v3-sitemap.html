<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Site Maps — Event Logic Pro v3</title>
<link rel="icon" href="favicon-eventlogic.ico">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f4f5f7;--bg2:#ebedf1;--card:#fff;--hover:#f0f0f3;--border:#e2e4e8;--t1:#1a1a1a;--t2:#6b7280;--acc:#DC2626;--acc2:#B91C1C;--glow:rgba(220,38,38,.10);--inp:#fafafa;--overlay:rgba(0,0,0,.45);}
body.dark{--bg:#111;--bg2:#1a1a1a;--card:#222;--hover:#2a2a2a;--border:#333;--t1:#f0f0f0;--t2:#999;--acc:#DC2626;--acc2:#EF4444;--glow:rgba(220,38,38,.15);--inp:#1a1a1a;--overlay:rgba(0,0,0,.75);}
html{background:var(--bg);}html.dark{background:#111;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;padding-bottom:100px;min-height:100vh;}
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{padding:8px 24px;display:flex;justify-content:space-between;align-items:center;}
.dh-left{display:flex;align-items:center;gap:16px;}
.dh-logo{height:52px;object-fit:contain;}
.dh-titles h1{font-size:22px;font-weight:700;}
.dh-titles .sub{font-size:11px;color:var(--acc);font-weight:600;}
.dh-right{display:flex;align-items:center;gap:10px;}
.event-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--glow);border:1px solid var(--acc);border-radius:20px;font-size:12px;color:var(--acc);font-weight:600;max-width:200px;}
.event-badge span.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.event-badge-x{opacity:.6;cursor:pointer;font-size:14px;}
.dark-toggle{background:none;border:none;cursor:pointer;padding:6px;color:var(--t2);display:flex;}
.dark-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--t2);cursor:pointer;}
.nav-bar{display:flex;align-items:center;padding:0 24px;border-top:1px solid var(--border);}
.nav-left{display:flex;gap:2px;}
.nav-btn{padding:8px 14px;font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;border-radius:6px;transition:all .15s;}
.nav-btn:hover{color:var(--t1);background:var(--hover);}
.nav-btn.active{color:var(--acc);font-weight:600;}
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-bar{display:flex;align-items:center;padding:10px 16px;gap:10px;}
.mh-logo{height:36px;object-fit:contain;}
.mh-title{font-size:17px;font-weight:700;flex:1;}
.mh-badge{font-size:11px;color:var(--acc);font-weight:600;}
.mbn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom);}
.mbn-inner{display:grid;grid-template-columns:repeat(5,1fr);}
.mbn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--t2);font-size:10px;cursor:pointer;text-decoration:none;}
.mbn-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.mbn-btn.active{color:var(--acc);}
.sheet-overlay{display:none;position:fixed;inset:0;z-index:300;background:var(--overlay);}
.sheet-overlay.open{display:block;}
.more-sheet{position:fixed;bottom:-100%;left:0;right:0;z-index:301;background:var(--card);border-radius:20px 20px 0 0;padding:12px 0 env(safe-area-inset-bottom);transition:bottom .3s cubic-bezier(.4,0,.2,1);}
.more-sheet.open{bottom:0;}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px;}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;color:var(--t1);text-decoration:none;border:none;background:none;width:100%;text-align:left;cursor:pointer;}
.sheet-item:hover{background:var(--hover);}
.sheet-item svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;}
.sheet-item.danger{color:#DC2626;}
.sheet-sep{height:1px;background:var(--border);margin:4px 0;}
.event-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;display:flex;align-items:center;gap:10px;}
.event-select{max-width:300px;flex:1;padding:8px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.event-select:focus{outline:none;border-color:var(--acc);}
.btn-primary{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:9px 18px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--acc2);}
.btn-secondary{background:var(--bg2);color:var(--t1);border:1px solid var(--border);border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;}
.btn-danger{background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;}
.content{max-width:1000px;margin:0 auto;padding:20px 24px;}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
.section-title{font-size:16px;font-weight:600;}
.maps-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.map-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:box-shadow .15s;}
.map-card:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);}
.map-thumb{width:100%;height:140px;background:var(--bg2);display:flex;align-items:center;justify-content:center;font-size:48px;}
.map-thumb img{width:100%;height:100%;object-fit:cover;}
.map-body{padding:14px 16px;}
.map-name{font-size:14px;font-weight:700;margin-bottom:4px;}
.map-meta{font-size:12px;color:var(--t2);margin-bottom:10px;}
.map-footer{display:flex;gap:8px;padding:10px 16px;border-top:1px solid var(--border);}
.map-action{font-size:12px;color:var(--acc);font-weight:600;background:var(--glow);border:none;border-radius:6px;padding:5px 10px;cursor:pointer;}
.map-action:hover{background:var(--acc);color:#fff;}
.map-action.danger{color:#DC2626;background:#fee2e2;}
.map-action.danger:hover{background:#DC2626;color:#fff;}
/* CANVAS EDITOR */
.editor-view{display:none;}
.editor-view.active{display:block;}
.editor-header{display:flex;align-items:center;gap:10px;padding:10px 20px;background:var(--card);border-bottom:1px solid var(--border);}
.back-btn{background:none;border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;color:var(--t2);}
.editor-title{font-size:15px;font-weight:700;flex:1;}
.editor-tools{display:flex;gap:6px;padding:8px 20px;background:var(--bg2);border-bottom:1px solid var(--border);flex-wrap:wrap;}
.tool-btn{padding:6px 12px;font-size:12px;border:1px solid var(--border);border-radius:6px;cursor:pointer;background:var(--card);color:var(--t1);}
.tool-btn:hover,.tool-btn.active{background:var(--acc);color:#fff;border-color:var(--acc);}
.canvas-wrap{overflow:auto;padding:20px;}
.site-canvas{border:2px solid var(--border);border-radius:8px;background:#fff;position:relative;display:block;margin:0 auto;}
.canvas-element{position:absolute;border:2px solid transparent;cursor:move;user-select:none;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;border-radius:4px;}
.canvas-element:hover,.canvas-element.selected{border-color:var(--acc);outline:none;}
.canvas-element .el-label{text-align:center;padding:4px;word-break:break-word;line-height:1.2;}
.el-delete{position:absolute;top:-10px;right:-10px;width:20px;height:20px;border-radius:50%;background:var(--acc);color:#fff;border:none;cursor:pointer;font-size:12px;display:none;align-items:center;justify-content:center;}
.canvas-element.selected .el-delete{display:flex;}
.empty-state{text-align:center;padding:48px 24px;color:var(--t2);}
.empty-icon{font-size:48px;margin-bottom:12px;}
.empty-title{font-size:18px;font-weight:600;color:var(--t1);margin-bottom:6px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:var(--overlay);align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border-radius:16px;width:90%;max-width:440px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 0;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);}
.modal-body{padding:14px 20px;}
.modal-footer{padding:0 20px 16px;display:flex;gap:8px;justify-content:flex-end;}
.form-group{margin-bottom:12px;}
.form-label{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:4px;display:block;}
.form-input,.form-select{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--acc);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--card);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;}
.toast.show{opacity:1;}
@media(max-width:768px){.dh{display:none!important;}.mh{display:block!important;}.mbn{display:block!important;}.content{padding:14px 16px;}.modal-overlay{align-items:flex-end;padding:0;}.modal-box{border-radius:20px 20px 0 0;width:100%;max-height:90vh;}}
@media(min-width:769px){.mh{display:none!important;}.mbn{display:none!important;}}'
</style>
</head>

<script>
var isDark=localStorage.getItem('elp_dark_mode')==='true';
if(isDark){document.body.classList.add('dark');document.documentElement.classList.add('dark');}
function applyDarkIcons(){var d=document.body.classList.contains('dark');document.documentElement.classList.toggle('dark',d);['d','m'].forEach(function(p){var moon=document.getElementById(p+'Moon'),sun=document.getElementById(p+'Sun');if(moon)moon.style.display=d?'none':'block';if(sun)sun.style.display=d?'block':'none';});var logo=document.getElementById('dLogo');if(logo)logo.src=d?'eventlogicpro-logo-dark.png':'eventlogicpro-logo.png';}
applyDarkIcons();
function toggleDark(){document.body.classList.toggle('dark');isDark=document.body.classList.contains('dark');localStorage.setItem('elp_dark_mode',isDark);applyDarkIcons();}
var SUPABASE_URL='https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var tenantId=null,userId=null;
var allMaps=[],allProjects=[];
var currentMapId=null,currentMapData=null;
var canvasElements=[],selectedEl=null,dragging=false,dragOffX=0,dragOffY=0;
var ctx=null,canvasEl=null;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2400);}
async function doLogout(){await sb.auth.signOut();localStorage.removeItem('sb_access_token');localStorage.removeItem('sb_refresh_token');location.replace('/');}
async function checkAuth(){var r=await sb.auth.getSession();var s=r.data.session;if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.replace('/');return null;}}return s;}
function clearCurrentEvent(){localStorage.removeItem('elp_current_event');localStorage.removeItem('elp_current_event_name');localStorage.removeItem('elp_current_event_date');updateEventBadge();}
function updateEventBadge(){var name=localStorage.getItem('elp_current_event_name')||'';var badge=document.getElementById('dEventBadge'),mBadge=document.getElementById('mEventBadge');if(name){if(badge){document.getElementById('dEventName').textContent=name;badge.style.display='flex';}if(mBadge){mBadge.textContent='📍 '+name;mBadge.style.display='block';}}else{if(badge)badge.style.display='none';if(mBadge)mBadge.style.display='none';}}
function openMoreSheet(){document.getElementById('sheetOverlay').classList.add('open');document.getElementById('moreSheet').classList.add('open');}
function closeMoreSheet(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('moreSheet').classList.remove('open');}

async function init(){
  var session=await checkAuth();if(!session)return;
  userId=session.user.id;var email=session.user.email||'';
  var ur=await sb.from('users').select('tenant_id').eq('email',email).maybeSingle();
  if(ur.data)tenantId=ur.data.tenant_id;
  if(!tenantId){var bs=await sb.from('business_settings').select('tenant_id').limit(1).maybeSingle();if(bs.data)tenantId=bs.data.tenant_id;}
  if(!tenantId)return;
  var biz=await sb.from('business_settings').select('business_name,display_name').eq('tenant_id',tenantId).maybeSingle();
  if(biz.data)document.getElementById('dBiz').textContent=biz.data.display_name||biz.data.business_name||'Event Logic Pro';
  updateEventBadge();
  await Promise.all([loadMaps(),loadProjects()]);
  populateEventFilter();
  var savedEv=localStorage.getItem('elp_current_event');
  if(savedEv)document.getElementById('eventFilter').value=savedEv;
  renderMaps();
}
async function loadMaps(){var r=await sb.from('site_maps').select('*').eq('tenant_id',tenantId).order('created_at',{ascending:false});allMaps=r.data||[];}
async function loadProjects(){var r=await sb.from('event_projects').select('event_project_id,event_name,event_date').eq('tenant_id',tenantId).order('event_date');allProjects=r.data||[];}
function populateEventFilter(){var sel=document.getElementById('eventFilter');sel.innerHTML='<option value="">All Events</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name;sel.appendChild(o);});}

function renderMaps(){
  var evFilter=document.getElementById('eventFilter').value;
  var filtered=allMaps.filter(function(m){return !evFilter||m.event_project_id===evFilter;});
  var container=document.getElementById('mapsContainer');
  if(!filtered.length){container.innerHTML='<div class="empty-state"><div class="empty-icon">🗺️</div><div class="empty-title">No site maps yet</div><p style="color:var(--t2);font-size:14px;margin-bottom:16px;">Create a site map to visually plan your event layout — stages, booths, parking, entrances, and more.</p><button class="btn-primary" onclick="openNewMapModal()">+ Create Site Map</button></div>';return;}
  var html='<div class="maps-grid">';
  filtered.forEach(function(m){
    var proj=allProjects.find(function(p){return p.event_project_id===m.event_project_id;});
    var thumb='🗺️';
    var elCount=0;try{var d=JSON.parse(m.map_data||'{}');elCount=(d.elements||[]).length;}catch(e){}
    html+='<div class="map-card">'
      +'<div class="map-thumb">'+thumb+'</div>'
      +'<div class="map-body">'
        +'<div class="map-name">'+esc(m.map_name||'Untitled Map')+'</div>'
        +'<div class="map-meta">'+(proj?esc(proj.event_name):'No event')+' · '+elCount+' elements</div>'
      +'</div>'
      +'<div class="map-footer">'
        +'<button class="map-action" onclick="openEditor(\''+m.map_id+'\')">Open Editor</button>'
        +'<button class="map-action danger" onclick="deleteMap(\''+m.map_id+'\',\''+escQ(m.map_name||'')+'\');event.stopPropagation()">Delete</button>'
      +'</div>'
    +'</div>';
  });
  html+='</div>';
  container.innerHTML=html;
}

/* MAP CRUD */
function openNewMapModal(){document.getElementById('nmName').value='';document.getElementById('nmW').value='800';document.getElementById('nmH').value='600';var sel=document.getElementById('nmEvent');sel.innerHTML='<option value="">— No event link —</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name;sel.appendChild(o);});var savedEv=localStorage.getItem('elp_current_event');if(savedEv)sel.value=savedEv;document.getElementById('newMapModal').classList.add('show');}
function closeNewMapModal(){document.getElementById('newMapModal').classList.remove('show');}
async function createMap(){var name=document.getElementById('nmName').value.trim();if(!name){toast('Name required');return;}var w=parseInt(document.getElementById('nmW').value)||800;var h=parseInt(document.getElementById('nmH').value)||600;var mapData=JSON.stringify({width:w,height:h,elements:[]});var data={tenant_id:tenantId,map_name:name,event_project_id:document.getElementById('nmEvent').value||null,map_data:mapData,created_by:userId};var r=await sb.from('site_maps').insert(data).select().single();if(r.error){toast('Error: '+r.error.message);return;}closeNewMapModal();toast('Map created');await loadMaps();renderMaps();openEditor(r.data.map_id);}
async function deleteMap(id,name){if(!confirm('Delete "'+name+'"?'))return;await sb.from('site_maps').delete().eq('map_id',id);toast('"'+name+'" deleted');await loadMaps();renderMaps();}

/* CANVAS EDITOR */
function openEditor(mapId){
  currentMapId=mapId;
  var map=allMaps.find(function(m){return m.map_id===mapId;})||{};
  document.getElementById('editorTitle').textContent=map.map_name||'Site Map';
  try{currentMapData=JSON.parse(map.map_data||'{}');}catch(e){currentMapData={};}
  canvasElements=currentMapData.elements||[];
  var w=currentMapData.width||800,h=currentMapData.height||600;
  document.getElementById('canvasW').value=w;
  document.getElementById('canvasH').value=h;
  canvasEl=document.getElementById('siteCanvas');
  canvasEl.width=w;canvasEl.height=h;
  ctx=canvasEl.getContext('2d');
  setupCanvasEvents();
  drawCanvas();
  document.getElementById('listView').style.display='none';
  document.getElementById('editorView').classList.add('active');
}
function backToList(){document.getElementById('editorView').classList.remove('active');document.getElementById('listView').style.display='block';currentMapId=null;}
function resizeCanvas(){var w=parseInt(document.getElementById('canvasW').value)||800;var h=parseInt(document.getElementById('canvasH').value)||600;canvasEl.width=w;canvasEl.height=h;drawCanvas();}
function setTool(t){document.querySelectorAll('.tool-btn').forEach(function(b){b.classList.remove('active');});document.getElementById('tool'+t.charAt(0).toUpperCase()+t.slice(1)).classList.add('active');}
function addElement(type,label,color,w,h){var el={id:Date.now()+'',type:type,label:label,color:color,x:50,y:50,w:w,h:h};canvasElements.push(el);selectedEl=el;drawCanvas();}
function addCustom(){var label=prompt('Element label:');if(!label)return;addElement('custom',label,'#7C3AED',80,50);}
function clearCanvas(){if(!confirm('Clear all elements?'))return;canvasElements=[];selectedEl=null;drawCanvas();}

function drawCanvas(){if(!ctx||!canvasEl)return;ctx.clearRect(0,0,canvasEl.width,canvasEl.height);ctx.fillStyle='#f8f9fa';ctx.fillRect(0,0,canvasEl.width,canvasEl.height);// Grid
ctx.strokeStyle='rgba(0,0,0,.06)';ctx.lineWidth=1;for(var x=0;x<canvasEl.width;x+=20){ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,canvasEl.height);ctx.stroke();}for(var y=0;y<canvasEl.height;y+=20){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(canvasEl.width,y);ctx.stroke();}
canvasElements.forEach(function(el){ctx.fillStyle=el.color+'cc';ctx.strokeStyle=selectedEl&&selectedEl.id===el.id?'#DC2626':el.color;ctx.lineWidth=selectedEl&&selectedEl.id===el.id?3:1;ctx.beginPath();if(el.type==='parking')ctx.rect(el.x,el.y,el.w,el.h);else if(el.type==='restroom'){ctx.arc(el.x+el.w/2,el.y+el.h/2,Math.min(el.w,el.h)/2,0,Math.PI*2);}else ctx.roundRect?ctx.roundRect(el.x,el.y,el.w,el.h,6):ctx.rect(el.x,el.y,el.w,el.h);ctx.fill();ctx.stroke();ctx.fillStyle='#fff';ctx.font='bold '+(Math.min(el.w/el.label.length*1.5,14))+'px system-ui';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(el.label,el.x+el.w/2,el.y+el.h/2);});}

function setupCanvasEvents(){canvasEl.onmousedown=function(e){var rect=canvasEl.getBoundingClientRect();var mx=(e.clientX-rect.left)*(canvasEl.width/rect.width);var my=(e.clientY-rect.top)*(canvasEl.height/rect.height);selectedEl=null;for(var i=canvasElements.length-1;i>=0;i--){var el=canvasElements[i];if(mx>=el.x&&mx<=el.x+el.w&&my>=el.y&&my<=el.y+el.h){selectedEl=el;dragging=true;dragOffX=mx-el.x;dragOffY=my-el.y;break;}}drawCanvas();};
canvasEl.onmousemove=function(e){if(!dragging||!selectedEl)return;var rect=canvasEl.getBoundingClientRect();selectedEl.x=Math.max(0,(e.clientX-rect.left)*(canvasEl.width/rect.width)-dragOffX);selectedEl.y=Math.max(0,(e.clientY-rect.top)*(canvasEl.height/rect.height)-dragOffY);drawCanvas();};
canvasEl.onmouseup=function(){dragging=false;};
canvasEl.ondblclick=function(e){if(selectedEl){var newLabel=prompt('Edit label:',selectedEl.label);if(newLabel!==null){selectedEl.label=newLabel;drawCanvas();}}};
canvasEl.onkeydown=function(e){if(e.key==='Delete'&&selectedEl){canvasElements=canvasElements.filter(function(el){return el.id!==selectedEl.id;});selectedEl=null;drawCanvas();}};
canvasEl.setAttribute('tabindex','0');}

async function saveCanvas(){if(!currentMapId)return;var mapData=JSON.stringify({width:canvasEl.width,height:canvasEl.height,elements:canvasElements});var thumb=canvasEl.toDataURL('image/jpeg',0.5);await sb.from('site_maps').update({map_data:mapData,thumbnail:thumb,updated_at:new Date().toISOString()}).eq('map_id',currentMapId);toast('Map saved');await loadMaps();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function escQ(s){return String(s||'').replace(/'/g,"\\'");}
init();
</script>
