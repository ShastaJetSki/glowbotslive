<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>SharkLaw V2 – Pipeline</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
  <script>(function(){var t=localStorage.getItem('app-theme')||'dark-blue';document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{background:var(--bg-primary);color:var(--text-primary);font-family:system-ui,-apple-system,sans-serif;min-height:100vh;}
    /* HEADER */
    .desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border-default);}
    .mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .mobile-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px;gap:12px;}
    .mobile-menu-toggle{background:transparent;border:none;color:var(--text-secondary);font-size:20px;width:36px;height:36px;cursor:pointer;}
    .mobile-header-title{font-size:18px;font-weight:600;}
    .mobile-header-content{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--bg-primary);border-top:1px solid var(--border-default);}
    .mobile-header-content.expanded{max-height:200px;}
    .mobile-header-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 12px;}
    .mobile-header-actions button{padding:10px;font-size:13px;background:color-mix(in srgb,var(--accent-primary) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent-primary) 30%,transparent);color:var(--accent-light);border-radius:8px;cursor:pointer;}
    .theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    /* STAGE SUMMARY */
    .stage-summary{display:flex;gap:6px;padding:10px 16px;overflow-x:auto;scrollbar-width:none;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .stage-summary::-webkit-scrollbar{display:none;}
    .stage-pill{padding:6px 16px;border-radius:20px;background:var(--bg-card);border:1px solid var(--border-default);white-space:nowrap;text-align:center;cursor:pointer;transition:all .15s;flex-shrink:0;}
    .stage-pill:hover{border-color:currentColor;}
    .sp-val{font-size:18px;font-weight:700;}
    .sp-lbl{font-size:10px;color:var(--text-secondary);margin-top:2px;}
    /* TOOLBAR */
    .pipeline-toolbar{display:flex;gap:8px;align-items:center;padding:10px 16px;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);flex-wrap:wrap;}
    .tb-label{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;}
    .tb-select{padding:7px 10px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:13px;cursor:pointer;}
    .board-count{margin-left:auto;font-size:12px;color:var(--text-secondary);}
    /* BOARD */
    .board-wrap{display:flex;gap:0;overflow-x:auto;height:calc(100vh - 220px);}
    .board-col{flex:0 0 280px;display:flex;flex-direction:column;border-right:1px solid var(--border-default);}
    .col-header{padding:12px 14px;font-size:13px;font-weight:700;border-bottom:1px solid var(--border-default);display:flex;justify-content:space-between;align-items:center;flex-shrink:0;position:sticky;top:0;background:var(--bg-secondary);z-index:1;}
    .col-count{font-size:11px;padding:2px 8px;border-radius:10px;background:var(--bg-hover);}
    .col-body{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:#333 #111;display:flex;flex-direction:column;gap:8px;}
    .col-body::-webkit-scrollbar{width:4px;}
    .col-body::-webkit-scrollbar-track{background:#111;}
    .col-body::-webkit-scrollbar-thumb{background:#444;border-radius:4px;}
    .drop-zone{min-height:60px;border:2px dashed var(--border-default);border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text-secondary);font-size:12px;}
    .drop-zone.drag-over{border-color:var(--accent-primary);background:color-mix(in srgb,var(--accent-primary) 8%,transparent);}
    /* CONTACT CARDS */
    /* CONTACT CARD */
    .cc{border-radius:8px;padding:12px 14px;cursor:pointer;transition:filter .15s;border-left:4px solid;display:flex;flex-direction:column;gap:7px;min-width:0;}
    .cc:hover{filter:brightness(1.15);}
    .cc-row{display:flex;justify-content:space-between;align-items:baseline;min-width:0;}
    .cc-name{font-size:14px;font-weight:700;color:var(--text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .cc-org{font-size:12px;color:var(--text-secondary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:right;max-width:50%;}
    .cc-phone{font-size:13px;color:var(--text-primary);text-decoration:none;}
    .cc-type{font-size:13px;font-weight:400;color:var(--text-primary);text-align:right;}
    .cc-rep{font-size:11px;color:var(--text-secondary);}
    .cc-stage{font-size:11px;color:var(--text-secondary);text-align:right;}
    /* MOBILE NAV */
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);padding:8px;z-index:100;border-top:1px solid var(--border-default);}
    .mobile-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
    .mobile-nav-row:last-child{margin-bottom:0;}
    .mobile-nav-row.three-col{grid-template-columns:1fr 1fr 1fr;}
    .mobile-nav-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;}
    .mobile-nav-btn.active{background:color-mix(in srgb,var(--accent-primary) 60%,transparent);border-color:var(--accent-primary);color:var(--text-primary);}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--accent-primary);color:var(--text-primary);padding:10px 20px;border-radius:20px;font-size:13px;z-index:2000;opacity:0;pointer-events:none;transition:opacity .3s;}
    .toast.show{opacity:1;}
    @media(max-width:768px){
      .desktop-header{display:none!important;}
      .mobile-top-header{display:block;}
      .mobile-bottom-nav{display:block!important;}
      body{padding-bottom:120px;}
    }
    @media(min-width:769px){.mobile-top-header{display:none!important;}.mobile-bottom-nav{display:none!important;}}
  </style>
</head>
<body>

<div class="mobile-top-header">
  <div class="mobile-header-bar">
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">&#9776;</button>
    <div style="flex:1;"><div class="mobile-header-title">Pipeline</div><div style="font-size:12px;color:var(--accent-light);" id="mUserName">Loading...</div></div>
    <button class="theme-btn" onclick="cycleTheme()">&#9788;</button>
  </div>
  <div class="mobile-header-content" id="mobileHeaderContent">
    <div class="mobile-header-actions">
      <button onclick="location.href='v2-sharklaw-dashboard.html'">Dashboard</button>
      <button onclick="location.href='v2-sharklaw-contacts.html'">Contacts</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<div class="desktop-header">
  <div style="padding:16px 24px 8px;display:flex;justify-content:space-between;align-items:center;">
    <div><h1 style="margin:0;font-size:28px;font-weight:700;">Pipeline</h1><div style="font-size:12px;color:var(--accent-light);" id="dUserName">Loading...</div></div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="theme-btn" onclick="cycleTheme()">&#9788;</button>
      <a onclick="logout()" style="color:var(--text-secondary);cursor:pointer;font-size:14px;">Logout</a>
    </div>
  </div>
  <div style="padding:0 24px 12px;">
    <nav style="display:flex;gap:24px;align-items:center;">
      <a href="v2-sharklaw-dashboard.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Dashboard</a>
      <a href="v2-sharklaw-scheduler.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Scheduler</a>
      <a href="v2-sharklaw-contacts.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Contacts</a>
      <a href="v2-sharklaw-pipeline.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--accent-primary);border-bottom:2px solid var(--accent-primary);">Pipeline</a>
      <a href="v2-sharklaw-swag.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Swag</a>
      <a href="v2-sharklaw-settings.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Settings</a>
    </nav>
  </div>
</div>

<div class="stage-summary" id="stageSummary"></div>

<div class="pipeline-toolbar">
  <span class="tb-label">Filter:</span>
  <select class="tb-select" id="teamFilter" onchange="renderBoard()"><option value="">All Team</option></select>
  <select class="tb-select" id="typeFilter" onchange="renderBoard()">
    <option value="">All Types</option>
    <option value="MC">MC</option><option value="RC">RC</option><option value="HOG">HOG</option>
    <option value="Club">Club</option><option value="Vendor">Vendor</option>
    <option value="Individual">Individual</option><option value="Business">Business</option>
    <option value="prospect">prospect</option>
  </select>
  <span class="board-count" id="boardCount"></span>
</div>

<div class="board-wrap" id="boardWrap"></div>

<div class="mobile-bottom-nav">
  <div class="mobile-nav-row">
    <a href="v2-sharklaw-dashboard.html" class="mobile-nav-btn">Dashboard</a>
    <a href="v2-sharklaw-scheduler.html" class="mobile-nav-btn">Scheduler</a>
  </div>
  <div class="mobile-nav-row three-col">
    <a href="v2-sharklaw-contacts.html" class="mobile-nav-btn">Contacts</a>
    <a href="v2-sharklaw-pipeline.html" class="mobile-nav-btn active">Pipeline</a>
    <a href="v2-sharklaw-settings.html" class="mobile-nav-btn">Settings</a>
  </div>
</div>
<div class="toast" id="themeToast"></div>

<script>
var STAGE_MAP={'1':'1st Contact','2':'Follow Up','3':'Swag Approved','4':'Receive Artwork','5':'Deliver Pop Up','6':'Confirmed Partnership','7':'Follow Up (Old)'};
var STAGE_ORDER=['1','2','3','4','5','6','7'];
function stageName(val){return STAGE_MAP[String(val)]||val||'';}

function hexToRgb(hex){if(!hex||hex[0]!=='#')return'100,100,200';var h=hex.length===4?hex[1]+hex[1]+hex[2]+hex[2]+hex[3]+hex[3]:hex.slice(1);return parseInt(h.slice(0,2),16)+','+parseInt(h.slice(2,4),16)+','+parseInt(h.slice(4,6),16);}
function fmt(v){if(!v)return'';var d=v.replace(/\D/g,'').slice(0,10);if(d.length<=3)return d;if(d.length<=6)return d.slice(0,3)+'-'+d.slice(3);return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);}
SB_URL = 'https://wiwbmvmgrutjfbnqhfnb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
var sb = window.supabase.createClient(SB_URL, SB_KEY);

var TENANT = null, currentUserId = null, currentUserRole = null;
var allContacts = [], allMembers = [], funnelStages = [], swagTotals = {};
var currentEditId = null;

var DEFAULT_STAGES = {
  1:{name:'1st Contact',color:'#3b82f6'},
  2:{name:'Follow Up',color:'#06b6d4'},
  3:{name:'Swag Approved',color:'#8b5cf6'},
  4:{name:'Receive Artwork',color:'#f59e0b'},
  5:{name:'Deliver Pop Up',color:'#10b981'},
  6:{name:'Confirmed Partnership',color:'#ef4444'}
};
var STAGES = {};

function getStageIds() { return Object.keys(STAGES).map(Number).sort(function(a,b){return a-b;}); }
function getStageName(id) { return STAGES[id] ? STAGES[id].name : 'Stage '+id; }
function getStageColor(id) { return STAGES[id] ? STAGES[id].color : '#9fb0c3'; }

function memberColor(id) { var m = allMembers.find(function(x){return x.member_id===id;}); return (m&&m.color)||'#6b7280'; }
function memberName(id)  { var m = allMembers.find(function(x){return x.member_id===id;}); if(!m) return 'Unassigned'; return ((m.first_name||'')+' '+(m.last_name||'')).trim(); }

/* ===== THEME ===== */
var THEME_NAMES = {'dark-blue':'Dark Blue','blue-light':'Blue Light','slate-dark':'Slate Dark','slate-light':'Slate Light','ocean-dark':'Ocean Dark','ocean-light':'Ocean Light','midnight-dark':'Midnight','lavender-light':'Lavender','forest-dark':'Forest','mint-light':'Mint','crimson-dark':'Crimson','coral-light':'Coral','amber-dark':'Amber','honey-light':'Honey','rose-dark':'Rose','sky-light':'Sky','cyber-dark':'Cyber','sand-light':'Sand'};
var userThemeBank = ['dark-blue'], themeIndex = 0;
function loadTheme() { var t=localStorage.getItem('app-theme')||'dark-blue'; document.documentElement.setAttribute('data-theme',t); themeIndex=userThemeBank.indexOf(t); if(themeIndex<0)themeIndex=0; }
function cycleTheme() { if(userThemeBank.length<=1){showToast('Unlock more themes in Settings!');return;} themeIndex=(themeIndex+1)%userThemeBank.length; var t=userThemeBank[themeIndex]; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('app-theme',t); showToast(THEME_NAMES[t]||t); }
async function loadUserThemeBank() { if(!currentUserId)return; try{ var r=await sb.from('user_theme_bank').select('theme_key').eq('member_id',currentUserId); if(r.data&&r.data.length>0){userThemeBank=['dark-blue'].concat(r.data.map(function(t){return t.theme_key;}));userThemeBank=[...new Set(userThemeBank)];} loadTheme(); }catch(e){} }
loadTheme();

function showToast(msg) { var t=document.getElementById('themeToast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
async function logout() { await sb.auth.signOut(); localStorage.clear(); location.replace('v2-login.html'); }
function toggleMobileMenu() { document.getElementById('mobileMenuContent').classList.toggle('expanded'); }
function isAdmin() { return ['owner','admin'].includes((currentUserRole||'').toLowerCase()); }
function isManager() { return ['manager','sr_associate'].includes((currentUserRole||'').toLowerCase()); }

/* ===== STAGE SUMMARY ===== */
function renderStageSummary() {
  var ids = getStageIds();
  var html = ids.map(function(id){
    var count = allContacts.filter(function(c){ return (c.funnel_stage||ids[0]) === id; }).length;
    return '<div class="stage-pill" style="color:'+getStageColor(id)+'" onclick="scrollToStage('+id+')">'+
      '<div class="sp-val">'+count+'</div>'+
      '<div class="sp-lbl">'+getStageName(id)+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('stageSummary').innerHTML = html;
}

function scrollToStage(id) {
  var col = document.getElementById('col-'+id);
  if (col) col.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

/* ===== BOARD RENDER ===== */
function getFiltered() {
  var teamId = document.getElementById('teamFilter').value;
  var typeVal = document.getElementById('typeFilter').value;
  return allContacts.filter(function(c){
    if (teamId && c.assigned_to !== teamId) return false;
    if (typeVal && (c.customer_type||'') !== typeVal) return false;
    return true;
  });
}

function renderBoard() {
  var ids = getStageIds();
  var filtered = getFiltered();
  document.getElementById('boardCount').textContent = filtered.length + ' contact' + (filtered.length!==1?'s':'');

  var boardHtml = ids.map(function(stageId){
    var color = getStageColor(stageId);
    var cards = filtered.filter(function(c){ return (c.funnel_stage||ids[0]) === stageId; });
    cards.sort(function(a,b){ return ((a.first_name||'')+(a.last_name||'')).toLowerCase().localeCompare(((b.first_name||'')+(b.last_name||'')).toLowerCase()); });

    var cardsHtml = cards.length === 0
      ? '<div class="col-empty">Drop here</div>'
      : cards.map(function(c){
          var name = ((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
          var ec = memberColor(c.assigned_to);
          var en = memberName(c.assigned_to);
          var swagVal = swagTotals[c.contact_id] || 0;
          return '<div class="kcard" draggable="true" data-id="'+c.contact_id+'" style="border-left-color:'+ec+';"'+
            ' ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" onclick="openDet(\''+c.contact_id+'\')">'+
            '<div class="kcard-name">'+esc(name)+'</div>'+
            (c.organization_name ? '<div class="kcard-org">'+esc(c.organization_name)+'</div>' : '')+
            '<div class="kcard-row">'+
              (c.phone ? '<a class="kcard-phone" href="tel:'+esc(c.phone)+'" onclick="event.stopPropagation()">'+esc(c.phone)+'</a>' : '<span style="font-size:11px;color:var(--text-secondary);">No phone</span>')+
              '<span class="kcard-assigned"><span class="kcard-dot" style="background:'+ec+'"></span>'+esc(en)+'</span>'+
            '</div>'+
            '<div class="kcard-row" style="margin-top:4px;">'+
              '<span class="kcard-type">'+(c.customer_type||'\u2014')+'</span>'+
              (swagVal > 0 ? '<span class="kcard-swag">$'+swagVal+' swag</span>' : '')+
            '</div>'+
          '</div>';
        }).join('');

    return '<div class="col" id="col-'+stageId+'">'+
      '<div class="col-header" style="background:color-mix(in srgb, '+color+' 20%, var(--bg-secondary));">'+
        '<span class="col-title" style="color:'+color+'">'+getStageName(stageId)+'</span>'+
        '<span class="col-count" style="color:'+color+'">'+cards.length+'</span>'+
      '</div>'+
      '<div class="col-body" id="colbody-'+stageId+'"'+
        ' ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'+stageId+')">'+
        cardsHtml+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('board').innerHTML = boardHtml;
}

/* ===== DRAG & DROP ===== */
var dragId = null;
function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  var c = allContacts.find(function(x){return x.contact_id === dragId;});
  if (!c || c.funnel_stage === stageId) return;
  var oldStage = c.funnel_stage;
  c.funnel_stage = stageId;
  renderBoard();
  renderStageSummary();
  // Save to DB
  var r = await sb.from('contacts').update({ funnel_stage: stageId }).eq('contact_id', dragId);
  if (r.error) { c.funnel_stage = oldStage; renderBoard(); showToast('Error saving stage'); return; }
  // Log activity
  await sb.from('funnel_activity').insert({
    tenant_id: TENANT,
    contact_id: dragId,
    from_stage: oldStage,
    to_stage: stageId,
    changed_by: currentUserId,
    changed_at: new Date().toISOString()
  }).catch(function(){});
  showToast('Stage updated');
  dragId = null;
}

/* ===== DETAIL MODAL ===== */
function openDet(id) {
  var c = allContacts.find(function(x){return x.contact_id===id;}); if(!c) return;
  currentEditId = id;
  var name = ((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
  var ini = name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'U';
  var ec = memberColor(c.assigned_to);
  var stage = c.funnel_stage || getStageIds()[0] || 1;
  if (!STAGES[stage]) stage = getStageIds()[0] || 1;
  var ctO = '<option value="">-- Select --</option>';
  ['MC','RC','HOG','CC','SC','Independent','Shop'].forEach(function(v){ctO+='<option value="'+v+'"'+(c.customer_type===v?' selected':'')+'>'+v+'</option>';});

  document.getElementById('detBody').innerHTML =
    '<div class="det-head">'+
      '<div class="det-av" style="border-color:'+ec+'">'+ini+'</div>'+
      '<div class="det-name">'+esc(name)+'</div>'+
      (c.organization_name ? '<div class="det-company">'+esc(c.organization_name)+'</div>' : '')+
      '<div class="det-actions">'+
        (c.phone ? '<a href="tel:'+esc(c.phone)+'" class="det-btn">Call</a><a href="sms:'+esc(c.phone)+'" class="det-btn">Text</a>' : '')+
        (c.email ? '<a href="mailto:'+esc(c.email)+'" class="det-btn">Email</a>' : '')+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Basic Info</div>'+
      '<div class="fr" style="margin-bottom:12px">'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">First Name</label><input type="text" class="fi" id="eF" value="'+esc(c.first_name||'')+'"></div>'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Last Name</label><input type="text" class="fi" id="eL" value="'+esc(c.last_name||'')+'"></div>'+
      '</div>'+
      '<div class="fg"><label class="fl">Organization</label><input type="text" class="fi" id="eO" value="'+esc(c.organization_name||'')+'"></div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Contact Info</div>'+
      '<div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" id="eP" value="'+esc(c.phone||'')+'"></div>'+
      '<div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="eE" value="'+esc(c.email||'')+'"></div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Classification</div>'+
      '<div class="fr" style="margin-bottom:12px">'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Client Type</label><select class="fsel" id="eT">'+ctO+'</select></div>'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Assigned To</label>'+
          (isAdmin()||isManager() ? '<select class="fsel" id="eA">'+buildAssignOpts(c.assigned_to)+'</select>' : '<span style="font-size:13px;color:var(--text-secondary);">'+esc(memberName(c.assigned_to))+'</span><input type="hidden" id="eA" value="'+(c.assigned_to||'')+'">')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Funnel Stage</div>'+
      '<div class="stage-selector">'+
        getStageIds().map(function(s){return'<button type="button" class="stage-option'+(s===stage?' active':'')+'" style="color:'+getStageColor(s)+'" data-stage="'+s+'" onclick="selectDetStage('+s+')">'+getStageName(s)+'</button>';}).join('')+
      '</div>'+
      '<input type="hidden" id="eStage" value="'+stage+'">'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Notes</div><textarea class="fta" id="eN" placeholder="Additional notes...">'+esc(c.notes||'')+'</textarea></div>'+
    '<div class="sec" style="padding-top:16px;border-top:1px solid var(--border-default);display:flex;flex-direction:column;gap:12px;">'+
      '<button class="btn-p" style="width:100%;padding:12px;" onclick="saveDet()">Save Changes</button>'+
      '<a href="v2-sharklaw-profiles.html?id='+c.contact_id+'" style="width:100%;padding:12px;text-align:center;text-decoration:none;display:block;background:#d97706;color:#fff;border:1px solid #d97706;border-radius:6px;font-size:14px;font-weight:500;">View Full Profile</a>'+
    '</div>';

  document.getElementById('detailModal').classList.add('active');
}

function selectDetStage(s) {
  document.getElementById('eStage').value = s;
  document.querySelectorAll('#detBody .stage-option').forEach(function(btn){btn.classList.toggle('active', parseInt(btn.dataset.stage)===s);});
}
function closeDet() { document.getElementById('detailModal').classList.remove('active'); }

function buildAssignOpts(sel) {
  var h = '<option value="">-- Unassigned --</option>';
  allMembers.forEach(function(m){ var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email; h+='<option value="'+m.member_id+'"'+(m.member_id===sel?' selected':'')+'>'+esc(n)+'</option>'; });
  return h;
}

async function saveDet() {
  var c = allContacts.find(function(x){return x.contact_id===currentEditId;}); if(!c) return;
  var newStage = parseInt(document.getElementById('eStage').value) || getStageIds()[0];
  var oldStage = c.funnel_stage;
  var u = {
    first_name: document.getElementById('eF').value.trim()||null,
    last_name:  document.getElementById('eL').value.trim()||null,
    organization_name: document.getElementById('eO').value.trim()||null,
    phone: document.getElementById('eP').value.trim()||null,
    email: document.getElementById('eE').value.trim()||null,
    customer_type: document.getElementById('eT').value||null,
    assigned_to: document.getElementById('eA').value||null,
    funnel_stage: newStage,
    notes: document.getElementById('eN').value.trim()||null,
  };
  try {
    var r = await sb.from('contacts').update(u).eq('contact_id', currentEditId);
    if (r.error) throw r.error;
    Object.assign(c, u);
    if (oldStage !== newStage) {
      await sb.from('funnel_activity').insert({ tenant_id:TENANT, contact_id:currentEditId, from_stage:oldStage, to_stage:newStage, changed_by:currentUserId, changed_at:new Date().toISOString() }).catch(function(){});
    }
    closeDet(); renderBoard(); renderStageSummary(); showToast('Contact saved!');
  } catch(e) { alert('Error: '+e.message); }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===== AUTH & INIT ===== */
async function checkAuth() {
  var r = await sb.auth.getSession(), s = r.data.session;
  if (!s) { var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token'); if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;} if(!s){location.href='v2-login.html';return null;} }
  return s;
}

async function init() {
  var s = await checkAuth(); if(!s) return;
  var email = s.user?.email;
  if (email) {
    var r = await sb.from('team_members').select('member_id,tenant_id,role,is_active,first_name,last_name').eq('email',email).single();
    if (r.data) {
      if (r.data.is_active===false) { await sb.auth.signOut(); localStorage.clear(); location.replace('login.html?reason=deactivated'); return; }
      TENANT = r.data.tenant_id;
      currentUserId   = r.data.member_id;
      currentUserRole = r.data.role;
      var bizName = ((r.data.first_name||'')+' '+(r.data.last_name||'')).trim()||email;
      document.getElementById('dBiz').textContent = bizName;
      document.getElementById('mBiz').textContent = bizName;
    }
  }
  if (!TENANT) { var r2=await sb.from('business_settings').select('tenant_id').limit(1).single(); if(r2.data?.tenant_id) TENANT=r2.data.tenant_id; }
  await loadUserThemeBank();

  // Load stages
  var sr = await sb.from('funnel_stages').select('*').eq('tenant_id',TENANT).or('is_deleted.is.null,is_deleted.eq.false').order('sort_order');
  if (sr.data&&sr.data.length>0) { STAGES={}; sr.data.forEach(function(row){STAGES[row.stage_id]={name:row.stage_name,color:row.stage_color};}); }
  else { STAGES = JSON.parse(JSON.stringify(DEFAULT_STAGES)); }

  // Load team members
  var mr = await sb.from('team_members').select('member_id,first_name,last_name,email,color,role').eq('tenant_id',TENANT).eq('is_active',true).order('last_name');
  allMembers = mr.data||[];
  var teamSel = document.getElementById('teamFilter');
  allMembers.forEach(function(m){ var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email; teamSel.innerHTML+='<option value="'+m.member_id+'">'+esc(n)+'</option>'; });

  // Load contacts
  var cr = await sb.from('contacts').select('*').eq('tenant_id',TENANT).or('is_deleted.is.null,is_deleted.eq.false');
  allContacts = cr.data||[];

  // Load swag totals
  try { var swagR=await sb.from('swag_given').select('contact_id,value').eq('tenant_id',TENANT); (swagR.data||[]).forEach(function(row){swagTotals[row.contact_id]=(swagTotals[row.contact_id]||0)+(parseFloat(row.value)||0);}); } catch(e){}

  renderStageSummary();
  renderBoard();
}

init();

function buildKanbanCard(c){return buildCard(c);}
</script>
</body>
