<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Pipeline</title>
  <script>
    (function() {
      var theme = localStorage.getItem('app-theme') || 'dark-blue';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="themes.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg-primary: #0b0f14; --bg-secondary: #0f1621; --bg-card: #1a2535; --bg-hover: #223044;
      --border-default: #223044; --text-primary: #e8eef6; --text-secondary: #9fb0c3;
      --accent-primary: #3b82f6; --accent-light: #60a5fa;
    }
    [data-theme="dark-blue"] { --bg-primary: #0b0f14; --bg-secondary: #0f1621; --bg-card: #1a2535; --bg-hover: #223044; --border-default: #223044; --text-primary: #e8eef6; --text-secondary: #9fb0c3; --accent-primary: #3b82f6; --accent-light: #60a5fa; }
    [data-theme="blue-light"] { --bg-primary: #f0f5ff; --bg-secondary: #e0eaff; --bg-card: #ffffff; --bg-hover: #d0e0ff; --border-default: #b0c8f0; --text-primary: #1a2744; --text-secondary: #4a5a74; --accent-primary: #2563eb; --accent-light: #3b82f6; }
    [data-theme="slate-dark"] { --bg-primary: #0f172a; --bg-secondary: #1e293b; --bg-card: #273549; --bg-hover: #334155; --border-default: #334155; --text-primary: #f1f5f9; --text-secondary: #94a3b8; --accent-primary: #64748b; --accent-light: #94a3b8; }
    [data-theme="slate-light"] { --bg-primary: #f8fafc; --bg-secondary: #f1f5f9; --bg-card: #ffffff; --bg-hover: #e2e8f0; --border-default: #cbd5e1; --text-primary: #0f172a; --text-secondary: #475569; --accent-primary: #475569; --accent-light: #64748b; }
    [data-theme="ocean-dark"] { --bg-primary: #0a1214; --bg-secondary: #0e181c; --bg-card: #152228; --bg-hover: #1c2d35; --border-default: #243842; --text-primary: #e5f0f3; --text-secondary: #8faab5; --accent-primary: #14b8a6; --accent-light: #2dd4bf; }
    [data-theme="ocean-light"] { --bg-primary: #f0fdfa; --bg-secondary: #e0f7f4; --bg-card: #ffffff; --bg-hover: #ccfbf1; --border-default: #99f6e4; --text-primary: #134e4a; --text-secondary: #2d6a66; --accent-primary: #0d9488; --accent-light: #14b8a6; }
    [data-theme="midnight-dark"],[data-theme="midnight"] { --bg-primary: #09090b; --bg-secondary: #0f0f12; --bg-card: #18181d; --bg-hover: #222228; --border-default: #27272f; --text-primary: #eeeef0; --text-secondary: #9898a4; --accent-primary: #8b5cf6; --accent-light: #a78bfa; }
    [data-theme="lavender-light"],[data-theme="lavender"] { --bg-primary: #faf5ff; --bg-secondary: #f3e8ff; --bg-card: #ffffff; --bg-hover: #ede4ff; --border-default: #d8b4fe; --text-primary: #3b1d5c; --text-secondary: #6b4d8a; --accent-primary: #9333ea; --accent-light: #a855f7; }
    [data-theme="forest-dark"],[data-theme="forest"] { --bg-primary: #071209; --bg-secondary: #0c1f10; --bg-card: #132a18; --bg-hover: #1a3820; --border-default: #234428; --text-primary: #e5f5e8; --text-secondary: #8fb898; --accent-primary: #22c55e; --accent-light: #4ade80; }
    [data-theme="mint-light"],[data-theme="mint"] { --bg-primary: #f0fdf4; --bg-secondary: #dcfce7; --bg-card: #ffffff; --bg-hover: #bbf7d0; --border-default: #86efac; --text-primary: #14532d; --text-secondary: #3d6b4f; --accent-primary: #16a34a; --accent-light: #22c55e; }
    [data-theme="crimson-dark"],[data-theme="crimson"] { --bg-primary: #0f0708; --bg-secondary: #1a0c0e; --bg-card: #261214; --bg-hover: #331a1c; --border-default: #442225; --text-primary: #fee2e2; --text-secondary: #c9a3a5; --accent-primary: #dc2626; --accent-light: #ef4444; }
    [data-theme="coral-light"],[data-theme="coral"] { --bg-primary: #fff5f5; --bg-secondary: #fee2e2; --bg-card: #ffffff; --bg-hover: #fecaca; --border-default: #fca5a5; --text-primary: #7f1d1d; --text-secondary: #a04444; --accent-primary: #ef4444; --accent-light: #f87171; }
    [data-theme="amber-dark"],[data-theme="amber"] { --bg-primary: #0f0c05; --bg-secondary: #1a1508; --bg-card: #26200c; --bg-hover: #332a10; --border-default: #443815; --text-primary: #fef3c7; --text-secondary: #c9b896; --accent-primary: #f59e0b; --accent-light: #fbbf24; }
    [data-theme="honey-light"],[data-theme="honey"] { --bg-primary: #fffbeb; --bg-secondary: #fef3c7; --bg-card: #ffffff; --bg-hover: #fde68a; --border-default: #fcd34d; --text-primary: #78350f; --text-secondary: #a06020; --accent-primary: #d97706; --accent-light: #f59e0b; }
    [data-theme="rose-dark"],[data-theme="rose"] { --bg-primary: #0f070a; --bg-secondary: #1a0c12; --bg-card: #26121a; --bg-hover: #331a24; --border-default: #44222e; --text-primary: #ffe4ec; --text-secondary: #c9a3b0; --accent-primary: #ec4899; --accent-light: #f472b6; }
    [data-theme="sky-light"],[data-theme="sky"] { --bg-primary: #f0f9ff; --bg-secondary: #e0f2fe; --bg-card: #ffffff; --bg-hover: #bae6fd; --border-default: #7dd3fc; --text-primary: #0c4a6e; --text-secondary: #3a6a8a; --accent-primary: #0284c7; --accent-light: #0ea5e9; }
    [data-theme="cyber-dark"],[data-theme="cyber"] { --bg-primary: #0a0a0f; --bg-secondary: #0f0f18; --bg-card: #151522; --bg-hover: #1c1c2e; --border-default: #2a2a44; --text-primary: #e0e0ff; --text-secondary: #9090c0; --accent-primary: #00ff88; --accent-light: #44ffaa; }
    [data-theme="sand-light"],[data-theme="sand"] { --bg-primary: #fefcf8; --bg-secondary: #faf6ee; --bg-card: #ffffff; --bg-hover: #f5efe0; --border-default: #e8dcc8; --text-primary: #44402a; --text-secondary: #6a6550; --accent-primary: #a89060; --accent-light: #c4aa78; }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { background: var(--bg-primary); min-height: 100%; }
    body { font-family: system-ui; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }

    /* ===== MOBILE TOP HEADER ===== */
    .mobile-top-header { display: none; position: sticky; top: 0; z-index: 100; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default); }
    .mobile-header-bar { display: flex; justify-content: space-between; align-items: center; padding: 12px; gap: 12px; }
    .mobile-menu-toggle { background: transparent; border: none; color: var(--text-secondary); font-size: 20px; width: 36px; height: 36px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .mobile-header-center { flex: 1; }
    .mobile-header-title { font-size: 18px; font-weight: 600; }
    .business-name { font-size: 12px; color: var(--accent-light); }
    .mobile-menu-content { max-height: 0; overflow: hidden; transition: max-height 0.3s ease; background: var(--bg-primary); border-top: 1px solid var(--border-default); }
    .mobile-menu-content.expanded { max-height: 200px; }
    .mobile-header-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 8px 12px 12px; }
    .mobile-header-actions button { padding: 10px; font-size: 13px; background: color-mix(in srgb, var(--accent-primary) 10%, transparent); border: 1px solid color-mix(in srgb, var(--accent-primary) 30%, transparent); color: var(--accent-light); border-radius: 8px; cursor: pointer; }

    /* ===== DESKTOP HEADER ===== */
    .desktop-header { position: sticky; top: 0; z-index: 100; background: var(--bg-primary); border-bottom: 1px solid var(--border-default); }

    /* ===== THEME ===== */
    .theme-toggle-btn { width: 36px; height: 36px; border-radius: 8px; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .theme-toggle-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .theme-toggle-btn svg { width: 20px; height: 20px; stroke: currentColor; stroke-width: 2; fill: none; }
    .theme-toast { position: fixed; bottom: 200px; left: 50%; transform: translateX(-50%); background: var(--bg-card); border: 1px solid var(--border-default); color: var(--text-primary); padding: 12px 20px; border-radius: 10px; font-size: 14px; z-index: 1000; display: none; white-space: nowrap; }
    .theme-toast.show { display: block; }

    /* ===== TOOLBAR ===== */
    .pipeline-toolbar { display: flex; gap: 8px; align-items: center; padding: 10px 12px; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default); overflow-x: auto; scrollbar-width: none; flex-wrap: wrap; }
    .pipeline-toolbar::-webkit-scrollbar { display: none; }
    .tb-label { font-size: 12px; color: var(--text-secondary); white-space: nowrap; }
    .tb-select { padding: 6px 10px; border-radius: 6px; border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 12px; }
    .tb-btn { padding: 6px 14px; border-radius: 6px; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); font-size: 12px; cursor: pointer; white-space: nowrap; }
    .tb-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .tb-btn.active { background: color-mix(in srgb, var(--accent-primary) 20%, transparent); border-color: var(--accent-primary); color: var(--accent-light); }
    .tb-spacer { flex: 1; }

    /* ===== KANBAN BOARD ===== */
    .board-wrap { overflow-x: auto; padding: 12px; min-height: calc(100vh - 200px); }
    .board { display: flex; gap: 10px; align-items: flex-start; min-width: max-content; }

    .col { width: 260px; flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; }
    .col-header { border-radius: 8px 8px 0 0; padding: 10px 12px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
    .col-title { font-size: 13px; font-weight: 700; letter-spacing: .3px; }
    .col-count { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; background: rgba(0,0,0,.25); }
    .col-body { display: flex; flex-direction: column; gap: 6px; min-height: 60px; border-radius: 0 0 8px 8px; padding: 6px; background: color-mix(in srgb, var(--bg-secondary) 60%, transparent); border: 1px solid var(--border-default); border-top: none; }
    .col-body.drag-over { background: color-mix(in srgb, var(--accent-primary) 10%, var(--bg-secondary)); border-color: var(--accent-primary); }

    /* ===== KANBAN CARD ===== */
    .kcard { background: var(--bg-card); border: 1px solid var(--border-default); border-left: 3px solid #6b7280; border-radius: 8px; padding: 10px; cursor: grab; transition: box-shadow .15s, transform .1s; user-select: none; }
    .kcard:hover { box-shadow: 0 4px 12px rgba(0,0,0,.35); transform: translateY(-1px); }
    .kcard.dragging { opacity: .4; cursor: grabbing; }
    .kcard-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
    .kcard-org  { font-size: 11px; color: var(--text-secondary); margin-bottom: 6px; }
    .kcard-row  { display: flex; align-items: center; justify-content: space-between; }
    .kcard-phone { font-size: 11px; color: var(--accent-light); text-decoration: none; }
    .kcard-phone:hover { text-decoration: underline; }
    .kcard-assigned { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--text-secondary); }
    .kcard-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .kcard-type { font-size: 10px; color: var(--text-secondary); margin-top: 4px; }
    .kcard-swag { font-size: 10px; color: var(--accent-light); font-weight: 600; }
    .col-empty { font-size: 12px; color: var(--text-secondary); text-align: center; padding: 20px 8px; opacity: .5; }

    /* ===== STAGE SUMMARY BAR ===== */
    .stage-summary { display: flex; gap: 6px; padding: 10px 12px; overflow-x: auto; scrollbar-width: none; background: var(--bg-secondary); border-bottom: 1px solid var(--border-default); }
    .stage-summary::-webkit-scrollbar { display: none; }
    .stage-pill { padding: 6px 14px; border-radius: 20px; background: var(--bg-card); border: 1px solid var(--border-default); white-space: nowrap; text-align: center; cursor: pointer; transition: all .15s; }
    .stage-pill:hover { border-color: var(--accent-primary); }
    .stage-pill.on { border-color: currentColor; background: color-mix(in srgb, currentColor 15%, var(--bg-card)); }
    .sp-val { font-size: 15px; font-weight: 700; }
    .sp-lbl { font-size: 10px; color: var(--text-secondary); }

    /* ===== MODAL ===== */
    .modal-bg { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
    .modal-bg.active { display: flex; }
    .modal-box { background: var(--bg-secondary); border-radius: 14px; width: 100%; max-width: 520px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--border-default); }
    .modal-head { display: flex; justify-content: space-between; align-items: center; padding: 16px 20px; border-bottom: 1px solid var(--border-default); }
    .modal-title { font-size: 18px; font-weight: 600; }
    .modal-x { background: transparent; border: none; color: var(--text-secondary); font-size: 24px; cursor: pointer; }
    .modal-body { padding: 20px; }
    .fg { margin-bottom: 14px; }
    .fl { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 5px; }
    .fi, .fsel, .fta { width: 100%; padding: 10px 12px; border-radius: 6px; border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-primary); font-size: 14px; }
    .fta { min-height: 80px; resize: vertical; }
    .fr { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .btn-p { padding: 10px 20px; border-radius: 6px; border: none; background: var(--accent-primary); color: #fff; font-size: 14px; font-weight: 500; cursor: pointer; }
    .btn-p:hover { background: var(--accent-light); }
    .btn-s { padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); font-size: 14px; cursor: pointer; }
    .btn-s:hover { background: var(--bg-hover); }
    .stage-selector { display: flex; flex-direction: column; gap: 6px; margin-top: 8px; }
    .stage-option { padding: 10px 14px; border-radius: 8px; border: 1px solid var(--border-default); background: transparent; color: var(--text-secondary); font-size: 13px; cursor: pointer; text-align: left; display: flex; align-items: center; gap: 8px; }
    .stage-option::before { content: ''; width: 10px; height: 10px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
    .stage-option:hover { background: var(--bg-hover); }
    .stage-option.active { border-color: currentColor; background: color-mix(in srgb, currentColor 20%, transparent); }
    .sec { margin-bottom: 16px; }
    .sec-title { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; margin-bottom: 8px; }
    .det-head { text-align: center; padding-bottom: 16px; border-bottom: 1px solid var(--border-default); margin-bottom: 16px; }
    .det-av { width: 80px; height: 80px; border-radius: 50%; background: var(--bg-hover); display: flex; align-items: center; justify-content: center; font-size: 32px; font-weight: 600; color: var(--accent-light); margin: 0 auto 12px; border: 3px solid var(--border-default); }
    .det-name { font-size: 20px; font-weight: 600; }
    .det-company { font-size: 14px; color: var(--text-secondary); }
    .det-actions { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
    .det-btn { padding: 8px 16px; border-radius: 8px; border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-secondary); font-size: 12px; cursor: pointer; text-decoration: none; }
    .det-btn:hover { background: var(--bg-hover); color: var(--text-primary); }
    .btn-d { padding: 10px 20px; border-radius: 6px; border: none; background: #dc2626; color: #fff; font-size: 14px; cursor: pointer; width: 100%; }

    /* ===== MOBILE BOTTOM NAV ===== */
    .mobile-bottom-nav { display: none; position: fixed; bottom: 0; left: 0; right: 0; background: var(--bg-secondary); padding: 8px; z-index: 100; border-top: 1px solid var(--border-default); }
    .mobile-nav-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; margin-bottom: 6px; }
    .mobile-nav-row:last-child { margin-bottom: 0; }
    .mobile-nav-row.three-col { grid-template-columns: 1fr 1fr 1fr; }
    .mobile-nav-btn { padding: 10px 8px; border-radius: 8px; border: 1px solid var(--border-default); background: var(--bg-card); color: var(--text-secondary); font-size: 12px; font-weight: 600; cursor: pointer; text-decoration: none; display: flex; align-items: center; justify-content: center; min-height: 44px; }
    .mobile-nav-btn.active { background: color-mix(in srgb, var(--accent-primary) 60%, transparent); border-color: var(--accent-primary); color: var(--text-primary); }
    .mobile-nav-btn.action-btn { background: color-mix(in srgb, var(--accent-primary) 20%, transparent); border-color: color-mix(in srgb, var(--accent-primary) 50%, transparent); color: var(--accent-light); }

    @media (max-width: 768px) {
      .desktop-header { display: none !important; }
      .mobile-top-header { display: block; }
      .mobile-bottom-nav { display: block !important; }
      body { padding-bottom: 120px; }
      .fr { grid-template-columns: 1fr; }
      .modal-bg { align-items: flex-end; padding: 0; }
      .modal-box { border-radius: 20px 20px 0 0; max-height: 92vh; }
      .col { width: 220px; }
    }
    @media (min-width: 769px) {
      .mobile-top-header { display: none !important; }
      .mobile-bottom-nav { display: none !important; }
    }
  </style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-top-header">
  <div class="mobile-header-bar">
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-header-center">
      <div class="mobile-header-title">Pipeline</div>
      <div class="business-name" id="mBiz">Loading...</div>
    </div>
    <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
  </div>
  <div class="mobile-menu-content" id="mobileMenuContent">
    <div class="mobile-header-actions">
      <button onclick="location.href='sharklaw-settings.html'">Settings</button>
      <button onclick="location.href='v2-sharklaw-contacts.html'">Contacts</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div style="padding:16px 24px 8px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <h1 style="margin:0;font-size:32px;font-weight:600;">Pipeline</h1>
      <div class="business-name" id="dBiz">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
      <a onclick="logout()" style="color:var(--text-secondary);cursor:pointer;font-size:14px;">Logout</a>
    </div>
  </div>
  <div style="padding:0 24px 12px;">
    <nav style="display:flex;gap:24px;align-items:center;">
      <a href="v2-sharklaw-dashboard.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Dashboard</a>
      <a href="v2-sharklaw-scheduler.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Scheduler</a>
      <a href="v2-sharklaw-contacts.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Contacts</a>
      <a href="v2-sharklaw-pipeline.html" style="padding:12px 0;color:var(--accent-primary);text-decoration:none;font-size:14px;border-bottom:2px solid var(--accent-primary);">Pipeline</a>
      <a href="v2-sharklaw-swag.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Swag</a>
      <a href="sharklaw-settings.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Settings</a>
    </nav>
  </div>
</div>

<!-- STAGE SUMMARY BAR -->
<div class="stage-summary" id="stageSummary"></div>

<!-- TOOLBAR -->
<div class="pipeline-toolbar">
  <span class="tb-label">Filter:</span>
  <select class="tb-select" id="teamFilter" onchange="renderBoard()">
    <option value="">All Team</option>
  </select>
  <select class="tb-select" id="typeFilter" onchange="renderBoard()">
    <option value="">All Types</option>
    <option value="MC">MC</option>
    <option value="RC">RC</option>
    <option value="HOG">HOG</option>
    <option value="CC">CC</option>
    <option value="SC">SC</option>
    <option value="Independent">Independent</option>
    <option value="Shop">Shop</option>
  </select>
  <div class="tb-spacer"></div>
  <span id="boardCount" style="font-size:12px;color:var(--text-secondary);"></span>
</div>

<!-- BOARD -->
<div class="board-wrap">
  <div class="board" id="board">
    <div style="padding:60px 20px;color:var(--text-secondary);font-size:14px;">Loading pipeline…</div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="modal-bg" id="detailModal">
  <div class="modal-box" style="max-width:540px;">
    <div class="modal-head"><div class="modal-title">Contact Details</div><button class="modal-x" onclick="closeDet()">&times;</button></div>
    <div class="modal-body" id="detBody"></div>
  </div>
</div>

</div>

<div class="theme-toast" id="themeToast"></div>

<script>
var SB_URL = 'https://wiwbmvmgrutjfbnqhfnb.supabase.co';
var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
var sb = window.supabase.createClient(SB_URL, SB_KEY);

var currentTenantId = null, currentUserId = null, currentUserRole = null;
var allContacts = [], allMembers = [], funnelStages = [], swagTotals = {};
var currentEditId = null;

var DEFAULT_STAGES = {
  1:{name:'1st Contact',color:'#3b82f6'},
  2:{name:'Follow Up',color:'#06b6d4'},
  3:{name:'Swag Approved',color:'#8b5cf6'},
  4:{name:'Receive Artwork',color:'#f59e0b'},
  5:{name:'Deliver Pop Up',color:'#10b981'},
  6:{name:'Confirmed Partnership',color:'#ef4444'}
};
var STAGES = {};

function getStageIds() { return Object.keys(STAGES).map(Number).sort(function(a,b){return a-b;}); }
function getStageName(id) { return STAGES[id] ? STAGES[id].name : 'Stage '+id; }
function getStageColor(id) { return STAGES[id] ? STAGES[id].color : '#9fb0c3'; }

function memberColor(id) { var m = allMembers.find(function(x){return x.member_id===id;}); return (m&&m.color)||'#6b7280'; }
function memberName(id)  { var m = allMembers.find(function(x){return x.member_id===id;}); if(!m) return 'Unassigned'; return ((m.first_name||'')+' '+(m.last_name||'')).trim(); }

/* ===== THEME ===== */
var THEME_NAMES = {'dark-blue':'Dark Blue','blue-light':'Blue Light','slate-dark':'Slate Dark','slate-light':'Slate Light','ocean-dark':'Ocean Dark','ocean-light':'Ocean Light','midnight-dark':'Midnight','lavender-light':'Lavender','forest-dark':'Forest','mint-light':'Mint','crimson-dark':'Crimson','coral-light':'Coral','amber-dark':'Amber','honey-light':'Honey','rose-dark':'Rose','sky-light':'Sky','cyber-dark':'Cyber','sand-light':'Sand'};
var userThemeBank = ['dark-blue'], themeIndex = 0;
function loadTheme() { var t=localStorage.getItem('app-theme')||'dark-blue'; document.documentElement.setAttribute('data-theme',t); themeIndex=userThemeBank.indexOf(t); if(themeIndex<0)themeIndex=0; }
function cycleTheme() { if(userThemeBank.length<=1){showToast('Unlock more themes in Settings!');return;} themeIndex=(themeIndex+1)%userThemeBank.length; var t=userThemeBank[themeIndex]; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('app-theme',t); showToast(THEME_NAMES[t]||t); }
async function loadUserThemeBank() { if(!currentUserId)return; try{ var r=await sb.from('user_theme_bank').select('theme_key').eq('member_id',currentUserId); if(r.data&&r.data.length>0){userThemeBank=['dark-blue'].concat(r.data.map(function(t){return t.theme_key;}));userThemeBank=[...new Set(userThemeBank)];} loadTheme(); }catch(e){} }
loadTheme();

function showToast(msg) { var t=document.getElementById('themeToast'); t.textContent=msg; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
async function logout() { await sb.auth.signOut(); localStorage.clear(); location.replace('login.html'); }
function toggleMobileMenu() { document.getElementById('mobileMenuContent').classList.toggle('expanded'); }
function isAdmin() { return ['owner','admin'].includes((currentUserRole||'').toLowerCase()); }
function isManager() { return ['manager','sr_associate'].includes((currentUserRole||'').toLowerCase()); }

/* ===== STAGE SUMMARY ===== */
function renderStageSummary() {
  var ids = getStageIds();
  var html = ids.map(function(id){
    var count = allContacts.filter(function(c){ return (c.funnel_stage||ids[0]) === id; }).length;
    return '<div class="stage-pill" style="color:'+getStageColor(id)+'" onclick="scrollToStage('+id+')">'+
      '<div class="sp-val">'+count+'</div>'+
      '<div class="sp-lbl">'+getStageName(id)+'</div>'+
    '</div>';
  }).join('');
  document.getElementById('stageSummary').innerHTML = html;
}

function scrollToStage(id) {
  var col = document.getElementById('col-'+id);
  if (col) col.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

/* ===== BOARD RENDER ===== */
function getFiltered() {
  var teamId = document.getElementById('teamFilter').value;
  var typeVal = document.getElementById('typeFilter').value;
  return allContacts.filter(function(c){
    if (teamId && c.assigned_to !== teamId) return false;
    if (typeVal && (c.customer_type||'') !== typeVal) return false;
    return true;
  });
}

function renderBoard() {
  var ids = getStageIds();
  var filtered = getFiltered();
  document.getElementById('boardCount').textContent = filtered.length + ' contact' + (filtered.length!==1?'s':'');

  var boardHtml = ids.map(function(stageId){
    var color = getStageColor(stageId);
    var cards = filtered.filter(function(c){ return (c.funnel_stage||ids[0]) === stageId; });
    cards.sort(function(a,b){ return ((a.first_name||'')+(a.last_name||'')).toLowerCase().localeCompare(((b.first_name||'')+(b.last_name||'')).toLowerCase()); });

    var cardsHtml = cards.length === 0
      ? '<div class="col-empty">Drop here</div>'
      : cards.map(function(c){
          var name = ((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
          var ec = memberColor(c.assigned_to);
          var en = memberName(c.assigned_to);
          var swagVal = swagTotals[c.contact_id] || 0;
          return '<div class="kcard" draggable="true" data-id="'+c.contact_id+'" style="border-left-color:'+ec+';"'+
            ' ondragstart="onDragStart(event)" ondragend="onDragEnd(event)" onclick="openDet(\''+c.contact_id+'\')">'+
            '<div class="kcard-name">'+esc(name)+'</div>'+
            (c.organization_name ? '<div class="kcard-org">'+esc(c.organization_name)+'</div>' : '')+
            '<div class="kcard-row">'+
              (c.phone ? '<a class="kcard-phone" href="tel:'+esc(c.phone)+'" onclick="event.stopPropagation()">'+esc(c.phone)+'</a>' : '<span style="font-size:11px;color:var(--text-secondary);">No phone</span>')+
              '<span class="kcard-assigned"><span class="kcard-dot" style="background:'+ec+'"></span>'+esc(en)+'</span>'+
            '</div>'+
            '<div class="kcard-row" style="margin-top:4px;">'+
              '<span class="kcard-type">'+(c.customer_type||'—')+'</span>'+
              (swagVal > 0 ? '<span class="kcard-swag">$'+swagVal+' swag</span>' : '')+
            '</div>'+
          '</div>';
        }).join('');

    return '<div class="col" id="col-'+stageId+'">'+
      '<div class="col-header" style="background:color-mix(in srgb, '+color+' 20%, var(--bg-secondary));">'+
        '<span class="col-title" style="color:'+color+'">'+getStageName(stageId)+'</span>'+
        '<span class="col-count" style="color:'+color+'">'+cards.length+'</span>'+
      '</div>'+
      '<div class="col-body" id="colbody-'+stageId+'"'+
        ' ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'+stageId+')">'+
        cardsHtml+
      '</div>'+
    '</div>';
  }).join('');

  document.getElementById('board').innerHTML = boardHtml;
}

/* ===== DRAG & DROP ===== */
var dragId = null;
function onDragStart(e) {
  dragId = e.currentTarget.dataset.id;
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function onDragEnd(e) { e.currentTarget.classList.remove('dragging'); }
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drag-over'); }
async function onDrop(e, stageId) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragId) return;
  var c = allContacts.find(function(x){return x.contact_id === dragId;});
  if (!c || c.funnel_stage === stageId) return;
  var oldStage = c.funnel_stage;
  c.funnel_stage = stageId;
  renderBoard();
  renderStageSummary();
  // Save to DB
  var r = await sb.from('contacts').update({ funnel_stage: stageId }).eq('contact_id', dragId);
  if (r.error) { c.funnel_stage = oldStage; renderBoard(); showToast('Error saving stage'); return; }
  // Log activity
  await sb.from('funnel_activity').insert({
    tenant_id: currentTenantId,
    contact_id: dragId,
    from_stage: oldStage,
    to_stage: stageId,
    changed_by: currentUserId,
    changed_at: new Date().toISOString()
  }).catch(function(){});
  showToast('Stage updated');
  dragId = null;
}

/* ===== DETAIL MODAL ===== */
function openDet(id) {
  var c = allContacts.find(function(x){return x.contact_id===id;}); if(!c) return;
  currentEditId = id;
  var name = ((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
  var ini = name.split(' ').map(function(w){return w[0]||'';}).join('').toUpperCase().slice(0,2)||'U';
  var ec = memberColor(c.assigned_to);
  var stage = c.funnel_stage || getStageIds()[0] || 1;
  if (!STAGES[stage]) stage = getStageIds()[0] || 1;
  var ctO = '<option value="">-- Select --</option>';
  ['MC','RC','HOG','CC','SC','Independent','Shop'].forEach(function(v){ctO+='<option value="'+v+'"'+(c.customer_type===v?' selected':'')+'>'+v+'</option>';});

  document.getElementById('detBody').innerHTML =
    '<div class="det-head">'+
      '<div class="det-av" style="border-color:'+ec+'">'+ini+'</div>'+
      '<div class="det-name">'+esc(name)+'</div>'+
      (c.organization_name ? '<div class="det-company">'+esc(c.organization_name)+'</div>' : '')+
      '<div class="det-actions">'+
        (c.phone ? '<a href="tel:'+esc(c.phone)+'" class="det-btn">Call</a><a href="sms:'+esc(c.phone)+'" class="det-btn">Text</a>' : '')+
        (c.email ? '<a href="mailto:'+esc(c.email)+'" class="det-btn">Email</a>' : '')+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Basic Info</div>'+
      '<div class="fr" style="margin-bottom:12px">'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">First Name</label><input type="text" class="fi" id="eF" value="'+esc(c.first_name||'')+'"></div>'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Last Name</label><input type="text" class="fi" id="eL" value="'+esc(c.last_name||'')+'"></div>'+
      '</div>'+
      '<div class="fg"><label class="fl">Organization</label><input type="text" class="fi" id="eO" value="'+esc(c.organization_name||'')+'"></div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Contact Info</div>'+
      '<div class="fg"><label class="fl">Phone</label><input type="tel" class="fi" id="eP" value="'+esc(c.phone||'')+'"></div>'+
      '<div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="eE" value="'+esc(c.email||'')+'"></div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Classification</div>'+
      '<div class="fr" style="margin-bottom:12px">'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Client Type</label><select class="fsel" id="eT">'+ctO+'</select></div>'+
        '<div class="fg" style="margin-bottom:0"><label class="fl">Assigned To</label>'+
          (isAdmin()||isManager() ? '<select class="fsel" id="eA">'+buildAssignOpts(c.assigned_to)+'</select>' : '<span style="font-size:13px;color:var(--text-secondary);">'+esc(memberName(c.assigned_to))+'</span><input type="hidden" id="eA" value="'+(c.assigned_to||'')+'">')+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Funnel Stage</div>'+
      '<div class="stage-selector">'+
        getStageIds().map(function(s){return'<button type="button" class="stage-option'+(s===stage?' active':'')+'" style="color:'+getStageColor(s)+'" data-stage="'+s+'" onclick="selectDetStage('+s+')">'+getStageName(s)+'</button>';}).join('')+
      '</div>'+
      '<input type="hidden" id="eStage" value="'+stage+'">'+
    '</div>'+
    '<div class="sec"><div class="sec-title">Notes</div><textarea class="fta" id="eN" placeholder="Additional notes...">'+esc(c.notes||'')+'</textarea></div>'+
    '<div class="sec" style="padding-top:16px;border-top:1px solid var(--border-default);display:flex;flex-direction:column;gap:12px;">'+
      '<button class="btn-p" style="width:100%;padding:12px;" onclick="saveDet()">Save Changes</button>'+
      '<a href="v2-sharklaw-profiles.html?id='+c.contact_id+'" style="width:100%;padding:12px;text-align:center;text-decoration:none;display:block;background:#d97706;color:#fff;border:1px solid #d97706;border-radius:6px;font-size:14px;font-weight:500;">View Full Profile</a>'+
    '</div>';

  document.getElementById('detailModal').classList.add('active');
}

function selectDetStage(s) {
  document.getElementById('eStage').value = s;
  document.querySelectorAll('#detBody .stage-option').forEach(function(btn){btn.classList.toggle('active', parseInt(btn.dataset.stage)===s);});
}
function closeDet() { document.getElementById('detailModal').classList.remove('active'); }

function buildAssignOpts(sel) {
  var h = '<option value="">-- Unassigned --</option>';
  allMembers.forEach(function(m){ var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email; h+='<option value="'+m.member_id+'"'+(m.member_id===sel?' selected':'')+'>'+esc(n)+'</option>'; });
  return h;
}

async function saveDet() {
  var c = allContacts.find(function(x){return x.contact_id===currentEditId;}); if(!c) return;
  var newStage = parseInt(document.getElementById('eStage').value) || getStageIds()[0];
  var oldStage = c.funnel_stage;
  var u = {
    first_name: document.getElementById('eF').value.trim()||null,
    last_name:  document.getElementById('eL').value.trim()||null,
    organization_name: document.getElementById('eO').value.trim()||null,
    phone: document.getElementById('eP').value.trim()||null,
    email: document.getElementById('eE').value.trim()||null,
    customer_type: document.getElementById('eT').value||null,
    assigned_to: document.getElementById('eA').value||null,
    funnel_stage: newStage,
    notes: document.getElementById('eN').value.trim()||null,
  };
  try {
    var r = await sb.from('contacts').update(u).eq('contact_id', currentEditId);
    if (r.error) throw r.error;
    Object.assign(c, u);
    if (oldStage !== newStage) {
      await sb.from('funnel_activity').insert({ tenant_id:currentTenantId, contact_id:currentEditId, from_stage:oldStage, to_stage:newStage, changed_by:currentUserId, changed_at:new Date().toISOString() }).catch(function(){});
    }
    closeDet(); renderBoard(); renderStageSummary(); showToast('Contact saved!');
  } catch(e) { alert('Error: '+e.message); }
}

function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

/* ===== AUTH & INIT ===== */
async function checkAuth() {
  var r = await sb.auth.getSession(), s = r.data.session;
  if (!s) { var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token'); if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;} if(!s){location.href='login.html';return null;} }
  return s;
}

async function init() {
  var s = await checkAuth(); if(!s) return;
  var email = s.user?.email;
  if (email) {
    var r = await sb.from('team_members').select('member_id,tenant_id,role,is_active,first_name,last_name').eq('email',email).single();
    if (r.data) {
      if (r.data.is_active===false) { await sb.auth.signOut(); localStorage.clear(); location.replace('login.html?reason=deactivated'); return; }
      currentTenantId = r.data.tenant_id;
      currentUserId   = r.data.member_id;
      currentUserRole = r.data.role;
      var bizName = ((r.data.first_name||'')+' '+(r.data.last_name||'')).trim()||email;
      document.getElementById('dBiz').textContent = bizName;
      document.getElementById('mBiz').textContent = bizName;
    }
  }
  if (!currentTenantId) { var r2=await sb.from('business_settings').select('tenant_id').limit(1).single(); if(r2.data?.tenant_id) currentTenantId=r2.data.tenant_id; }
  await loadUserThemeBank();

  // Load stages
  var sr = await sb.from('funnel_stages').select('*').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false').order('sort_order');
  if (sr.data&&sr.data.length>0) { STAGES={}; sr.data.forEach(function(row){STAGES[row.stage_id]={name:row.stage_name,color:row.stage_color};}); }
  else { STAGES = JSON.parse(JSON.stringify(DEFAULT_STAGES)); }

  // Load team members
  var mr = await sb.from('team_members').select('member_id,first_name,last_name,email,color,role').eq('tenant_id',currentTenantId).eq('is_active',true).order('last_name');
  allMembers = mr.data||[];
  var teamSel = document.getElementById('teamFilter');
  allMembers.forEach(function(m){ var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email; teamSel.innerHTML+='<option value="'+m.member_id+'">'+esc(n)+'</option>'; });

  // Load contacts
  var cr = await sb.from('contacts').select('*').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false');
  allContacts = cr.data||[];

  // Load swag totals
  try { var swagR=await sb.from('swag_given').select('contact_id,value').eq('tenant_id',currentTenantId); (swagR.data||[]).forEach(function(row){swagTotals[row.contact_id]=(swagTotals[row.contact_id]||0)+(parseFloat(row.value)||0);}); } catch(e){}

  renderStageSummary();
  renderBoard();
}

init();
</script>
</body>
