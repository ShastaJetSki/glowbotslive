<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shark Law – Sign In</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon-sharklaw-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-sharklaw-192.png">
  <meta name="apple-mobile-web-app-title" content="Shark Law">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#0a0a12;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#e8e0f6;background-image:radial-gradient(ellipse at 50% 0%,rgba(139,92,246,.12) 0%,transparent 60%);}
    .login-wrap{width:100%;max-width:440px;padding:20px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-tagline{font-size:13px;color:#7c6ba0;margin-top:4px;letter-spacing:0.5px;}
    .card{padding:32px;border-radius:18px;background:linear-gradient(145deg,#13111f,#161226);border:1px solid #2d2250;box-shadow:0 8px 40px rgba(139,92,246,.08);}
    .card-title{font-size:20px;font-weight:700;margin-bottom:4px;}
    .card-sub{font-size:13px;color:#8b7faa;margin-bottom:24px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:#8b7faa;text-transform:uppercase;letter-spacing:0.5px;}
    .form-input{width:100%;padding:13px 14px;font-size:15px;border-radius:10px;border:1px solid #2d2250;background:#0d0b18;color:#e8e0f6;transition:border-color .2s;-webkit-appearance:none;appearance:none;}
    .form-input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.15);}
    .form-input::placeholder{color:#4a3f6b;}
    .pw-wrap{position:relative;}
    .pw-toggle{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;color:#6b5b95;cursor:pointer;font-size:18px;padding:4px;}
    .pw-toggle:hover{color:#a78bfa;}
    .btn-login{width:100%;padding:14px;border:none;border-radius:10px;background:linear-gradient(135deg,#7c3aed,#8b5cf6);color:#fff;font-size:15px;font-weight:700;cursor:pointer;transition:all .2s;margin-top:8px;-webkit-appearance:none;touch-action:manipulation;}
    .btn-login:hover{background:linear-gradient(135deg,#6d28d9,#7c3aed);transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.3);}
    .btn-login:active{transform:translateY(0);}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .msg-error{background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#f87171;}
    .msg-success{background:rgba(16,185,129,.12);border:1px solid #10b981;color:#34d399;}
    .msg.show{display:block;}
    .forgot{text-align:right;margin-top:6px;}
    .forgot a{color:#7c6ba0;font-size:12px;text-decoration:none;}
    .forgot a:hover{color:#a78bfa;}
    .footer{text-align:center;margin-top:24px;}
    .footer-powered{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
    .footer-powered span{color:#4a3f6b;font-size:11px;}
    .footer-powered img{height:32px;}
    .footer-powered a{color:#7c3aed;text-decoration:none;font-weight:600;font-size:11px;}
    .footer-links{display:flex;justify-content:center;gap:16px;}
    .footer-links a{color:#4a3f6b;font-size:11px;text-decoration:none;}
    .footer-copy{color:#2d2250;font-size:10px;margin-top:10px;}
    .deactivated-banner{background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#f87171;padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;}
    @media(max-width:480px){.card{padding:24px 20px;}}
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="brand">
    <img src="sharklawlogo.png" alt="Shark Law" style="max-width:260px;height:auto;margin-bottom:8px;">
    <div class="brand-tagline">Motorcycle Law CRM</div>
  </div>
  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>
    <div class="msg msg-error" id="errorMsg"></div>
    <div class="msg msg-success" id="successMsg"></div>
    <div class="form-group">
      <label class="form-label">Email</label>
      <input type="email" class="form-input" id="email" placeholder="you@sharklaw.com"
        autocomplete="username" autocapitalize="none" autocorrect="off" spellcheck="false" inputmode="email">
    </div>
    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input type="password" class="form-input" id="password" placeholder="Enter your password"
          autocomplete="current-password" autocapitalize="none" autocorrect="off" spellcheck="false">
        <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">&#128065;</button>
      </div>
      <div class="forgot"><a href="#" onclick="handleForgot(event)">Forgot password?</a></div>
    </div>
    <button class="btn-login" id="loginBtn">Sign In</button>
    <div id="debugOut" style="margin-top:12px;padding:10px;background:rgba(255,255,255,.05);border-radius:8px;font-size:11px;color:#8b7faa;word-break:break-all;display:none;"></div>
  </div>
  <div class="footer">
    <div class="footer-powered">
      <span>Powered by</span>
      <img src="glowbot.png" alt="GlowBot">
      <a href="https://glowbotslive.com" target="_blank">GlowBotsLive.com</a>
    </div>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="mailto:support@sharklawrules.com">Support</a>
    </div>
    <div class="footer-copy">&copy; 2026 Shark Law. All rights reserved.</div>
  </div>
</div>

<script>
(function(){
  var SB_URL='https://wiwbmvmgrutjfbnqhfnb.supabase.co';
  var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
  var sb=window.supabase.createClient(SB_URL,SB_KEY);
  var DASHBOARD='v2-sharklaw-dashboard.html';

  var emailEl=document.getElementById('email');
  var pwEl=document.getElementById('password');
  var btn=document.getElementById('loginBtn');
  var pwToggle=document.getElementById('pwToggle');
  var errEl=document.getElementById('errorMsg');
  var okEl=document.getElementById('successMsg');

  // Safe localStorage (Safari private mode throws)
  function lsGet(k){try{return localStorage.getItem(k);}catch(e){return null;}}
  function lsSet(k,v){try{localStorage.setItem(k,v);}catch(e){}}
  function lsClear(){try{localStorage.clear();}catch(e){}}

  // Deactivated param
  if(new URLSearchParams(location.search).get('reason')==='deactivated'){
    var bann=document.createElement('div');
    bann.className='deactivated-banner';
    bann.textContent='Your account has been deactivated. Contact your administrator.';
    document.querySelector('.card').insertBefore(bann,document.querySelector('.form-group'));
  }

  // Password toggle
  pwToggle.addEventListener('click',function(){
    var pw=pwEl.type==='password';
    pwEl.type=pw?'text':'password';
    pwToggle.innerHTML=pw?'&#128584;':'&#128065;';
  });

  function showErr(m){errEl.textContent=m;errEl.classList.add('show');okEl.classList.remove('show');}
  function showOk(m){okEl.textContent=m;okEl.classList.add('show');errEl.classList.remove('show');}
  function clearMsgs(){errEl.classList.remove('show');okEl.classList.remove('show');}

  // Check existing session quietly on load
  (async function(){
    try{
      var r=await sb.auth.getSession();
      if(r.data&&r.data.session){doRedirect(r.data.session);return;}
      var t=lsGet('sb_access_token'),rf=lsGet('sb_refresh_token');
      if(t&&rf){
        var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});
        if(sr.data&&sr.data.session){doRedirect(sr.data.session);}
      }
    }catch(e){/* silent */}
  })();

  async function doRedirect(session){
    var email=(session.user&&session.user.email||'').toLowerCase().trim();
    if(!email){location.replace(DASHBOARD);return;}
    try{
      var r=await sb.from('team_members').select('is_active').eq('email',email).single();
      if(r.data&&r.data.is_active===false){
        await sb.auth.signOut();lsClear();
        showErr('Account deactivated. Contact your administrator.');
        btn.disabled=false;btn.textContent='Sign In';
        return;
      }
    }catch(e){/* if lookup fails, redirect anyway — auth was valid */}
    location.replace(DASHBOARD);
  }

  var debugEl=document.getElementById('debugOut');
  function dbg(m){debugEl.style.display='block';debugEl.textContent=m;}

  async function login(){
    clearMsgs();

    var email=(emailEl.value||'').trim().toLowerCase();
    var password=(pwEl.value||'').trim();

    dbg('Attempting: '+email+' | pwd length: '+password.length);

    if(!email||!password){showErr('Please enter your email and password.');return;}
    if(email.indexOf('@')<0){showErr('Please enter a valid email address.');return;}

    btn.disabled=true;
    btn.textContent='Signing in...';

    try{
      var r=await sb.auth.signInWithPassword({email:email,password:password});
      dbg('Response: '+(r.error?'ERROR: '+r.error.message+' | status: '+r.error.status:'OK'));
      if(r.error)throw r.error;

      lsSet('sb_access_token',r.data.session.access_token);
      lsSet('sb_refresh_token',r.data.session.refresh_token);

      showOk('Welcome back! Redirecting...');
      btn.textContent='Loading...';
      await doRedirect(r.data.session);

    }catch(err){
      var msg=(err&&err.message)||'Login failed. Please try again.';
      if(/invalid login|invalid credentials/i.test(msg)){
        msg='Wrong email or password for "'+email+'" — check caps lock.';
      }else if(/email not confirmed/i.test(msg)){
        msg='Please confirm your email before signing in.';
      }else if(/network|fetch/i.test(msg)){
        msg='Network error. Check your connection and try again.';
      }
      showErr(msg);
      btn.textContent='Sign In';
      btn.disabled=false;
    }
  }

  window.handleForgot=async function(e){
    e.preventDefault();
    var email=(emailEl.value||'').trim().toLowerCase();
    if(!email){showErr('Enter your email address first.');return;}
    btn.disabled=true;
    try{
      var r=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+'/v2-login.html'});
      if(r.error)throw r.error;
      showOk('Reset email sent. Check your inbox.');
    }catch(err){showErr((err&&err.message)||'Could not send reset email.');}
    btn.disabled=false;
  };

  // Only 3 event listeners — click, and Enter navigation between fields.
  // No input/change listeners on email or password fields.
  btn.addEventListener('click',login);
  emailEl.addEventListener('keydown',function(e){if(e.key==='Enter')pwEl.focus();});
  pwEl.addEventListener('keydown',function(e){
    // Only submit on Enter if both fields have values — prevents autofill ghost submit
    if(e.key==='Enter'&&emailEl.value.trim()&&pwEl.value)login();
  });

})();
</script>
</body>
</html>
