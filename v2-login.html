<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Shark Law – Sign In</title>
  <link rel="icon" href="favicon.ico">
  <link rel="icon" type="image/png" href="favicon-sharklaw-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-sharklaw-192.png">
  <meta name="apple-mobile-web-app-title" content="Shark Law">
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      min-height:100vh;display:flex;align-items:center;justify-content:center;
      background:#0a0a12;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;color:#e8e0f6;
      background-image:radial-gradient(ellipse at 50% 0%,rgba(139,92,246,.12) 0%,transparent 60%);
    }
    .login-wrap{width:100%;max-width:440px;padding:20px;}
    .brand{text-align:center;margin-bottom:32px;}
    .brand-tagline{font-size:13px;color:#7c6ba0;margin-top:4px;letter-spacing:0.5px;}
    .card{
      padding:32px;border-radius:18px;
      background:linear-gradient(145deg,#13111f,#161226);
      border:1px solid #2d2250;
      box-shadow:0 8px 40px rgba(139,92,246,.08);
    }
    .card-title{font-size:20px;font-weight:700;margin-bottom:4px;}
    .card-sub{font-size:13px;color:#8b7faa;margin-bottom:24px;}
    .form-group{margin-bottom:16px;}
    .form-label{display:block;margin-bottom:6px;font-size:12px;font-weight:600;color:#8b7faa;text-transform:uppercase;letter-spacing:0.5px;}
    .form-input{
      width:100%;padding:13px 14px;font-size:15px;border-radius:10px;
      border:1px solid #2d2250;background:#0d0b18;color:#e8e0f6;
      transition:border-color .2s;
      /* Critical mobile fixes */
      -webkit-appearance:none;
      appearance:none;
    }
    .form-input:focus{outline:none;border-color:#8b5cf6;box-shadow:0 0 0 3px rgba(139,92,246,.15);}
    .form-input::placeholder{color:#4a3f6b;}
    .pw-wrap{position:relative;}
    .pw-toggle{
      position:absolute;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:#6b5b95;cursor:pointer;font-size:18px;padding:4px;
    }
    .pw-toggle:hover{color:#a78bfa;}
    .btn-login{
      width:100%;padding:14px;border:none;border-radius:10px;
      background:linear-gradient(135deg,#7c3aed,#8b5cf6);
      color:#fff;font-size:15px;font-weight:700;cursor:pointer;
      transition:all .2s;margin-top:8px;
      -webkit-appearance:none;
      touch-action:manipulation;
    }
    .btn-login:hover{background:linear-gradient(135deg,#6d28d9,#7c3aed);transform:translateY(-1px);box-shadow:0 4px 20px rgba(139,92,246,.3);}
    .btn-login:active{transform:translateY(0);}
    .btn-login:disabled{opacity:.5;cursor:not-allowed;transform:none;}
    .msg{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;display:none;}
    .msg-error{background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#f87171;}
    .msg-success{background:rgba(16,185,129,.12);border:1px solid #10b981;color:#34d399;}
    .msg.show{display:block;}
    .forgot{text-align:right;margin-top:6px;}
    .forgot a{color:#7c6ba0;font-size:12px;text-decoration:none;}
    .forgot a:hover{color:#a78bfa;}
    .footer{text-align:center;margin-top:24px;}
    .footer-powered{display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:10px;}
    .footer-powered span{color:#4a3f6b;font-size:11px;}
    .footer-powered img{height:32px;}
    .footer-powered a{color:#7c3aed;text-decoration:none;font-weight:600;font-size:11px;}
    .footer-powered a:hover{color:#a78bfa;}
    .footer-links{display:flex;justify-content:center;gap:16px;flex-wrap:wrap;}
    .footer-links a{color:#4a3f6b;font-size:11px;text-decoration:none;}
    .footer-links a:hover{color:#a78bfa;}
    .footer-copy{color:#2d2250;font-size:10px;margin-top:10px;}
    .deactivated-banner{
      background:rgba(239,68,68,.12);border:1px solid #ef4444;color:#f87171;
      padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:16px;
    }
    @media(max-width:480px){
      .brand-name{font-size:26px;}
      .card{padding:24px 20px;}
    }
  </style>
</head>
<body>

<div class="login-wrap">
  <div class="brand">
    <img src="sharklawlogo.png" alt="Shark Law" style="max-width:260px;height:auto;margin-bottom:8px;">
    <div class="brand-tagline">Motorcycle Law CRM</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to your account</div>

    <div class="msg msg-error" id="errorMsg"></div>
    <div class="msg msg-success" id="successMsg"></div>

    <div class="form-group">
      <label class="form-label">Email</label>
      <!--
        autocapitalize="none"  → stops mobile Safari from capitalizing first letter
        autocorrect="off"      → stops autocorrect from mangling the email
        autocomplete="email"   → still lets password manager fill correctly
        spellcheck="false"     → no red squiggles under email
      -->
      <input
        type="email"
        class="form-input"
        id="email"
        placeholder="you@sharklaw.com"
        autocomplete="email"
        autocapitalize="none"
        autocorrect="off"
        autocomplete="username"
        spellcheck="false"
        inputmode="email"
      >
    </div>

    <div class="form-group">
      <label class="form-label">Password</label>
      <div class="pw-wrap">
        <input
          type="password"
          class="form-input"
          id="password"
          placeholder="Enter your password"
          autocomplete="current-password"
        >
        <button type="button" class="pw-toggle" id="pwToggle" tabindex="-1">👁</button>
      </div>
      <div class="forgot"><a href="#" onclick="handleForgot(event)">Forgot password?</a></div>
    </div>

    <button class="btn-login" id="loginBtn">Sign In</button>
  </div>

  <div class="footer">
    <div class="footer-powered">
      <span>Powered by</span>
      <img src="glowbot.png" alt="GlowBot">
      <a href="https://glowbotslive.com" target="_blank">GlowBotsLive.com</a>
    </div>
    <div class="footer-links">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="mailto:support@sharklawrules.com">Support</a>
    </div>
    <div class="footer-copy">&copy; 2026 Shark Law. All rights reserved.</div>
  </div>
</div>

<script>
(function(){
  var SB_URL = 'https://wiwbmvmgrutjfbnqhfnb.supabase.co';
  var SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
  var sb = window.supabase.createClient(SB_URL, SB_KEY);

  var DASHBOARD = 'v2-sharklaw-dashboard.html';

  var emailInput    = document.getElementById('email');
  var passwordInput = document.getElementById('password');
  var loginBtn      = document.getElementById('loginBtn');
  var pwToggle      = document.getElementById('pwToggle');
  var errorMsg      = document.getElementById('errorMsg');
  var successMsg    = document.getElementById('successMsg');

  // ── Safe localStorage helpers (Safari private mode blocks localStorage) ──
  function lsGet(key){try{return localStorage.getItem(key);}catch(e){return null;}}
  function lsSet(key,val){try{localStorage.setItem(key,val);}catch(e){}}
  function lsClear(){try{localStorage.clear();}catch(e){}}

  // ── Deactivated banner ───────────────────────────────────────────────────
  var params = new URLSearchParams(location.search);
  if (params.get('reason') === 'deactivated') {
    var banner = document.createElement('div');
    banner.className = 'deactivated-banner';
    banner.textContent = 'Your account has been deactivated. Please contact your administrator.';
    document.querySelector('.card').insertBefore(banner, document.querySelector('.form-group'));
  }

  // ── Password toggle ──────────────────────────────────────────────────────
  pwToggle.addEventListener('click', function() {
    var isPw = passwordInput.type === 'password';
    passwordInput.type = isPw ? 'text' : 'password';
    pwToggle.textContent = isPw ? '🙈' : '👁';
  });

  function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.classList.add('show');
    successMsg.classList.remove('show');
  }
  function showSuccess(msg) {
    successMsg.textContent = msg;
    successMsg.classList.add('show');
    errorMsg.classList.remove('show');
  }
  function clearMessages() {
    errorMsg.classList.remove('show');
    successMsg.classList.remove('show');
  }

  // ── Check existing session on load ───────────────────────────────────────
  async function checkExistingSession() {
    try {
      var r = await sb.auth.getSession();
      if (r.data?.session) {
        await validateAndRedirect(r.data.session);
        return;
      }
      // Try stored tokens (may not exist in Safari private mode)
      var token = lsGet('sb_access_token');
      var refresh = lsGet('sb_refresh_token');
      if (token && refresh) {
        var sr = await sb.auth.setSession({ access_token: token, refresh_token: refresh });
        if (sr.data?.session) {
          await validateAndRedirect(sr.data.session);
        }
      }
    } catch(e) {
      // Silent fail — just show the login form
      lsSet('sb_access_token', '');
      lsSet('sb_refresh_token', '');
    }
  }
  checkExistingSession();

  // ── Validate member is active then redirect ──────────────────────────────
  async function validateAndRedirect(session) {
    var email = session.user?.email;
    if (!email) { location.replace(DASHBOARD); return; }
    try {
      var r = await sb.from('team_members')
        .select('is_active')
        .eq('email', email.toLowerCase().trim())
        .single();
      if (r.data?.is_active === false) {
        await sb.auth.signOut();
        lsClear();
        showError('Your account has been deactivated. Please contact your administrator.');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Sign In';
        return;
      }
    } catch(e) {
      // If member lookup fails, still redirect — auth succeeded
    }
    location.replace(DASHBOARD);
  }

  // ── Login ────────────────────────────────────────────────────────────────
  async function login() {
    clearMessages();

    // Trim and lowercase the email — fixes mobile autocapitalize
    var email = (emailInput.value || '').trim().toLowerCase();
    var password = passwordInput.value;

    if (!email || !password) {
      showError('Please enter your email and password.');
      return;
    }

    // Basic email format check
    if (!email.includes('@') || !email.includes('.')) {
      showError('Please enter a valid email address.');
      return;
    }

    loginBtn.disabled = true;
    loginBtn.textContent = 'Signing in…';

    try {
      var r = await sb.auth.signInWithPassword({ email: email, password: password });

      if (r.error) throw r.error;

      // Store tokens safely
      lsSet('sb_access_token', r.data.session.access_token);
      lsSet('sb_refresh_token', r.data.session.refresh_token);

      showSuccess('Welcome back! Redirecting…');
      loginBtn.textContent = 'Loading…';

      await validateAndRedirect(r.data.session);

    } catch(err) {
      var msg = (err && err.message) ? err.message : 'Login failed. Please try again.';
      if (msg.toLowerCase().includes('invalid login') || msg.toLowerCase().includes('invalid credentials')) {
        msg = 'Invalid email or password. Check caps lock and try again.';
      } else if (msg.toLowerCase().includes('email not confirmed')) {
        msg = 'Please confirm your email address before signing in.';
      } else if (msg.toLowerCase().includes('network') || msg.toLowerCase().includes('fetch')) {
        msg = 'Network error. Check your connection and try again.';
      }
      showError(msg);
      loginBtn.textContent = 'Sign In';
      loginBtn.disabled = false;
    }
  }

  // ── Forgot password ──────────────────────────────────────────────────────
  window.handleForgot = async function(e) {
    e.preventDefault();
    var email = (emailInput.value || '').trim().toLowerCase();
    if (!email) { showError('Enter your email address above first.'); return; }
    loginBtn.disabled = true;
    try {
      var r = await sb.auth.resetPasswordForEmail(email, {
        redirectTo: location.origin + '/v2-login.html'
      });
      if (r.error) throw r.error;
      showSuccess('Password reset email sent. Check your inbox.');
    } catch(err) {
      showError((err && err.message) || 'Could not send reset email.');
    }
    loginBtn.disabled = false;
  };

  // ── Event listeners ──────────────────────────────────────────────────────
  loginBtn.addEventListener('click', login);
  passwordInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') login(); });
  emailInput.addEventListener('keydown', function(e) { if (e.key === 'Enter') passwordInput.focus(); });

  // Force lowercase as user types — catches autofill that ignores autocapitalize
  emailInput.addEventListener('input', function() {
    var pos = this.selectionStart;
    this.value = this.value.toLowerCase();
    try { this.setSelectionRange(pos, pos); } catch(e) {}
  });

})();
</script>
</body>
</html>
