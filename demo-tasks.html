<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tasks — Life Logic</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg-primary:#f4f5f7;--bg-secondary:#ebedf1;--bg-card:#ffffff;--bg-hover:#f0f0f3;
  --border:#e2e4e8;--text-primary:#1a1a1a;--text-secondary:#6b7280;
  --accent:#4F46E5;--accent-hover:#4338CA;--accent-light:#6366F1;
  --accent-glow:rgba(79,70,229,.10);
  --shadow:0 2px 12px rgba(0,0,0,.06);--input-bg:#fafafa;--modal-overlay:rgba(0,0,0,.45);
  --green:#16A34A;--red:#DC2626;--yellow:#D97706;--orange:#EA580C;
}
body.dark{
  --bg-primary:#111;--bg-secondary:#1a1a1a;--bg-card:#222;--bg-hover:#2a2a2a;
  --border:#333;--text-primary:#f0f0f0;--text-secondary:#999;
  --accent:#6366F1;--accent-hover:#818CF8;--accent-light:#818CF8;
  --accent-glow:rgba(99,102,241,.15);
  --shadow:0 2px 12px rgba(0,0,0,.3);--input-bg:#1a1a1a;--modal-overlay:rgba(0,0,0,.75);
}
html{background:var(--bg-primary);}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);padding-bottom:140px;min-height:100vh;}

/* ===== HEADER ===== */
.desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border);}
.header-top{padding:10px 24px;display:flex;justify-content:space-between;align-items:center;}
.header-left{display:flex;align-items:center;gap:16px;}
.brand-icon{width:36px;height:36px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;}
.header-titles h1{font-size:24px;font-weight:700;}
.header-titles .sub{font-size:11px;color:var(--accent);font-weight:600;letter-spacing:.5px;text-transform:uppercase;}
.header-right{display:flex;gap:10px;align-items:center;}
.dark-toggle{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dark-toggle svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.settings-link,.logout-link{font-size:13px;color:var(--text-secondary);text-decoration:none;cursor:pointer;padding:4px 8px;border-radius:6px;}
.settings-link:hover,.logout-link:hover{color:var(--text-primary);background:var(--bg-hover);}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:0 24px;border-top:1px solid var(--border);}
.nav-left{display:flex;gap:4px;}
.nav-btn{padding:10px 16px;font-size:13px;font-weight:500;color:var(--text-secondary);text-decoration:none;border-radius:8px;transition:all .2s;}
.nav-btn:hover{color:var(--text-primary);background:var(--bg-hover);}
.nav-btn.active{color:var(--accent);font-weight:600;}
.nav-right-controls{display:flex;gap:8px;padding:6px 0;}
.btn-add{padding:7px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .2s;}
.btn-add:hover{background:var(--accent-hover);}

/* ===== MOBILE HEADER ===== */
.mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border);}
.m-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.m-title{font-size:17px;font-weight:700;}
.m-sub{font-size:10px;color:var(--accent);font-weight:600;letter-spacing:.4px;}

/* ===== MOBILE BOTTOM NAV ===== */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 12px 20px;box-shadow:0 -4px 20px rgba(0,0,0,.08);}
.m-nav-top{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;}
.m-nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:6px 4px;border-radius:10px;text-decoration:none;color:var(--text-secondary);font-size:10px;font-weight:500;}
.m-nav-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.m-nav-btn.active{color:var(--accent);}
.m-nav-btn.active svg{stroke:var(--accent);}

/* ===== FAB ===== */
.fab{position:fixed;bottom:90px;right:20px;z-index:300;width:52px;height:52px;background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:24px;cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.4);display:none;align-items:center;justify-content:center;transition:all .2s;}
.fab:hover{transform:scale(1.05);}
@media(max-width:768px){.fab{display:flex;}}

/* ===== LAYOUT ===== */
.page-wrap{max-width:900px;margin:0 auto;padding:20px 24px;}

/* ===== TOOLBAR ===== */
.toolbar{display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.search-wrap{flex:1;min-width:160px;position:relative;}
.search-input{width:100%;padding:9px 12px 9px 36px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;}
.search-input:focus{border-color:var(--accent);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text-secondary);}
.toolbar-select{padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text-primary);font-size:13px;outline:none;cursor:pointer;}
.btn-filter{padding:9px 12px;border:1px solid var(--border);border-radius:10px;background:var(--bg-card);color:var(--text-secondary);font-size:13px;cursor:pointer;font-weight:500;white-space:nowrap;}
.btn-filter.active{border-color:var(--accent);color:var(--accent);background:var(--accent-glow);}

/* ===== CATEGORY ACCORDION ===== */
.cat-section{margin-bottom:12px;}
.cat-accordion{background:var(--bg-card);border:1px solid var(--border);border-radius:14px;overflow:hidden;}
.cat-acc-header{display:flex;align-items:center;gap:12px;padding:14px 16px;cursor:pointer;user-select:none;transition:background .15s;}
.cat-acc-header:hover{background:var(--bg-hover);}
.acc-icon{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
.acc-info{flex:1;}
.acc-name{font-size:15px;font-weight:700;}
.acc-meta{font-size:12px;color:var(--text-secondary);}
.acc-stats{display:flex;align-items:center;gap:8px;}
.acc-badge{font-size:11px;font-weight:600;padding:2px 8px;border-radius:8px;}
.acc-badge.overdue{background:rgba(220,38,38,.1);color:var(--red);}
.acc-badge.count{background:var(--bg-secondary);color:var(--text-secondary);}
.acc-progress{width:50px;height:5px;background:var(--bg-secondary);border-radius:3px;overflow:hidden;}
.acc-progress-fill{height:100%;border-radius:3px;}
.acc-chevron{color:var(--text-secondary);font-size:12px;transition:transform .2s;}
.acc-chevron.open{transform:rotate(180deg);}
.acc-body{border-top:1px solid var(--border);}

/* ===== TASK ITEMS ===== */
.task-list{padding:6px 0;}
.task-row{display:flex;align-items:flex-start;gap:10px;padding:10px 16px;transition:background .15s;cursor:pointer;}
.task-row:hover{background:var(--bg-hover);}
.task-row.done-row .task-title{text-decoration:line-through;color:var(--text-secondary);}
.task-check{width:20px;height:20px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;cursor:pointer;transition:all .15s;}
.task-check.checked{background:var(--green);border-color:var(--green);}
.task-check.checked::after{content:'✓';color:#fff;font-size:12px;font-weight:700;}
.task-body{flex:1;min-width:0;}
.task-title{font-size:14px;font-weight:500;margin-bottom:3px;}
.task-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.task-badge{font-size:10px;font-weight:600;padding:1px 7px;border-radius:6px;}
.pri-urgent{background:rgba(220,38,38,.12);color:var(--red);}
.pri-high{background:rgba(234,88,12,.12);color:var(--orange);}
.pri-medium{background:rgba(79,70,229,.1);color:var(--accent);}
.pri-low{background:rgba(107,114,128,.1);color:var(--text-secondary);}
.task-due{font-size:11px;color:var(--text-secondary);}
.task-due.overdue{color:var(--red);font-weight:600;}
.task-due.today{color:var(--orange);font-weight:600;}
.task-expand-btn{width:24px;height:24px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-size:11px;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.task-actions{display:flex;gap:4px;flex-shrink:0;}
.task-action-btn{width:26px;height:26px;border-radius:6px;background:transparent;border:1px solid var(--border);color:var(--text-secondary);cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center;opacity:0;transition:all .15s;}
.task-row:hover .task-action-btn{opacity:1;}

/* ===== SUBTASKS ===== */
.subtask-list{padding:0 16px 6px 46px;border-top:1px solid var(--border);background:var(--bg-secondary);}
.subtask-row{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid var(--border);}
.subtask-row:last-child{border-bottom:none;}
.subtask-check{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .15s;}
.subtask-check.checked{background:var(--green);border-color:var(--green);}
.subtask-check.checked::after{content:'✓';color:#fff;font-size:9px;font-weight:700;}
.subtask-title{font-size:13px;flex:1;}
.subtask-title.done{text-decoration:line-through;color:var(--text-secondary);}
.add-subtask-row{padding:8px 0;display:flex;gap:6px;align-items:center;}
.add-subtask-input{flex:1;padding:6px 10px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-primary);font-size:13px;outline:none;}
.add-subtask-input:focus{border-color:var(--accent);}
.add-subtask-btn{padding:6px 10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;}

.add-task-row{padding:10px 16px;border-top:1px solid var(--border);}
.add-task-inline{display:flex;gap:8px;}
.add-task-inline input{flex:1;padding:8px 12px;border:1px solid var(--border);border-radius:8px;background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;}
.add-task-inline input:focus{border-color:var(--accent);}
.add-task-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;}

.section-label{font-size:11px;font-weight:700;letter-spacing:.6px;text-transform:uppercase;color:var(--text-secondary);padding:14px 0 6px;margin-top:4px;}

/* ===== MODAL ===== */
.modal-overlay{display:none;position:fixed;inset:0;background:var(--modal-overlay);z-index:500;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal-content{background:var(--bg-card);width:100%;max-width:520px;border-radius:20px 20px 0 0;padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:600px){.modal-content{border-radius:16px;margin-bottom:20px;}}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:700;}
.modal-close{width:32px;height:32px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;}
.form-group{margin-bottom:14px;}
.form-label{display:block;font-size:12px;font-weight:600;color:var(--text-secondary);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;}
.form-input,.form-select,.form-textarea{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:10px;background:var(--input-bg);color:var(--text-primary);font-size:14px;outline:none;transition:border-color .2s;}
.form-input:focus,.form-select:focus,.form-textarea:focus{border-color:var(--accent);}
.form-textarea{resize:vertical;min-height:80px;font-family:inherit;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;margin-top:20px;}
.btn-primary{flex:1;padding:12px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{padding:12px 20px;background:var(--bg-hover);color:var(--text-primary);border:1px solid var(--border);border-radius:10px;font-size:15px;cursor:pointer;}
.btn-danger{padding:10px 16px;background:rgba(220,38,38,.1);color:var(--red);border:1px solid rgba(220,38,38,.2);border-radius:10px;font-size:13px;cursor:pointer;font-weight:600;}

/* ===== TOAST ===== */
#toast{position:fixed;bottom:140px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:500;z-index:9999;opacity:0;pointer-events:none;transition:opacity .3s;white-space:nowrap;}
#toast.show{opacity:1;}
body.dark #toast{background:#f0f0f0;color:#111;}

/* ===== EMPTY STATE ===== */
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);}
.empty-state-icon{font-size:48px;margin-bottom:12px;}
.empty-state-title{font-size:16px;font-weight:600;margin-bottom:6px;color:var(--text-primary);}
.empty-state-sub{font-size:13px;}

@media(max-width:768px){
  .desktop-header{display:none;}
  .mobile-top-header{display:block;}
  .mobile-bottom-nav{display:block;}
  .page-wrap{padding:12px 12px;}
  .form-row{grid-template-columns:1fr;}
  .task-action-btn{opacity:1;}
}
@media(min-width:769px){
  .mobile-top-header{display:none;}
  .mobile-bottom-nav{display:none;}
  .fab{display:none;}
}
  </style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-top-header">
  <div class="m-bar">
    <div>
      <div class="m-title">Tasks</div>
      <div class="m-sub" id="mCatName">All Categories</div>
    </div>
    <div style="display:flex;gap:8px;align-items:center;">
      <button class="dark-toggle" onclick="toggleDark()">
        <svg id="mMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="mSun" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2" stroke-width="2"/></svg>

</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div class="header-top">
    <div class="header-left">
      <div class="brand-icon">✅</div>
      <div class="header-titles"><h1>Tasks</h1><div class="sub">Life Logic</div></div>
    </div>
    <div class="header-right">
      <button class="dark-toggle" onclick="toggleDark()">
        <svg id="dMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="dSun" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2" stroke-width="2"/></svg>
      </button>
      <a href="demo-settings.html" class="settings-link">Settings</a>
      <a class="logout-link" onclick="doLogout()">Logout</a>
    </div>
  </div>
  <div class="nav-bar">
    <div class="nav-left">
      <a href="demo-dashboard.html" class="nav-btn">🏠 Dashboard</a>
      <a href="demo-tasks.html" class="nav-btn active">✅ Tasks</a>
      <a href="demo-calendar.html" class="nav-btn">📅 Calendar</a>

      <a href="demo-settings.html" class="nav-btn">⚙️ Settings</a>
    </div>
    <div class="nav-right-controls">
      <button class="btn-add" onclick="openTaskModal()">+ Add Task</button>
    </div>
  </div>
</div>

<!-- FAB -->
<button class="fab" onclick="openTaskModal()">+</button>

<!-- PAGE CONTENT -->
<div class="page-wrap">

  <!-- TOOLBAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <svg class="search-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="searchInput" placeholder="Search tasks…" oninput="renderAll()">
    </div>
    <select class="toolbar-select" id="filterCat" onchange="renderAll()">
      <option value="">All Categories</option>

      <option value="all">All</option>
      <option value="done">Done</option>
    </select>
    <button class="btn-filter" id="filterOverdue" onclick="toggleOverdue(this)">🔴 Overdue</button>
  </div>

  <div id="taskContent">
    <div style="text-align:center;padding:40px;color:var(--text-secondary);">Loading tasks…</div>
  </div>

</div>

<!-- MOBILE BOTTOM NAV -->
<div class="mobile-bottom-nav">
  <div class="m-nav-top">
    <a href="demo-dashboard.html" class="m-nav-btn">
      <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>Dashboard
    </a>

    </a>
  </div>
</div>

<!-- TASK MODAL -->
<div class="modal-overlay" id="taskModal">
  <div class="modal-content">
    <div class="modal-header">
      <div class="modal-title" id="taskModalTitle">New Task</div>
      <button class="modal-close" onclick="closeTaskModal()">×</button>
    </div>
    <div class="form-group">
      <label class="form-label">Title *</label>
      <input type="text" class="form-input" id="taskTitle" placeholder="What needs to be done?">
    </div>
    <div class="form-group">
      <label class="form-label">Description</label>
      <textarea class="form-textarea" id="taskDesc" placeholder="Optional notes…"></textarea>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category *</label>
        <select class="form-select" id="taskCat">
          <option value="">Select…</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Priority</label>
        <select class="form-select" id="taskPri">
          <option value="low">🟢 Low</option>
          <option value="medium" selected>🔵 Medium</option>
          <option value="high">🟠 High</option>
          <option value="urgent">🔴 Urgent</option>
        </select>
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Due Date</label>
        <input type="date" class="form-input" id="taskDue">
      </div>
      <div class="form-group">
        <label class="form-label">Status</label>
        <select class="form-select" id="taskStatus">

  return allTasks.filter(function(t) {
    if (q && !t.title.toLowerCase().includes(q)) return false;

    if (statusFilter === 'active' && t.status === 'done') return false;

      var isOpen = openAccordions[cat.id] !== false; // default open
      html += '<div class="cat-section"><div class="cat-accordion">' +
        '<div class="cat-acc-header" onclick="toggleAccordion(\'' + cat.id + '\')">' +
          '<div class="acc-icon" style="background:' + hexAlpha(cat.color,0.12) + '">' + (cat.icon||'📋') + '</div>' +
          '<div class="acc-info">' +
            '<div class="acc-name">' + esc(cat.name) + '</div>' +
            '<div class="acc-meta">' + total + ' task' + (total!==1?'s':'') + ' · ' + pct + '% done</div>' +
          '</div>' +
          '<div class="acc-stats">' +
            (overdue ? '<span class="acc-badge overdue">' + overdue + ' overdue</span>' : '') +
            '<span class="acc-badge count">' + catTasks.length + '</span>' +
            '<div class="acc-progress"><div class="acc-progress-fill" style="width:' + pct + '%;background:' + (cat.color||'#4F46E5') + '"></div></div>' +
            '<span class="acc-chevron' + (isOpen?' open':'') + '" id="chev-' + cat.id + '">▼</span>' +
          '</div>' +
        '</div>' +
        '<div class="acc-body" id="acc-' + cat.id + '" style="display:' + (isOpen?'block':'none') + '">' +
          '<div class="task-list">' + renderTaskList(catTasks, tasks, cat) + '</div>' +
          '<div class="add-task-row">' +
            '<div class="add-task-inline">' +
              '<input type="text" placeholder="+ Add task…" onkeydown="quickAddTask(event,\'' + cat.id + '\')" id="quick-' + cat.id + '">' +
              '<button class="add-task-btn" onclick="quickAddTaskBtn(\'' + cat.id + '\')">Add</button>' +
            '</div>' +
          '</div>' +
        '</div>' +
      '</div></div>';
    });
  });

  // Uncategorized tasks
  var uncatTasks = topLevelTasks.filter(function(t) { return !cats.find(function(c) { return c.id === t.category_id; }); });
  if (uncatTasks.length) {
    html += '<div class="section-label">📌 Uncategorized</div>' + uncatTasks.map(function(t) { return renderTaskRow(t, tasks, null); }).join('');
  }

  if (!html) {
    html = '<div class="empty-state"><div class="empty-state-icon">🎉</div><div class="empty-state-title">All clear!</div><div class="empty-state-sub">No tasks match your filters.</div></div>';
  }
  document.getElementById('taskContent').innerHTML = html;
}

function renderTaskList(tasks, allTasks, cat) {
  return tasks.map(function(t) { return renderTaskRow(t, allTasks, cat); }).join('');
}

function renderTaskRow(t, allTasks, cat) {
  var subtasks = allTasks.filter(function(s) { return s.parent_id === t.id; });
  var today = new Date().toISOString().split('T')[0];
  var isDone = t.status === 'done';
  var isOverdue = !isDone && t.due_date && t.due_date < today;
  var isToday = !isDone && t.due_date === today;
  var priClass = {urgent:'pri-urgent',high:'pri-high',medium:'pri-medium',low:'pri-low'}[t.priority] || 'pri-medium';
  var showSubs = openSubtasks[t.id];
  var html = '<div class="task-row' + (isDone?' done-row':'') + '">' +
    '<div class="task-check' + (isDone?' checked':'') + '" onclick="toggleTask(event,\'' + t.id + '\',\'' + (t.status) + '\')"></div>' +
    '<div class="task-body" onclick="openTaskModal(\'' + t.id + '\')">' +
      '<div class="task-title">' + esc(t.title) + '</div>' +
      '<div class="task-meta">' +
        '<span class="task-badge ' + priClass + '">' + (t.priority||'medium') + '</span>' +
        (t.due_date ? '<span class="task-due' + (isOverdue?' overdue':isToday?' today':'') + '">' + (isOverdue?'⚠ ':isToday?'📅 ':'') + formatDate(t.due_date) + '</span>' : '') +
        (subtasks.length ? '<span style="font-size:11px;color:var(--text-secondary);">'+subtasks.length+' sub</span>' : '') +
      '</div>' +
    '</div>' +
    (subtasks.length ? '<button class="task-expand-btn" onclick="toggleSubtasks(\'' + t.id + '\')">' + (showSubs?'▲':'▼') + '</button>' : '') +
    '<div class="task-actions">' +
      '<button class="task-action-btn" onclick="openTaskModal(\'' + t.id + '\')">✏️</button>' +
    '</div>' +
  '</div>';
  if (subtasks.length && showSubs) {
    html += '<div class="subtask-list">' +
      subtasks.map(function(s) {
        return '<div class="subtask-row">' +
          '<div class="subtask-check' + (s.status==='done'?' checked':'') + '" onclick="toggleTask(event,\'' + s.id + '\',\'' + s.status + '\')"></div>' +
          '<span class="subtask-title' + (s.status==='done'?' done':'') + '" onclick="openTaskModal(\'' + s.id + '\')">' + esc(s.title) + '</span>' +
        '</div>';
      }).join('') +
      '<div class="add-subtask-row">' +
        '<input type="text" class="add-subtask-input" placeholder="+ Add subtask…" id="subinput-' + t.id + '" onkeydown="quickAddSubtask(event,\'' + t.id + '\',\'' + (cat?cat.id:'') + '\')">' +
        '<button class="add-subtask-btn" onclick="quickAddSubtaskBtn(\'' + t.id + '\',\'' + (cat?cat.id:'') + '\')">+</button>' +
      '</div>' +
    '</div>';
  }
  return html;
}

function toggleAccordion(catId) {
  openAccordions[catId] = openAccordions[catId] === false ? true : false;
  renderAll();
}
function toggleSubtasks(taskId) {
  openSubtasks[taskId] = !openSubtasks[taskId];
  renderAll();
}

async function toggleTask(e, id, currentStatus) {
  e.stopPropagation();
  var newStatus = currentStatus === 'done' ? 'todo' : 'done';
  var update = { status: newStatus };
  if (newStatus === 'done') update.completed_at = new Date().toISOString();
  await sb.from('todo_tasks').update(update).eq('id', id);
  var task = allTasks.find(function(t) { return t.id === id; });
  if (task) { task.status = newStatus; task.completed_at = update.completed_at || null; }
  renderAll();
  toast(newStatus === 'done' ? '✅ Done!' : 'Marked as to-do');
}

async function quickAddTask(e, catId) {
  if (e.key === 'Enter') { await quickAddTaskBtn(catId); }
}
async function quickAddTaskBtn(catId) {
  var inp = document.getElementById('quick-' + catId);
  if (!inp) return;
  var title = inp.value.trim();
  if (!title) return;
  var r = await sb.from('todo_tasks').insert({ title: title, category_id: catId, user_id: userId, status: 'todo', priority: 'medium', is_active: true }).select().single();
  if (!r.error && r.data) { allTasks.push(r.data); inp.value = ''; renderAll(); toast('Task added!'); }
}
async function quickAddSubtask(e, parentId, catId) {
  if (e.key === 'Enter') { await quickAddSubtaskBtn(parentId, catId); }
}
async function quickAddSubtaskBtn(parentId, catId) {
  var inp = document.getElementById('subinput-' + parentId);
  if (!inp) return;
  var title = inp.value.trim();
  if (!title) return;
  var r = await sb.from('todo_tasks').insert({ title: title, parent_id: parentId, category_id: catId, user_id: userId, status: 'todo', priority: 'medium', is_active: true }).select().single();
  if (!r.error && r.data) { allTasks.push(r.data); openSubtasks[parentId] = true; inp.value = ''; renderAll(); toast('Subtask added!'); }
}

// TASK MODAL
function openTaskModal(taskId) {
  editingTaskId = taskId || null;
  document.getElementById('taskModalTitle').textContent = taskId ? 'Edit Task' : 'New Task';
  document.getElementById('taskDeleteBtn').style.display = taskId ? 'block' : 'none';
  document.getElementById('taskTitle').value = '';
  document.getElementById('taskDesc').value = '';
  document.getElementById('taskDue').value = '';
  document.getElementById('taskCat').value = '';
  document.getElementById('taskPri').value = 'medium';
  document.getElementById('taskStatus').value = 'todo';
  document.getElementById('taskParent').value = '';
  // Populate cat select
  var catSel = document.getElementById('taskCat');
  var parentSel = document.getElementById('taskParent');
  catSel.innerHTML = '<option value="">Select category…</option>' + allCategories.map(function(c) { return '<option value="'+c.id+'">'+c.icon+' '+esc(c.name)+'</option>'; }).join('');
  parentSel.innerHTML = '<option value="">None (top-level)</option>' + allTasks.filter(function(t){return !t.parent_id && t.status!=='done';}).map(function(t){ return '<option value="'+t.id+'">'+esc(t.title)+'</option>'; }).join('');
  // Pre-set category from filter
  var catFilter = document.getElementById('filterCat').value || filterCatParam;
  if (catFilter) catSel.value = catFilter;
  if (taskId) {
    var task = allTasks.find(function(t) { return t.id === taskId; });
    if (task) {
      document.getElementById('taskTitle').value = task.title || '';
      document.getElementById('taskDesc').value = task.description || '';
      document.getElementById('taskDue').value = task.due_date || '';
      document.getElementById('taskCat').value = task.category_id || '';
      document.getElementById('taskPri').value = task.priority || 'medium';
      document.getElementById('taskStatus').value = task.status || 'todo';
      document.getElementById('taskParent').value = task.parent_id || '';
    }
  }
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal() { document.getElementById('taskModal').classList.remove('open'); }

async function saveTask() {
  var title = document.getElementById('taskTitle').value.trim();
  if (!title) { toast('Please enter a task title'); return; }
  var catId = document.getElementById('taskCat').value;
  if (!catId) { toast('Please select a category'); return; }
  var data = {
    title: title,
    description: document.getElementById('taskDesc').value.trim() || null,
    category_id: catId,
    priority: document.getElementById('taskPri').value,
    status: document.getElementById('taskStatus').value,
    due_date: document.getElementById('taskDue').value || null,
    parent_id: document.getElementById('taskParent').value || null,
    user_id: userId,
    is_active: true
  };
  if (data.status === 'done' && !editingTaskId) data.completed_at = new Date().toISOString();
  var r;
  if (editingTaskId) {
    r = await sb.from('todo_tasks').update(data).eq('id', editingTaskId).select().single();
    if (!r.error) { var idx = allTasks.findIndex(function(t){return t.id===editingTaskId;}); if (idx>=0) allTasks[idx] = r.data; }
  } else {
    r = await sb.from('todo_tasks').insert(data).select().single();
    if (!r.error) allTasks.push(r.data);
  }
  if (r.error) { toast('Error: ' + r.error.message); return; }
  toast(editingTaskId ? 'Task updated!' : 'Task created!');
  closeTaskModal();
  renderAll();
}

async function deleteTask() {
  if (!editingTaskId || !confirm('Delete this task?')) return;
  await sb.from('todo_tasks').update({ is_active: false }).eq('id', editingTaskId);
  allTasks = allTasks.filter(function(t) { return t.id !== editingTaskId && t.parent_id !== editingTaskId; });
  closeTaskModal(); renderAll(); toast('Task deleted');
}

function populateCatFilter() {
  var sel = document.getElementById('filterCat');
  sel.innerHTML = '<option value="">All Categories</option>' + allCategories.map(function(c) { return '<option value="'+c.id+'">'+c.icon+' '+esc(c.name)+'</option>'; }).join('');
  if (filterCatParam) {
    sel.value = filterCatParam;
    var cat = allCategories.find(function(c){ return c.id === filterCatParam; });
    if (cat) document.getElementById('mCatName').textContent = cat.name;
  }
}

function loadData() {
  populateCatFilter();
  renderAll();
}
loadData();
</script>
</body>
</html>
