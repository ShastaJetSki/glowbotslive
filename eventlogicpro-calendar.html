<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="theme-color" content="#DC2626">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Event Logic Pro">
  <meta name="description" content="Event Logic Pro — Calendar and schedule management">
  <title>Calendar — Event Logic Pro</title>
  <link rel="icon" href="favicon-eventlogic.ico">
  <link rel="icon" type="image/png" href="favicon-eventlogic-32.png" sizes="32x32">
  <link rel="apple-touch-icon" href="favicon-eventlogic-192.png">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg-primary:#f4f5f7;--bg-secondary:#ebedf1;--bg-card:#ffffff;--bg-hover:#f0f0f3;
  --border:#e2e4e8;--text-primary:#1a1a1a;--text-secondary:#6b7280;
  --accent:#DC2626;--accent-hover:#B91C1C;--accent-light:#EF4444;
  --accent-glow:rgba(220,38,38,.10);--accent-glow2:rgba(220,38,38,.06);
  --shadow:0 2px 12px rgba(0,0,0,.06);--input-bg:#fafafa;--modal-overlay:rgba(0,0,0,.45);
}
body.dark{
  --bg-primary:#111;--bg-secondary:#1a1a1a;--bg-card:#222;--bg-hover:#2a2a2a;
  --border:#333;--text-primary:#f0f0f0;--text-secondary:#999;
  --accent:#DC2626;--accent-hover:#EF4444;
  --accent-glow:rgba(220,38,38,.15);--accent-glow2:rgba(220,38,38,.08);
  --shadow:0 2px 12px rgba(0,0,0,.3);--input-bg:#1a1a1a;--modal-overlay:rgba(0,0,0,.75);
}
html{background:var(--bg-primary);scrollbar-gutter:stable;}
html.dark{background:#111;}
html,body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;height:100%;}

/* DESKTOP HEADER */
.desktop-header{background:var(--bg-primary);border-bottom:1px solid var(--border);flex-shrink:0;}
.header-top{padding:10px 24px;display:flex;justify-content:space-between;align-items:center;}
.header-left{display:flex;align-items:center;gap:20px;}
.header-logo{height:72px;object-fit:contain;}
.header-titles h1{font-size:28px;font-weight:700;letter-spacing:-.3px;}
.header-titles .sub{font-size:12px;color:var(--accent);font-weight:600;letter-spacing:.3px;}
.nav-bar{display:flex;justify-content:space-between;align-items:center;padding:0 24px;margin-top:-4px;}
.nav-left{display:flex;gap:2px;}
.nav-right-controls{display:flex;align-items:center;gap:12px;}
.nav-btn{padding:8px 18px;font-size:13px;font-weight:600;color:var(--text-secondary);text-decoration:none;border-bottom:2px solid transparent;transition:all .2s;white-space:nowrap;}
.nav-btn:hover{color:var(--accent);}.nav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.dark-toggle{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.dark-toggle:hover{border-color:var(--accent);color:var(--accent);}
.dark-toggle svg{width:14px;height:14px;fill:currentColor;}
.logout-link,.settings-link{color:var(--text-secondary);cursor:pointer;font-size:12px;text-decoration:none;font-weight:500;}
.logout-link:hover,.settings-link:hover{color:var(--accent);}

/* MOBILE TOP HEADER */
.mobile-top-header{display:none;background:var(--bg-primary);border-bottom:1px solid var(--border);flex-shrink:0;}
.m-bar{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;}
.m-menu-btn{background:transparent;border:none;color:var(--text-secondary);font-size:20px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.m-center{flex:1;}.m-title{font-size:18px;font-weight:600;}.m-biz{font-size:12px;color:var(--accent);font-weight:600;}
.m-right{display:flex;align-items:center;gap:8px;}
.m-menu{max-height:0;overflow:hidden;transition:max-height .3s;background:var(--bg-primary);border-top:1px solid var(--border);}
.m-menu.expanded{max-height:300px;}
.m-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 12px;}
.m-actions button{padding:10px;font-size:13px;background:var(--accent-glow);border:1px solid rgba(220,38,38,.25);color:var(--accent);border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600;}
.m-actions button:hover{background:var(--accent);color:#fff;}

/* MOBILE BOTTOM NAV */
.mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1px solid var(--border);padding:8px 8px calc(8px + env(safe-area-inset-bottom));z-index:200;}
.m-nav-top{display:grid;grid-template-columns:repeat(4,1fr);gap:4px;}
.m-nav-bot{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-top:4px;}
.m-nav-btn{text-align:center;padding:8px 4px;font-size:11px;font-weight:600;color:var(--text-secondary);text-decoration:none;border-radius:8px;background:var(--bg-hover);transition:all .2s;display:flex;align-items:center;justify-content:center;min-height:40px;}
.m-nav-btn:hover,.m-nav-btn.active{background:var(--accent);color:#fff;}

/* VIEW TOGGLE */
.view-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border);}
.view-btn{padding:5px 12px;border:none;background:var(--bg-card);color:var(--text-secondary);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
.view-btn.active{background:var(--accent);color:#fff;}
.view-btn+.view-btn{border-left:1px solid var(--border);}

/* TOAST */
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--accent);z-index:9999;display:none;box-shadow:var(--shadow);}
.toast.show{display:block;animation:fadeIn .3s;}
@keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* APP SHELL */
.app-shell{display:flex;flex-direction:column;height:100%;}
.app-body{display:flex;flex:1;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:230px;background:var(--bg-secondary);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;scrollbar-width:thin;}
.sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border);}
.sidebar-section:last-child{border-bottom:none;}
.sidebar-title{font-size:10px;text-transform:uppercase;font-weight:700;color:var(--text-secondary);letter-spacing:.8px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;}
.sidebar-add{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--text-secondary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.sidebar-add:hover{background:var(--bg-hover);color:var(--text-primary);}

/* MINI CAL */
.mini-cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
.mini-cal-title{font-size:12px;font-weight:600;}
.mini-cal-btn{width:24px;height:24px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:4px;font-size:13px;display:flex;align-items:center;justify-content:center;}
.mini-cal-btn:hover{background:var(--bg-hover);}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;}
.mini-hdr{font-size:9px;color:var(--text-secondary);padding:2px 0;}
.mini-day{font-size:10px;border-radius:50%;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
.mini-day:hover{background:var(--bg-hover);}
.mini-day.today{background:var(--accent);color:#fff;font-weight:700;}
.mini-day.selected{border:2px solid var(--accent-light, #EF4444);}
.mini-day.other{color:var(--text-secondary);opacity:.4;}

/* CAL LAYERS */
.cal-layer{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;}
.cal-layer:hover{background:var(--bg-hover);}
.cal-layer-check{width:16px;height:16px;border-radius:4px;border:2px solid;flex-shrink:0;position:relative;}
.cal-layer-check.on{background:currentColor;}
.cal-layer-check.on::after{content:'';width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);position:absolute;top:1px;left:4px;}
.cal-layer-name{font-size:12px;font-weight:500;flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cal-layer-count{font-size:9px;background:var(--bg-hover);padding:1px 6px;border-radius:10px;color:var(--text-secondary);flex-shrink:0;}
.cal-layer-actions{opacity:0;transition:opacity .15s;display:flex;gap:1px;}
.cal-layer:hover .cal-layer-actions{opacity:1;}
.cal-layer-btn{width:20px;height:20px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:4px;font-size:11px;display:flex;align-items:center;justify-content:center;}
.cal-layer-btn:hover{background:var(--bg-primary);}
.cal-layer.active-glow{box-shadow:inset 0 0 0 1px currentColor;background:color-mix(in srgb,currentColor 8%,transparent);}

/* MAIN */
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.sched-controls{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--border);}
.sched-nav{display:flex;align-items:center;gap:6px;}
.sched-nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.sched-nav-btn:hover{background:var(--bg-hover);}
.sched-title{font-size:20px;font-weight:700;min-width:140px;text-align:center;}
.sched-today-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-primary);font-size:12px;font-weight:600;cursor:pointer;}
.sched-today-btn:hover{background:var(--bg-hover);}
.sched-add-btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.sched-add-btn:hover{background:var(--accent-hover);}
.cal-drawer-btn{display:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:16px;align-items:center;justify-content:center;}
.view-area{flex:1;overflow:hidden;padding:0 12px 12px;}

/* MONTH */
.month-wrap{display:flex;flex-direction:column;height:100%;}
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex-shrink:0;}
.cal-header-day{text-align:center;font-size:11px;font-weight:600;color:var(--text-secondary);padding:10px 4px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:1px;flex:1;min-height:0;}
.cal-cell{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:5px 6px;cursor:pointer;transition:border-color .15s;overflow:hidden;display:flex;flex-direction:column;min-height:100px;}
.cal-cell:hover{border-color:var(--accent);}
.cal-cell.today{border-color:var(--accent);border-width:2px;}
.cal-cell.other{opacity:.3;}
.cal-day-num{font-size:13px;font-weight:600;margin-bottom:4px;flex-shrink:0;line-height:1.4;}
.cal-cell.today .cal-day-num{background:var(--accent);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}
.cal-events{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:3px;min-height:0;scrollbar-width:thin;}
.cal-strip{font-size:10px;padding:2px 6px;border-radius:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;font-weight:500;border-left:4px solid;line-height:1.6;}
.cal-strip:hover{filter:brightness(1.15);}

/* WEEK */
.week-wrap{display:flex;flex-direction:column;height:100%;}
.week-header{display:grid;grid-template-columns:52px repeat(7,1fr);flex-shrink:0;}
.week-header-day{text-align:center;font-size:11px;font-weight:600;color:var(--text-secondary);padding:6px 2px;border-bottom:2px solid var(--border);}
.week-header-day.today{color:var(--accent);border-bottom-color:var(--accent);}
.week-header-day .wh-num{font-size:22px;font-weight:700;color:var(--text-primary);display:block;line-height:1.2;}
.week-header-day.today .wh-num{color:var(--accent);}
.week-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;}
.week-grid{display:grid;grid-template-columns:52px repeat(7,1fr);}
.week-time{font-size:10px;color:var(--text-secondary);text-align:right;padding:2px 6px 0 0;height:56px;border-top:1px solid var(--border);}
.week-cell{border-top:1px solid var(--border);border-left:1px solid var(--border);min-height:56px;padding:2px;cursor:pointer;}
.week-cell:hover{background:var(--bg-hover);}
.week-cell.today-col{background:var(--accent-glow2);}
.week-ev{font-size:11px;padding:3px 6px;border-radius:4px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;border-left:3px solid;font-weight:500;}

/* DAY */
.day-wrap{display:flex;flex-direction:column;height:100%;}
.day-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;}
.day-hour{display:grid;grid-template-columns:52px 1fr;min-height:68px;border-top:1px solid var(--border);}
.day-hour-label{font-size:11px;color:var(--text-secondary);text-align:right;padding:3px 8px 0 0;}
.day-hour-content{padding:3px 6px;cursor:pointer;min-height:68px;}
.day-hour-content:hover{background:var(--bg-hover);}
.day-ev{padding:8px 12px;border-radius:6px;margin-bottom:4px;cursor:pointer;border-left:4px solid;}
.day-ev-title{font-weight:600;font-size:14px;}
.day-ev-meta{font-size:12px;opacity:.8;margin-top:2px;}

/* MODALS */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--modal-overlay);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
.modal-overlay.active{opacity:1;pointer-events:auto;}
.modal-content{background:var(--bg-card);border-radius:14px;width:100%;max-width:480px;max-height:90vh;overflow-y:auto;border:1px solid var(--border);}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border);}
.modal-title{font-size:15px;font-weight:700;}
.modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text-secondary);font-size:18px;cursor:pointer;}
.modal-close:hover{background:var(--bg-hover);}
.modal-body{padding:16px 18px;}
.modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border);}
.form-group{margin-bottom:12px;}
.form-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;display:block;}
.form-input,.form-select,.form-textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border);background:var(--input-bg);color:var(--text-primary);font-size:13px;font-family:inherit;}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow);}
.form-textarea{resize:vertical;min-height:50px;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.btn-primary{padding:8px 16px;border-radius:6px;border:none;background:var(--accent);color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--accent-hover);}
.btn-secondary{padding:8px 16px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--text-primary);font-size:12px;font-weight:600;cursor:pointer;}
.btn-danger{padding:8px 16px;border-radius:6px;border:none;background:#ef4444;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-right:auto;}
.color-picker{display:flex;gap:6px;flex-wrap:wrap;margin-top:4px;}
.color-swatch{width:24px;height:24px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .15s;}
.color-swatch:hover{transform:scale(1.2);}
.color-swatch.picked{border-color:var(--text-primary);box-shadow:0 0 0 2px var(--bg-card);}

/* MOBILE DRAWER */
.mobile-cal-drawer{display:none;position:fixed;bottom:96px;left:0;right:0;background:var(--bg-secondary);border-top:1px solid var(--border);z-index:99;max-height:50vh;overflow-y:auto;border-radius:16px 16px 0 0;box-shadow:0 -4px 20px rgba(0,0,0,.3);transform:translateY(100%);transition:transform .25s ease;}
.mobile-cal-drawer.open{transform:translateY(0);}
.drawer-handle{width:36px;height:4px;background:var(--border);border-radius:2px;margin:8px auto;}

/* RESPONSIVE */
@media(max-width:768px){
  html,body{overflow:auto;}
  body{padding-bottom:130px;}
  .desktop-header{display:none!important;}
  .mobile-top-header{display:block!important;}
  .mobile-bottom-nav{display:block!important;}
  .sidebar{display:none!important;}
  .mobile-cal-drawer{display:block!important;}
  .cal-drawer-btn{display:flex!important;}
  .sched-title{font-size:14px;min-width:80px;}
  .view-area{padding:0 4px 60px;}
  .cal-header-day{font-size:9px;padding:5px 2px;}
  .cal-cell.today .cal-day-num{width:20px;height:20px;font-size:9px;}
  .cal-strip{font-size:9px;padding:2px 4px;border-left-width:2px;}
  .week-header{grid-template-columns:36px repeat(7,1fr);}
  .week-grid{grid-template-columns:36px repeat(7,1fr);}
  .week-time{font-size:8px;padding-right:2px;}
  .week-header-day{font-size:8px;}
  .week-header-day .wh-num{font-size:14px;}
  .week-ev{font-size:8px;padding:1px 2px;}
  .day-hour{grid-template-columns:36px 1fr;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-content{border-radius:16px 16px 0 0;max-height:85vh;}
  .form-row{grid-template-columns:1fr;}
}
@media(min-width:769px){
  .mobile-top-header{display:none!important;}
  .mobile-bottom-nav{display:none!important;}
  .mobile-cal-drawer{display:none!important;}
}
  </style>
</head>
<body>
<div class="app-shell">

<!-- MOBILE TOP HEADER -->
<div class="mobile-top-header">
  <div class="m-bar">
    <button class="m-menu-btn" onclick="document.getElementById('mMenu').classList.toggle('expanded')">&#9776;</button>
    <div class="m-center">
      <div class="m-title">Calendar</div>
      <div class="m-biz" id="mBiz">Event Logic Pro</div>
    </div>
    <div class="m-right">
      <div class="view-toggle">
        <button class="view-btn active" id="mVM" onclick="setView('month')">M</button>
        <button class="view-btn" id="mVW" onclick="setView('week')">W</button>
        <button class="view-btn" id="mVD" onclick="setView('day')">D</button>
      </div>
      <button class="dark-toggle" onclick="toggleDark()">
        <svg id="mMoon" viewBox="0 0 24 24"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg id="mSun" viewBox="0 0 24 24" style="display:none;"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      </button>
    </div>
  </div>
  <div class="m-menu" id="mMenu">
    <div class="m-actions">
      <button onclick="openEventModal()">+ Add Event</button>
      <button onclick="location.href='eventlogicpro-settings.html'">Settings</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div class="header-top">
    <div class="header-left">
      <div class="header-titles">
        <h1>Calendar</h1>
        <div class="sub" id="dBiz">Event Logic Pro</div>
      </div>
    </div>
    <img id="headerLogo" class="header-logo" src="eventlogicpro-logo.png" alt="Event Logic Pro">
  </div>
  <div class="nav-bar">
    <div class="nav-left">
      <a href="eventlogicpro-dashboard.html" class="nav-btn">Dashboard</a>
      <a href="eventlogicpro-calendar.html" class="nav-btn active">Calendar</a>
      <a href="eventlogicpro.html" class="nav-btn">Tasks</a>
      <a href="eventlogicpro-budget.html" class="nav-btn">Budget</a>
      <a href="eventlogicpro-sponsors.html" class="nav-btn">Packages</a>
      <a href="eventlogicpro-contacts.html" class="nav-btn">Contacts</a>
      <a href="eventlogicpro-sitemap.html" class="nav-btn">Site Maps</a>
    </div>
    <div class="nav-right-controls">

<script>
/* DARK MODE */
var isDark = localStorage.getItem('elp_dark_mode') === 'true';
if (isDark) { document.body.classList.add('dark'); document.documentElement.classList.add('dark'); }
function applyDarkIcons() {
  var d = document.body.classList.contains('dark');
  document.documentElement.classList.toggle('dark', d);
  ['d','m'].forEach(function(p) {
    var moon = document.getElementById(p+'Moon'), sun = document.getElementById(p+'Sun');

  });

}
applyDarkIcons();
function toggleDark() { document.body.classList.toggle('dark'); isDark = document.body.classList.contains('dark'); localStorage.setItem('elp_dark_mode', isDark); applyDarkIcons(); }

/* SUPABASE */
var SUPABASE_URL = 'https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var tenantId = null, userId = null;
var allCalendars = [], allItems = [], allProjects = [], allMembers = [];
var visibleCalIds = new Set();
var currentView = 'month';
var viewDate = new Date(), miniDate = new Date();
var editingItemId = null, editingCalId = null;

var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_S = ['S','M','T','W','T','F','S'];
var MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
var PALETTE = ['#3b82f6','#ef4444','#22c55e','#f59e0b','#8b5cf6','#ec4899','#06b6d4','#f97316','#14b8a6','#6366f1','#84cc16','#e879f9'];

/* UTILS */
function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function isToday(d) {
  var t = new Date();
  return d.getFullYear()===t.getFullYear() && d.getMonth()===t.getMonth() && d.getDate()===t.getDate();
}
function getWeekStart(d) { var s = new Date(d); s.setDate(s.getDate()-s.getDay()); return s; }
function showToast(m) { var t = document.getElementById('toast'); t.textContent = m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2400); }
function empName(id) { if(!id)return''; var m=allMembers.find(function(x){return x.member_id===id;}); return m?((m.first_name||'')+' '+(m.last_name||'')).trim():''; }
function getCalColor(calId) { var c=allCalendars.find(function(x){return x.calendar_id===calId;}); return c?c.color:'#64748b'; }
function getCalName(calId) { var c=allCalendars.find(function(x){return x.calendar_id===calId;}); return c?c.calendar_name:''; }

/* AUTH */
async function logout() { await sb.auth.signOut(); localStorage.removeItem('sb_access_token'); localStorage.removeItem('sb_refresh_token'); location.replace('/'); }
async function checkAuth() {
  var r=await sb.auth.getSession(); var s=r.data.session;
  if (!s) {
    var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');
    if (t&&rf) { var sr=await sb.auth.setSession({access_token:t,refresh_token:rf}); s=sr.data?.session; }
    if (!s) { location.replace('/'); return null; }
  }
  return s;
}

/* DATA */
async function loadCalendars() {
  var r=await sb.from('event_calendars').select('*').eq('tenant_id',tenantId).order('sort_order');
  allCalendars=r.data||[];
  if (!allCalendars.length) {
    await sb.from('event_calendars').insert({tenant_id:tenantId,calendar_name:'General',color:'#3b82f6',is_default:true,created_by:userId});
    var r2=await sb.from('event_calendars').select('*').eq('tenant_id',tenantId);
    allCalendars=r2.data||[];
  }
  var saved=localStorage.getItem('visible_cals_'+tenantId);
  if (saved) { try{var arr=JSON.parse(saved);visibleCalIds=new Set(arr);}catch(e){allCalendars.forEach(function(c){visibleCalIds.add(c.calendar_id);});} }
  else { allCalendars.forEach(function(c){visibleCalIds.add(c.calendar_id);}); }
}
async function loadProjects() {
  var r=await sb.from('event_projects').select('event_project_id,event_name').eq('tenant_id',tenantId).order('created_at',{ascending:false});
  allProjects=r.data||[];
}
async function loadMembers() {
  var r=await sb.from('event_members').select('*').eq('tenant_id',tenantId).eq('is_active',true).order('first_name');
  allMembers=r.data||[];
}
async function loadItems() {
  var r=await sb.from('event_schedule_items').select('*').eq('tenant_id',tenantId).order('item_date').order('start_time');
  allItems=r.data||[];
}
function getVisibleItems(ds) {
  return allItems.filter(function(it){ return it.item_date===ds && (!it.calendar_id || visibleCalIds.has(it.calendar_id)); });
}
function saveVisibleCals() { localStorage.setItem('visible_cals_'+tenantId,JSON.stringify([...visibleCalIds])); }

/* DRAWER */
var drawerOpen=false;
function toggleMobileDrawer() { drawerOpen=!drawerOpen; document.getElementById('mobileDrawer').classList.toggle('open',drawerOpen); }

/* MINI CAL */
function renderMiniCal() {
  var el=document.getElementById('miniCalSection');
  var y=miniDate.getFullYear(),mo=miniDate.getMonth();
  var first=new Date(y,mo,1),sd=first.getDay(),dim=new Date(y,mo+1,0).getDate(),prev=new Date(y,mo,0).getDate();
  var h='<div class="mini-cal-nav"><button class="mini-cal-btn" onclick="miniPrev()">&#9664;</button>'
    +'<div class="mini-cal-title">'+MONTHS[mo].substring(0,3)+' '+y+'</div>'
    +'<button class="mini-cal-btn" onclick="miniNext()">&#9654;</button></div>'
    +'<div class="mini-grid">';
  DAYS_S.forEach(function(d){h+='<div class="mini-hdr">'+d+'</div>';});
  for (var i=0;i<42;i++) {
    var dn,cls='mini-day',dt;
    if (i<sd) {dn=prev-sd+i+1;dt=new Date(y,mo-1,dn);cls+=' other';}
    else if (i-sd>=dim) {dn=i-sd-dim+1;dt=new Date(y,mo+1,dn);cls+=' other';}
    else {dn=i-sd+1;dt=new Date(y,mo,dn);}
    if (isToday(dt)) cls+=' today';
    if (dateStr(dt)===dateStr(viewDate)) cls+=' selected';
    h+='<div class="'+cls+'" onclick="miniClick(\''+dateStr(dt)+'\')">'+dn+'</div>';
  }
  h+='</div>';
  el.innerHTML=h;
}
function miniPrev(){miniDate.setMonth(miniDate.getMonth()-1);renderMiniCal();}
function miniNext(){miniDate.setMonth(miniDate.getMonth()+1);renderMiniCal();}
function miniClick(ds){viewDate=new Date(ds+'T12:00:00');miniDate=new Date(viewDate);render();renderMiniCal();}

/* CAL LAYERS */
function renderCalLayers() {
  var h='';
  allCalendars.forEach(function(c) {
    var on=visibleCalIds.has(c.calendar_id);
    var cnt=allItems.filter(function(it){return it.calendar_id===c.calendar_id;}).length;
    h+='<div class="cal-layer'+(on?' active-glow':'')+'" style="'+(on?'color:'+c.color+';':'')+'" onclick="toggleCal(\''+c.calendar_id+'\')">';
    h+='<div class="cal-layer-check'+(on?' on':'')+'" style="border-color:'+c.color+';'+(on?'background:'+c.color+';':'')+'"></div>';
    h+='<div class="cal-layer-name">'+c.calendar_name+'</div>';
    if (cnt) h+='<div class="cal-layer-count">'+cnt+'</div>';
    h+='<div class="cal-layer-actions"><button class="cal-layer-btn" onclick="event.stopPropagation();openEditCal(\''+c.calendar_id+'\')">&#9998;</button></div>';
    h+='</div>';
  });
  document.getElementById('calLayerList').innerHTML=h;
  var ml=document.getElementById('mCalLayerList');if(ml)ml.innerHTML=h;
}
function toggleCal(id){if(visibleCalIds.has(id))visibleCalIds.delete(id);else visibleCalIds.add(id);saveVisibleCals();renderCalLayers();render();}

/* VIEW */
function setView(v) {
  currentView=v;
  document.getElementById('monthView').style.display=v==='month'?'flex':'none';
  document.getElementById('weekView').style.display=v==='week'?'flex':'none';
  document.getElementById('dayView').style.display=v==='day'?'flex':'none';
  ['dVM','dVW','dVD','mVM','mVW','mVD'].forEach(function(id){var e=document.getElementById(id);if(e)e.classList.remove('active');});
  var map={month:'M',week:'W',day:'D'};
  var dl=document.getElementById('dV'+map[v]);if(dl)dl.classList.add('active');
  var ml=document.getElementById('mV'+map[v]);if(ml)ml.classList.add('active');
  render();
}
function navPrev(){if(currentView==='month')viewDate.setMonth(viewDate.getMonth()-1);else if(currentView==='week')viewDate.setDate(viewDate.getDate()-7);else viewDate.setDate(viewDate.getDate()-1);miniDate=new Date(viewDate);render();renderMiniCal();}
function navNext(){if(currentView==='month')viewDate.setMonth(viewDate.getMonth()+1);else if(currentView==='week')viewDate.setDate(viewDate.getDate()+7);else viewDate.setDate(viewDate.getDate()+1);miniDate=new Date(viewDate);render();renderMiniCal();}
function goToday(){viewDate=new Date();miniDate=new Date();render();renderMiniCal();}

function render() {
  var title='';
  if (currentView==='month') { title=MONTHS[viewDate.getMonth()]+' '+viewDate.getFullYear(); renderMonth(); }
  else if (currentView==='week') {
    var ws=getWeekStart(viewDate),we=new Date(ws);we.setDate(we.getDate()+6);
    var sm=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    title=sm[ws.getMonth()]+' '+ws.getDate()+' \u2013 '+sm[we.getMonth()]+' '+we.getDate()+', '+we.getFullYear();
    renderWeek();
  } else {
    title=DAYS[viewDate.getDay()]+', '+MONTHS[viewDate.getMonth()]+' '+viewDate.getDate()+', '+viewDate.getFullYear();
    renderDay();
  }
  document.getElementById('schedTitle').textContent=title;
}

function stripHTML(it) {
  var col=getCalColor(it.calendar_id);
  var tip=it.title+(it.start_time?' \u2013 '+it.start_time.substring(0,5):'');
  return '<div class="cal-strip" style="border-left-color:'+col+';background:'+col+'22;color:var(--text-primary);"'
    +' onclick="event.stopPropagation();openEditItem(\''+it.schedule_item_id+'\')" title="'+tip+'">'+it.title+'</div>';
}

function renderMonth() {
  var el=document.getElementById('monthView');
  var y=viewDate.getFullYear(),mo=viewDate.getMonth();
  var first=new Date(y,mo,1),sd=first.getDay(),dim=new Date(y,mo+1,0).getDate(),prev=new Date(y,mo,0).getDate();
  var h='<div class="cal-header">';
  DAYS.forEach(function(d){h+='<div class="cal-header-day">'+d+'</div>';});
  h+='</div><div class="cal-grid">';
  for (var i=0;i<42;i++) {
    var dn,ds,cls='cal-cell';
    if (i<sd) { dn=prev-sd+i+1; ds=dateStr(new Date(y,mo-1,dn)); cls+=' other'; }
    else if (i-sd>=dim) { dn=i-sd-dim+1; ds=dateStr(new Date(y,mo+1,dn)); cls+=' other'; }
    else { dn=i-sd+1; var cd=new Date(y,mo,dn); ds=dateStr(cd); if(isToday(cd))cls+=' today'; }
    var items=getVisibleItems(ds);
    h+='<div class="'+cls+'" onclick="clickDate(\''+ds+'\')">';
    h+='<div class="cal-day-num">'+dn+'</div><div class="cal-events">';
    items.forEach(function(it){h+=stripHTML(it);});
    h+='</div></div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function renderWeek() {
  var el=document.getElementById('weekView'),ws=getWeekStart(viewDate);
  var h='<div class="week-header"><div class="week-header-day"></div>';
  for (var d=0;d<7;d++) {
    var dd=new Date(ws);dd.setDate(dd.getDate()+d);
    h+='<div class="week-header-day'+(isToday(dd)?' today':'')+'"><span class="wh-num">'+dd.getDate()+'</span>'+DAYS[d]+'</div>';
  }
  h+='</div><div class="week-scroll"><div class="week-grid">';
  for (var hr=6;hr<22;hr++) {
    var lb=hr<12?(hr===0?'12a':hr+'a'):(hr===12?'12p':(hr-12)+'p');
    h+='<div class="week-time">'+lb+'</div>';
    for (var d=0;d<7;d++) {
      var dd=new Date(ws);dd.setDate(dd.getDate()+d);var ds=dateStr(dd);
      var items=getVisibleItems(ds).filter(function(it){return it.start_time?parseInt(it.start_time.split(':')[0])===hr:hr===8;});
      h+='<div class="week-cell'+(isToday(dd)?' today-col':'')+'" onclick="clickDate(\''+ds+'\','+hr+')">';
      items.forEach(function(it){
        var col=getCalColor(it.calendar_id);
        h+='<div class="week-ev" style="border-left-color:'+col+';background:'+col+'22;"'
          +' onclick="event.stopPropagation();openEditItem(\''+it.schedule_item_id+'\')">'+it.title+'</div>';
      });
      h+='</div>';
    }
  }
  h+='</div></div>';
  el.innerHTML=h;
}

function renderDay() {
  var el=document.getElementById('dayView'),ds=dateStr(viewDate);
  var h='<div class="day-scroll">';
  for (var hr=6;hr<22;hr++) {
    var lb=hr===0?'12 AM':hr<12?hr+' AM':hr===12?'12 PM':(hr-12)+' PM';
    var items=getVisibleItems(ds).filter(function(it){return it.start_time?parseInt(it.start_time.split(':')[0])===hr:hr===8;});
    h+='<div class="day-hour"><div class="day-hour-label">'+lb+'</div>'
      +'<div class="day-hour-content" onclick="clickDate(\''+ds+'\','+hr+')">';
    items.forEach(function(it){
      var col=getCalColor(it.calendar_id);
      var ts=it.start_time?(it.start_time.substring(0,5)+(it.end_time?' \u2013 '+it.end_time.substring(0,5):'')):'' ;
      h+='<div class="day-ev" style="border-left-color:'+col+';background:'+col+'18;"'
        +' onclick="event.stopPropagation();openEditItem(\''+it.schedule_item_id+'\')">';
      h+='<div class="day-ev-title">'+it.title+'</div>';
      if(ts)h+='<div class="day-ev-meta">'+ts+'</div>';
      var cn=getCalName(it.calendar_id);if(cn)h+='<div class="day-ev-meta">'+cn+'</div>';
      if(it.location)h+='<div class="day-ev-meta">&#128205; '+it.location+'</div>';
      var a=empName(it.assigned_to);if(a)h+='<div class="day-ev-meta">&#128100; '+a+'</div>';
      h+='</div>';
    });
    h+='</div></div>';
  }
  h+='</div>';
  el.innerHTML=h;
}

function clickDate(ds,hr) {
  if (currentView==='month') { viewDate=new Date(ds+'T12:00:00'); setView('day'); }
  else { openEventModal(ds,hr); }
}

/* MODALS - EVENT */
function populateSelects() {
  var cp=document.getElementById('emProject');
  cp.innerHTML='<option value="">-- None --</option>';
  allProjects.forEach(function(p){cp.innerHTML+='<option value="'+p.event_project_id+'">'+p.event_name+'</option>';});
  var ca=document.getElementById('emAssigned');
  ca.innerHTML='<option value="">-- None --</option>';
  allMembers.forEach(function(m){ca.innerHTML+='<option value="'+m.member_id+'">'+ ((m.first_name||'')+' '+(m.last_name||'')).trim()+'</option>';});
  var cc=document.getElementById('emCalendar');
  cc.innerHTML='';
  allCalendars.forEach(function(c){cc.innerHTML+='<option value="'+c.calendar_id+'" style="color:'+c.color+';">'+c.calendar_name+'</option>';});
}
function openEventModal(ds,hr) {
  editingItemId=null;populateSelects();
  document.getElementById('emModalTitle').textContent='Add Event';
  document.getElementById('emTitle').value='';
  document.getElementById('emDate').value=ds||dateStr(viewDate);
  document.getElementById('emStart').value=hr!==undefined?String(hr).padStart(2,'0')+':00':'09:00';
  document.getElementById('emEnd').value=hr!==undefined?String(Math.min(hr+1,23)).padStart(2,'0')+':00':'10:00';
  document.getElementById('emCategory').value='meeting';
  document.getElementById('emCalendar').value=allCalendars.length?allCalendars[0].calendar_id:'';
  document.getElementById('emProject').value='';
  document.getElementById('emAssigned').value='';
  document.getElementById('emLocation').value='';
  document.getElementById('emNotes').value='';
  document.getElementById('emDeleteBtn').style.display='none';
  document.getElementById('eventModal').classList.add('active');
}
function openEditItem(id) {
  var it=allItems.find(function(x){return x.schedule_item_id===id;});if(!it)return;
  editingItemId=id;populateSelects();
  document.getElementById('emModalTitle').textContent='Edit Event';
  document.getElementById('emTitle').value=it.title||'';
  document.getElementById('emDate').value=it.item_date||'';
  document.getElementById('emStart').value=it.start_time?it.start_time.substring(0,5):'';
  document.getElementById('emEnd').value=it.end_time?it.end_time.substring(0,5):'';
  document.getElementById('emCategory').value=it.category||'meeting';
  document.getElementById('emCalendar').value=it.calendar_id||'';
  document.getElementById('emProject').value=it.event_project_id||'';
  document.getElementById('emAssigned').value=it.assigned_to||'';
  document.getElementById('emLocation').value=it.location||'';
  document.getElementById('emNotes').value=it.notes||'';
  document.getElementById('emDeleteBtn').style.display='block';
  document.getElementById('eventModal').classList.add('active');
}
function closeEventModal(){document.getElementById('eventModal').classList.remove('active');}
async function saveScheduleItem() {
  var title=document.getElementById('emTitle').value.trim(),dt=document.getElementById('emDate').value;
  if(!title||!dt){showToast('Title and date required');return;}
  var data={title:title,item_date:dt,category:document.getElementById('emCategory').value,
    calendar_id:document.getElementById('emCalendar').value||null,
    start_time:document.getElementById('emStart').value||null,
    end_time:document.getElementById('emEnd').value||null,
    event_project_id:document.getElementById('emProject').value||null,
    assigned_to:document.getElementById('emAssigned').value||null,
    location:document.getElementById('emLocation').value.trim()||null,
    notes:document.getElementById('emNotes').value.trim()||null};
  if(editingItemId){await sb.from('event_schedule_items').update(data).eq('schedule_item_id',editingItemId);showToast('Updated');}
  else{data.tenant_id=tenantId;data.created_by=userId;await sb.from('event_schedule_items').insert(data);showToast('Added');}
  closeEventModal();await loadItems();renderCalLayers();render();
}
async function deleteScheduleItem() {
  if(!editingItemId||!confirm('Delete this event?'))return;
  await sb.from('event_schedule_items').delete().eq('schedule_item_id',editingItemId);
  closeEventModal();showToast('Deleted');await loadItems();renderCalLayers();render();
}

/* MODALS - CALENDAR */
var pickedColor=PALETTE[0];
function renderColorPicker(sel) {
  var el=document.getElementById('cmColorPicker');el.innerHTML='';
  PALETTE.forEach(function(c){el.innerHTML+='<div class="color-swatch'+(c===sel?' picked':'')+'" style="background:'+c+';" onclick="pickColor(\''+c+'\')"></div>';});
}
function pickColor(c){pickedColor=c;renderColorPicker(c);}
function openCalModal(){
  editingCalId=null;
  document.getElementById('calModalTitle').textContent='New Calendar';
  document.getElementById('cmName').value='';
  pickedColor=PALETTE[Math.floor(Math.random()*PALETTE.length)];
  renderColorPicker(pickedColor);
  document.getElementById('cmDeleteBtn').style.display='none';
  document.getElementById('calModal').classList.add('active');
}
function openEditCal(id){
  var c=allCalendars.find(function(x){return x.calendar_id===id;});if(!c)return;
  editingCalId=id;
  document.getElementById('calModalTitle').textContent='Edit Calendar';
  document.getElementById('cmName').value=c.calendar_name;
  pickedColor=c.color;renderColorPicker(pickedColor);
  document.getElementById('cmDeleteBtn').style.display=c.is_default?'none':'block';
  document.getElementById('calModal').classList.add('active');
}
function closeCalModal(){document.getElementById('calModal').classList.remove('active');}
async function saveCalendar(){
  var name=document.getElementById('cmName').value.trim();if(!name){showToast('Name required');return;}
  if(editingCalId){await sb.from('event_calendars').update({calendar_name:name,color:pickedColor}).eq('calendar_id',editingCalId);showToast('Updated');}
  else{var mx=0;allCalendars.forEach(function(c){if(c.sort_order!=null&&c.sort_order>mx)mx=c.sort_order;});await sb.from('event_calendars').insert({tenant_id:tenantId,calendar_name:name,color:pickedColor,created_by:userId,sort_order:mx+1});showToast('Calendar created');}
  closeCalModal();await loadCalendars();allCalendars.forEach(function(c){visibleCalIds.add(c.calendar_id);});saveVisibleCals();renderCalLayers();populateSelects();render();
}
async function deleteCalendar(){
  if(!editingCalId||!confirm('Delete this calendar?'))return;
  await sb.from('event_schedule_items').update({calendar_id:null}).eq('calendar_id',editingCalId);
  await sb.from('event_calendars').delete().eq('calendar_id',editingCalId);
  closeCalModal();showToast('Deleted');visibleCalIds.delete(editingCalId);saveVisibleCals();
  await loadCalendars();await loadItems();renderCalLayers();render();
}

/* TOUCH/KEY NAV */
var tx=0,ty=0;
document.addEventListener('touchstart',function(e){tx=e.touches[0].clientX;ty=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-tx,dy=e.changedTouches[0].clientY-ty,ax=Math.abs(dx),ay=Math.abs(dy);
  if(ax<40&&ay<40)return;
  if(ax>ay){if(ax>60){if(dx>0)navPrev();else navNext();}}
  else{if(ay>60){if(dy>0)navPrev();else navNext();}}
},{passive:true});
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.key==='ArrowLeft')navPrev();else if(e.key==='ArrowRight')navNext();
});

/* INIT */
async function init() {
  var s=await checkAuth();if(!s)return;
  userId=s.user.id;
  var email=s.user.email||'';
  if (email) {
    var ur=await sb.from('users').select('tenant_id,user_id,display_name,first_name').eq('email',email).single();
    if (ur.data) {
      tenantId=ur.data.tenant_id;userId=ur.data.user_id;
      var biz=ur.data.display_name||ur.data.first_name||email;
      document.getElementById('dBiz').textContent=biz;
      document.getElementById('mBiz').textContent=biz;
    }
  }
  if (!tenantId) {
    var bs=await sb.from('business_settings').select('tenant_id,business_name').limit(1).single();
    if (bs.data) {
      tenantId=bs.data.tenant_id;
      if (bs.data.business_name) { document.getElementById('dBiz').textContent=bs.data.business_name; document.getElementById('mBiz').textContent=bs.data.business_name; }
    }
  }
  if (!tenantId) { showToast('Could not determine tenant'); return; }
  await loadCalendars();
  await loadProjects();
  await loadMembers();
  await loadItems();
  renderMiniCal();
  renderCalLayers();
  populateSelects();
  render();
}
init();
</script>
