<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Tasks — Life Logic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--bg2:#eceef2;--card:#fff;--hover:#f0f1f5;
  --border:#e2e4ea;--text:#18181b;--muted:#6b7280;
  --accent:#4F46E5;--accent2:#4338CA;--accent-bg:rgba(79,70,229,.08);
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--orange:#ea580c;
  --shadow:0 1px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.10);
  --input:#fafafa;--overlay:rgba(0,0,0,.45);
  --r:12px;--r-sm:8px;--r-lg:16px;
}
body.dark{
  --bg:#0f0f10;--bg2:#18181b;--card:#1e1e21;--hover:#26262a;
  --border:#2e2e32;--text:#f4f4f5;--muted:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.12);
  --shadow:0 1px 8px rgba(0,0,0,.3);--shadow-md:0 4px 20px rgba(0,0,0,.4);
  --input:#18181b;--overlay:rgba(0,0,0,.7);
}
html{background:var(--bg);}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px;}

/* DESKTOP HEADER */
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.dh-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:.15s;}
.icon-btn:hover{color:var(--text);background:var(--hover);}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.text-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:4px 8px;border-radius:6px;}
.text-btn:hover{color:var(--text);background:var(--hover);}
.dh-nav{display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;border-top:1px solid var(--border);}
.dh-links{display:flex;gap:2px;}
.nav-link{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;
  font-weight:500;color:var(--muted);text-decoration:none;border-radius:var(--r-sm);transition:.15s;}
.nav-link svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.nav-link:hover{color:var(--text);background:var(--hover);}
.nav-link.active{color:var(--accent);font-weight:700;}
.dh-right{display:flex;gap:8px;padding:6px 0;}
.btn-primary{padding:7px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--accent2);}

/* MOBILE HEADER */
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.mh-title{font-size:17px;font-weight:800;}
.mh-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.mh-actions{display:flex;gap:8px;}

/* MOBILE BOTTOM NAV */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 8px max(20px,env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.mn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;
  border-radius:10px;text-decoration:none;color:var(--muted);
  font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s;}
.mn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.mn-btn.active{color:var(--accent);}
.fab{position:fixed;bottom:88px;right:18px;z-index:300;width:50px;height:50px;
  background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.45);display:none;
  align-items:center;justify-content:center;transition:.2s;}
.fab:hover{background:var(--accent2);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* PAGE */
.page{max-width:960px;margin:0 auto;padding:20px 24px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px;}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:72px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:10px;margin-top:20px;}
.btn-lg{flex:1;padding:12px;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-sub{background:var(--accent);color:#fff;}
.btn-sub:hover{background:var(--accent2);}
.btn-can{background:var(--hover);color:var(--text);border:1px solid var(--border);}
.btn-can:hover{background:var(--bg2);}
.btn-del{padding:11px 16px;background:rgba(220,38,38,.08);color:var(--red);
  border:1.5px solid rgba(220,38,38,.18);border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;}

/* MODAL */
.mw{display:none;position:fixed;inset:0;background:var(--overlay);z-index:500;
  align-items:flex-end;justify-content:center;}
.mw.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;
  padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:560px){.modal{border-radius:var(--r-lg);margin-bottom:24px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#18181b;color:#fff;padding:10px 20px;border-radius:40px;
  font-size:13px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.dark #toast{background:#f4f4f5;color:#18181b;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;}
.b-urgent{background:rgba(220,38,38,.1);color:var(--red);}
.b-high{background:rgba(234,88,12,.1);color:var(--orange);}
.b-medium{background:rgba(79,70,229,.1);color:var(--accent);}
.b-low{background:var(--bg2);color:var(--muted);}
.b-done{background:rgba(22,163,74,.1);color:var(--green);}
.b-prog{background:rgba(79,70,229,.1);color:var(--accent);}

/* ICON / COLOR PICKERS (used in category modals) */
.icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
.ip-opt{width:40px;height:40px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s;color:var(--muted);}
.ip-opt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ip-opt:hover{border-color:var(--accent);color:var(--accent);}
.ip-opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.cp-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:.15s;}
.cp-opt.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state svg{width:44px;height:44px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-title svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}

/* DATE CHIPS */
.date-chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.dc{padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;}
.dc:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .dh{display:none;}
  .mh,.mn{display:block;}
  .fab{display:flex;}
  .page{padding:12px;}
  .fr{grid-template-columns:1fr;}
}
@media(min-width:769px){.mh,.mn,.fab{display:none!important;}}


.demo-bar{background:linear-gradient(135deg,#1e1b4b,#312e81);
  border-bottom:1px solid rgba(255,255,255,.08);padding:8px 24px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.demo-bar-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.demo-personas{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.persona-group{display:flex;align-items:center;}
.persona-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:20px 0 0 20px;border:1.5px solid rgba(255,255,255,.2);
  border-right:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);
  font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.persona-btn:hover{background:rgba(255,255,255,.15);}
.persona-btn.active{background:rgba(255,255,255,.22);color:#fff;
  border-color:rgba(255,255,255,.4);}
.persona-avatar{width:20px;height:20px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:800;
  color:#fff;flex-shrink:0;}
.persona-del-btn{padding:6px 10px;border-radius:0 20px 20px 0;
  border:1.5px solid rgba(220,38,38,.5);background:rgba(220,38,38,.15);
  color:#fca5a5;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;}
.persona-del-btn:hover{background:rgba(220,38,38,.4);color:#fff;
  border-color:rgba(220,38,38,.8);}
.demo-bar-right{display:flex;align-items:center;gap:8px;}
.demo-back-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:20px;border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);
  font-size:12px;font-weight:700;cursor:pointer;transition:.2s;
  text-decoration:none;}
.demo-back-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
@media(max-width:768px){.demo-bar{padding:8px 12px;}}


.toolbar{display:flex;gap:8px;align-items:center;margin-bottom:16px;flex-wrap:wrap;}
.srch-wrap{flex:1;min-width:160px;position:relative;}
.srch-wrap svg{position:absolute;left:10px;top:50%;transform:translateY(-50%);
  width:15px;height:15px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;}
.srch{width:100%;padding:9px 12px 9px 34px;border:1.5px solid var(--border);
  border-radius:var(--r-sm);background:var(--input);color:var(--text);font-size:14px;outline:none;}
.srch:focus{border-color:var(--accent);}
.tbar-sel{padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:13px;outline:none;cursor:pointer;}
.chip{padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;
  display:flex;align-items:center;gap:5px;white-space:nowrap;}
.chip svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.chip.on{border-color:var(--red);color:var(--red);background:rgba(220,38,38,.06);}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;padding:14px 0 6px;}
.acc{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;margin-bottom:10px;box-shadow:var(--shadow);}
.acc-head{display:flex;align-items:center;gap:12px;padding:13px 16px;cursor:pointer;
  user-select:none;transition:.15s;}
.acc-head:hover{background:var(--hover);}
.acc-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;}
.acc-ico svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.acc-info{flex:1;min-width:0;}
.acc-name{font-size:14px;font-weight:700;}
.acc-meta{font-size:11px;color:var(--muted);}
.acc-right{display:flex;align-items:center;gap:8px;}
.acc-prog{width:48px;height:4px;background:var(--bg2);border-radius:4px;overflow:hidden;}
.acc-prog-fill{height:100%;border-radius:4px;}
.acc-chev{transition:transform .2s;flex-shrink:0;}
.acc-chev.open{transform:rotate(180deg);}
.acc-body{border-top:1px solid var(--border);}
.trow{display:flex;align-items:flex-start;padding:10px 16px;transition:.15s;
  border-bottom:1px solid var(--border);cursor:pointer;border-left:3px solid transparent;}
.trow:last-of-type{border-bottom:none;}
.trow:hover{background:var(--hover);}
.trow.t-done .t-title{text-decoration:line-through;color:var(--muted);}
.trow.p-urgent{border-left-color:var(--red);}
.trow.p-high{border-left-color:var(--orange);}
.trow.p-medium{border-left-color:var(--accent);}
.trow.p-low{border-left-color:var(--border);}
.t-check{width:20px;height:20px;border-radius:5px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
  margin-top:1px;cursor:pointer;transition:.15s;margin-right:10px;}
.t-check.done{background:var(--green);border-color:var(--green);}
.t-check.done svg{display:block;}
.t-check svg{display:none;width:11px;height:11px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;}
.t-body{flex:1;min-width:0;}
.t-title{font-size:14px;font-weight:500;margin-bottom:2px;}
.t-notes{font-size:11px;color:var(--muted);margin-bottom:3px;
  display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden;}
.t-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.t-due{font-size:11px;font-weight:600;}
.t-due.over{color:var(--red);}
.t-due.tod{color:var(--amber);}
.t-due.norm{color:var(--muted);}
.t-edit-btn{width:28px;height:28px;border-radius:6px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;opacity:0;transition:.15s;}
.t-edit-btn svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.trow:hover .t-edit-btn{opacity:1;}
.subs{padding:0 16px 8px 49px;background:var(--bg);border-bottom:1px solid var(--border);}
.sub-row{display:flex;align-items:center;gap:8px;padding:5px 0;border-bottom:1px solid var(--border);}
.sub-row:last-child{border-bottom:none;}
.sub-chk{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;}
.sub-chk.done{background:var(--green);border-color:var(--green);}
.sub-chk.done svg{display:block;}
.sub-chk svg{display:none;width:9px;height:9px;fill:none;stroke:#fff;stroke-width:3;stroke-linecap:round;}
.sub-title{font-size:13px;flex:1;cursor:pointer;}
.sub-title.done{text-decoration:line-through;color:var(--muted);}
.sub-add{display:flex;gap:6px;padding:6px 0;}
.sub-add input{flex:1;padding:6px 10px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:13px;outline:none;}
.sub-add input:focus{border-color:var(--accent);}
.sub-add-btn{padding:6px 12px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:12px;font-weight:700;cursor:pointer;}
.qa-row{padding:10px 16px;border-top:1px solid var(--border);display:flex;gap:8px;cursor:default;}
.qa-row:hover{background:transparent;}
.qa-in{flex:1;padding:8px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:14px;outline:none;}
.qa-in:focus{border-color:var(--accent);}
.qa-btn{padding:8px 14px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:13px;font-weight:700;cursor:pointer;}
.sub-tog{width:22px;height:22px;border-radius:5px;border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-left:4px;}
@media(max-width:768px){.t-edit-btn{opacity:1;}}

</style>
</head>
<body>
<div class="dh">
  <div class="dh-top">
    <div class="brand">
      <div class="brand-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <div><div class="brand-name">Tasks</div><div class="brand-sub">Life Logic</div></div>
    </div>
    <div class="dh-actions">
      <button class="icon-btn" onclick="toggleDark()">
        <span data-moon style="display:flex"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span>
        <span data-sun style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></span>
      </button>
      <button class="text-btn" onclick="doLogout()">Sign out</button>

function toast(m,dur){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},dur||2400);}

// ── Auth ──
async function checkAuth(){
  var r=await sb.auth.getSession(),s=r.data.session;
  if(!s){
    var at=localStorage.getItem('sb_at'),rt=localStorage.getItem('sb_rt');
    if(at&&rt){var sr=await sb.auth.setSession({access_token:at,refresh_token:rt});s=sr.data&&sr.data.session;}
    if(!s){location.replace('life-login.html');return null;}
  }
  localStorage.setItem('sb_at',s.access_token);
  localStorage.setItem('sb_rt',s.refresh_token);
  return s;
}
async function doLogout(){
  await sb.auth.signOut();
  ['sb_at','sb_rt'].forEach(function(k){localStorage.removeItem(k);});
  location.replace('life-login.html');
}

// ── Helpers ──
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'';var dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDateFull(d){if(!d)return'';var dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function isOverdue(due,status){return status!=='done'&&due&&due<todayStr();}
function isToday(due){return due===todayStr();}
function addDays(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}

// ── Cat icon/color picker helpers ──
function buildIconPicker(pid,selIcon){
  var h='';CAT_ICONS.forEach(function(n){
    h+='<div class="ip-opt'+(n===selIcon?' sel':'')+'" data-icon="'+n+'" onclick="pickIcon(this,this.dataset.icon)">'+icon(n,18)+'</div>';
  });document.getElementById(pid).innerHTML=h;
}
function buildColorPicker(pid,selColor){
  var h='';CAT_COLORS.forEach(function(c){
    h+='<div class="cp-opt'+(c===selColor?' sel':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this,this.dataset.color)"></div>';
  });document.getElementById(pid).innerHTML=h;
}
function pickIcon(el,n){document.querySelectorAll('.ip-opt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');_selIcon=n;}
function pickColor(el,c){document.querySelectorAll('.cp-opt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');_selColor=c;}
var _selIcon='clipboard',_selColor='#4F46E5';


var PERSONA_INFO={
  bobby:  {name:'Bobby',   initials:'B',  color:'#2563EB'},
  brenda: {name:'Brenda',  initials:'Br', color:'#DB2777'},
  bigmatt:{name:'Big Matt',initials:'BM', color:'#374151'}
};
function getActivePid(){
  var p=localStorage.getItem('ll_active_persona');
  return(p&&!localStorage.getItem('ll_demo_deleted_'+p))?p:null;
}
function getActiveCatIds(){
  var p=getActivePid();if(!p)return null;
  var raw=localStorage.getItem('ll_demo_ids_'+p);if(!raw)return null;
  var ids=JSON.parse(raw);return(ids.cats&&ids.cats.length)?ids.cats:null;
}
function filterByCat(arr){
  var cats=getActiveCatIds();
  return cats?arr.filter(function(x){return cats.indexOf(x.category_id)>=0;}):arr;
}
function filterCats(arr){
  var cats=getActiveCatIds();
  return cats?arr.filter(function(x){return cats.indexOf(x.id)>=0;}):arr;
}
function renderDemoBar(onRefresh){
  var active=['bobby','brenda','bigmatt'].filter(function(p){
    return !localStorage.getItem('ll_demo_deleted_'+p);
  });
  var bar=document.getElementById('demoBar');if(!bar)return;
  bar.style.display=active.length?'flex':'none';
  if(!active.length)return;
  var pid=getActivePid(),h='';
  active.forEach(function(p){
    var P=PERSONA_INFO[p],isAct=pid===p;
    h+='<div class="persona-group">';
    h+='<button class="persona-btn'+(isAct?' active':'')+'" data-pid="'+p+'">';
    h+='<div class="persona-avatar" style="background:'+P.color+'">'+P.initials+'</div>'+P.name;
    h+='</button>';
    h+='<button class="persona-del-btn" data-pid="'+p+'">&#215; Delete</button>';
    h+='</div>';
  });
  document.getElementById('demoPersonas').innerHTML=h;
  document.querySelectorAll('.persona-btn[data-pid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      localStorage.setItem('ll_active_persona',this.dataset.pid);
      renderDemoBar(onRefresh);if(onRefresh)onRefresh();
    });
  });
  document.querySelectorAll('.persona-del-btn[data-pid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var p=this.dataset.pid;
      if(!confirm('Permanently delete '+PERSONA_INFO[p].name+"'s demo data?"))return;
      deletePersona(p,onRefresh);
    });
  });
}
async function deletePersona(pid,onRefresh){
  var raw=localStorage.getItem('ll_demo_ids_'+pid);
  if(raw){
    var ids=JSON.parse(raw),catIds=ids.cats||[];
    if(catIds.length){
      await sb.from('life_goals').delete().in('category_id',catIds);
      await sb.from('life_tasks').delete().in('category_id',catIds);
      await sb.from('life_categories').delete().in('id',catIds);
    }
    if(ids.goals&&ids.goals.length)await sb.from('life_goals').delete().in('id',ids.goals);
    if(ids.tasks&&ids.tasks.length)await sb.from('life_tasks').delete().in('id',ids.tasks);
  }
  localStorage.setItem('ll_demo_deleted_'+pid,'1');
  localStorage.removeItem('ll_demo_ids_'+pid);
  localStorage.removeItem('ll_demo_seeded_'+pid);
  if(localStorage.getItem('ll_active_persona')===pid){
    var nxt=['bobby','brenda','bigmatt'].find(function(p){
      return p!==pid&&!localStorage.getItem('ll_demo_deleted_'+p);
    });
    if(nxt)localStorage.setItem('ll_active_persona',nxt);
    else localStorage.removeItem('ll_active_persona');
  }
  toast('Demo data removed');
  renderDemoBar(onRefresh);if(onRefresh)onRefresh();
}

var _cats=[],_tasks=[],_editTask=null,_overdueOn=false,_openAcc={},_openSub={};
var _urlCat=new URLSearchParams(location.search).get('cat');
var SEC={life:'Life',work:'Work',personal:'Personal',hobbies:'Hobbies',goals:'Goals & Dreams'};

function buildIconPicker(pid,selIcon){
  var h='';CAT_ICONS.forEach(function(n){
    h+='<div class="ip-opt'+(n===selIcon?' sel':'')+'" data-icon="'+n+'" onclick="pickIcon(this,this.dataset.icon)">'+icon(n,18)+'</div>';
  });document.getElementById(pid).innerHTML=h;
}
function buildColorPicker(pid,selColor){
  var h='';CAT_COLORS.forEach(function(c){
    h+='<div class="cp-opt'+(c===selColor?' sel':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this,this.dataset.color)"></div>';
  });document.getElementById(pid).innerHTML=h;
}

async function init(){
  var s=await checkAuth();if(!s)return;userId=s.user.id;
  var cr=await sb.from('life_categories').select('*').eq('user_id',userId).eq('is_active',true).order('section').order('sort_order');
  _cats=cr.data||[];
  var tr=await sb.from('life_tasks').select('*').eq('user_id',userId).eq('is_active',true).order('sort_order').order('created_at');
  _tasks=tr.data||[];
  renderDemoBar(function(){populateCatFilter();renderAll();});
  populateCatFilter();renderAll();
}

function populateCatFilter(){
  var dispCats=filterCats(_cats);
  var sel=document.getElementById('fCat');
  sel.innerHTML='<option value="">All categories</option>'+dispCats.map(function(c){
    return '<option value="'+c.id+'">'+esc(c.name)+'</option>';
  }).join('');
  if(_urlCat)sel.value=_urlCat;
}

function getFiltered(){
  var q=(document.getElementById('srchQ').value||'').toLowerCase();
  var catF=document.getElementById('fCat').value||_urlCat;
  var st=document.getElementById('fStatus').value;
  var td=todayStr();
  var dispCats=filterCats(_cats).map(function(c){return c.id;});
  return _tasks.filter(function(t){
    if(!dispCats.length||dispCats.indexOf(t.category_id)>=0){}else return false;
    if(!t.parent_id===false)return false;
    if(q&&!t.title.toLowerCase().includes(q))return false;
    if(catF&&t.category_id!==catF)return false;
    if(st==='active'&&t.status==='done')return false;
    if(st==='done'&&t.status!=='done')return false;
    if(_overdueOn&&!(t.status!=='done'&&t.due_date&&t.due_date<td))return false;
    return true;
  }).filter(function(t){return!t.parent_id;});
}

function toggleOverdue(btn){_overdueOn=!_overdueOn;btn.classList.toggle('on',_overdueOn);renderAll();}

function renderAll(){
  var tasks=getFiltered();
  var catF=document.getElementById('fCat').value||_urlCat;
  var dispCats=filterCats(_cats);
  var cats=catF?dispCats.filter(function(c){return c.id===catF;}):dispCats;
  var td=todayStr(),html='',lastSec='';
  cats.forEach(function(cat){
    var catTasks=tasks.filter(function(t){return t.category_id===cat.id;});
    var allCatT=_tasks.filter(function(t){return t.category_id===cat.id&&!t.parent_id;});
    var done=allCatT.filter(function(t){return t.status==='done';});
    var over=allCatT.filter(function(t){return t.status!=='done'&&t.due_date&&t.due_date<td;});
    var pct=allCatT.length?Math.round(done.length/allCatT.length*100):0;
    var isOpen=_openAcc[cat.id]!==false;
    if(!catF&&cat.section!==lastSec){html+='<div class="sec-label">'+esc(SEC[cat.section]||cat.section)+'</div>';lastSec=cat.section;}
    var cid=cat.id;
    html+='<div class="acc">'+
      '<div class="acc-head" data-cid="'+cid+'" onclick="toggleAcc(this.dataset.cid)">'+
        '<div class="acc-ico" style="background:'+(cat.color||'#4F46E5')+'">'+icon(cat.icon||'clipboard',18)+'</div>'+
        '<div class="acc-info"><div class="acc-name">'+esc(cat.name)+'</div>'+
        '<div class="acc-meta">'+allCatT.length+' tasks &middot; '+pct+'% done</div></div>'+
        '<div class="acc-right">'+
          (over.length?'<span class="badge b-urgent">'+over.length+' overdue</span>':'')+
          '<span class="badge b-done">'+done.length+'</span>'+
          '<div class="acc-prog"><div class="acc-prog-fill" style="width:'+pct+'%;background:'+(cat.color||'#4F46E5')+'"></div></div>'+
          '<div class="acc-chev'+(isOpen?' open':'')+'">'+icon('chevron_d',16)+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="acc-body" id="acc-'+cid+'" style="display:'+(isOpen?'block':'none')+'">'+
        '<div>'+catTasks.map(function(t){return renderRow(t,cid);}).join('')+'</div>'+
        '<div class="qa-row">'+
          '<input class="qa-in" placeholder="+ Quick add task…" id="qa-'+cid+'" data-cid="'+cid+'" onkeydown="if(event.keyCode===13)quickAdd(this.dataset.cid)">'+
          '<button class="qa-btn" data-cid="'+cid+'" onclick="quickAdd(this.dataset.cid)">Add</button>'+
        '</div>'+
      '</div>'+
    '</div>';
  });
  if(!html)html='<div class="empty-state">'+icon('check_sq',44)+'<h3>All clear!</h3><p>No tasks match your filters.</p></div>';
  document.getElementById('taskContent').innerHTML=html;
}

function renderRow(t,catId){
  var subs=_tasks.filter(function(s){return s.parent_id===t.id;});
  var td=todayStr(),over=isOverdue(t.due_date,t.status),tod2=isToday(t.due_date);
  var dueLabel=t.due_date?(over?'Overdue · ':tod2?'Today · ':'')+fmtDate(t.due_date):'';
  var dueClass=over?'over':tod2?'tod':'norm';
  var showSub=_openSub[t.id];
  var tid=t.id,pri=t.priority||'medium';
  var h='<div class="trow p-'+pri+(t.status==='done'?' t-done':'')+'">'+
    '<div class="t-check'+(t.status==='done'?' done':'')+'" data-id="'+tid+'" data-st="'+t.status+'" onclick="toggleTask(event,this.dataset.id,this.dataset.st)">'+
      '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
    '<div class="t-body" data-id="'+tid+'" onclick="openTaskModal(this.dataset.id)">'+
      '<div class="t-title">'+esc(t.title)+'</div>'+
      (t.notes?'<div class="t-notes">'+esc(t.notes)+'</div>':'')+
      '<div class="t-meta">'+
        '<span class="badge b-'+pri+'">'+pri+'</span>'+
        (dueLabel?'<span class="t-due '+dueClass+'">'+esc(dueLabel)+'</span>':'')+
        (subs.length?'<span style="font-size:11px;color:var(--muted);">'+subs.length+' subtask'+(subs.length!==1?'s':'')+'</span>':'')+
      '</div>'+
    '</div>'+
    (subs.length?'<button class="sub-tog" data-id="'+tid+'" onclick="toggleSub(this.dataset.id)">'+(showSub?'▲':'▼')+'</button>':'')+
    '<button class="t-edit-btn" data-id="'+tid+'" onclick="openTaskModal(this.dataset.id)">'+icon('edit',13)+'</button>'+
  '</div>';
  if(showSub&&subs.length){
    h+='<div class="subs">'+
      subs.map(function(s){
        return '<div class="sub-row">'+
          '<div class="sub-chk'+(s.status==='done'?' done':'')+'" data-id="'+s.id+'" data-st="'+s.status+'" onclick="toggleTask(event,this.dataset.id,this.dataset.st)"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg></div>'+
          '<span class="sub-title'+(s.status==='done'?' done':'')+'" data-id="'+s.id+'" onclick="openTaskModal(this.dataset.id)">'+esc(s.title)+'</span>'+
        '</div>';
      }).join('')+
      '<div class="sub-add"><input type="text" id="sub-'+tid+'" data-pid="'+tid+'" data-cid="'+catId+'" placeholder="+ Add subtask…" onkeydown="if(event.keyCode===13)addSub(this.dataset.pid,this.dataset.cid)"><button class="sub-add-btn" data-pid="'+tid+'" data-cid="'+catId+'" onclick="addSub(this.dataset.pid,this.dataset.cid)">+</button></div>'+
    '</div>';
  }
  return h;
}

function toggleAcc(id){_openAcc[id]=_openAcc[id]===false;renderAll();}
function toggleSub(id){_openSub[id]=!_openSub[id];renderAll();}

async function toggleTask(e,id,cur){
  e.stopPropagation();
  var ns=cur==='done'?'todo':'done';
  var u={status:ns,completed_at:ns==='done'?new Date().toISOString():null};
  await sb.from('life_tasks').update(u).eq('id',id);
  var t=_tasks.find(function(x){return x.id===id;});
  if(t){t.status=ns;t.completed_at=u.completed_at;}
  renderAll();toast(ns==='done'?'Done! ✓':'Marked to-do');
}

async function quickAdd(cid){
  var inp=document.getElementById('qa-'+cid);if(!inp)return;
  var title=inp.value.trim();if(!title)return;
  var r=await sb.from('life_tasks').insert({title:title,category_id:cid,user_id:userId,status:'todo',priority:'medium',is_active:true}).select().single();
  if(!r.error){_tasks.push(r.data);inp.value='';renderAll();toast('Task added!');}
}
async function addSub(pid,cid){
  var inp=document.getElementById('sub-'+pid);if(!inp)return;
  var title=inp.value.trim();if(!title)return;
  var r=await sb.from('life_tasks').insert({title:title,parent_id:pid,category_id:cid,user_id:userId,status:'todo',priority:'medium',is_active:true}).select().single();
  if(!r.error){_tasks.push(r.data);_openSub[pid]=true;inp.value='';renderAll();toast('Subtask added!');}
}

function openTaskModal(id){
  _editTask=id||null;
  document.getElementById('tmTitle').textContent=id?'Edit Task':'New Task';
  document.getElementById('tmDel').style.display=id?'block':'none';
  document.getElementById('tmT').value='';document.getElementById('tmN').value='';
  document.getElementById('tmDue').value='';document.getElementById('tmPri').value='medium';
  document.getElementById('tmSt').value='todo';document.getElementById('tmPar').value='';
  var cs=document.getElementById('tmCat');
  cs.innerHTML='<option value="">Select…</option>'+_cats.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
  document.getElementById('tmPar').innerHTML='<option value="">None — top level</option>'+
    _tasks.filter(function(t){return!t.parent_id&&t.status!=='done';}).map(function(t){return '<option value="'+t.id+'">'+esc(t.title)+'</option>';}).join('');
  var cf=document.getElementById('fCat').value||_urlCat;if(cf)cs.value=cf;
  if(id){
    var t=_tasks.find(function(x){return x.id===id;});
    if(t){
      document.getElementById('tmT').value=t.title||'';
      document.getElementById('tmN').value=t.notes||'';
      document.getElementById('tmDue').value=t.due_date||'';
      document.getElementById('tmCat').value=t.category_id||'';
      document.getElementById('tmPri').value=t.priority||'medium';
      document.getElementById('tmSt').value=t.status||'todo';
      document.getElementById('tmPar').value=t.parent_id||'';
    }
  }
  document.getElementById('taskModal').classList.add('open');
}
function closeTaskModal(){document.getElementById('taskModal').classList.remove('open');}

async function saveTask(){
  var title=document.getElementById('tmT').value.trim();if(!title){toast('Title required');return;}
  var cid=document.getElementById('tmCat').value;if(!cid){toast('Select a category');return;}
  var d={title:title,notes:document.getElementById('tmN').value.trim()||null,
    category_id:cid,priority:document.getElementById('tmPri').value,
    status:document.getElementById('tmSt').value,
    due_date:document.getElementById('tmDue').value||null,
    parent_id:document.getElementById('tmPar').value||null,
    user_id:userId,is_active:true};
  if(d.status==='done'&&!_editTask)d.completed_at=new Date().toISOString();
  var r;
  if(_editTask){r=await sb.from('life_tasks').update(d).eq('id',_editTask).select().single();if(!r.error){var i=_tasks.findIndex(function(t){return t.id===_editTask;});if(i>=0)_tasks[i]=r.data;}}
  else{r=await sb.from('life_tasks').insert(d).select().single();if(!r.error)_tasks.push(r.data);}
  if(r.error){toast('Error: '+r.error.message);return;}
  toast(_editTask?'Task updated!':'Task added!');closeTaskModal();renderAll();
}
async function deleteTask(){
  if(!_editTask||!confirm('Delete this task?'))return;
  await sb.from('life_tasks').update({is_active:false}).eq('id',_editTask);
  _tasks=_tasks.filter(function(t){return t.id!==_editTask&&t.parent_id!==_editTask;});
  closeTaskModal();renderAll();toast('Deleted');
}
init();
</script>
