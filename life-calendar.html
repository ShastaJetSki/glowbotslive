<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Calendar — Life Logic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--bg2:#eceef2;--card:#fff;--hover:#f0f1f5;
  --border:#e2e4ea;--text:#18181b;--muted:#6b7280;
  --accent:#4F46E5;--accent2:#4338CA;--accent-bg:rgba(79,70,229,.08);
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--orange:#ea580c;
  --shadow:0 1px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.10);
  --input:#fafafa;--overlay:rgba(0,0,0,.45);
  --r:12px;--r-sm:8px;--r-lg:16px;
}
body.dark{
  --bg:#0f0f10;--bg2:#18181b;--card:#1e1e21;--hover:#26262a;
  --border:#2e2e32;--text:#f4f4f5;--muted:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.12);
  --shadow:0 1px 8px rgba(0,0,0,.3);--shadow-md:0 4px 20px rgba(0,0,0,.4);
  --input:#18181b;--overlay:rgba(0,0,0,.7);
}
html{background:var(--bg);}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px;}

/* DESKTOP HEADER */
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.dh-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:.15s;}
.icon-btn:hover{color:var(--text);background:var(--hover);}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.text-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:4px 8px;border-radius:6px;}
.text-btn:hover{color:var(--text);background:var(--hover);}
.dh-nav{display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;border-top:1px solid var(--border);}
.dh-links{display:flex;gap:2px;}
.nav-link{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;
  font-weight:500;color:var(--muted);text-decoration:none;border-radius:var(--r-sm);transition:.15s;}
.nav-link svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.nav-link:hover{color:var(--text);background:var(--hover);}
.nav-link.active{color:var(--accent);font-weight:700;}
.dh-right{display:flex;gap:8px;padding:6px 0;}
.btn-primary{padding:7px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--accent2);}

/* MOBILE HEADER */
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.mh-title{font-size:17px;font-weight:800;}
.mh-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.mh-actions{display:flex;gap:8px;}

/* MOBILE BOTTOM NAV */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 8px max(20px,env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.mn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;
  border-radius:10px;text-decoration:none;color:var(--muted);
  font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s;}
.mn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.mn-btn.active{color:var(--accent);}
.fab{position:fixed;bottom:88px;right:18px;z-index:300;width:50px;height:50px;
  background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.45);display:none;
  align-items:center;justify-content:center;transition:.2s;}
.fab:hover{background:var(--accent2);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* PAGE */
.page{max-width:960px;margin:0 auto;padding:20px 24px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px;}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:72px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:10px;margin-top:20px;}
.btn-lg{flex:1;padding:12px;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-sub{background:var(--accent);color:#fff;}
.btn-sub:hover{background:var(--accent2);}
.btn-can{background:var(--hover);color:var(--text);border:1px solid var(--border);}
.btn-can:hover{background:var(--bg2);}
.btn-del{padding:11px 16px;background:rgba(220,38,38,.08);color:var(--red);
  border:1.5px solid rgba(220,38,38,.18);border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;}

/* MODAL */
.mw{display:none;position:fixed;inset:0;background:var(--overlay);z-index:500;
  align-items:flex-end;justify-content:center;}
.mw.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;
  padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:560px){.modal{border-radius:var(--r-lg);margin-bottom:24px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#18181b;color:#fff;padding:10px 20px;border-radius:40px;
  font-size:13px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.dark #toast{background:#f4f4f5;color:#18181b;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;}
.b-urgent{background:rgba(220,38,38,.1);color:var(--red);}
.b-high{background:rgba(234,88,12,.1);color:var(--orange);}
.b-medium{background:rgba(79,70,229,.1);color:var(--accent);}
.b-low{background:var(--bg2);color:var(--muted);}
.b-done{background:rgba(22,163,74,.1);color:var(--green);}
.b-prog{background:rgba(79,70,229,.1);color:var(--accent);}

/* ICON / COLOR PICKERS (used in category modals) */
.icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
.ip-opt{width:40px;height:40px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s;color:var(--muted);}
.ip-opt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ip-opt:hover{border-color:var(--accent);color:var(--accent);}
.ip-opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.cp-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:.15s;}
.cp-opt.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state svg{width:44px;height:44px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-title svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}

/* DATE CHIPS */
.date-chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.dc{padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;}
.dc:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .dh{display:none;}
  .mh,.mn{display:block;}
  .fab{display:flex;}
  .page{padding:12px;}
  .fr{grid-template-columns:1fr;}
}
@media(min-width:769px){.mh,.mn,.fab{display:none!important;}}


body{padding-bottom:0;}
.cal-shell{display:flex;flex-direction:column;height:calc(100vh - 97px);overflow:hidden;}
.cal-bar{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;
  border-bottom:1px solid var(--border);background:var(--bg);flex-wrap:wrap;gap:8px;flex-shrink:0;}
.cal-nav{display:flex;align-items:center;gap:8px;}
.cal-nav-btn{width:30px;height:30px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  background:var(--card);color:var(--text);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.cal-nav-btn svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.cal-nav-btn:hover{background:var(--hover);}
.cal-title{font-size:16px;font-weight:800;min-width:160px;text-align:center;}
.cal-today-btn{padding:6px 14px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--card);color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;}
.view-switch{display:flex;border:1.5px solid var(--border);border-radius:var(--r-sm);overflow:hidden;}
.view-btn{padding:6px 14px;font-size:13px;font-weight:600;color:var(--muted);
  background:var(--card);border:none;cursor:pointer;transition:.15s;}
.view-btn.active{background:var(--accent);color:#fff;}
.cal-body{flex:1;display:flex;overflow:hidden;}
.cal-sidebar{width:220px;flex-shrink:0;border-right:1px solid var(--border);
  overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:14px;}
.cal-main{flex:1;overflow:auto;padding:12px;}
.day-panel{width:230px;flex-shrink:0;border-left:1px solid var(--border);overflow-y:auto;padding:14px;}
.mini-head{font-size:12px;font-weight:700;display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}
.mini-nav{width:20px;height:20px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:11px;}
.mini-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;text-align:center;}
.mini-dow{font-size:9px;font-weight:700;color:var(--muted);padding:2px 0;text-transform:uppercase;}
.mini-cell{font-size:11px;width:24px;height:24px;border-radius:5px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;margin:0 auto;position:relative;}
.mini-cell:hover{background:var(--hover);}
.mini-cell.today{background:var(--accent);color:#fff;font-weight:700;}
.mini-cell.sel{outline:2px solid var(--accent);}
.mini-cell.has::after{content:'';width:4px;height:4px;border-radius:50%;background:var(--accent);
  position:absolute;bottom:1px;left:50%;transform:translateX(-50%);}
.mini-cell.other{color:var(--border);}
.leg-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:var(--r-sm);cursor:pointer;}
.leg-item:hover{background:var(--hover);}
.leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.leg-name{font-size:12px;font-weight:600;flex:1;}
.leg-cnt{font-size:11px;color:var(--muted);}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.month-dow{background:var(--bg2);padding:7px;text-align:center;font-size:10px;
  font-weight:700;color:var(--muted);text-transform:uppercase;}
.month-cell{background:var(--card);min-height:88px;padding:6px;cursor:pointer;transition:.1s;position:relative;}
.month-cell:hover{background:var(--hover);}
.month-cell.other{background:var(--bg2);opacity:.55;}
.month-cell.today-c{background:rgba(79,70,229,.04);}
.cell-num{font-size:12px;font-weight:700;width:22px;height:22px;display:flex;align-items:center;
  justify-content:center;margin-bottom:4px;border-radius:50%;}
.today-c .cell-num{background:var(--accent);color:#fff;}
.cell-evt{font-size:10px;padding:2px 5px;border-radius:4px;color:#fff;font-weight:600;
  margin-bottom:2px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;}
.cell-more{font-size:10px;color:var(--muted);font-weight:700;}
.week-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;}
.week-col{background:var(--card);border:1.5px solid var(--border);border-radius:var(--r);
  padding:10px;cursor:pointer;min-height:120px;}
.week-col.today-c{border-color:var(--accent);}
.week-col:hover{background:var(--hover);}
.week-dow{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;margin-bottom:4px;}
.week-num{font-size:18px;font-weight:800;margin-bottom:8px;}
.today-c .week-num{color:var(--accent);}
.dp-title{font-size:14px;font-weight:800;margin-bottom:12px;}
.dp-item{background:var(--card);border:1px solid var(--border);border-radius:var(--r-sm);
  padding:10px 12px;margin-bottom:6px;border-left:3px solid var(--accent);}
.dp-item-title{font-size:13px;font-weight:600;}
.dp-item-meta{font-size:11px;color:var(--muted);margin-top:2px;}
@media(max-width:768px){
  .cal-shell{height:calc(100vh - 57px);}
  .cal-sidebar,.day-panel{display:none;}
  .cal-main{padding:6px;}
  .month-cell{min-height:56px;}
}

</style>
</head>

    <div><div class="mh-title">Calendar</div><div class="mh-sub">Life Logic</div></div>

  var h='<div class="month-grid">';
  ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].forEach(function(d){h+='<div class="month-dow">'+d+'</div>';});
  for(var i=fd-1;i>=0;i--){h+=mCell(prev-i,ds(new Date(yr,mo-1,prev-i)),true,td);}
  for(var d=1;d<=dim;d++){h+=mCell(d,ds(new Date(yr,mo,d)),false,td);}
  var rem=(7-((fd+dim)%7))%7;
  for(var d=1;d<=rem;d++){h+=mCell(d,ds(new Date(yr,mo+1,d)),true,td);}
  h+='</div>';
  document.getElementById('calView').innerHTML=h;
}

function mCell(n,dstr,other,td){
  var evts=evtsFor(dstr),isT=dstr===td;
  var h='<div class="month-cell'+(other?' other':'')+(isT?' today-c':'')+'" onclick="clickDay(''+dstr+'')"><div class="cell-num">'+n+'</div>';
  evts.slice(0,3).forEach(function(e){h+='<div class="cell-evt" style="background:'+(e.category_id?catColor(e.category_id):'#4F46E5')+'">'+esc(e.title||e.name||'')+'</div>';});
  if(evts.length>3)h+='<div class="cell-more">+'+(evts.length-3)+' more</div>';
  return h+'</div>';
}

function renderWeek(){
  var ws=wkStart(_curDate),td=todayStr();
  var h='<div class="week-grid">';
  var D=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  for(var i=0;i<7;i++){
    var d=new Date(ws.getTime()+i*864e5),dstr=ds(d),isT=dstr===td;
    var evts=evtsFor(dstr);
    h+='<div class="week-col'+(isT?' today-c':'')+'" onclick="clickDay(''+dstr+'')">'+
      '<div class="week-dow">'+D[i]+'</div><div class="week-num">'+d.getDate()+'</div>';
    evts.slice(0,4).forEach(function(e){h+='<div class="cell-evt" style="background:'+(e.category_id?catColor(e.category_id):'#4F46E5')+'">'+esc(e.title||e.name||'')+'</div>';});
    if(evts.length>4)h+='<div class="cell-more">+'+(evts.length-4)+' more</div>';
    h+='</div>';
  }
  h+='</div>';
  document.getElementById('calView').innerHTML=h;
}

function renderMini(){
  var yr=_miniDate.getFullYear(),mo=_miniDate.getMonth(),td=todayStr();
  var M=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var fd=new Date(yr,mo,1).getDay(),dim=new Date(yr,mo+1,0).getDate();
  var h='<div class="mini-head"><span>'+M[mo]+' '+yr+'</span><div><button class="mini-nav" onclick="miniNav(-1)">&#9664;</button><button class="mini-nav" onclick="miniNav(1)">&#9654;</button></div></div>';
  h+='<div class="mini-grid">';
  ['S','M','T','W','T','F','S'].forEach(function(d){h+='<div class="mini-dow">'+d+'</div>';});
  for(var i=0;i<fd;i++)h+='<div></div>';
  for(var d=1;d<=dim;d++){
    var dstr=yr+'-'+String(mo+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var has=evtsFor(dstr).length>0;
    var cls='mini-cell'+(dstr===td?' today':'')+(dstr===_selDate?' sel':'')+(has?' has':'');
    h+='<div class="'+cls+'" onclick="miniClick(''+dstr+'','+yr+','+mo+','+d+')">'+d+'</div>';
  }
  h+='</div>';
  document.getElementById('miniCal').innerHTML=h;
}
function miniNav(d){_miniDate=new Date(_miniDate.getFullYear(),_miniDate.getMonth()+d,1);renderMini();}
function miniClick(dstr,yr,mo,day){_selDate=dstr;_curDate=new Date(yr,mo,day);renderAll();showPanel(dstr);}

function renderLegend(){
  document.getElementById('calLegend').innerHTML=_cats.map(function(c){
    var cnt=_tasks.filter(function(t){return t.category_id===c.id&&t.status!=='done';}).length;
    return '<div class="leg-item"><div class="leg-dot" style="background:'+(c.color||'#4F46E5')+'"></div>'+
      '<span class="leg-name">'+esc(c.name)+'</span>'+(cnt?'<span class="leg-cnt">'+cnt+'</span>':'')+' </div>';
  }).join('');
}

function clickDay(dstr){
  _selDate=dstr;renderAll();
  if(window.innerWidth<=768)showDayModal(dstr);else showPanel(dstr);
}

function showPanel(dstr){
  var evts=evtsFor(dstr),dt=new Date(dstr+'T00:00:00');
  document.getElementById('dpTitle').textContent=dt.toLocaleDateString('en-US',{weekday:'short',month:'short',day:'numeric'});
  document.getElementById('dpContent').innerHTML=evts.length?evts.map(function(e){
    return '<div class="dp-item" style="border-left-color:'+(e.category_id?catColor(e.category_id):'#4F46E5')+'">'+
      '<div class="dp-item-title">'+esc(e.title||e.name||'')+'</div>'+
      '<div class="dp-item-meta">'+esc(catName(e.category_id))+(e.priority?' · '+e.priority:'')+'</div></div>';
  }).join(''):'<div style="color:var(--muted);font-size:13px;text-align:center;padding:16px;">Nothing scheduled</div>';
}

function showDayModal(dstr){
  var evts=evtsFor(dstr),dt=new Date(dstr+'T00:00:00');
  document.getElementById('dmTitle').textContent=dt.toLocaleDateString('en-US',{weekday:'long',month:'short',day:'numeric'});
  document.getElementById('dmContent').innerHTML=evts.length?evts.map(function(e){
    return '<div class="dp-item" style="border-left-color:'+(e.category_id?catColor(e.category_id):'#4F46E5')+'">'+
      '<div class="dp-item-title">'+esc(e.title||e.name||'')+'</div>'+
      '<div class="dp-item-meta">'+esc(catName(e.category_id))+'</div></div>';
  }).join(''):'<div style="color:var(--muted);text-align:center;padding:16px;font-size:13px;">Nothing scheduled</div>';
  document.getElementById('dayModal').classList.add('open');
}
init();
</script>
</body>
</html>
