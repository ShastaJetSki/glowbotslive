<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Shark Law - Scheduler</title>
  <script>(function(){var t=localStorage.getItem('app-theme')||'dark-blue';document.documentElement.setAttribute('data-theme',t);})();</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="dark-blue"]{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="blue-light"]{--bg-primary:#f0f5ff;--bg-secondary:#e0eaff;--bg-card:#ffffff;--bg-hover:#d0e0ff;--border-default:#b0c8f0;--text-primary:#1a2744;--text-secondary:#4a5a74;--accent-primary:#2563eb;--accent-light:#3b82f6;}
    [data-theme="slate-dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#273549;--bg-hover:#334155;--border-default:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent-primary:#64748b;--accent-light:#94a3b8;}
    [data-theme="ocean-dark"]{--bg-primary:#0a1214;--bg-secondary:#0e181c;--bg-card:#152228;--bg-hover:#1c2d35;--border-default:#243842;--text-primary:#e5f0f3;--text-secondary:#8faab5;--accent-primary:#14b8a6;--accent-light:#2dd4bf;}
    [data-theme="midnight-dark"],[data-theme="midnight"]{--bg-primary:#09090b;--bg-secondary:#0f0f12;--bg-card:#18181d;--bg-hover:#222228;--border-default:#27272f;--text-primary:#eeeef0;--text-secondary:#9898a4;--accent-primary:#8b5cf6;--accent-light:#a78bfa;}
    [data-theme="forest-dark"],[data-theme="forest"]{--bg-primary:#071209;--bg-secondary:#0c1f10;--bg-card:#132a18;--bg-hover:#1a3820;--border-default:#234428;--text-primary:#e5f5e8;--text-secondary:#8fb898;--accent-primary:#22c55e;--accent-light:#4ade80;}
    [data-theme="crimson-dark"],[data-theme="crimson"]{--bg-primary:#0f0708;--bg-secondary:#1a0c0e;--bg-card:#261214;--bg-hover:#331a1c;--border-default:#442225;--text-primary:#fee2e2;--text-secondary:#c9a3a5;--accent-primary:#dc2626;--accent-light:#ef4444;}
    [data-theme="amber-dark"],[data-theme="amber"]{--bg-primary:#0f0c05;--bg-secondary:#1a1508;--bg-card:#26200c;--bg-hover:#332a10;--border-default:#443815;--text-primary:#fef3c7;--text-secondary:#c9b896;--accent-primary:#f59e0b;--accent-light:#fbbf24;}
    [data-theme="cyber-dark"],[data-theme="cyber"]{--bg-primary:#0a0a0f;--bg-secondary:#0f0f18;--bg-card:#151522;--bg-hover:#1c1c2e;--border-default:#2a2a44;--text-primary:#e0e0ff;--text-secondary:#9090c0;--accent-primary:#00ff88;--accent-light:#44ffaa;}
    [data-theme="rose-dark"],[data-theme="rose"]{--bg-primary:#0f070a;--bg-secondary:#1a0c12;--bg-card:#26121a;--bg-hover:#331a24;--border-default:#44222e;--text-primary:#ffe4ec;--text-secondary:#c9a3b0;--accent-primary:#ec4899;--accent-light:#f472b6;}
    [data-theme="slate-light"]{--bg-primary:#f8fafc;--bg-secondary:#f1f5f9;--bg-card:#ffffff;--bg-hover:#e2e8f0;--border-default:#cbd5e1;--text-primary:#0f172a;--text-secondary:#475569;--accent-primary:#475569;--accent-light:#64748b;}
    [data-theme="ocean-light"]{--bg-primary:#f0fdfa;--bg-secondary:#e0f7f4;--bg-card:#ffffff;--bg-hover:#ccfbf1;--border-default:#99f6e4;--text-primary:#134e4a;--text-secondary:#2d6a66;--accent-primary:#0d9488;--accent-light:#14b8a6;}
    [data-theme="mint-light"],[data-theme="mint"]{--bg-primary:#f0fdf4;--bg-secondary:#dcfce7;--bg-card:#ffffff;--bg-hover:#bbf7d0;--border-default:#86efac;--text-primary:#14532d;--text-secondary:#3d6b4f;--accent-primary:#16a34a;--accent-light:#22c55e;}
    [data-theme="lavender-light"],[data-theme="lavender"]{--bg-primary:#faf5ff;--bg-secondary:#f3e8ff;--bg-card:#ffffff;--bg-hover:#ede4ff;--border-default:#d8b4fe;--text-primary:#3b1d5c;--text-secondary:#6b4d8a;--accent-primary:#9333ea;--accent-light:#a855f7;}
    [data-theme="honey-light"],[data-theme="honey"]{--bg-primary:#fffbeb;--bg-secondary:#fef3c7;--bg-card:#ffffff;--bg-hover:#fde68a;--border-default:#fcd34d;--text-primary:#78350f;--text-secondary:#a06020;--accent-primary:#d97706;--accent-light:#f59e0b;}
    [data-theme="coral-light"],[data-theme="coral"]{--bg-primary:#fff5f5;--bg-secondary:#fee2e2;--bg-card:#ffffff;--bg-hover:#fecaca;--border-default:#fca5a5;--text-primary:#7f1d1d;--text-secondary:#a04444;--accent-primary:#ef4444;--accent-light:#f87171;}
    [data-theme="sky-light"],[data-theme="sky"]{--bg-primary:#f0f9ff;--bg-secondary:#e0f2fe;--bg-card:#ffffff;--bg-hover:#bae6fd;--border-default:#7dd3fc;--text-primary:#0c4a6e;--text-secondary:#3a6a8a;--accent-primary:#0284c7;--accent-light:#0ea5e9;}
    [data-theme="sand-light"],[data-theme="sand"]{--bg-primary:#fefcf8;--bg-secondary:#faf6ee;--bg-card:#ffffff;--bg-hover:#f5efe0;--border-default:#e8dcc8;--text-primary:#44402a;--text-secondary:#6a6550;--accent-primary:#a89060;--accent-light:#c4aa78;}

    *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
    html,body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg-primary);color:var(--text-primary);overflow:hidden;height:100%;}
    .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--bg-card);color:var(--text-primary);padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;border:1px solid var(--accent-primary);z-index:9999;display:none;}
    .toast.show{display:block;animation:fadeIn .3s;}
    @keyframes fadeIn{from{opacity:0;transform:translateX(-50%) translateY(10px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}
    .business-name{font-size:13px;color:var(--text-secondary);}
    .theme-toggle-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .theme-toggle-btn:hover{background:var(--bg-hover);}
    .theme-toggle-btn svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}

    .app-shell{display:flex;flex-direction:column;height:100%;}
    .desktop-header{background:var(--bg-secondary);border-bottom:1px solid var(--border-default);flex-shrink:0;}
    .app-body{display:flex;flex:1;overflow:hidden;}

    .sidebar{width:230px;background:var(--bg-secondary);border-right:1px solid var(--border-default);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;scrollbar-width:thin;scrollbar-color:var(--border-default) transparent;}
    .sidebar::-webkit-scrollbar{width:5px;}
    .sidebar::-webkit-scrollbar-thumb{background:var(--border-default);border-radius:4px;}
    .sidebar-section{padding:12px 14px;border-bottom:1px solid var(--border-default);}
    .sidebar-section:last-child{border-bottom:none;}
    .sidebar-title{font-size:10px;text-transform:uppercase;font-weight:700;color:var(--text-secondary);letter-spacing:.8px;margin-bottom:8px;}

    .mini-cal-nav{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;}
    .mini-cal-title{font-size:12px;font-weight:600;}
    .mini-cal-btn{width:24px;height:24px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;border-radius:4px;font-size:13px;display:flex;align-items:center;justify-content:center;}
    .mini-cal-btn:hover{background:var(--bg-hover);}
    .mini-grid{display:grid;grid-template-columns:repeat(7,1fr);text-align:center;}
    .mini-hdr{font-size:9px;color:var(--text-secondary);padding:2px 0;}
    .mini-day{font-size:10px;padding:3px 0;border-radius:50%;cursor:pointer;width:26px;height:26px;display:flex;align-items:center;justify-content:center;margin:0 auto;}
    .mini-day:hover{background:var(--bg-hover);}
    .mini-day.today{background:var(--accent-primary);color:#fff;font-weight:700;}
    .mini-day.selected{border:2px solid var(--accent-light);}
    .mini-day.other{color:var(--text-secondary);opacity:.4;}

    .cal-layer{display:flex;align-items:center;gap:8px;padding:5px 8px;border-radius:8px;cursor:pointer;transition:all .15s;margin-bottom:3px;}
    .cal-layer:hover{background:var(--bg-hover);}
    .cal-layer-check{width:16px;height:16px;border-radius:4px;border:2px solid;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;}
    .cal-layer-check.on{background:currentColor;}
    .cal-layer-check.on::after{content:'';width:4px;height:8px;border:solid #fff;border-width:0 2px 2px 0;transform:rotate(45deg);position:absolute;top:1px;}
    .cal-layer-name{font-size:12px;font-weight:500;flex:1;}
    .cal-layer-count{font-size:9px;background:var(--bg-hover);padding:1px 6px;border-radius:10px;color:var(--text-secondary);}
    .cal-layer.active-glow{box-shadow:inset 0 0 0 1px currentColor;background:var(--bg-card);}

    .emp-row{display:flex;align-items:center;gap:8px;padding:4px 8px;border-radius:6px;cursor:pointer;margin-bottom:2px;}
    .emp-row:hover{background:var(--bg-hover);}
    .emp-avatar{width:22px;height:22px;border-radius:50%;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:#fff;}
    .emp-name{font-size:11px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .emp-chk{width:14px;height:14px;border-radius:3px;border:2px solid var(--border-default);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;position:relative;}
    .emp-chk.on{background:var(--accent-primary);border-color:var(--accent-primary);}
    .emp-chk.on::after{content:'';width:3px;height:7px;border:solid #fff;border-width:0 1.5px 1.5px 0;transform:rotate(45deg);position:absolute;top:0px;}

    .main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
    .sched-controls{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;gap:8px;flex-wrap:wrap;flex-shrink:0;border-bottom:1px solid var(--border-default);}
    .sched-nav{display:flex;align-items:center;gap:6px;}
    .sched-nav-btn{width:32px;height:32px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
    .sched-nav-btn:hover{background:var(--bg-hover);}
    .sched-title{font-size:17px;font-weight:700;min-width:140px;text-align:center;}
    .sched-today-btn{padding:5px 12px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-primary);font-size:12px;font-weight:600;cursor:pointer;}
    .sched-today-btn:hover{background:var(--bg-hover);}
    .view-toggle{display:flex;border-radius:6px;overflow:hidden;border:1px solid var(--border-default);}
    .view-btn{padding:6px 14px;border:none;background:var(--bg-card);color:var(--text-secondary);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;}
    .view-btn.active{background:var(--accent-primary);color:#fff;}
    .view-btn+.view-btn{border-left:1px solid var(--border-default);}
    .sched-add-btn{padding:6px 14px;border-radius:6px;border:none;background:var(--accent-primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
    .sched-add-btn:hover{filter:brightness(1.1);}
    .cal-drawer-btn{display:none;width:32px;height:32px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:16px;align-items:center;justify-content:center;}

    .view-area{flex:1;overflow:hidden;padding:0 12px 12px;position:relative;}
    .view-slider{height:100%;will-change:transform;transition:transform .32s cubic-bezier(.4,0,.2,1);}
.cal-events::-webkit-scrollbar{width:3px;}
.cal-events::-webkit-scrollbar-track{background:#111;border-radius:3px;}
.cal-events::-webkit-scrollbar-thumb{background:#444;border-radius:3px;}
.cal-events::-webkit-scrollbar-thumb:hover{background:#666;}
    .view-slider.no-transition{transition:none !important;}

    .month-wrap{display:flex;flex-direction:column;height:100%;}
    .cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;flex-shrink:0;}
    .cal-header-day{text-align:center;font-size:13px;font-weight:600;color:var(--text-secondary);padding:10px 4px;text-transform:uppercase;border-bottom:1px solid var(--border-default);}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(6,1fr);gap:1px;flex:1;min-height:0;}
    .cal-cell{background:var(--bg-card);border:1px solid var(--border-default);border-radius:4px;padding:5px 6px;cursor:pointer;transition:border-color .15s;overflow:hidden;display:flex;flex-direction:column;min-height:120px;}
    .cal-cell:hover{border-color:var(--accent-primary);}
    .cal-cell.today{border-color:var(--accent-primary);border-width:2px;}
    .cal-cell.other{opacity:.3;}
    .cal-day-num{font-size:13px;font-weight:600;margin-bottom:4px;flex-shrink:0;line-height:1.4;}
    .cal-cell.today .cal-day-num{background:var(--accent-primary);color:#fff;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;}
    .cal-events{flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:2px;min-height:0;scrollbar-width:thin;scrollbar-color:#333 #111;}
    .cal-strip{display:flex;align-items:center;gap:6px;height:24px;min-height:24px;max-height:24px;font-size:11px;padding:0 7px 0 8px;border-radius:4px;white-space:nowrap;overflow:hidden;cursor:pointer;font-weight:500;flex-shrink:0;border-left-width:4px;border-left-style:solid;border-left-color:transparent;}
    .cal-strip:hover{filter:brightness(1.15);}
    .cal-strip-time{font-weight:700;flex-shrink:0;font-size:11px;}
    .cal-strip-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0;}

    .week-wrap{display:flex;flex-direction:column;height:100%;}
    .week-header{display:grid;grid-template-columns:52px repeat(7,1fr);gap:0;flex-shrink:0;}
    .week-header-day{text-align:center;font-size:11px;font-weight:600;color:var(--text-secondary);padding:6px 2px;border-bottom:2px solid var(--border-default);}
    .week-header-day.today{color:var(--accent-light);border-bottom-color:var(--accent-primary);}
    .week-header-day .wh-num{font-size:22px;font-weight:700;color:var(--text-primary);display:block;line-height:1.2;}
    .week-header-day.today .wh-num{color:var(--accent-light);}
    .week-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;}
    .week-grid{display:grid;grid-template-columns:52px repeat(7,1fr);gap:0;}
    .week-time{font-size:10px;color:var(--text-secondary);text-align:right;padding:2px 6px 0 0;height:100px;border-top:1px solid var(--border-default);}
    .week-cell{border-top:1px solid var(--border-default);border-left:1px solid color-mix(in srgb,var(--border-default) 50%,transparent);min-height:100px;padding:4px;cursor:pointer;}
    .week-cell:hover{background:var(--bg-hover);}
    .week-cell.today-col{background:var(--bg-card) 4%,transparent);}
    .week-ev{font-size:11px;padding:6px 8px 6px 10px;border-radius:5px;margin-bottom:3px;overflow:hidden;cursor:pointer;font-weight:500;min-height:52px;line-height:1.35;border-left-width:4px;border-left-style:solid;border-left-color:transparent;transition:filter .15s;}
    .week-ev:hover{opacity:1;}

    .day-wrap{display:flex;flex-direction:column;height:100%;}
    .day-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;}
    .day-hour{display:grid;grid-template-columns:52px 1fr;min-height:68px;border-top:1px solid var(--border-default);}
    .day-hour-label{font-size:11px;color:var(--text-secondary);text-align:right;padding:3px 8px 0 0;}
    .day-hour-content{padding:3px 6px;cursor:pointer;min-height:68px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;align-content:start;}
    .day-hour-content:hover{background:var(--bg-hover);}
    .day-ev{padding:8px 12px 8px 10px;border-radius:6px;margin-bottom:4px;cursor:pointer;border-left-width:4px;border-left-style:solid;border-left-color:transparent;transition:filter .15s;}
    .day-ev:hover{filter:brightness(1.15);}
    .day-ev-title{font-weight:600;font-size:14px;color:var(--text-primary);}
    .day-ev-meta{font-size:12px;color:var(--text-secondary);margin-top:2px;}

    .modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity .2s;}
    .modal-overlay.active{opacity:1;pointer-events:auto;}
    .modal-content{background:var(--bg-card);border-radius:14px;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-default);}
    .modal-header{display:flex;justify-content:space-between;align-items:center;padding:14px 18px;border-bottom:1px solid var(--border-default);}
    .modal-title{font-size:15px;font-weight:700;}
    .modal-close{width:28px;height:28px;border-radius:6px;border:none;background:transparent;color:var(--text-secondary);font-size:18px;cursor:pointer;}
    .modal-close:hover{background:var(--bg-hover);}
    .modal-body{padding:16px 18px;}
    .modal-footer{display:flex;justify-content:flex-end;gap:8px;padding:12px 18px;border-top:1px solid var(--border-default);}
    .form-group{margin-bottom:12px;}
    .form-label{font-size:11px;font-weight:600;color:var(--text-secondary);margin-bottom:3px;display:block;}
    .form-input,.form-select,.form-textarea{width:100%;padding:8px 10px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-secondary);color:var(--text-primary);font-size:13px;font-family:inherit;}
    .form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--accent-primary);}
    .form-textarea{resize:vertical;min-height:50px;}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .btn-primary{padding:8px 16px;border-radius:6px;border:none;background:var(--accent-primary);color:#fff;font-size:12px;font-weight:600;cursor:pointer;}
    .btn-primary:hover{filter:brightness(1.1);}
    .btn-secondary{padding:8px 16px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-primary);font-size:12px;font-weight:600;cursor:pointer;}
    .btn-danger{padding:8px 16px;border-radius:6px;border:none;background:#ef4444;color:#fff;font-size:12px;font-weight:600;cursor:pointer;margin-right:auto;}
    .event-badge{display:inline-block;background:#f97316;color:white;font-size:9px;padding:1px 5px;border-radius:3px;font-weight:600;margin-left:4px;}

    .autocomplete-list{position:absolute;top:100%;left:0;right:0;background:var(--bg-card);border:1px solid var(--border-default);border-radius:8px;max-height:200px;overflow-y:auto;z-index:20;display:none;box-shadow:0 8px 24px rgba(0,0,0,.3);}
    .autocomplete-list.show{display:block;}
    .autocomplete-item{padding:10px 14px;cursor:pointer;font-size:14px;border-bottom:1px solid var(--border-default);}
    .autocomplete-item:last-child{border-bottom:none;}
    .autocomplete-item:hover,.autocomplete-item.highlighted{background:var(--bg-hover);}
    .autocomplete-item .ac-sub{font-size:11px;color:var(--text-secondary);margin-top:2px;}
    .autocomplete-item .ac-match{color:var(--accent-light);font-weight:600;}

    .mobile-top-header{display:none;}
    .mobile-header-bar{display:flex;align-items:center;padding:10px 12px;gap:8px;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .mobile-menu-toggle{width:34px;height:34px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-primary);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .mobile-header-center{flex:1;min-width:0;}
    .mobile-header-title{font-size:15px;font-weight:700;}
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);padding:8px;z-index:100;border-top:1px solid var(--border-default);}
    .mobile-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
    .mobile-nav-row:last-child{margin-bottom:0;}
    .mobile-nav-row.three-col{grid-template-columns:1fr 1fr 1fr;}
    .mobile-nav-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:44px;}
    .mobile-nav-btn.active{background:var(--bg-card) 60%,transparent);border-color:var(--accent-primary);color:var(--text-primary);}

<script>
var SB_URL='https://wiwbmvmgrutjfbnqhfnb.supabase.co';
var SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk';
var sb=window.supabase.createClient(SB_URL,SB_KEY);

var tenantId=null,userId=null,userRole=null;
var allAppointments=[],allEvents=[],allMembers=[],allContacts=[];
var visibleLayers={appointments:true,events:true};
var visibleMemberIds=new Set(),allMembersVisible=true;
var dv=localStorage.getItem('sched-default-view');var currentView=dv||'day',viewDate=new Date(),miniDate=new Date();
var editingApptId=null,editingEventId=null;

var DEFAULT_COLORS=['#3b82f6','#22c55e','#f97316','#8b5cf6','#ec4899','#14b8a6','#eab308','#ef4444','#6366f1','#84cc16'];
var UNASSIGNED_COLOR='#64748b';
var APPT_LAYER_COLOR='#3b82f6';
var EVENT_LAYER_COLOR='#f97316';
var MONTHS=['January','February','March','April','May','June','July','August','September','October','November','December'];
var DAYS=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
var DAYS_S=['S','M','T','W','T','F','S'];

function getMemberColor(id){
  if(!id)return UNASSIGNED_COLOR;
  var m=allMembers.find(function(x){return x.member_id===id;});
  if(!m)return UNASSIGNED_COLOR;
  if(m.color&&!m.color.includes('gradient'))return m.color;
  var idx=allMembers.findIndex(function(x){return x.member_id===id;});
  return DEFAULT_COLORS[idx%DEFAULT_COLORS.length];
}
function getItemColor(it){if(it._empId)return getMemberColor(it._empId);return it._isEvent?EVENT_LAYER_COLOR:APPT_LAYER_COLOR;}
function memberName(id){if(!id)return'';var m=allMembers.find(function(x){return x.member_id===id;});return m?((m.first_name||'')+' '+(m.last_name||'')).trim():'';}

var userThemeBank=['dark-blue'];
function loadTheme(){var t=localStorage.getItem('app-theme')||'dark-blue';document.documentElement.setAttribute('data-theme',t);}
function cycleTheme(){
  var t=localStorage.getItem('app-theme')||'dark-blue';
  var i=userThemeBank.indexOf(t);i=(i+1)%userThemeBank.length;
  var nt=userThemeBank[i];document.documentElement.setAttribute('data-theme',nt);localStorage.setItem('app-theme',nt);
}
loadTheme();

function showToast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');setTimeout(function(){t.classList.remove('show');},2500);}
function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function isToday(d){var t=new Date();return d.getFullYear()===t.getFullYear()&&d.getMonth()===t.getMonth()&&d.getDate()===t.getDate();}
function getWeekStart(d){var w=new Date(d);w.setDate(w.getDate()-w.getDay());return w;}
function formatTime(t){if(!t)return'';var p=t.split(':'),h=parseInt(p[0]),m=p[1]||'00',ap=h>=12?'PM':'AM';h=h%12||12;return h+':'+m+' '+ap;}
function dateInRange(ds,start,end){if(!start)return false;var e=end||start;return ds>=start&&ds<=e;}
function isAdminOrOwner(){return['owner','admin'].includes((userRole||'').toLowerCase());}

async function logout(){await sb.auth.signOut();localStorage.clear();location.replace('v2-login.html');}
async function checkAuth(){
  var r=await sb.auth.getSession();var s=r.data.session;
  if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');
    if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}
    if(!s){location.href='v2-login.html';return null;}}
  return s;
}

async function loadMembers(){
  var r=await sb.from('team_members').select('member_id,first_name,last_name,color,role').eq('tenant_id',tenantId).eq('is_active',true).order('last_name');
  allMembers=r.data||[];
  allMembers.forEach(function(m){visibleMemberIds.add(m.member_id);});
}
async function loadContacts(){
  var r=await sb.from('contacts').select('contact_id,first_name,last_name,phone,email').eq('tenant_id',tenantId).or('is_deleted.is.null,is_deleted.eq.false').order('last_name');
  allContacts=r.data||[];
}
async function loadAppointments(){
  var q=sb.from('sales_appointments').select('*').eq('tenant_id',tenantId).or('is_deleted.is.null,is_deleted.eq.false');
  // Associates only see their own — admins/owners/managers see all
  if(!isAdminOrOwner()&&userRole!=='manager'&&userRole!=='sr_associate'){
    q=q.eq('assigned_to',userId);
  }
  var r=await q;
  allAppointments=r.data||[];
}
async function loadEvents(){
  var r=await sb.from('events').select('*').eq('tenant_id',tenantId).or('is_deleted.is.null,is_deleted.eq.false');
  allEvents=r.data||[];
}
async function loadUserThemeBank(){
  try{var r=await sb.from('user_theme_bank').select('theme_key').eq('member_id',userId);
    if(r.data&&r.data.length>0){userThemeBank=['dark-blue'].concat(r.data.map(function(t){return t.theme_key;}));userThemeBank=[...new Set(userThemeBank)];}}catch(e){}
}

function getUnifiedItems(ds){
  var items=[];
  if(visibleLayers.appointments){
    allAppointments.forEach(function(a){
      var start=a.appointment_date;
      var end=a.appointment_end_date||start;
      if(!dateInRange(ds,start,end))return;
      if(!allMembersVisible&&a.assigned_to&&!visibleMemberIds.has(a.assigned_to))return;
      items.push({_id:a.appointment_id,_isEvent:false,_title:a.customer_name||'Unknown',_date:start,_endDate:end,_time:a.appointment_time||'09:00',_empId:a.assigned_to||null,_notes:a.notes||'',_service:a.service_type||'',_data:a});
    });
  }
  if(visibleLayers.events){
    allEvents.forEach(function(e){
      var start=e.event_date||e.start_date;
      var end=e.event_end_date||e.end_date||start;
      if(!dateInRange(ds,start,end))return;
      if(!allMembersVisible&&e.assigned_to&&!visibleMemberIds.has(e.assigned_to))return;
      items.push({_id:e.event_id,_isEvent:true,_title:e.event_name||e.title||'Event',_date:start,_endDate:end,_time:e.event_time||e.start_time||'10:00',_empId:e.assigned_to||null,_notes:e.notes||'',_location:e.location||'',_data:e});
    });
  }
  items.sort(function(a,b){return(a._time||'').localeCompare(b._time||'');});
  return items;
}

var drawerOpen=false;
function toggleMobileDrawer(){drawerOpen=!drawerOpen;document.getElementById('mobileDrawer').classList.toggle('open',drawerOpen);}

function renderMiniCal(){
  var el=document.getElementById('miniCalSection');
  var y=miniDate.getFullYear(),mo=miniDate.getMonth();
  var first=new Date(y,mo,1),sd=first.getDay(),dim=new Date(y,mo+1,0).getDate(),prev=new Date(y,mo,0).getDate();
  var h='<div class="mini-cal-nav"><button class="mini-cal-btn" onclick="miniPrev()">◀</button><div class="mini-cal-title">'+MONTHS[mo].substring(0,3)+' '+y+'</div><button class="mini-cal-btn" onclick="miniNext()">▶</button></div><div class="mini-grid">';
  DAYS_S.forEach(function(d){h+='<div class="mini-hdr">'+d+'</div>';});
  for(var i=0;i<42;i++){var dn,cls='mini-day',dt;if(i<sd){dn=prev-sd+i+1;dt=new Date(y,mo-1,dn);cls+=' other';}else if(i-sd>=dim){dn=i-sd-dim+1;dt=new Date(y,mo+1,dn);cls+=' other';}else{dn=i-sd+1;dt=new Date(y,mo,dn);}if(isToday(dt))cls+=' today';if(dateStr(dt)===dateStr(viewDate))cls+=' selected';h+='<div class="'+cls+'" onclick="miniClick(\''+dateStr(dt)+'\')">'+dn+'</div>';}
  h+='</div>';el.innerHTML=h;
}
function miniPrev(){miniDate.setMonth(miniDate.getMonth()-1);renderMiniCal();}
function miniNext(){miniDate.setMonth(miniDate.getMonth()+1);renderMiniCal();}
function miniClick(ds){viewDate=new Date(ds+'T12:00:00');miniDate=new Date(viewDate);render();renderMiniCal();}

function renderCalLayers(){
  var h='';
  var aOn=visibleLayers.appointments;
  h+='<div class="cal-layer'+(aOn?' active-glow':'')+'" style="'+(aOn?'color:'+APPT_LAYER_COLOR+';':'')+'" onclick="toggleLayer(\'appointments\')">';
  h+='<div class="cal-layer-check'+(aOn?' on':'')+'" style="border-color:'+APPT_LAYER_COLOR+';'+(aOn?'background:'+APPT_LAYER_COLOR+';':'')+'"></div>';
  h+='<div class="cal-layer-name">Appointments</div><div class="cal-layer-count">'+allAppointments.length+'</div></div>';
  var eOn=visibleLayers.events;
  h+='<div class="cal-layer'+(eOn?' active-glow':'')+'" style="'+(eOn?'color:'+EVENT_LAYER_COLOR+';':'')+'" onclick="toggleLayer(\'events\')">';
  h+='<div class="cal-layer-check'+(eOn?' on':'')+'" style="border-color:'+EVENT_LAYER_COLOR+';'+(eOn?'background:'+EVENT_LAYER_COLOR+';':'')+'"></div>';
  h+='<div class="cal-layer-name">Events</div><div class="cal-layer-count">'+allEvents.length+'</div></div>';
  document.getElementById('calLayerList').innerHTML=h;
  var ml=document.getElementById('mCalLayerList');if(ml)ml.innerHTML=h;
}

function renderMemberFilters(){
  var h='<div class="emp-row" onclick="toggleAllMembers()"><div class="emp-avatar" style="background:var(--accent-primary);font-size:8px;">ALL</div><div class="emp-name" style="font-weight:600;">All Members</div><div class="emp-chk'+(allMembersVisible?' on':'')+'"></div></div>';
  allMembers.forEach(function(m){
    var on=visibleMemberIds.has(m.member_id);
    var col=getMemberColor(m.member_id);
    var initials=((m.first_name||'')[0]||'')+((m.last_name||'')[0]||'');
    h+='<div class="emp-row" onclick="toggleMember(\''+m.member_id+'\')">';

function hexToRgba(hex,alpha){
  var r=0,g=0,b=0;
  if(!hex||hex[0]!=='#')return'rgba(100,100,100,'+alpha+')';
  if(hex.length===4){r=parseInt(hex[1]+hex[1],16);g=parseInt(hex[2]+hex[2],16);b=parseInt(hex[3]+hex[3],16);}
  else{r=parseInt(hex[1]+hex[2],16);g=parseInt(hex[3]+hex[4],16);b=parseInt(hex[5]+hex[6],16);}
  return'rgba('+r+','+g+','+b+','+alpha+')';
}
function stripHTML(it,ds){
  var col=getItemColor(it);
  var handler=it._isEvent?'openEditEvent':'openEditAppt';
  var timeStr=it._time?formatTime(it._time):'';
  var isMulti=it._endDate&&it._endDate!==it._date;
  var br='border-radius:4px;';
  if(isMulti){
    if(it._date===ds)br='border-radius:4px 0 0 4px;margin-right:-1px;';
    else if(it._endDate===ds)br='border-radius:0 4px 4px 0;margin-left:-1px;';
    else br='border-radius:0;margin-left:-1px;margin-right:-1px;';
  }
  var style='background:'+hexToRgba(col,0.35)+';border-left-color:'+col+';color:var(--text-primary);'+br;
  return '<div class="cal-strip" style="'+style+'" onclick="event.stopPropagation();'+handler+'(\''+it._id+'\')" title="'+timeStr+' '+esc(it._title)+'">'+(it._date===ds||!isMulti?'<span class="cal-strip-time">'+timeStr+'</span><span class="cal-strip-name">'+esc(it._title)+'</span>':'<span class="cal-strip-name">'+esc(it._title)+'</span>')+'</div>';

function renderMonth(){
  var el=document.getElementById('monthView'),y=viewDate.getFullYear(),mo=viewDate.getMonth();
  var first=new Date(y,mo,1),sd=first.getDay(),dim=new Date(y,mo+1,0).getDate(),prev=new Date(y,mo,0).getDate();
  var isMobile=window.innerWidth<=768;
  var totalCells=sd+dim;var numRows=Math.ceil(totalCells/7);var cellCount=isMobile?numRows*7:42;
  var h='<div class="cal-header">';DAYS.forEach(function(d){h+='<div class="cal-header-day">'+d+'</div>';});
  h+='</div><div class="cal-grid" style="'+(isMobile?'grid-template-rows:repeat('+numRows+',1fr);':'')+'">';
  for(var i=0;i<cellCount;i++){
    var dn,ds,cls='cal-cell';
    if(i<sd){dn=prev-sd+i+1;ds=dateStr(new Date(y,mo-1,dn));cls+=' other';}
    else if(i-sd>=dim){dn=i-sd-dim+1;ds=dateStr(new Date(y,mo+1,dn));cls+=' other';}
    else{dn=i-sd+1;var cd=new Date(y,mo,dn);ds=dateStr(cd);if(isToday(cd))cls+=' today';}
    if(isMobile&&cls.indexOf('other')>-1){h+='<div class="'+cls+'" style="opacity:.15;pointer-events:none;"><div class="cal-day-num">'+dn+'</div><div class="cal-events"></div></div>';}
    else{var items=getUnifiedItems(ds);h+='<div class="'+cls+'" onclick="clickDate(\''+ds+'\')">';h+='<div class="cal-day-num">'+dn+'</div><div class="cal-events">';items.forEach(function(it){h+=stripHTML(it,ds);});h+='</div></div>';}
  }
  h+='</div>';el.innerHTML=h;
}

  va.addEventListener('wheel',function(e){
    e.preventDefault();if(scrollLocked)return;
    accX+=e.deltaX;accY+=e.deltaY;clearTimeout(accTimer);accTimer=setTimeout(function(){accX=0;accY=0;},400);
    var ax=Math.abs(accX),ay=Math.abs(accY);
    if(ay>=THRESHOLD&&ay>=ax){accY>0?navNext('up'):navPrev('down');accX=0;accY=0;}
    else if(ax>=THRESHOLD&&ax>ay){accX>0?navNext('left'):navPrev('right');accX=0;accY=0;}
  },{passive:false});
})();

(function(){
  var sx=0,sy=0,active=false,inScroll=false;var SWIPE_MIN=120;
  document.addEventListener('touchstart',function(e){
    var t=e.touches[0];sx=t.clientX;sy=t.clientY;active=true;
    // Check if touch started inside a scrollable 14-day container
    var scrollEl=e.target.closest('.fourteenday-wrap,.fd-events,.week-scroll,.day-scroll,.cal-events');
    inScroll=!!(scrollEl&&scrollEl.scrollHeight>scrollEl.clientHeight+2);
  },{passive:true});
  document.addEventListener('touchend',function(e){
    if(!active||scrollLocked)return;active=false;
    var t=e.changedTouches[0];var dx=t.clientX-sx,dy=t.clientY-sy;var ax=Math.abs(dx),ay=Math.abs(dy);
    if(ax<SWIPE_MIN&&ay<SWIPE_MIN)return;
    // In 14-day view, vertical scroll is native - only handle horizontal swipe
    if(ax>=ay){dx>0?navPrev('right'):navNext('left');}else{dy>0?navPrev('down'):navNext('up');}
  },{passive:true});
})();

var resizeTimer;
window.addEventListener('resize',function(){clearTimeout(resizeTimer);resizeTimer=setTimeout(function(){render();},200);});

document.addEventListener('DOMContentLoaded',function(){setupAC();});

async function init(){
  var s=await checkAuth();if(!s)return;
  var email=s.user?.email;
  if(email){
    var r=await sb.from('team_members').select('member_id,tenant_id,role,is_active,first_name,last_name').eq('email',email).single();
    if(r.data){
      if(r.data.is_active===false){await sb.auth.signOut();localStorage.clear();location.replace('v2-login.html?reason=deactivated');return;}
      tenantId=r.data.tenant_id;userId=r.data.member_id;userRole=r.data.role;
      var name=((r.data.first_name||'')+' '+(r.data.last_name||'')).trim()||email;
      document.getElementById('dBizName').textContent=name;document.getElementById('mBizName').textContent=name;
    }
  }
  if(!tenantId){var r2=await sb.from('business_settings').select('tenant_id').limit(1).single();if(r2.data)tenantId=r2.data.tenant_id;}
  await loadUserThemeBank();
  await Promise.all([loadMembers(),loadContacts(),loadAppointments(),loadEvents()]);
  setView(currentView);renderMiniCal();renderCalLayers();renderMemberFilters();
}
init();
</script>
