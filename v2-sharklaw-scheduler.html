<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Scheduler</title>
  <script>
    (function() {
      var theme = localStorage.getItem('app-theme') || 'dark-blue';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="themes.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root { --bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa; }
    [data-theme="dark-blue"]{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="blue-light"]{--bg-primary:#f0f5ff;--bg-secondary:#e0eaff;--bg-card:#ffffff;--bg-hover:#d0e0ff;--border-default:#b0c8f0;--text-primary:#1a2744;--text-secondary:#4a5a74;--accent-primary:#2563eb;--accent-light:#3b82f6;}
    [data-theme="slate-dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#273549;--bg-hover:#334155;--border-default:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent-primary:#64748b;--accent-light:#94a3b8;}
    [data-theme="slate-light"]{--bg-primary:#f8fafc;--bg-secondary:#f1f5f9;--bg-card:#ffffff;--bg-hover:#e2e8f0;--border-default:#cbd5e1;--text-primary:#0f172a;--text-secondary:#475569;--accent-primary:#475569;--accent-light:#64748b;}
    [data-theme="ocean-dark"]{--bg-primary:#0a1214;--bg-secondary:#0e181c;--bg-card:#152228;--bg-hover:#1c2d35;--border-default:#243842;--text-primary:#e5f0f3;--text-secondary:#8faab5;--accent-primary:#14b8a6;--accent-light:#2dd4bf;}
    [data-theme="ocean-light"]{--bg-primary:#f0fdfa;--bg-secondary:#e0f7f4;--bg-card:#ffffff;--bg-hover:#ccfbf1;--border-default:#99f6e4;--text-primary:#134e4a;--text-secondary:#2d6a66;--accent-primary:#0d9488;--accent-light:#14b8a6;}
    [data-theme="midnight-dark"],[data-theme="midnight"]{--bg-primary:#09090b;--bg-secondary:#0f0f12;--bg-card:#18181d;--bg-hover:#222228;--border-default:#27272f;--text-primary:#eeeef0;--text-secondary:#9898a4;--accent-primary:#8b5cf6;--accent-light:#a78bfa;}
    [data-theme="lavender-light"],[data-theme="lavender"]{--bg-primary:#faf5ff;--bg-secondary:#f3e8ff;--bg-card:#ffffff;--bg-hover:#ede4ff;--border-default:#d8b4fe;--text-primary:#3b1d5c;--text-secondary:#6b4d8a;--accent-primary:#9333ea;--accent-light:#a855f7;}
    [data-theme="forest-dark"],[data-theme="forest"]{--bg-primary:#071209;--bg-secondary:#0c1f10;--bg-card:#132a18;--bg-hover:#1a3820;--border-default:#234428;--text-primary:#e5f5e8;--text-secondary:#8fb898;--accent-primary:#22c55e;--accent-light:#4ade80;}
    [data-theme="mint-light"],[data-theme="mint"]{--bg-primary:#f0fdf4;--bg-secondary:#dcfce7;--bg-card:#ffffff;--bg-hover:#bbf7d0;--border-default:#86efac;--text-primary:#14532d;--text-secondary:#3d6b4f;--accent-primary:#16a34a;--accent-light:#22c55e;}
    [data-theme="crimson-dark"],[data-theme="crimson"]{--bg-primary:#0f0708;--bg-secondary:#1a0c0e;--bg-card:#261214;--bg-hover:#331a1c;--border-default:#442225;--text-primary:#fee2e2;--text-secondary:#c9a3a5;--accent-primary:#dc2626;--accent-light:#ef4444;}
    [data-theme="coral-light"],[data-theme="coral"]{--bg-primary:#fff5f5;--bg-secondary:#fee2e2;--bg-card:#ffffff;--bg-hover:#fecaca;--border-default:#fca5a5;--text-primary:#7f1d1d;--text-secondary:#a04444;--accent-primary:#ef4444;--accent-light:#f87171;}
    [data-theme="amber-dark"],[data-theme="amber"]{--bg-primary:#0f0c05;--bg-secondary:#1a1508;--bg-card:#26200c;--bg-hover:#332a10;--border-default:#443815;--text-primary:#fef3c7;--text-secondary:#c9b896;--accent-primary:#f59e0b;--accent-light:#fbbf24;}
    [data-theme="honey-light"],[data-theme="honey"]{--bg-primary:#fffbeb;--bg-secondary:#fef3c7;--bg-card:#ffffff;--bg-hover:#fde68a;--border-default:#fcd34d;--text-primary:#78350f;--text-secondary:#a06020;--accent-primary:#d97706;--accent-light:#f59e0b;}
    [data-theme="rose-dark"],[data-theme="rose"]{--bg-primary:#0f070a;--bg-secondary:#1a0c12;--bg-card:#26121a;--bg-hover:#331a24;--border-default:#44222e;--text-primary:#ffe4ec;--text-secondary:#c9a3b0;--accent-primary:#ec4899;--accent-light:#f472b6;}
    [data-theme="sky-light"],[data-theme="sky"]{--bg-primary:#f0f9ff;--bg-secondary:#e0f2fe;--bg-card:#ffffff;--bg-hover:#bae6fd;--border-default:#7dd3fc;--text-primary:#0c4a6e;--text-secondary:#3a6a8a;--accent-primary:#0284c7;--accent-light:#0ea5e9;}
    [data-theme="cyber-dark"],[data-theme="cyber"]{--bg-primary:#0a0a0f;--bg-secondary:#0f0f18;--bg-card:#151522;--bg-hover:#1c1c2e;--border-default:#2a2a44;--text-primary:#e0e0ff;--text-secondary:#9090c0;--accent-primary:#00ff88;--accent-light:#44ffaa;}
    [data-theme="sand-light"],[data-theme="sand"]{--bg-primary:#fefcf8;--bg-secondary:#faf6ee;--bg-card:#ffffff;--bg-hover:#f5efe0;--border-default:#e8dcc8;--text-primary:#44402a;--text-secondary:#6a6550;--accent-primary:#a89060;--accent-light:#c4aa78;}

    *{margin:0;padding:0;box-sizing:border-box;}
    html{background:var(--bg-primary);min-height:100%;}
    body{font-family:system-ui;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}

    .theme-toggle-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .theme-toggle-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .theme-toggle-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;}
    .theme-toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border-default);color:var(--text-primary);padding:12px 20px;border-radius:10px;font-size:14px;z-index:1000;display:none;white-space:nowrap;}
    .theme-toast.show{display:block;}

    /* MOBILE */
    .mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .mobile-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px;gap:12px;}
    .mobile-menu-toggle{background:transparent;border:none;color:var(--text-secondary);font-size:20px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .mobile-header-center{flex:1;}
    .mobile-header-title{font-size:18px;font-weight:600;}
    .business-name{font-size:12px;color:var(--accent-light);}
    .mobile-menu-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:var(--bg-primary);border-top:1px solid var(--border-default);}
    .mobile-menu-content.expanded{max-height:200px;}
    .mobile-header-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 12px;}
    .mobile-header-actions button{padding:10px;font-size:13px;background:color-mix(in srgb,var(--accent-primary) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent-primary) 30%,transparent);color:var(--accent-light);border-radius:8px;cursor:pointer;}

    /* DESKTOP */
    .desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border-default);}

    /* TOOLBAR */
    .cal-toolbar{display:flex;gap:8px;align-items:center;padding:10px 12px;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);flex-wrap:wrap;}
    .cal-nav-btn{padding:6px 12px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;}
    .cal-nav-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .cal-title{font-size:15px;font-weight:600;min-width:160px;text-align:center;}
    .view-btn{padding:6px 14px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;}
    .view-btn:hover{background:var(--bg-hover);}
    .view-btn.active{background:color-mix(in srgb,var(--accent-primary) 20%,transparent);border-color:var(--accent-primary);color:var(--accent-light);}
    .tb-spacer{flex:1;}
    .add-btn{padding:8px 16px;border-radius:8px;border:none;background:var(--accent-primary);color:#fff;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;}
    .add-btn:hover{background:var(--accent-light);}
    .team-filter{padding:6px 10px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:12px;}

    /* MONTH VIEW */
    .month-grid{padding:12px;}
    .month-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px;}
    .month-dow{text-align:center;font-size:11px;font-weight:600;color:var(--text-secondary);padding:4px 0;text-transform:uppercase;}
    .month-cells{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;}
    .month-cell{min-height:80px;background:var(--bg-card);border:1px solid var(--border-default);border-radius:6px;padding:4px;cursor:pointer;transition:border-color .15s;}
    .month-cell:hover{border-color:var(--accent-primary);}
    .month-cell.today{border-color:var(--accent-primary);background:color-mix(in srgb,var(--accent-primary) 8%,var(--bg-card));}
    .month-cell.other-month{opacity:.4;}
    .month-cell.selected{background:color-mix(in srgb,var(--accent-primary) 15%,var(--bg-card));}
    .cell-day{font-size:12px;font-weight:600;margin-bottom:3px;color:var(--text-secondary);}
    .month-cell.today .cell-day{color:var(--accent-light);}
    .cell-dot{display:flex;align-items:center;gap:3px;font-size:10px;border-radius:4px;padding:2px 5px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;}
    .cell-dot.appt{background:color-mix(in srgb,var(--accent-primary) 20%,transparent);color:var(--accent-light);}
    .cell-dot.event{background:color-mix(in srgb,#10b981 20%,transparent);color:#10b981;}
    .cell-more{font-size:10px;color:var(--text-secondary);padding:1px 5px;}

    /* WEEK VIEW */
    .week-wrap{overflow-x:auto;}
    .week-grid{display:grid;grid-template-columns:48px repeat(7,1fr);min-width:600px;}
    .week-header{display:contents;}
    .week-col-head{background:var(--bg-secondary);border-bottom:1px solid var(--border-default);border-right:1px solid var(--border-default);padding:8px 4px;text-align:center;position:sticky;top:0;z-index:5;}
    .week-col-head.today-col{background:color-mix(in srgb,var(--accent-primary) 12%,var(--bg-secondary));}
    .week-dow{font-size:11px;color:var(--text-secondary);text-transform:uppercase;font-weight:600;}
    .week-date{font-size:16px;font-weight:700;}
    .week-col-head.today-col .week-date{color:var(--accent-light);}
    .week-time-col{border-right:1px solid var(--border-default);}
    .week-time-slot{height:50px;border-bottom:1px solid color-mix(in srgb,var(--border-default) 40%,transparent);display:flex;align-items:flex-start;padding:2px 4px;}
    .week-time-label{font-size:10px;color:var(--text-secondary);}
    .week-day-col{border-right:1px solid var(--border-default);position:relative;}
    .week-day-col.today-col{background:color-mix(in srgb,var(--accent-primary) 4%,var(--bg-primary));}
    .week-slot{height:50px;border-bottom:1px solid color-mix(in srgb,var(--border-default) 30%,transparent);cursor:pointer;transition:background .1s;}
    .week-slot:hover{background:var(--bg-hover);}
    .week-event{position:absolute;left:2px;right:2px;border-radius:4px;padding:2px 5px;font-size:11px;font-weight:500;cursor:pointer;overflow:hidden;z-index:2;border-left:3px solid;}
    .week-event.appt{background:color-mix(in srgb,var(--accent-primary) 20%,var(--bg-card));border-left-color:var(--accent-primary);color:var(--accent-light);}
    .week-event.event{background:color-mix(in srgb,#10b981 20%,var(--bg-card));border-left-color:#10b981;color:#10b981;}

    /* DAY VIEW */
    .day-wrap{padding:12px;}
    .day-header-bar{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
    .day-title{font-size:18px;font-weight:600;}
    .day-slots{display:grid;grid-template-columns:48px 1fr;gap:0;}
    .day-time{height:56px;border-bottom:1px solid color-mix(in srgb,var(--border-default) 40%,transparent);display:flex;align-items:flex-start;padding-top:2px;justify-content:flex-end;padding-right:8px;}
    .day-time-lbl{font-size:10px;color:var(--text-secondary);}
    .day-slot{height:56px;border-bottom:1px solid color-mix(in srgb,var(--border-default) 30%,transparent);border-left:1px solid var(--border-default);padding:2px 4px;cursor:pointer;transition:background .1s;position:relative;}
    .day-slot:hover{background:var(--bg-hover);}
    .day-event{border-radius:5px;padding:3px 8px;font-size:12px;font-weight:500;margin-bottom:2px;cursor:pointer;border-left:3px solid;}
    .day-event.appt{background:color-mix(in srgb,var(--accent-primary) 20%,var(--bg-card));border-left-color:var(--accent-primary);color:var(--accent-light);}
    .day-event.event{background:color-mix(in srgb,#10b981 20%,var(--bg-card));border-left-color:#10b981;color:#10b981;}

    /* DAY LIST (sidebar for month view) */
    .day-list-panel{padding:0 12px 12px;}
    .day-list-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;padding:10px 0 6px;}
    .day-item{background:var(--bg-card);border:1px solid var(--border-default);border-radius:8px;padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:border-color .15s;}
    .day-item:hover{border-color:var(--accent-primary);}
    .day-item-time{font-size:11px;color:var(--text-secondary);margin-bottom:2px;}
    .day-item-name{font-size:14px;font-weight:600;}
    .day-item-sub{font-size:12px;color:var(--text-secondary);margin-top:2px;}
    .day-item.appt{border-left:3px solid var(--accent-primary);}
    .day-item.event{border-left:3px solid #10b981;}

    /* MODAL */
    .modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px;}
    .modal-bg.active{display:flex;}
    .modal-box{background:var(--bg-secondary);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-default);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-default);}
    .modal-title{font-size:18px;font-weight:600;}
    .modal-x{background:transparent;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;}
    .modal-body{padding:20px;}
    .modal-foot{display:flex;gap:12px;justify-content:flex-end;padding:14px 20px;border-top:1px solid var(--border-default);}
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;}
    .req{color:#ef4444;}
    .fi,.fsel,.fta{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:14px;}
    .fta{min-height:80px;resize:vertical;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-p{padding:10px 20px;border-radius:6px;border:none;background:var(--accent-primary);color:#fff;font-size:14px;font-weight:500;cursor:pointer;width:100%;}
    .btn-p:hover{background:var(--accent-light);}
    .btn-s{padding:10px 20px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:14px;cursor:pointer;width:100%;}
    .btn-s:hover{background:var(--bg-hover);}
    .btn-d{padding:10px 20px;border-radius:6px;border:none;background:#dc2626;color:#fff;font-size:14px;cursor:pointer;width:100%;}
    .sec{margin-bottom:16px;}
    .sec-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px;}
    .type-tabs{display:flex;gap:8px;margin-bottom:16px;}
    .type-tab{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:13px;font-weight:600;cursor:pointer;text-align:center;}
    .type-tab.active{border-color:var(--accent-primary);background:color-mix(in srgb,var(--accent-primary) 15%,transparent);color:var(--accent-light);}

    /* MOBILE BOTTOM NAV */
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);padding:8px;z-index:100;border-top:1px solid var(--border-default);}
    .mobile-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
    .mobile-nav-row:last-child{margin-bottom:0;}
    .mobile-nav-row.three-col{grid-template-columns:1fr 1fr 1fr;}
    .mobile-nav-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:44px;}
    .mobile-nav-btn.active{background:color-mix(in srgb,var(--accent-primary) 60%,transparent);border-color:var(--accent-primary);color:var(--text-primary);}
    .mobile-nav-btn.action-btn{background:color-mix(in srgb,var(--accent-primary) 20%,transparent);border-color:color-mix(in srgb,var(--accent-primary) 50%,transparent);color:var(--accent-light);}

    @media(max-width:768px){
      .desktop-header{display:none!important;}
      .mobile-top-header{display:block;}
      .mobile-bottom-nav{display:block!important;}
      body{padding-bottom:120px;}
      .fr{grid-template-columns:1fr;}
      .modal-bg{align-items:flex-end;padding:0;}
      .modal-box{border-radius:20px 20px 0 0;max-height:92vh;}
      .month-cell{min-height:56px;}
    }
    @media(min-width:769px){
      .mobile-top-header{display:none!important;}
      .mobile-bottom-nav{display:none!important;}
    }
  </style>
</head>
<body>

<!-- MOBILE HEADER -->

</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div style="padding:16px 24px 8px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <h1 style="margin:0;font-size:32px;font-weight:600;">Scheduler</h1>
      <div class="business-name" id="dBiz">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:16px;">
      <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
      <a onclick="logout()" style="color:var(--text-secondary);cursor:pointer;font-size:14px;">Logout</a>
    </div>
  </div>
  <div style="padding:0 24px 12px;">
    <nav style="display:flex;gap:24px;align-items:center;">
      <a href="v2-sharklaw-dashboard.html" style="padding:12px 0;color:var(--text-secondary);text-decoration:none;font-size:14px;">Dashboard</a>
      <a href="v2-sharklaw-scheduler.html" style="padding:12px 0;color:var(--accent-primary);text-decoration:none;font-size:14px;border-bottom:2px solid var(--accent-primary);">Scheduler</a>

function contactName(id){var c=allContacts.find(function(x){return x.contact_id===id;});if(!c)return'Unknown';return((c.first_name||'')+' '+(c.last_name||'')).trim();}

function dateStr(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}
function today(){return dateStr(new Date());}
function fmtTime(dt){if(!dt)return'';var d=new Date(dt);return d.toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
function fmtDate(dt){if(!dt)return'';var d=new Date(dt);return d.toLocaleDateString('en-US',{month:'short',day:'numeric'});}

/* ===== VIEW / NAV ===== */
function setView(v){
  curView=v;
  ['month','week','day'].forEach(function(x){document.getElementById('v'+x.charAt(0).toUpperCase()+x.slice(1)).classList.toggle('active',x===v);});
  selectedDate=null;
  document.getElementById('dayListPanel').innerHTML='';
  renderCal();
}

function navCal(dir){
  if(curView==='month'){curDate=new Date(curDate.getFullYear(),curDate.getMonth()+dir,1);}
  else if(curView==='week'){curDate=new Date(curDate.getTime()+dir*7*86400000);}
  else{curDate=new Date(curDate.getTime()+dir*86400000);}
  renderCal();
}

function goToday(){curDate=new Date();selectedDate=today();renderCal();renderDayList(selectedDate);}

/* ===== FILTER ===== */
function getFilteredAppts(){
  var tf=document.getElementById('teamFilter').value;
  return allAppts.filter(function(a){return!tf||a.assigned_to===tf;});
}
function getFilteredEvents(){
  var tf=document.getElementById('teamFilter').value;
  return allEvents; // events not filtered by team
}

/* ===== MONTH VIEW ===== */
function renderMonth(){
  var year=curDate.getFullYear(),month=curDate.getMonth();
  document.getElementById('calTitle').textContent=new Date(year,month,1).toLocaleDateString('en-US',{month:'long',year:'numeric'});
  var first=new Date(year,month,1),last=new Date(year,month+1,0);
  var startDow=first.getDay(),endDay=last.getDate();
  var appts=getFilteredAppts(),events=getFilteredEvents();
  var todayS=today();

  var dowHtml='<div class="month-header">'+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(function(d){return'<div class="month-dow">'+d+'</div>';}).join('')+'</div>';
  var cellsHtml='<div class="month-cells">';
  // prev month filler
  for(var i=0;i<startDow;i++){
    var pd=new Date(year,month,-(startDow-i-1));
    cellsHtml+='<div class="month-cell other-month"><div class="cell-day">'+pd.getDate()+'</div></div>';
  }
  for(var d=1;d<=endDay;d++){
    var ds=year+'-'+String(month+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    var isToday=ds===todayS,isSel=ds===selectedDate;
    var dayAppts=appts.filter(function(a){return a.appointment_date&&a.appointment_date.startsWith(ds);});
    var dayEvents=events.filter(function(e){return(e.start_date||'').startsWith(ds)||(e.end_date&&ds>=e.start_date.split('T')[0]&&ds<=e.end_date.split('T')[0]);});
    var dotsHtml='';
    var shown=0;
    dayAppts.slice(0,2).forEach(function(a){dotsHtml+='<div class="cell-dot appt">'+esc(contactName(a.contact_id)||'Appt')+'</div>';shown++;});
    dayEvents.slice(0,Math.max(0,2-shown)).forEach(function(e){dotsHtml+='<div class="cell-dot event">'+esc(e.title||'Event')+'</div>';});
    var more=Math.max(0,(dayAppts.length+dayEvents.length)-2);
    if(more>0)dotsHtml+='<div class="cell-more">+'+more+' more</div>';
    cellsHtml+='<div class="month-cell'+(isToday?' today':'')+(isSel?' selected':'')+'" onclick="selectDay(\''+ds+'\')">'+'<div class="cell-day">'+d+'</div>'+dotsHtml+'</div>';
  }
  // next month filler
  var rem=(7-((startDow+endDay)%7))%7;
  for(var i=1;i<=rem;i++){cellsHtml+='<div class="month-cell other-month"><div class="cell-day">'+i+'</div></div>';}
  cellsHtml+='</div>';
  document.getElementById('calArea').innerHTML='<div class="month-grid">'+dowHtml+cellsHtml+'</div>';
}

function selectDay(ds){
  selectedDate=ds;
  renderMonth();
  renderDayList(ds);
}

function renderDayList(ds){
  var appts=getFilteredAppts().filter(function(a){return a.appointment_date&&a.appointment_date.startsWith(ds);});
  var events=getFilteredEvents().filter(function(e){return(e.start_date||'').startsWith(ds);});
  if(!appts.length&&!events.length){document.getElementById('dayListPanel').innerHTML='<div class="day-list-panel"><div class="day-list-title">'+fmtDate(ds+' 00:00')+'</div><div style="font-size:13px;color:var(--text-secondary);padding:8px 0;">Nothing scheduled</div></div>';return;}
  var all=[];
  appts.forEach(function(a){all.push({type:'appt',time:a.appointment_date,title:contactName(a.contact_id),sub:a.notes||memberName(a.assigned_to),id:a.appointment_id});});
  events.forEach(function(e){all.push({type:'event',time:e.start_date,title:e.title,sub:e.location||e.description||'',id:e.event_id});});
  all.sort(function(a,b){return(a.time||'').localeCompare(b.time||'');});
  var html='<div class="day-list-panel"><div class="day-list-title">'+fmtDate(ds+'T00:00')+'</div>';
  all.forEach(function(item){
    html+='<div class="day-item '+item.type+'" onclick="openEdit(\''+item.type+'\',\''+item.id+'\')">'+
      '<div class="day-item-time">'+fmtTime(item.time)+'</div>'+
      '<div class="day-item-name">'+esc(item.title)+'</div>'+
      (item.sub?'<div class="day-item-sub">'+esc(item.sub)+'</div>':'')+
    '</div>';
  });
  html+='</div>';
  document.getElementById('dayListPanel').innerHTML=html;
}

/* ===== WEEK VIEW ===== */
function renderWeek(){
  var startOfWeek=new Date(curDate);
  startOfWeek.setDate(curDate.getDate()-curDate.getDay());
  var days=[];
  for(var i=0;i<7;i++){var d=new Date(startOfWeek);d.setDate(startOfWeek.getDate()+i);days.push(d);}
  var s=days[0].toLocaleDateString('en-US',{month:'short',day:'numeric'});
  var e=days[6].toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
  document.getElementById('calTitle').textContent=s+' – '+e;
  var HOURS=[];for(var h=6;h<22;h++)HOURS.push(h);
  var appts=getFilteredAppts(),events=getFilteredEvents(),todayS=today();
  var html='<div class="week-wrap"><div class="week-grid" style="grid-template-columns:48px repeat(7,1fr);">';
  // Header row
  html+='<div class="week-col-head" style="border-bottom:1px solid var(--border-default);"></div>';
  days.forEach(function(d){
    var ds=dateStr(d);
    html+='<div class="week-col-head'+(ds===todayS?' today-col':'')+'" style="border-bottom:1px solid var(--border-default);">'+
      '<div class="week-dow">'+d.toLocaleDateString('en-US',{weekday:'short'})+'</div>'+
      '<div class="week-date">'+d.getDate()+'</div>'+
    '</div>';
  });
  // Hour rows
  HOURS.forEach(function(h){
    html+='<div class="week-time-col"><div class="week-time-slot"><span class="week-time-label">'+formatHour(h)+'</span></div></div>';
    days.forEach(function(d){
      var ds=dateStr(d);
      var slotAppts=appts.filter(function(a){if(!a.appointment_date)return false;var ad=new Date(a.appointment_date);return dateStr(ad)===ds&&ad.getHours()===h;});
      var slotEvents=events.filter(function(e){if(!e.start_date)return false;var ed=new Date(e.start_date);return dateStr(ed)===ds&&ed.getHours()===h;});
      var evHtml='';
      slotAppts.forEach(function(a){evHtml+='<div class="week-event appt" onclick="openEdit(\'appt\',\''+a.appointment_id+'\')" title="'+esc(contactName(a.contact_id))+'">'+esc(contactName(a.contact_id))+'</div>';});
      slotEvents.forEach(function(e){evHtml+='<div class="week-event event" onclick="openEdit(\'event\',\''+e.event_id+'\')" title="'+esc(e.title)+'">'+esc(e.title)+'</div>';});
      html+='<div class="week-day-col'+(ds===todayS?' today-col':'')+'"><div class="week-slot" onclick="openAddModal(\''+ds+'T'+String(h).padStart(2,'0')+':00\')">'+evHtml+'</div></div>';
    });
  });
  html+='</div></div>';
  document.getElementById('calArea').innerHTML=html;
  document.getElementById('dayListPanel').innerHTML='';
}

/* ===== DAY VIEW ===== */
function renderDay(){
  var ds=dateStr(curDate);
  document.getElementById('calTitle').textContent=curDate.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  var HOURS=[];for(var h=6;h<22;h++)HOURS.push(h);
  var appts=getFilteredAppts().filter(function(a){return a.appointment_date&&a.appointment_date.startsWith(ds);});
  var events=getFilteredEvents().filter(function(e){return(e.start_date||'').startsWith(ds);});
  var html='<div class="day-wrap"><div class="day-slots">';
  HOURS.forEach(function(h){
    var slotAppts=appts.filter(function(a){return new Date(a.appointment_date).getHours()===h;});
    var slotEvents=events.filter(function(e){return e.start_date&&new Date(e.start_date).getHours()===h;});
    var evHtml='';
    slotAppts.forEach(function(a){evHtml+='<div class="day-event appt" onclick="openEdit(\'appt\',\''+a.appointment_id+'\')">'+fmtTime(a.appointment_date)+' · '+esc(contactName(a.contact_id))+'</div>';});
    slotEvents.forEach(function(e){evHtml+='<div class="day-event event" onclick="openEdit(\'event\',\''+e.event_id+'\')">'+fmtTime(e.start_date)+' · '+esc(e.title)+'</div>';});
    html+='<div class="day-time"><span class="day-time-lbl">'+formatHour(h)+'</span></div>';
    html+='<div class="day-slot" onclick="openAddModal(\''+ds+'T'+String(h).padStart(2,'0')+':00\')">'+evHtml+'</div>';
  });
  html+='</div></div>';
  document.getElementById('calArea').innerHTML=html;
  document.getElementById('dayListPanel').innerHTML='';
}

function formatHour(h){return h===0?'12am':h<12?h+'am':h===12?'12pm':(h-12)+'pm';}

function renderCal(){
  if(curView==='month')renderMonth();
  else if(curView==='week')renderWeek();
  else renderDay();
}

/* ===== MODAL ===== */
function setItemType(t){
  itemType=t;
  document.getElementById('tabAppt').classList.toggle('active',t==='appointment');
  document.getElementById('tabEvent').classList.toggle('active',t==='event');
  document.getElementById('apptFields').style.display=t==='appointment'?'':'none';
  document.getElementById('eventFields').style.display=t==='event'?'':'none';
}

function openAddModal(dateTimeStr){
  editId=null;editType=null;
  document.getElementById('modalTitle').textContent='New Item';
  document.getElementById('deleteBtn').style.display='none';
  setItemType('appointment');
  var ds=dateTimeStr?(dateTimeStr.split('T')[0]):(selectedDate||today());
  var ts=dateTimeStr&&dateTimeStr.includes('T')?(dateTimeStr.split('T')[1].substring(0,5)):'09:00';
  document.getElementById('aDate').value=ds;
  document.getElementById('aTime').value=ts;
  document.getElementById('aNotes').value='';
  document.getElementById('aContact').value='';
  document.getElementById('aAssigned').value=currentUserId||'';
  document.getElementById('eName').value='';
  document.getElementById('eStart').value=ds;
  document.getElementById('eEnd').value='';
  document.getElementById('eStartTime').value=ts;
  document.getElementById('eEndTime').value='';
  document.getElementById('eLocation').value='';
  document.getElementById('eDesc').value='';
  document.getElementById('itemModal').classList.add('active');
}

function openEdit(type,id){
  editType=type;editId=id;
  document.getElementById('deleteBtn').style.display='block';
  if(type==='appt'){
    var a=allAppts.find(function(x){return x.appointment_id===id;});if(!a)return;
    setItemType('appointment');
    document.getElementById('modalTitle').textContent='Edit Appointment';
    document.getElementById('aContact').value=a.contact_id||'';
    var dt=a.appointment_date?new Date(a.appointment_date):null;
    document.getElementById('aDate').value=dt?dateStr(dt):'';
    document.getElementById('aTime').value=dt?String(dt.getHours()).padStart(2,'0')+':'+String(dt.getMinutes()).padStart(2,'0'):'';
    document.getElementById('aAssigned').value=a.assigned_to||'';
    document.getElementById('aNotes').value=a.notes||'';
  } else {
    var e=allEvents.find(function(x){return x.event_id===id;});if(!e)return;
    setItemType('event');
    document.getElementById('modalTitle').textContent='Edit Event';
    document.getElementById('eName').value=e.title||'';
    document.getElementById('eStart').value=e.start_date?(e.start_date.split('T')[0]):'';
    document.getElementById('eEnd').value=e.end_date?(e.end_date.split('T')[0]):'';
    document.getElementById('eStartTime').value=e.start_date&&e.start_date.includes('T')?(e.start_date.split('T')[1].substring(0,5)):'';
    document.getElementById('eEndTime').value=e.end_date&&e.end_date.includes('T')?(e.end_date.split('T')[1].substring(0,5)):'';
    document.getElementById('eLocation').value=e.location||'';
    document.getElementById('eDesc').value=e.description||'';
  }
  document.getElementById('itemModal').classList.add('active');
}

function closeModal(){document.getElementById('itemModal').classList.remove('active');}

async function saveItem(){
  if(itemType==='appointment'){
    var contactId=document.getElementById('aContact').value;
    var dateVal=document.getElementById('aDate').value;
    var timeVal=document.getElementById('aTime').value||'00:00';
    if(!contactId||!dateVal){alert('Contact and date are required.');return;}
    var dt=dateVal+'T'+timeVal+':00';
    var payload={tenant_id:currentTenantId,contact_id:contactId,appointment_date:dt,assigned_to:document.getElementById('aAssigned').value||currentUserId||null,notes:document.getElementById('aNotes').value.trim()||null};
    if(editId){
      var r=await sb.from('sales_appointments').update(payload).eq('appointment_id',editId);
      if(r.error){alert('Error: '+r.error.message);return;}
      var idx=allAppts.findIndex(function(x){return x.appointment_id===editId;});
      if(idx>=0)Object.assign(allAppts[idx],payload);
    } else {
      var r=await sb.from('sales_appointments').insert(payload).select().single();
      if(r.error){alert('Error: '+r.error.message);return;}
      allAppts.push(r.data);
    }
  } else {
    var name=document.getElementById('eName').value.trim();
    var startDate=document.getElementById('eStart').value;
    if(!name||!startDate){alert('Event name and start date are required.');return;}
    var startTime=document.getElementById('eStartTime').value;
    var endDate=document.getElementById('eEnd').value;
    var endTime=document.getElementById('eEndTime').value;
    var payload={tenant_id:currentTenantId,title:name,start_date:startDate+(startTime?'T'+startTime+':00':'T00:00:00'),end_date:endDate?(endDate+(endTime?'T'+endTime+':00':'T23:59:59')):null,location:document.getElementById('eLocation').value.trim()||null,description:document.getElementById('eDesc').value.trim()||null};
    if(editId){
      var r=await sb.from('events').update(payload).eq('event_id',editId);
      if(r.error){alert('Error: '+r.error.message);return;}
      var idx=allEvents.findIndex(function(x){return x.event_id===editId;});
      if(idx>=0)Object.assign(allEvents[idx],payload);
    } else {
      var r=await sb.from('events').insert(payload).select().single();
      if(r.error){alert('Error: '+r.error.message);return;}
      allEvents.push(r.data);
    }
  }
  closeModal();
  renderCal();
  if(selectedDate)renderDayList(selectedDate);
  showToast('Saved!');
}

async function deleteItem(){
  if(!confirm('Delete this item?'))return;
  if(editType==='appt'){
    await sb.from('sales_appointments').delete().eq('appointment_id',editId);
    allAppts=allAppts.filter(function(x){return x.appointment_id!==editId;});
  } else {
    await sb.from('events').delete().eq('event_id',editId);
    allEvents=allEvents.filter(function(x){return x.event_id!==editId;});
  }
  closeModal();renderCal();if(selectedDate)renderDayList(selectedDate);showToast('Deleted');
}

/* ===== AUTH & INIT ===== */
async function checkAuth(){
  var r=await sb.auth.getSession(),s=r.data.session;
  if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.href='login.html';return null;}}
  return s;
}

async function init(){
  var s=await checkAuth();if(!s)return;
  var email=s.user?.email;
  if(email){
    var r=await sb.from('team_members').select('member_id,tenant_id,role,is_active,first_name,last_name').eq('email',email).single();
    if(r.data){
      if(r.data.is_active===false){await sb.auth.signOut();localStorage.clear();location.replace('login.html?reason=deactivated');return;}
      currentTenantId=r.data.tenant_id;currentUserId=r.data.member_id;currentUserRole=r.data.role;
      var biz=((r.data.first_name||'')+' '+(r.data.last_name||'')).trim()||email;
      document.getElementById('dBiz').textContent=biz;document.getElementById('mBiz').textContent=biz;
    }
  }
  if(!currentTenantId){var r2=await sb.from('business_settings').select('tenant_id').limit(1).single();if(r2.data?.tenant_id)currentTenantId=r2.data.tenant_id;}
  await loadUserThemeBank();

  // Team members
  var mr=await sb.from('team_members').select('member_id,first_name,last_name,email,color').eq('tenant_id',currentTenantId).eq('is_active',true).order('last_name');
  allMembers=mr.data||[];
  var tf=document.getElementById('teamFilter');
  var aAssigned=document.getElementById('aAssigned');
  allMembers.forEach(function(m){
    var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email;
    tf.innerHTML+='<option value="'+m.member_id+'">'+esc(n)+'</option>';
    aAssigned.innerHTML+='<option value="'+m.member_id+'"'+(m.member_id===currentUserId?' selected':'')+'>'+esc(n)+'</option>';
  });

  // Contacts for appointment dropdown
  var cr=await sb.from('contacts').select('contact_id,first_name,last_name').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false').order('last_name');
  allContacts=cr.data||[];
  var cSel=document.getElementById('aContact');
  allContacts.forEach(function(c){var n=((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';cSel.innerHTML+='<option value="'+c.contact_id+'">'+esc(n)+'</option>';});

  // Appointments — load 3 months range
  var rangeStart=new Date(curDate.getFullYear(),curDate.getMonth()-1,1).toISOString();
  var rangeEnd=new Date(curDate.getFullYear(),curDate.getMonth()+3,0).toISOString();
  var ar=await sb.from('sales_appointments').select('*').eq('tenant_id',currentTenantId).gte('appointment_date',rangeStart).lte('appointment_date',rangeEnd).order('appointment_date');
  allAppts=ar.data||[];

  // Events
  var er=await sb.from('events').select('*').eq('tenant_id',currentTenantId).order('start_date');
  allEvents=er.data||[];

  selectedDate=today();
  renderCal();
  renderDayList(selectedDate);
}

init();
</script>
