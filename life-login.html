<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Life Logic — Sign In</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--bg2:#eceef2;--card:#fff;--hover:#f0f1f5;
  --border:#e2e4ea;--text:#18181b;--muted:#6b7280;
  --accent:#4F46E5;--accent2:#4338CA;--accent-bg:rgba(79,70,229,.08);
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--orange:#ea580c;
  --shadow:0 1px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.10);
  --input:#fafafa;--overlay:rgba(0,0,0,.45);
  --r:12px;--r-sm:8px;--r-lg:16px;
}
body.dark{
  --bg:#0f0f10;--bg2:#18181b;--card:#1e1e21;--hover:#26262a;
  --border:#2e2e32;--text:#f4f4f5;--muted:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.12);
  --shadow:0 1px 8px rgba(0,0,0,.3);--shadow-md:0 4px 20px rgba(0,0,0,.4);
  --input:#18181b;--overlay:rgba(0,0,0,.7);
}
html{background:var(--bg);}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px;}

/* DESKTOP HEADER */
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.dh-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:.15s;}
.icon-btn:hover{color:var(--text);background:var(--hover);}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.text-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:4px 8px;border-radius:6px;}
.text-btn:hover{color:var(--text);background:var(--hover);}
.dh-nav{display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;border-top:1px solid var(--border);}
.dh-links{display:flex;gap:2px;}
.nav-link{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;
  font-weight:500;color:var(--muted);text-decoration:none;border-radius:var(--r-sm);transition:.15s;}
.nav-link svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.nav-link:hover{color:var(--text);background:var(--hover);}
.nav-link.active{color:var(--accent);font-weight:700;}
.dh-right{display:flex;gap:8px;padding:6px 0;}
.btn-primary{padding:7px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--accent2);}

/* MOBILE HEADER */
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.mh-title{font-size:17px;font-weight:800;}
.mh-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.mh-actions{display:flex;gap:8px;}

/* MOBILE BOTTOM NAV */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 8px max(20px,env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.mn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;
  border-radius:10px;text-decoration:none;color:var(--muted);
  font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s;}
.mn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.mn-btn.active{color:var(--accent);}
.fab{position:fixed;bottom:88px;right:18px;z-index:300;width:50px;height:50px;
  background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.45);display:none;
  align-items:center;justify-content:center;transition:.2s;}
.fab:hover{background:var(--accent2);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* PAGE */
.page{max-width:960px;margin:0 auto;padding:20px 24px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px;}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:72px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:10px;margin-top:20px;}
.btn-lg{flex:1;padding:12px;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-sub{background:var(--accent);color:#fff;}
.btn-sub:hover{background:var(--accent2);}
.btn-can{background:var(--hover);color:var(--text);border:1px solid var(--border);}
.btn-can:hover{background:var(--bg2);}
.btn-del{padding:11px 16px;background:rgba(220,38,38,.08);color:var(--red);
  border:1.5px solid rgba(220,38,38,.18);border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;}

/* MODAL */
.mw{display:none;position:fixed;inset:0;background:var(--overlay);z-index:500;
  align-items:flex-end;justify-content:center;}
.mw.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;
  padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:560px){.modal{border-radius:var(--r-lg);margin-bottom:24px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#18181b;color:#fff;padding:10px 20px;border-radius:40px;
  font-size:13px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.dark #toast{background:#f4f4f5;color:#18181b;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;}
.b-urgent{background:rgba(220,38,38,.1);color:var(--red);}
.b-high{background:rgba(234,88,12,.1);color:var(--orange);}
.b-medium{background:rgba(79,70,229,.1);color:var(--accent);}
.b-low{background:var(--bg2);color:var(--muted);}
.b-done{background:rgba(22,163,74,.1);color:var(--green);}
.b-prog{background:rgba(79,70,229,.1);color:var(--accent);}

/* ICON / COLOR PICKERS (used in category modals) */
.icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
.ip-opt{width:40px;height:40px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s;color:var(--muted);}
.ip-opt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ip-opt:hover{border-color:var(--accent);color:var(--accent);}
.ip-opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.cp-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:.15s;}
.cp-opt.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state svg{width:44px;height:44px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-title svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}

/* DATE CHIPS */
.date-chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.dc{padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;}
.dc:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .dh{display:none;}
  .mh,.mn{display:block;}
  .fab{display:flex;}
  .page{padding:12px;}
  .fr{grid-template-columns:1fr;}
}
@media(min-width:769px){.mh,.mn,.fab{display:none!important;}}

body{padding-bottom:0;display:flex;flex-direction:column;min-height:100vh;}
.lg-top{display:flex;justify-content:space-between;align-items:center;padding:14px 24px;position:relative;z-index:1;}
.lg-main{flex:1;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;z-index:1;}
.lg-wrap{width:100%;max-width:400px;}
.lg-hero{text-align:center;margin-bottom:28px;}
.lg-hero-ico{width:60px;height:60px;background:var(--accent);border-radius:16px;
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px;}
.lg-hero-ico svg{width:30px;height:30px;stroke:#fff;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.lg-hero h1{font-size:26px;font-weight:900;letter-spacing:-.5px;margin-bottom:6px;}
.lg-hero p{font-size:14px;color:var(--muted);}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  padding:24px;box-shadow:0 8px 40px rgba(0,0,0,.09);}
.auth-tabs{display:grid;grid-template-columns:1fr 1fr;gap:3px;background:var(--bg2);
  border-radius:10px;padding:3px;margin-bottom:20px;}
.auth-tab{padding:9px;border-radius:8px;border:none;background:transparent;color:var(--muted);
  font-size:14px;font-weight:600;cursor:pointer;transition:.15s;}
.auth-tab.active{background:var(--card);color:var(--text);box-shadow:0 1px 4px rgba(0,0,0,.08);}
.err-box,.ok-box{padding:10px 14px;border-radius:var(--r-sm);font-size:13px;margin-bottom:14px;display:none;}
.err-box{background:rgba(220,38,38,.07);border:1.5px solid rgba(220,38,38,.2);color:var(--red);}
.ok-box{background:rgba(22,163,74,.07);border:1.5px solid rgba(22,163,74,.2);color:var(--green);}
.err-box.show,.ok-box.show{display:block;}
.divider{display:flex;align-items:center;gap:10px;margin:16px 0;}
.div-line{flex:1;height:1px;background:var(--border);}
.div-txt{font-size:12px;color:var(--muted);font-weight:600;}
.magic-btn{width:100%;padding:11px;border:1.5px solid var(--border);background:var(--card);
  color:var(--text);border-radius:var(--r-sm);font-size:14px;font-weight:600;cursor:pointer;
  transition:.15s;display:flex;align-items:center;justify-content:center;gap:8px;}
.magic-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.magic-btn:hover{border-color:var(--accent);color:var(--accent);}
.forgot-btn{display:block;text-align:right;font-size:12px;color:var(--accent);cursor:pointer;
  margin-top:-8px;margin-bottom:14px;font-weight:600;background:none;border:none;}
.features{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:20px;}
.feat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);
  padding:12px 10px;text-align:center;}
.feat svg{width:20px;height:20px;fill:none;stroke:var(--accent);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;margin-bottom:6px;}
.feat-lbl{font-size:11px;font-weight:600;color:var(--muted);}
</style>
</head>
<body>
<div class="lg-top">
  <div class="brand">
    <div class="brand-mark"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
    <div><div class="brand-name">Life Logic</div><div class="brand-sub">Personal Life Manager</div></div>
  </div>
  <button class="icon-btn" onclick="toggleDark()">
    <span data-moon style="display:flex"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg></span>
    <span data-sun style="display:none"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg></span>
  </button>
</div>
<div class="lg-main">
  <div class="lg-wrap">
    <div class="lg-hero">
      <div class="lg-hero-ico"><svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg></div>
      <h1>Your life, organized.</h1>
      <p>Tasks, goals, and dreams — all in one place.</p>
    </div>
    <div class="auth-card">
      <div class="auth-tabs">
        <button class="auth-tab active" id="tabIn" onclick="swTab('in')">Sign In</button>
        <button class="auth-tab" id="tabUp" onclick="swTab('up')">Create Account</button>
      </div>
      <div class="err-box" id="errBox"></div>
      <div class="ok-box" id="okBox"></div>
      <!-- Sign In -->
      <div id="fIn">
        <div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="siEmail" placeholder="you@example.com" autocomplete="email"></div>
        <div class="fg"><label class="fl">Password</label><input type="password" class="fi" id="siPass" placeholder="••••••••" autocomplete="current-password"></div>
        <button class="forgot-btn" onclick="forgotPw()">Forgot password?</button>
        <button class="btn-lg btn-sub" id="signinBtn" onclick="doSignIn()" style="width:100%;">Sign In</button>
        <div class="divider"><div class="div-line"></div><span class="div-txt">or</span><div class="div-line"></div></div>
        <button class="magic-btn" onclick="doMagic()"><svg viewBox="0 0 24 24"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Send magic link</button>
      </div>
      <!-- Sign Up -->
      <div id="fUp" style="display:none;">
        <div class="fg"><label class="fl">Email</label><input type="email" class="fi" id="suEmail" placeholder="you@example.com" autocomplete="email"></div>
        <div class="fg"><label class="fl">Password</label><input type="password" class="fi" id="suPass" placeholder="Min. 8 characters" autocomplete="new-password"></div>
        <div class="fg"><label class="fl">Confirm Password</label><input type="password" class="fi" id="suPass2" placeholder="Repeat password"></div>
        <button class="btn-lg btn-sub" id="signupBtn" onclick="doSignUp()" style="width:100%;">Create Account</button>
      </div>
    </div>
    <div class="features">
      <div class="feat"><svg viewBox="0 0 24 24"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg><div class="feat-lbl">Tasks &amp; Subtasks</div></div>
      <div class="feat"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/></svg><div class="feat-lbl">Goals &amp; Dreams</div></div>
      <div class="feat"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg><div class="feat-lbl">Smart Calendar</div></div>
    </div>
  </div>
</div>

function showErr(m){var e=document.getElementById('errBox');e.textContent=m;e.classList.add('show');document.getElementById('okBox').classList.remove('show');}

async function doSignIn(){
  var email=document.getElementById('siEmail').value.trim(),pass=document.getElementById('siPass').value;
  if(!email||!pass){showErr('Email and password required.');return;}
  document.getElementById('signinBtn').textContent='Loading…';document.getElementById('signinBtn').disabled=true;
  var r=await sb.auth.signInWithPassword({email:email,password:pass});
  document.getElementById('signinBtn').textContent='Sign In';document.getElementById('signinBtn').disabled=false;
  if(r.error){showErr(r.error.message);return;}
  if(r.data.session){localStorage.setItem('sb_at',r.data.session.access_token);localStorage.setItem('sb_rt',r.data.session.refresh_token);}
  location.replace('life-dashboard.html');
}
async function doSignUp(){
  var email=document.getElementById('suEmail').value.trim(),pass=document.getElementById('suPass').value,p2=document.getElementById('suPass2').value;
  if(!email){showErr('Email required.');return;}if(pass.length<8){showErr('Password must be 8+ characters.');return;}if(pass!==p2){showErr('Passwords do not match.');return;}
  document.getElementById('signupBtn').textContent='Loading…';document.getElementById('signupBtn').disabled=true;
  var r=await sb.auth.signUp({email:email,password:pass});
  document.getElementById('signupBtn').textContent='Create Account';document.getElementById('signupBtn').disabled=false;
  if(r.error){showErr(r.error.message);return;}
  if(r.data.session){localStorage.setItem('sb_at',r.data.session.access_token);localStorage.setItem('sb_rt',r.data.session.refresh_token);location.replace('life-dashboard.html');}
  else showOk('Account created! Check your email to confirm, then sign in.');
}
async function doMagic(){
  var email=document.getElementById('siEmail').value.trim();if(!email){showErr('Enter your email first.');return;}
  var r=await sb.auth.signInWithOtp({email:email,options:{emailRedirectTo:window.location.origin+'/life-dashboard.html'}});
  if(r.error){showErr(r.error.message);return;}showOk('Magic link sent! Check your email.');
}
async function forgotPw(){
  var email=document.getElementById('siEmail').value.trim();if(!email){showErr('Enter your email first.');return;}
  var r=await sb.auth.resetPasswordForEmail(email);if(r.error){showErr(r.error.message);return;}
  showOk('Password reset email sent!');
}
document.addEventListener('keydown',function(e){if(e.key==='Enter'){if(document.getElementById('tabIn').classList.contains('active'))doSignIn();else doSignUp();}});
