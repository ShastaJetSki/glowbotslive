<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Contact Profile</title>
  <script>
    (function() {
      var theme = localStorage.getItem('app-theme') || 'dark-blue';
      document.documentElement.setAttribute('data-theme', theme);
    })();
  </script>
  <link rel="stylesheet" href="themes.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="dark-blue"]{--bg-primary:#0b0f14;--bg-secondary:#0f1621;--bg-card:#1a2535;--bg-hover:#223044;--border-default:#223044;--text-primary:#e8eef6;--text-secondary:#9fb0c3;--accent-primary:#3b82f6;--accent-light:#60a5fa;}
    [data-theme="blue-light"]{--bg-primary:#f0f5ff;--bg-secondary:#e0eaff;--bg-card:#ffffff;--bg-hover:#d0e0ff;--border-default:#b0c8f0;--text-primary:#1a2744;--text-secondary:#4a5a74;--accent-primary:#2563eb;--accent-light:#3b82f6;}
    [data-theme="slate-dark"]{--bg-primary:#0f172a;--bg-secondary:#1e293b;--bg-card:#273549;--bg-hover:#334155;--border-default:#334155;--text-primary:#f1f5f9;--text-secondary:#94a3b8;--accent-primary:#64748b;--accent-light:#94a3b8;}
    [data-theme="slate-light"]{--bg-primary:#f8fafc;--bg-secondary:#f1f5f9;--bg-card:#ffffff;--bg-hover:#e2e8f0;--border-default:#cbd5e1;--text-primary:#0f172a;--text-secondary:#475569;--accent-primary:#475569;--accent-light:#64748b;}
    [data-theme="ocean-dark"]{--bg-primary:#0a1214;--bg-secondary:#0e181c;--bg-card:#152228;--bg-hover:#1c2d35;--border-default:#243842;--text-primary:#e5f0f3;--text-secondary:#8faab5;--accent-primary:#14b8a6;--accent-light:#2dd4bf;}
    [data-theme="ocean-light"]{--bg-primary:#f0fdfa;--bg-secondary:#e0f7f4;--bg-card:#ffffff;--bg-hover:#ccfbf1;--border-default:#99f6e4;--text-primary:#134e4a;--text-secondary:#2d6a66;--accent-primary:#0d9488;--accent-light:#14b8a6;}
    [data-theme="midnight-dark"],[data-theme="midnight"]{--bg-primary:#09090b;--bg-secondary:#0f0f12;--bg-card:#18181d;--bg-hover:#222228;--border-default:#27272f;--text-primary:#eeeef0;--text-secondary:#9898a4;--accent-primary:#8b5cf6;--accent-light:#a78bfa;}
    [data-theme="lavender-light"],[data-theme="lavender"]{--bg-primary:#faf5ff;--bg-secondary:#f3e8ff;--bg-card:#ffffff;--bg-hover:#ede4ff;--border-default:#d8b4fe;--text-primary:#3b1d5c;--text-secondary:#6b4d8a;--accent-primary:#9333ea;--accent-light:#a855f7;}
    [data-theme="forest-dark"],[data-theme="forest"]{--bg-primary:#071209;--bg-secondary:#0c1f10;--bg-card:#132a18;--bg-hover:#1a3820;--border-default:#234428;--text-primary:#e5f5e8;--text-secondary:#8fb898;--accent-primary:#22c55e;--accent-light:#4ade80;}
    [data-theme="mint-light"],[data-theme="mint"]{--bg-primary:#f0fdf4;--bg-secondary:#dcfce7;--bg-card:#ffffff;--bg-hover:#bbf7d0;--border-default:#86efac;--text-primary:#14532d;--text-secondary:#3d6b4f;--accent-primary:#16a34a;--accent-light:#22c55e;}
    [data-theme="crimson-dark"],[data-theme="crimson"]{--bg-primary:#0f0708;--bg-secondary:#1a0c0e;--bg-card:#261214;--bg-hover:#331a1c;--border-default:#442225;--text-primary:#fee2e2;--text-secondary:#c9a3a5;--accent-primary:#dc2626;--accent-light:#ef4444;}
    [data-theme="coral-light"],[data-theme="coral"]{--bg-primary:#fff5f5;--bg-secondary:#fee2e2;--bg-card:#ffffff;--bg-hover:#fecaca;--border-default:#fca5a5;--text-primary:#7f1d1d;--text-secondary:#a04444;--accent-primary:#ef4444;--accent-light:#f87171;}
    [data-theme="amber-dark"],[data-theme="amber"]{--bg-primary:#0f0c05;--bg-secondary:#1a1508;--bg-card:#26200c;--bg-hover:#332a10;--border-default:#443815;--text-primary:#fef3c7;--text-secondary:#c9b896;--accent-primary:#f59e0b;--accent-light:#fbbf24;}
    [data-theme="honey-light"],[data-theme="honey"]{--bg-primary:#fffbeb;--bg-secondary:#fef3c7;--bg-card:#ffffff;--bg-hover:#fde68a;--border-default:#fcd34d;--text-primary:#78350f;--text-secondary:#a06020;--accent-primary:#d97706;--accent-light:#f59e0b;}
    [data-theme="rose-dark"],[data-theme="rose"]{--bg-primary:#0f070a;--bg-secondary:#1a0c12;--bg-card:#26121a;--bg-hover:#331a24;--border-default:#44222e;--text-primary:#ffe4ec;--text-secondary:#c9a3b0;--accent-primary:#ec4899;--accent-light:#f472b6;}
    [data-theme="sky-light"],[data-theme="sky"]{--bg-primary:#f0f9ff;--bg-secondary:#e0f2fe;--bg-card:#ffffff;--bg-hover:#bae6fd;--border-default:#7dd3fc;--text-primary:#0c4a6e;--text-secondary:#3a6a8a;--accent-primary:#0284c7;--accent-light:#0ea5e9;}
    [data-theme="cyber-dark"],[data-theme="cyber"]{--bg-primary:#0a0a0f;--bg-secondary:#0f0f18;--bg-card:#151522;--bg-hover:#1c1c2e;--border-default:#2a2a44;--text-primary:#e0e0ff;--text-secondary:#9090c0;--accent-primary:#00ff88;--accent-light:#44ffaa;}
    [data-theme="sand-light"],[data-theme="sand"]{--bg-primary:#fefcf8;--bg-secondary:#faf6ee;--bg-card:#ffffff;--bg-hover:#f5efe0;--border-default:#e8dcc8;--text-primary:#44402a;--text-secondary:#6a6550;--accent-primary:#a89060;--accent-light:#c4aa78;}

    *{margin:0;padding:0;box-sizing:border-box;}
    html{background:var(--bg-primary);min-height:100%;}
    body{font-family:system-ui;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;}

    .theme-toggle-btn,.theme-btn{width:36px;height:36px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .theme-toggle-btn:hover,.theme-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .theme-toggle-btn svg{width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;}
    .theme-toast{position:fixed;bottom:200px;left:50%;transform:translateX(-50%);background:var(--bg-card);border:1px solid var(--border-default);color:var(--text-primary);padding:12px 20px;border-radius:10px;font-size:14px;z-index:1000;display:none;white-space:nowrap;}
    .theme-toast.show{display:block;}

    .mobile-top-header{display:none;position:sticky;top:0;z-index:100;background:var(--bg-secondary);border-bottom:1px solid var(--border-default);}
    .mobile-header-bar{display:flex;justify-content:space-between;align-items:center;padding:12px;gap:12px;}
    .mobile-menu-toggle{background:transparent;border:none;color:var(--text-secondary);font-size:20px;width:36px;height:36px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
    .mobile-header-center{flex:1;}
    .mobile-header-title{font-size:18px;font-weight:600;}
    .business-name{font-size:12px;color:var(--accent-light);}
    .mobile-menu-content{max-height:0;overflow:hidden;transition:max-height 0.3s ease;background:var(--bg-primary);border-top:1px solid var(--border-default);}
    .mobile-menu-content.expanded{max-height:200px;}
    .mobile-header-actions{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:8px 12px 12px;}
    .mobile-header-actions button{padding:10px;font-size:13px;background:color-mix(in srgb,var(--accent-primary) 10%,transparent);border:1px solid color-mix(in srgb,var(--accent-primary) 30%,transparent);color:var(--accent-light);border-radius:8px;cursor:pointer;}
    .desktop-header{position:sticky;top:0;z-index:100;background:var(--bg-primary);border-bottom:1px solid var(--border-default);}

    /* PROFILE LAYOUT */
    .profile-wrap{max-width:860px;margin:0 auto;padding:16px 12px 40px;}

    /* HERO CARD */
    .hero-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:12px;padding:20px;margin-bottom:14px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;}
    .hero-avatar{width:80px;height:80px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;flex-shrink:0;border:3px solid var(--border-default);}
    .hero-info{flex:1;min-width:200px;}
    .hero-name{font-size:24px;font-weight:700;margin-bottom:4px;}
    .hero-org{font-size:14px;color:var(--text-secondary);margin-bottom:8px;}
    .hero-badges{display:flex;gap:6px;flex-wrap:wrap;}
    .badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:600;border:1px solid var(--border-default);background:var(--bg-hover);}
    .badge.type{background:color-mix(in srgb,var(--accent-primary) 15%,transparent);border-color:color-mix(in srgb,var(--accent-primary) 40%,transparent);color:var(--accent-light);}
    .hero-actions{display:flex;gap:8px;flex-wrap:wrap;}
    .action-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:13px;cursor:pointer;text-decoration:none;display:flex;align-items:center;gap:6px;transition:all .15s;}
    .action-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .action-btn.primary{background:var(--accent-primary);border-color:var(--accent-primary);color:#fff;}
    .action-btn.primary:hover{background:var(--accent-light);}

    /* KPI ROW */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:14px;}
    @media(max-width:500px){.kpi-row{grid-template-columns:repeat(2,1fr);}}
    .kpi-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:10px;padding:12px;text-align:center;}
    .kpi-val{font-size:20px;font-weight:700;color:var(--accent-light);}
    .kpi-lbl{font-size:10px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;margin-top:3px;}

    /* SECTION CARDS */
    .sec-card{background:var(--bg-card);border:1px solid var(--border-default);border-radius:10px;margin-bottom:14px;overflow:hidden;}
    .sec-head{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border-default);}
    .sec-title{font-size:13px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.5px;}
    .sec-edit-btn{padding:4px 12px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:12px;cursor:pointer;}
    .sec-edit-btn:hover{background:var(--bg-hover);color:var(--text-primary);}
    .sec-body{padding:14px 16px;}

    /* INFO GRID */
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    @media(max-width:480px){.info-grid{grid-template-columns:1fr;}}
    .info-item{}
    .info-lbl{font-size:11px;color:var(--text-secondary);text-transform:uppercase;letter-spacing:.4px;margin-bottom:3px;}
    .info-val{font-size:14px;font-weight:500;}
    .info-val a{color:var(--accent-light);text-decoration:none;}
    .info-val a:hover{text-decoration:underline;}
    .info-val.empty{color:var(--text-secondary);font-style:italic;font-weight:400;}

    /* FUNNEL STAGE */
    .stage-dots{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:14px 16px;}
    .stage-dot-wrap{display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;}
    .stage-dot{width:16px;height:16px;border-radius:50%;border:2px solid var(--border-default);background:transparent;transition:all .2s;}
    .stage-dot.completed{border-color:currentColor;background:currentColor;}
    .stage-dot.current{border-color:currentColor;box-shadow:0 0 0 4px color-mix(in srgb,currentColor 25%,transparent);animation:pulse 2s infinite;}
    @keyframes pulse{0%,100%{box-shadow:0 0 0 4px color-mix(in srgb,currentColor 25%,transparent);}50%{box-shadow:0 0 0 8px color-mix(in srgb,currentColor 8%,transparent);}}
    .stage-dot-lbl{font-size:9px;color:var(--text-secondary);text-align:center;max-width:60px;line-height:1.2;}
    .stage-dot-wrap:hover .stage-dot{opacity:.8;}

    /* NOTES */
    .notes-text{font-size:13px;color:var(--text-secondary);line-height:1.6;font-style:italic;white-space:pre-wrap;}
    .notes-empty{font-size:13px;color:var(--text-secondary);font-style:italic;}

    /* SWAG TABLE */
    .swag-row{display:flex;justify-content:space-between;align-items:center;padding:10px 16px;border-bottom:1px solid var(--border-default);}
    .swag-row:last-child{border-bottom:none;}
    .swag-item-name{font-size:13px;font-weight:500;}
    .swag-item-sub{font-size:11px;color:var(--text-secondary);}
    .swag-val{font-size:13px;font-weight:700;color:var(--accent-light);}

    /* APPOINTMENTS */
    .appt-row{display:flex;align-items:center;gap:12px;padding:10px 16px;border-bottom:1px solid var(--border-default);}
    .appt-row:last-child{border-bottom:none;}
    .appt-date{font-size:12px;font-weight:600;color:var(--accent-light);min-width:80px;}
    .appt-info{flex:1;}
    .appt-notes{font-size:12px;color:var(--text-secondary);}

    /* FUNNEL ACTIVITY */
    .activity-row{display:flex;align-items:center;gap:10px;padding:8px 16px;border-bottom:1px solid var(--border-default);}
    .activity-row:last-child{border-bottom:none;}
    .activity-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .activity-text{font-size:13px;flex:1;}
    .activity-date{font-size:11px;color:var(--text-secondary);}

    /* DANGER ZONE */
    .danger-zone{margin-bottom:14px;padding:14px 16px;background:color-mix(in srgb,#dc2626 8%,var(--bg-card));border:1px solid color-mix(in srgb,#dc2626 30%,var(--border-default));border-radius:10px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;}
    .danger-label{font-size:13px;color:var(--text-secondary);}
    .btn-danger{padding:8px 18px;border-radius:6px;border:1px solid #dc2626;background:transparent;color:#ef4444;font-size:13px;cursor:pointer;}
    .btn-danger:hover{background:#dc2626;color:#fff;}

    /* EDIT MODAL */
    .modal-bg{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:1000;align-items:center;justify-content:center;padding:20px;}
    .modal-bg.active{display:flex;}
    .modal-box{background:var(--bg-secondary);border-radius:14px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;border:1px solid var(--border-default);}
    .modal-head{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;border-bottom:1px solid var(--border-default);}
    .modal-title{font-size:18px;font-weight:600;}
    .modal-x{background:transparent;border:none;color:var(--text-secondary);font-size:24px;cursor:pointer;}
    .modal-body{padding:20px;}
    .fg{margin-bottom:14px;}
    .fl{display:block;font-size:13px;font-weight:500;color:var(--text-secondary);margin-bottom:5px;}
    .req{color:#ef4444;}
    .fi,.fsel,.fta{width:100%;padding:10px 12px;border-radius:6px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-primary);font-size:14px;}
    .fta{min-height:80px;resize:vertical;}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
    .btn-p{padding:10px 20px;border-radius:6px;border:none;background:var(--accent-primary);color:#fff;font-size:14px;font-weight:500;cursor:pointer;width:100%;}
    .btn-p:hover{background:var(--accent-light);}
    .btn-s{padding:10px 20px;border-radius:6px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:14px;cursor:pointer;width:100%;}
    .btn-s:hover{background:var(--bg-hover);}
    .sec-m{margin-bottom:16px;}
    .sec-m-title{font-size:12px;font-weight:600;color:var(--text-secondary);text-transform:uppercase;margin-bottom:8px;}
    .stage-selector{display:flex;flex-direction:column;gap:6px;}
    .stage-option{padding:10px 14px;border-radius:8px;border:1px solid var(--border-default);background:transparent;color:var(--text-secondary);font-size:13px;cursor:pointer;text-align:left;display:flex;align-items:center;gap:8px;}
    .stage-option::before{content:'';width:10px;height:10px;border-radius:50%;background:currentColor;flex-shrink:0;}
    .stage-option:hover{background:var(--bg-hover);}
    .stage-option.active{border-color:currentColor;background:color-mix(in srgb,currentColor 20%,transparent);}

    /* MOBILE BOTTOM NAV */
    .mobile-bottom-nav{display:none;position:fixed;bottom:0;left:0;right:0;background:var(--bg-secondary);padding:8px;z-index:100;border-top:1px solid var(--border-default);}
    .mobile-nav-row{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:6px;}
    .mobile-nav-row:last-child{margin-bottom:0;}
    .mobile-nav-row.three-col{grid-template-columns:1fr 1fr 1fr;}
    .mobile-nav-btn{padding:10px 8px;border-radius:8px;border:1px solid var(--border-default);background:var(--bg-card);color:var(--text-secondary);font-size:12px;font-weight:600;cursor:pointer;text-decoration:none;display:flex;align-items:center;justify-content:center;min-height:44px;}
    .mobile-nav-btn.active{background:color-mix(in srgb,var(--accent-primary) 60%,transparent);border-color:var(--accent-primary);color:var(--text-primary);}
    .mobile-nav-btn.action-btn{background:color-mix(in srgb,var(--accent-primary) 20%,transparent);border-color:color-mix(in srgb,var(--accent-primary) 50%,transparent);color:var(--accent-light);}

    @media(max-width:768px){
      .desktop-header{display:none!important;}
      .mobile-top-header{display:block;}
      .mobile-bottom-nav{display:block!important;}
      body{padding-bottom:120px;}
      .fr{grid-template-columns:1fr;}
      .modal-bg{align-items:flex-end;padding:0;}
      .modal-box{border-radius:20px 20px 0 0;max-height:92vh;}
      .hero-card{flex-direction:column;align-items:flex-start;}
    }
    @media(min-width:769px){
      .mobile-top-header{display:none!important;}
      .mobile-bottom-nav{display:none!important;}
    }
  </style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mobile-top-header">
  <div class="mobile-header-bar">
    <button class="mobile-menu-toggle" onclick="toggleMobileMenu()">☰</button>
    <div class="mobile-header-center">
      <div class="mobile-header-title">Profile</div>
      <div class="business-name" id="mBiz">Loading...</div>
    </div>
    <button class="theme-toggle-btn" onclick="cycleTheme()"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
  </div>
  <div class="mobile-menu-content" id="mobileMenuContent">
    <div class="mobile-header-actions">
      <button onclick="history.back()">← Back</button>
      <button onclick="location.href='v2-sharklaw-contacts.html'">Contacts</button>
      <button onclick="logout()">Logout</button>
    </div>
  </div>
</div>

<!-- DESKTOP HEADER -->
<div class="desktop-header">
  <div style="padding:16px 24px 8px;display:flex;justify-content:space-between;align-items:center;">
    <div>
      <h1 style="margin:0;font-size:28px;font-weight:700;">Contacts</h1>
      <div style="font-size:12px;color:var(--accent-light);" id="dUserName">Loading...</div>
    </div>
    <div style="display:flex;align-items:center;gap:14px;">
      <button class="theme-btn" onclick="cycleTheme()" title="Cycle theme"><svg viewBox="0 0 24 24" style="width:20px;height:20px;stroke:currentColor;stroke-width:2;fill:none;"><circle cx="12" cy="12" r="3"></circle><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"></path></svg></button>
      <a onclick="logout()" style="color:var(--text-secondary);cursor:pointer;font-size:14px;">Logout</a>
    </div>
  </div>
  <div style="padding:0 24px 12px;">
    <nav style="display:flex;gap:24px;align-items:center;">
      <a href="v2-sharklaw-dashboard.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Dashboard</a>
      <a href="v2-sharklaw-scheduler.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Scheduler</a>
      <a href="v2-sharklaw-contacts.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--accent-primary);border-bottom:2px solid var(--accent-primary);">Contacts</a>
      <a href="v2-sharklaw-pipeline.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Pipeline</a>
      <a href="v2-sharklaw-swag.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Swag</a>
      <a href="v2-sharklaw-settings.html" style="padding:12px 0;text-decoration:none;font-size:14px;color:var(--text-secondary);">Settings</a>
      
    </nav>
  </div>
</div>

<div style="padding:10px 24px;font-size:13px;color:var(--text-secondary);">

function memberColor(id){var m=allMembers.find(function(x){return x.member_id===id;});return(m&&m.color)||'#6b7280';}

function fmtDate(d){if(!d)return'—';return new Date(d).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function fmtTime(d){if(!d)return'';return new Date(d).toLocaleTimeString('en-US',{hour:'numeric',minute:'2-digit',hour12:true});}
function daysAgo(d){if(!d)return null;var diff=Math.floor((Date.now()-new Date(d).getTime())/(1000*60*60*24));return diff===0?'Today':diff===1?'Yesterday':diff+'d ago';}

/* ===== RENDER PROFILE ===== */

  var c=contact;
  var name=((c.first_name||'')+' '+(c.last_name||'')).trim()||'Unknown';
  var initials=(((c.first_name||'')[0]||'')+((c.last_name||'')[0]||'')).toUpperCase()||'?';
  var ec=memberColor(c.assigned_to);
  var stage=c.funnel_stage||getStageIds()[0]||1;
  var ids=getStageIds();
  var stageIdx=ids.indexOf(stage);

  document.getElementById('breadcrumbName').textContent=name;
  if(document.getElementById('mUserName'))document.getElementById('mUserName').textContent=name;

  // Days in funnel
  var dif=c.created_at?Math.floor((Date.now()-new Date(c.created_at).getTime())/(1000*60*60*24)):null;
  var difStr=dif===null?'—':dif===0?'Today':dif+'d';
  var lastUpd=daysAgo(c.updated_at||c.created_at);
  var swagTotal=contactSwag.reduce(function(s,g){return s+(parseFloat(g.value)||0);},0);

  // Funnel dots
  var checkmark='<svg viewBox="0 0 16 16" style="width:13px;height:13px;display:block;"><polyline points="3,9 6.5,13 13,5" stroke="#fff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/></svg>';
  var dotsHtml=ids.map(function(id,i){
    var col=getStageColor(id);
    var isDone=i<stageIdx;
    var isCurrent=id===stage;
    var dc='stage-dot'+(isDone?' completed':isCurrent?' current':'');
    var wc='stage-dot-wrap'+(isCurrent?' scurrent':'');
    return '<div class="'+wc+'" onclick="quickStage('+id+')" style="color:'+col+';">'
      +'<div class="'+dc+'" style="color:'+col+';">'+(isCurrent?checkmark:'')+'</div>'
      +'<div class="stage-dot-lbl">'+esc(getStageName(id))+'</div>'
    +'</div>';
  }).join('');

  // Swag rows
  var swagHtml=contactSwag.length===0?'<div style="padding:14px 16px;font-size:13px;color:var(--text-secondary);font-style:italic;">No swag given yet</div>':
    contactSwag.map(function(g){
      return '<div class="swag-row"><div><div class="swag-item-name">'+esc(g.item_name||'Unknown Item')+'</div><div class="swag-item-sub">Qty: '+(g.quantity||1)+' · '+fmtDate(g.given_date)+'</div></div><div class="swag-val">$'+parseFloat(g.value||0).toFixed(2)+'</div></div>';
    }).join('');

  // Appointments
  var apptsHtml=contactAppts.length===0?'<div style="padding:14px 16px;font-size:13px;color:var(--text-secondary);font-style:italic;">No appointments</div>':
    contactAppts.slice(0,5).map(function(a){
      return '<div class="appt-row"><div class="appt-date">'+fmtDate(a.appointment_date)+'<br><span style="font-weight:400;font-size:11px;">'+fmtTime(a.appointment_date)+'</span></div><div class="appt-info"><div class="appt-notes">'+(a.notes||'No notes')+'</div><div style="font-size:11px;color:var(--text-secondary);margin-top:2px;">Assigned: '+esc(memberName(a.assigned_to))+'</div></div></div>';
    }).join('');

  // Activity
  var actHtml=contactActivity.length===0?'<div style="padding:14px 16px;font-size:13px;color:var(--text-secondary);font-style:italic;">No stage activity recorded</div>':
    contactActivity.slice(0,8).map(function(a){
      var fromName=getStageName(a.from_stage);
      var toName=getStageName(a.to_stage);
      var toColor=getStageColor(a.to_stage);
      return '<div class="activity-row"><div class="activity-dot" style="background:'+toColor+'"></div><div class="activity-text">Moved from <strong>'+esc(fromName)+'</strong> → <strong style="color:'+toColor+'">'+esc(toName)+'</strong></div><div class="activity-date">'+fmtDate(a.changed_at)+'</div></div>';
    }).join('');

  var html=
    // HERO
    '<div class="hero-card">'+
      '<div class="hero-avatar" style="background:'+ec+'">'+esc(initials)+'</div>'+
      '<div class="hero-info">'+
        '<div class="hero-name">'+esc(name)+'</div>'+
        (c.organization_name?'<div class="hero-org">'+esc(c.organization_name)+'</div>':'')+
        '<div class="hero-badges">'+
          (c.customer_type?'<span class="badge type">'+esc(c.customer_type)+'</span>':'')+
          '<span class="badge">'+esc(getStageName(stage))+'</span>'+
          '<span class="badge">'+esc(memberName(c.assigned_to))+'</span>'+
        '</div>'+
      '</div>'+
      '<div class="hero-actions">'+
        (c.phone?'<a href="tel:'+esc(c.phone)+'" class="action-btn">📞 Call</a><a href="sms:'+esc(c.phone)+'" class="action-btn">💬 Text</a>':'')+
        (c.email?'<a href="mailto:'+esc(c.email)+'" class="action-btn">✉️ Email</a>':'')+
        '<button class="action-btn primary" onclick="openEdit()" style="background:color-mix(in srgb,var(--accent-primary) 30%,transparent);border-color:color-mix(in srgb,var(--accent-primary) 40%,transparent);color:var(--accent-light);font-weight:600;">Edit</button>'+
      '</div>'+
    '</div>'+

    // KPI ROW
    '<div class="kpi-row">'+
      '<div class="kpi-card"><div class="kpi-val">'+difStr+'</div><div class="kpi-lbl">In Funnel</div></div>'+
      '<div class="kpi-card"><div class="kpi-val">'+(lastUpd||'—')+'</div><div class="kpi-lbl">Last Update</div></div>'+
      '<div class="kpi-card"><div class="kpi-val">'+contactAppts.length+'</div><div class="kpi-lbl">Appointments</div></div>'+
      '<div class="kpi-card"><div class="kpi-val">$'+swagTotal.toFixed(0)+'</div><div class="kpi-lbl">Swag Given</div></div>'+
    '</div>'+

    // CONTACT INFO
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Contact Info</div><button class="sec-edit-btn" onclick="openEdit()">Edit</button></div>'+
      '<div class="sec-body"><div class="info-grid">'+
        '<div class="info-item"><div class="info-lbl">Phone</div><div class="info-val">'+(c.phone?'<a href="tel:'+esc(c.phone)+'">'+esc(c.phone)+'</a>':'<span class="empty">Not set</span>')+'</div></div>'+
        '<div class="info-item"><div class="info-lbl">Email</div><div class="info-val">'+(c.email?'<a href="mailto:'+esc(c.email)+'">'+esc(c.email)+'</a>':'<span class="empty">Not set</span>')+'</div></div>'+
        '<div class="info-item"><div class="info-lbl">Birthday</div><div class="info-val '+(c.birthday?'':'empty')+'">'+esc(c.birthday?fmtDate(c.birthday):'Not set')+'</div></div>'+
        '<div class="info-item"><div class="info-lbl">Anniversary</div><div class="info-val '+(c.anniversary?'':'empty')+'">'+esc(c.anniversary?fmtDate(c.anniversary):'Not set')+'</div></div>'+
        '<div class="info-item"><div class="info-lbl">Added</div><div class="info-val">'+esc(fmtDate(c.created_at))+'</div></div>'+
        '<div class="info-item"><div class="info-lbl">Last Updated</div><div class="info-val">'+esc(fmtDate(c.updated_at))+'</div></div>'+
      '</div></div>'+
    '</div>'+

    // FUNNEL STAGE
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Funnel Stage</div><div style="font-size:12px;color:var(--text-secondary);">Tap a stage to move</div></div>'+
      '<div class="stage-dots">'+dotsHtml+'</div>'+
    '</div>'+

    // NOTES
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Notes</div><button class="sec-edit-btn" onclick="openEdit()">Edit</button></div>'+
      '<div class="sec-body">'+(c.notes?'<div class="notes-text">'+esc(c.notes)+'</div>':'<div class="notes-empty">No notes yet</div>')+'</div>'+
    '</div>'+

    // SWAG
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Swag Given</div><div style="font-size:13px;font-weight:700;color:var(--accent-light);">$'+swagTotal.toFixed(2)+' total</div></div>'+
      swagHtml+
    '</div>'+

    // APPOINTMENTS
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Appointments</div><a href="v2-sharklaw-scheduler.html" style="font-size:12px;color:var(--accent-primary);text-decoration:none;">View All →</a></div>'+
      apptsHtml+
    '</div>'+

    // ACTIVITY
    '<div class="sec-card">'+
      '<div class="sec-head"><div class="sec-title">Stage Activity</div></div>'+
      actHtml+
    '</div>'+

    // DANGER ZONE

    '<div class="danger-zone">'+
      '<div><div style="font-size:14px;font-weight:600;color:#ef4444;">Remove Contact</div><div class="danger-label">Moves contact to your vault</div></div>'+
      '<button class="btn-danger" onclick="removeContact()">Remove</button>'+
    '</div>':'');

  document.getElementById('profileWrap').innerHTML=html;
}

/* ===== QUICK STAGE CHANGE ===== */
async function quickStage(stageId){
  if(!contact||contact.funnel_stage===stageId)return;
  var oldStage=contact.funnel_stage;
  contact.funnel_stage=stageId;
  var r=await sb.from('contacts').update({funnel_stage:stageId}).eq('contact_id',contact.contact_id);
  if(r.error){contact.funnel_stage=oldStage;showToast('Error saving stage');return;}
  await sb.from('funnel_activity').insert({tenant_id:currentTenantId,contact_id:contact.contact_id,from_stage:oldStage,to_stage:stageId,changed_by:currentUserId,changed_at:new Date().toISOString()}).catch(function(){});
  // Reload activity
  var ar=await sb.from('funnel_activity').select('*').eq('contact_id',contact.contact_id).order('changed_at',{ascending:false}).limit(10).catch(function(){return{data:[]};});
  contactActivity=ar.data||[];
  renderProfile();showToast('Stage updated');
}

/* ===== REMOVE CONTACT ===== */
async function removeContact(){
  if(!confirm('Remove this contact from your list? It will move to your vault.'))return;
  var r=await sb.from('contact_removals').insert({tenant_id:currentTenantId,contact_id:contact.contact_id,member_id:currentUserId,removed_at:new Date().toISOString()});
  if(r.error){alert('Error: '+r.error.message);return;}
  showToast('Contact removed');
  setTimeout(function(){location.replace('v2-sharklaw-contacts.html');},1000);
}

/* ===== EDIT MODAL ===== */
function openEdit(){
  if(!contact)return;
  var c=contact;
  var stage=c.funnel_stage||getStageIds()[0]||1;
  document.getElementById('eF').value=c.first_name||'';
  document.getElementById('eL').value=c.last_name||'';
  document.getElementById('eO').value=c.organization_name||'';
  document.getElementById('eP').value=c.phone||'';
  document.getElementById('eE').value=c.email||'';
  document.getElementById('eT').value=c.customer_type||'';
  document.getElementById('eBd').value=c.birthday?c.birthday.split('T')[0]:'';
  document.getElementById('eAn').value=c.anniversary?c.anniversary.split('T')[0]:'';
  document.getElementById('eN').value=c.notes||'';
  document.getElementById('eStage').value=stage;

  // Assign dropdown
  var aSel=document.getElementById('eA');
  aSel.innerHTML='<option value="">-- Unassigned --</option>';
  allMembers.forEach(function(m){var n=((m.first_name||'')+' '+(m.last_name||'')).trim()||m.email;aSel.innerHTML+='<option value="'+m.member_id+'"'+(m.member_id===c.assigned_to?' selected':'')+'>'+esc(n)+'</option>';});

  // Stage selector
  var ss=document.getElementById('editStageSelector');
  ss.innerHTML=getStageIds().map(function(s){return'<button type="button" class="stage-option'+(s===stage?' active':'')+'" style="color:'+getStageColor(s)+'" data-stage="'+s+'" onclick="selectStage('+s+')">'+getStageName(s)+'</button>';}).join('');

  document.getElementById('editModal').classList.add('active');
}

function selectStage(s){
  document.getElementById('eStage').value=s;
  document.querySelectorAll('#editStageSelector .stage-option').forEach(function(btn){btn.classList.toggle('active',parseInt(btn.dataset.stage)===s);});
}
function closeEdit(){document.getElementById('editModal').classList.remove('active');}

async function saveEdit(){
  var newStage=parseInt(document.getElementById('eStage').value)||getStageIds()[0];
  var oldStage=contact.funnel_stage;
  var u={
    first_name:document.getElementById('eF').value.trim()||null,
    last_name:document.getElementById('eL').value.trim()||null,
    organization_name:document.getElementById('eO').value.trim()||null,
    phone:document.getElementById('eP').value.trim()||null,
    email:document.getElementById('eE').value.trim()||null,
    customer_type:document.getElementById('eT').value||null,
    assigned_to:document.getElementById('eA').value||null,
    funnel_stage:newStage,
    birthday:document.getElementById('eBd').value||null,
    anniversary:document.getElementById('eAn').value||null,
    notes:document.getElementById('eN').value.trim()||null,
    updated_at:new Date().toISOString()
  };
  var r=await sb.from('contacts').update(u).eq('contact_id',contact.contact_id);
  if(r.error){alert('Error: '+r.error.message);return;}
  Object.assign(contact,u);
  if(oldStage!==newStage){
    await sb.from('funnel_activity').insert({tenant_id:currentTenantId,contact_id:contact.contact_id,from_stage:oldStage,to_stage:newStage,changed_by:currentUserId,changed_at:new Date().toISOString()}).catch(function(){});
    var ar=await sb.from('funnel_activity').select('*').eq('contact_id',contact.contact_id).order('changed_at',{ascending:false}).limit(10).catch(function(){return{data:[]};});
    contactActivity=ar.data||[];
  }
  closeEdit();renderProfile();showToast('Saved!');
}

/* ===== AUTH & INIT ===== */
async function checkAuth(){
  var r=await sb.auth.getSession(),s=r.data.session;
  if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.href='v2-login.html';return null;}}
  return s;
}

async function init(){
  var s=await checkAuth();if(!s)return;
  var email=s.user?.email;

  // Get contact ID from URL
  var params=new URLSearchParams(location.search);
  var contactId=params.get('id');
  if(!contactId){document.getElementById('profileWrap').innerHTML='<div style="text-align:center;padding:60px;color:var(--text-secondary);">No contact ID provided. <a href="v2-sharklaw-contacts.html" style="color:var(--accent-light);">Go back</a></div>';return;}

  var TENANT='55555555-5555-5555-5555-555555555555';
  var authId=s?.user?.id;
  var tmRow=null;
  if(authId){var ra=await sb.from('team_members').select('member_id,tenant_id,role,is_active').eq('auth_user_id',authId).eq('tenant_id',TENANT).maybeSingle();if(ra.data)tmRow=ra.data;}
  if(!tmRow&&email){var rb=await sb.from('team_members').select('member_id,tenant_id,role,is_active').eq('email',email).eq('tenant_id',TENANT).maybeSingle();if(rb.data)tmRow=rb.data;}
  if(tmRow){
    if(tmRow.is_active===false){await sb.auth.signOut();localStorage.clear();location.replace('v2-login.html?reason=deactivated');return;}
    currentTenantId=tmRow.tenant_id;currentUserId=tmRow.member_id;currentUserRole=tmRow.role;
  }
  if(!currentTenantId){var r2=await sb.from('business_settings').select('tenant_id').limit(1).single();if(r2.data?.tenant_id)currentTenantId=r2.data.tenant_id;}
  // Load funnel stages
  funnelStages=JSON.parse(JSON.stringify(DEFAULT_STAGES));
  if(currentTenantId){try{var sr=await sb.from('funnel_stages').select('*').eq('tenant_id',currentTenantId).or('is_deleted.is.null,is_deleted.eq.false').order('sort_order');}catch(e){}}

  // Load team members
  var mr=await sb.from('team_members').select('member_id,first_name,last_name,email,color').eq('tenant_id',currentTenantId).eq('is_active',true).order('last_name');
  allMembers=mr.data||[];

  // Load contact
  var cr=await sb.from('contacts').select('*').eq('contact_id',contactId).single();
  if(!cr.data){document.getElementById('profileWrap').innerHTML='<div style="text-align:center;padding:60px;color:var(--text-secondary);">Contact not found. <a href="v2-sharklaw-contacts.html" style="color:var(--accent-light);">Go back</a></div>';return;}
  contact=cr.data;

  // Load related data in parallel
  var [apptR,swagR,actR]=await Promise.all([
    sb.from('sales_appointments').select('appointment_id,appointment_date,appointment_time,notes,assigned_to,customer_name').eq('contact_id',contactId).order('appointment_date',{ascending:false}),
    sb.from('swag_given').select('*').eq('contact_id',contactId).eq('tenant_id',TENANT).order('given_date',{ascending:false}),
    Promise.resolve({data:[]})
  ]); // funnel_activity disabled - no RLS policy
  contactAppts=apptR.data||[];
  contactSwag=swagR.data||[];
  contactActivity=[];

  renderProfile();
}

init();
</script>
</body>
</html>
