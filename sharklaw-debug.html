<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shark Law — DB Debug</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0b0f14; color: #e8eef6; padding: 24px 20px; }
  h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
  .sub { color: #9fb0c3; font-size: 13px; margin-bottom: 22px; }
  .btn { padding: 9px 22px; border: none; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; margin-right: 10px; margin-bottom: 10px; }
  .btn-blue { background: #3b82f6; color: #fff; }
  .btn-blue:hover { background: #2563eb; }
  .btn-green { background: #10b981; color: #fff; }
  .btn-green:hover { background: #059669; }
  .btn-orange { background: #f59e0b; color: #000; }
  .btn:disabled { opacity: .4; cursor: not-allowed; }

  .status { background: #1a2535; border: 1px solid #223044; border-radius: 10px; padding: 14px 18px; margin-bottom: 18px; font-size: 13px; }
  .status.ok { border-color: #10b981; }
  .status.err { border-color: #ef4444; }
  .status-title { font-weight: 700; margin-bottom: 6px; }
  .status-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #0f1621; font-size: 12px; }
  .status-row:last-child { border-bottom: none; }
  .pill { display: inline-block; padding: 1px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .pill-green { background: #064e3b; color: #6ee7b7; }
  .pill-red { background: #7f1d1d; color: #fca5a5; }
  .pill-blue { background: #1e3a8a; color: #93c5fd; }
  .pill-gray { background: #374151; color: #9ca3af; }

  .section { background: #1a2535; border: 1px solid #223044; border-radius: 12px; margin-bottom: 14px; overflow: hidden; }
  .sec-head { display: flex; align-items: center; justify-content: space-between; padding: 13px 18px; cursor: pointer; user-select: none; }
  .sec-head:hover { background: #223044; }
  .sec-title { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
  .arrow { color: #9fb0c3; font-size: 11px; transition: transform .2s; }
  .section.open .arrow { transform: rotate(180deg); }
  .sec-body { display: none; padding: 0 18px 18px; }
  .section.open .sec-body { display: block; }

  .tbl-wrap { overflow-x: auto; margin-top: 10px; }
  table { width: 100%; border-collapse: collapse; font-size: 12px; }
  th { text-align: left; padding: 7px 10px; background: #0f1621; color: #9fb0c3; font-size: 11px; font-weight: 600; text-transform: uppercase; border-bottom: 1px solid #223044; white-space: nowrap; }
  td { padding: 7px 10px; border-bottom: 1px solid #0f1621; vertical-align: top; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #0f1621; }
  .null-val { color: #4b5563; font-style: italic; }
  .empty { color: #9fb0c3; font-size: 13px; padding: 16px 0; text-align: center; }
  .highlight { background: #1e3a5f !important; }

  .log { background: #0b0f14; border: 1px solid #223044; border-radius: 8px; padding: 12px 14px; font-size: 12px; font-family: monospace; max-height: 180px; overflow-y: auto; margin-top: 12px; }
  .log-line { padding: 2px 0; color: #9fb0c3; }
  .log-line.ok { color: #34d399; }
  .log-line.err { color: #f87171; }
  .log-line.info { color: #60a5fa; }
  .log-line.warn { color: #fbbf24; }

  .date-highlight { color: #fbbf24; font-weight: 600; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 18px; align-items: center; }
  select.sel { background: #1a2535; border: 1px solid #334155; color: #e8eef6; border-radius: 8px; padding: 8px 12px; font-size: 13px; }
</style>
</head>
<body>

<h1>🔧 Shark Law — DB Debugger</h1>
<p class="sub">Diagnose what's actually in the DB, check connection, inspect timestamps</p>

<div class="controls">
  <select class="sel" id="dbPick">
    <option value="old">🔴 Old DB — kxqkwpkmtgvmthpafoqx</option>
    <option value="new">🟢 V2 DB — wiwbmvmgrutjfbnqhfnb</option>
  </select>
  <select class="sel" id="rowLimit">
    <option value="5">Show 5 rows</option>
    <option value="10" selected>Show 10 rows</option>
    <option value="25">Show 25 rows</option>
    <option value="50">Show 50 rows</option>
    <option value="1000">Show all</option>
  </select>
  <button class="btn btn-blue" id="btnCheck" onclick="runCheck()">🔍 Check DB &amp; Show Latest Records</button>
  <button class="btn btn-green" id="btnMigrate" onclick="migrateNew()" disabled>🚀 Migrate New Records to V2</button>
</div>

<div id="statusBox" style="display:none;"></div>
<div id="logWrap" style="display:none;">
  <div style="font-size:12px;font-weight:600;margin-bottom:6px;">Log</div>
  <div class="log" id="logBox"></div>
</div>
<div id="sections"></div>

<script>
const CONFIGS = {
  old: { url: 'https://kxqkwpkmtgvmthpafoqx.supabase.co', key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4' },
  new: { url: 'https://wiwbmvmgrutjfbnqhfnb.supabase.co', key: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Indpd2Jtdm1ncnV0amZibnFoZm5iIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NjY4NzQsImV4cCI6MjA5MDI0Mjg3NH0.puEaHAJijQPSi1ziuYsqTRZnSAALK0tpH1myrLz7dYk' }
};

const TABLES = [
  { key: 'customers',          label: '👤 Contacts',         cols: ['customer_id','full_name','first_name','last_name','phone','email','customer_type','funnel_stage','tenant_id','created_at','updated_at'] },
  { key: 'events',             label: '📅 Events',           cols: ['event_id','title','event_type','start_time','end_time','tenant_id','created_at','updated_at','is_deleted'] },
  { key: 'sales_appointments', label: '📋 Appointments',     cols: ['appointment_id','title','status','start_time','end_time','tenant_id','created_at','updated_at','is_deleted'] },
  { key: 'swag_given',         label: '🎁 Swag Given',       cols: ['id','item_name','value','quantity','given_date','customer_id','tenant_id','created_at'] },
  { key: 'funnel_activity',    label: '🔄 Funnel Activity',  cols: ['id','action','old_stage','new_stage','customer_id','tenant_id','created_at'] },
  { key: 'employees',          label: '👷 Employees',        cols: ['employee_id','first_name','last_name','email','role','tenant_id','created_at','is_active'] },
];

let lastResults = {};
let currentDb = 'old';

function log(msg, type = '') {
  const wrap = document.getElementById('logWrap');
  wrap.style.display = 'block';
  const box = document.getElementById('logBox');
  const line = document.createElement('div');
  line.className = 'log-line ' + type;
  line.textContent = '[' + new Date().toLocaleTimeString() + '] ' + msg;
  box.appendChild(line);
  box.scrollTop = box.scrollHeight;
}

function fmtDate(val) {
  if (!val) return '<span class="null-val">—</span>';
  try {
    const d = new Date(val);
    return `<span class="date-highlight">${d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})} ${d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})}</span>`;
  } catch { return val; }
}

function fmt(col, val) {
  if (val === null || val === undefined) return '<span class="null-val">—</span>';
  if (col.includes('_at') || col.includes('date') || col.includes('time')) return fmtDate(val);
  const s = String(val);
  return s.length > 40 ? `<span title="${s}">${s.slice(0,40)}…</span>` : s;
}

async function runCheck() {
  currentDb = document.getElementById('dbPick').value;
  const limit = parseInt(document.getElementById('rowLimit').value);
  const cfg = CONFIGS[currentDb];
  const sb = supabase.createClient(cfg.url, cfg.key);

  const btn = document.getElementById('btnCheck');
  btn.disabled = true;
  btn.textContent = '⏳ Checking...';
  document.getElementById('sections').innerHTML = '';
  document.getElementById('logBox').innerHTML = '';
  document.getElementById('statusBox').style.display = 'none';
  lastResults = {};

  log(`Connecting to ${currentDb === 'old' ? 'Old' : 'V2'} DB...`, 'info');

  const statusRows = [];
  let anyData = false;
  let newestDate = null;

  for (const tbl of TABLES) {
    try {
      const { data, error, count } = await sb
        .from(tbl.key)
        .select(tbl.cols.join(','), { count: 'exact' })
        .order('created_at', { ascending: false })
        .limit(limit);

      if (error) {
        statusRows.push({ label: tbl.label, status: 'error', count: 0, note: error.message });
        log(`${tbl.label}: ERROR — ${error.message}`, 'err');
        renderSection(tbl, [], 0, error.message);
      } else {
        const total = count ?? data?.length ?? 0;
        const rows = data || [];
        lastResults[tbl.key] = rows;
        if (rows.length > 0) anyData = true;

        // Find newest timestamp
        rows.forEach(r => {
          const ts = r.created_at || r.updated_at;
          if (ts && (!newestDate || ts > newestDate)) newestDate = ts;
        });

        statusRows.push({ label: tbl.label, status: rows.length > 0 ? 'ok' : 'empty', count: total, note: rows.length > 0 ? `newest: ${rows[0]?.created_at ? new Date(rows[0].created_at).toLocaleDateString() : 'N/A'}` : 'empty' });
        log(`${tbl.label}: ${total} total rows${rows.length > 0 ? ', newest: ' + (rows[0]?.created_at ? new Date(rows[0].created_at).toLocaleString() : 'no date') : ' (empty)'}`, rows.length > 0 ? 'ok' : 'warn');
        renderSection(tbl, rows, total, null);
      }
    } catch (e) {
      statusRows.push({ label: tbl.label, status: 'error', count: 0, note: e.message });
      log(`${tbl.label}: EXCEPTION — ${e.message}`, 'err');
      renderSection(tbl, [], 0, e.message);
    }
  }

  // Status summary
  const statusEl = document.getElementById('statusBox');
  statusEl.style.display = 'block';
  statusEl.className = 'status ' + (anyData ? 'ok' : 'err');
  statusEl.innerHTML = `
    <div class="status-title">${currentDb === 'old' ? '🔴 Old DB' : '🟢 V2 DB'} — ${anyData ? '✅ Connected & has data' : '⚠️ Connected but no data found'}</div>
    ${newestDate ? `<div style="font-size:12px;color:#fbbf24;margin-bottom:8px;">📅 Most recent record: <strong>${new Date(newestDate).toLocaleString()}</strong></div>` : ''}
    ${statusRows.map(r => `
      <div class="status-row">
        <span>${r.label}</span>
        <span>
          <span class="pill ${r.status === 'ok' ? 'pill-green' : r.status === 'error' ? 'pill-red' : 'pill-gray'}">${r.count} rows</span>
          <span style="color:#9fb0c3;font-size:11px;margin-left:8px;">${r.note}</span>
        </span>
      </div>
    `).join('')}
  `;

  btn.disabled = false;
  btn.textContent = '🔍 Check DB & Show Latest Records';

  if (anyData && currentDb === 'old') {
    document.getElementById('btnMigrate').disabled = false;
  }
}

function renderSection(tbl, rows, total, errMsg) {
  const container = document.getElementById('sections');
  const sec = document.createElement('div');
  sec.className = 'section' + (rows.length > 0 ? ' open' : '');
  sec.id = 'sec-' + tbl.key;

  const pillColor = rows.length > 0 ? 'pill-blue' : 'pill-gray';
  let body = '';

  if (errMsg) {
    body = `<div class="empty" style="color:#f87171;">❌ Error: ${errMsg}</div>`;
  } else if (rows.length === 0) {
    body = `<div class="empty">Table is empty or no access</div>`;
  } else {
    body = `<div class="tbl-wrap"><table><thead><tr>${tbl.cols.map(c => `<th>${c}</th>`).join('')}</tr></thead><tbody>
      ${rows.map(row => `<tr>${tbl.cols.map(c => `<td title="${String(row[c] ?? '')}">${fmt(c, row[c])}</td>`).join('')}</tr>`).join('')}
    </tbody></table></div>
    <div style="font-size:11px;color:#9fb0c3;margin-top:8px;">Showing ${rows.length} of ${total} total rows (ordered by newest first)</div>`;
  }

  sec.innerHTML = `
    <div class="sec-head" onclick="this.parentElement.classList.toggle('open')">
      <div class="sec-title">${tbl.label} <span class="pill ${pillColor}" style="font-size:11px;padding:2px 9px;">${total} total</span></div>
      <span class="arrow">▼</span>
    </div>
    <div class="sec-body">${body}</div>
  `;
  container.appendChild(sec);
}

async function migrateNew() {
  const sbNew = supabase.createClient(CONFIGS.new.url, CONFIGS.new.key);
  const btn = document.getElementById('btnMigrate');
  btn.disabled = true;
  btn.textContent = '⏳ Migrating...';

  // Find cutoff — 3 days ago
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - 3);
  cutoff.setHours(0, 0, 0, 0);
  log(`Migrating records newer than ${cutoff.toLocaleString()} to V2...`, 'info');

  let totalOk = 0, totalErr = 0;

  for (const tbl of TABLES) {
    const sbOld = supabase.createClient(CONFIGS.old.url, CONFIGS.old.key);
    try {
      const { data, error } = await sbOld
        .from(tbl.key)
        .select('*')
        .gte('created_at', cutoff.toISOString())
        .order('created_at', { ascending: false });

      if (error) throw error;
      if (!data || data.length === 0) { log(`${tbl.label}: 0 new records to migrate`, 'warn'); continue; }

      const { error: upsertErr } = await sbNew.from(tbl.key).upsert(data, { ignoreDuplicates: false });
      if (upsertErr) throw upsertErr;

      totalOk += data.length;
      log(`✅ ${tbl.label}: ${data.length} records migrated`, 'ok');
    } catch (e) {
      totalErr++;
      log(`❌ ${tbl.label}: ${e.message}`, 'err');
    }
  }

  log(`Done — ${totalOk} migrated, ${totalErr} errors`, totalOk > 0 ? 'ok' : 'err');
  btn.disabled = false;
  btn.textContent = '🚀 Migrate New Records to V2';
}
</script>
</body>
</html>
