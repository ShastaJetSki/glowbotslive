<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Details — Event Logic Pro v3</title>
<link rel="icon" href="favicon-eventlogic.ico">
<meta name="theme-color" content="#DC2626">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{--bg:#f4f5f7;--bg2:#ebedf1;--card:#fff;--hover:#f0f0f3;--border:#e2e4e8;--t1:#1a1a1a;--t2:#6b7280;--acc:#DC2626;--acc2:#B91C1C;--glow:rgba(220,38,38,.10);--shadow:0 2px 12px rgba(0,0,0,.06);--inp:#fafafa;--overlay:rgba(0,0,0,.45);}
body.dark{--bg:#111;--bg2:#1a1a1a;--card:#222;--hover:#2a2a2a;--border:#333;--t1:#f0f0f0;--t2:#999;--acc:#DC2626;--acc2:#EF4444;--glow:rgba(220,38,38,.15);--shadow:0 2px 12px rgba(0,0,0,.3);--inp:#1a1a1a;--overlay:rgba(0,0,0,.75);}
html{scrollbar-gutter:stable;background:var(--bg);}html.dark{background:#111;}
body{font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:var(--bg);color:var(--t1);overflow-x:hidden;padding-bottom:100px;min-height:100vh;}
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{padding:8px 24px;display:flex;justify-content:space-between;align-items:center;}
.dh-left{display:flex;align-items:center;gap:16px;}
.dh-logo{height:52px;object-fit:contain;}
.dh-titles h1{font-size:22px;font-weight:700;letter-spacing:-.3px;}
.dh-titles .sub{font-size:11px;color:var(--acc);font-weight:600;letter-spacing:.3px;}
.dh-right{display:flex;align-items:center;gap:10px;}
.event-badge{display:flex;align-items:center;gap:6px;padding:5px 12px;background:var(--glow);border:1px solid var(--acc);border-radius:20px;font-size:12px;color:var(--acc);font-weight:600;max-width:220px;}
.event-badge span.name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.event-badge-x{opacity:.6;cursor:pointer;font-size:14px;flex-shrink:0;}
.dark-toggle{background:none;border:none;cursor:pointer;padding:6px;color:var(--t2);display:flex;align-items:center;}
.dark-toggle svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;}
.logout-btn{background:none;border:1px solid var(--border);border-radius:6px;padding:5px 12px;font-size:12px;color:var(--t2);cursor:pointer;}
.nav-bar{display:flex;align-items:center;padding:0 24px;border-top:1px solid var(--border);}
.nav-left{display:flex;gap:2px;}
.nav-btn{padding:8px 14px;font-size:13px;font-weight:500;color:var(--t2);text-decoration:none;border-radius:6px;transition:all .15s;}
.nav-btn:hover{color:var(--t1);background:var(--hover);}
.nav-btn.active{color:var(--acc);font-weight:600;}
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-bar{display:flex;align-items:center;padding:10px 16px;gap:10px;}
.mh-logo{height:36px;object-fit:contain;}
.mh-title{font-size:17px;font-weight:700;flex:1;}
.mh-badge{font-size:11px;color:var(--acc);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:160px;}
.mh-right{display:flex;gap:6px;}
.mbn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;background:var(--card);border-top:1px solid var(--border);padding:6px 0 env(safe-area-inset-bottom);}
.mbn-inner{display:grid;grid-template-columns:repeat(5,1fr);}
.mbn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border:none;background:none;color:var(--t2);font-size:10px;cursor:pointer;text-decoration:none;}
.mbn-btn svg{width:22px;height:22px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.mbn-btn.active{color:var(--acc);}
.sheet-overlay{display:none;position:fixed;inset:0;z-index:300;background:var(--overlay);}
.sheet-overlay.open{display:block;}
.more-sheet{position:fixed;bottom:-100%;left:0;right:0;z-index:301;background:var(--card);border-radius:20px 20px 0 0;padding:12px 0 env(safe-area-inset-bottom);transition:bottom .3s cubic-bezier(.4,0,.2,1);}
.more-sheet.open{bottom:0;}
.sheet-handle{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px;}
.sheet-item{display:flex;align-items:center;gap:12px;padding:14px 20px;font-size:15px;color:var(--t1);text-decoration:none;border:none;background:none;width:100%;text-align:left;cursor:pointer;}
.sheet-item:hover{background:var(--hover);}
.sheet-item svg{width:20px;height:20px;fill:none;stroke:currentColor;stroke-width:1.8;flex-shrink:0;}
.sheet-item.danger{color:#DC2626;}
.sheet-sep{height:1px;background:var(--border);margin:4px 0;}
/* EVENT BAR */
.event-bar{background:var(--card);border-bottom:1px solid var(--border);padding:12px 24px;}
.event-bar-top{display:flex;align-items:center;gap:10px;}
.event-select{flex:1;max-width:320px;padding:8px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.event-select:focus{outline:none;border-color:var(--acc);}
/* CONTENT */
.content{max-width:960px;margin:0 auto;padding:24px;}
.section-card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:20px;}
.sc-header{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;}
.sc-title{font-size:15px;font-weight:700;}
.sc-body{padding:16px 20px;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
.form-group{margin-bottom:0;}
.form-label{font-size:11px;font-weight:600;color:var(--t2);margin-bottom:5px;display:block;text-transform:uppercase;letter-spacing:.3px;}
.form-input,.form-select,.form-textarea{width:100%;padding:9px 12px;background:var(--inp);border:1px solid var(--border);border-radius:8px;font-size:14px;color:var(--t1);}
.form-input:focus,.form-select:focus,.form-textarea:focus{outline:none;border-color:var(--acc);}
.form-textarea{resize:vertical;min-height:70px;}
.form-full{grid-column:1/-1;}
.save-row{display:flex;justify-content:flex-end;margin-top:14px;}
.btn-primary{background:var(--acc);color:#fff;border:none;border-radius:8px;padding:9px 20px;font-size:13px;font-weight:600;cursor:pointer;}
.btn-primary:hover{background:var(--acc2);}
.btn-secondary{background:var(--bg2);color:var(--t1);border:1px solid var(--border);border-radius:8px;padding:9px 16px;font-size:13px;cursor:pointer;}
.btn-danger{background:#fee2e2;color:#991b1b;border:none;border-radius:8px;padding:9px 14px;font-size:13px;cursor:pointer;}
/* VENDORS */
.vendor-table{width:100%;border-collapse:collapse;}
.vendor-table th{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;padding:6px 10px;text-align:left;border-bottom:1px solid var(--border);}
.vendor-table td{padding:10px 10px;font-size:13px;border-bottom:1px solid var(--border);}
.vendor-table tr:last-child td{border-bottom:none;}
.vendor-table tr:hover td{background:var(--hover);}
.vendor-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;background:var(--bg2);color:var(--t2);}
.vendor-actions{display:flex;gap:4px;}
.vbtn{background:none;border:none;cursor:pointer;padding:4px 8px;border-radius:5px;font-size:12px;color:var(--t2);}
.vbtn:hover{color:var(--t1);background:var(--hover);}
.vbtn.danger:hover{color:#DC2626;}
/* STATUS BANNER */
.status-bar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--bg2);border-radius:8px;margin-bottom:16px;flex-wrap:wrap;}
.status-bar .event-name{font-size:15px;font-weight:700;}
.status-bar .event-date{font-size:12px;color:var(--t2);}
.status-chip{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;text-transform:capitalize;}
.s-planning{background:#fef9c3;color:#854d0e;} .s-active{background:#dcfce7;color:#166534;}
.s-completed{background:#e0e7ff;color:#3730a3;} .s-cancelled{background:#fee2e2;color:#991b1b;}
body.dark .s-planning{background:#422006;color:#fde68a;} body.dark .s-active{background:#14532d;color:#86efac;}
body.dark .s-completed{background:#1e1b4b;color:#a5b4fc;} body.dark .s-cancelled{background:#450a0a;color:#fca5a5;}
.no-event{text-align:center;padding:48px 24px;color:var(--t2);font-size:14px;}
/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;z-index:500;background:var(--overlay);align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal-box{background:var(--card);border-radius:16px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto;}
.modal-header{display:flex;justify-content:space-between;align-items:center;padding:18px 20px 0;}
.modal-title{font-size:16px;font-weight:700;}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--t2);}
.modal-body{padding:16px 20px;}
.modal-footer{padding:0 20px 18px;display:flex;gap:8px;justify-content:flex-end;}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--t1);color:var(--card);padding:10px 20px;border-radius:20px;font-size:13px;opacity:0;pointer-events:none;transition:opacity .2s;z-index:999;white-space:nowrap;}
.toast.show{opacity:1;}
@media(max-width:768px){
  .dh{display:none!important;}.mh{display:block!important;}.mbn{display:block!important;}
  .form-grid{grid-template-columns:1fr;}.content{padding:14px 16px;}
  .modal-overlay{align-items:flex-end;padding:0;}
  .modal-box{border-radius:20px 20px 0 0;max-height:90vh;width:100%;}
}
@media(min-width:769px){.mh{display:none!important;}.mbn{display:none!important;}}
</style>
</head>

<script>
var isDark=localStorage.getItem('elp_dark_mode')==='true';
if(isDark){document.body.classList.add('dark');document.documentElement.classList.add('dark');}
function applyDarkIcons(){var d=document.body.classList.contains('dark');document.documentElement.classList.toggle('dark',d);['d','m'].forEach(function(p){var moon=document.getElementById(p+'Moon'),sun=document.getElementById(p+'Sun');if(moon)moon.style.display=d?'none':'block';if(sun)sun.style.display=d?'block':'none';});var logo=document.getElementById('dLogo');if(logo)logo.src=d?'eventlogicpro-logo-dark.png':'eventlogicpro-logo.png';}
applyDarkIcons();
function toggleDark(){document.body.classList.toggle('dark');isDark=document.body.classList.contains('dark');localStorage.setItem('elp_dark_mode',isDark);applyDarkIcons();}

var SUPABASE_URL='https://kxqkwpkmtgvmthpafoqx.supabase.co';
var SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4cWt3cGttdGd2bXRocGFmb3F4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjU0NDI1OTQsImV4cCI6MjA4MTAxODU5NH0.GT9pOMqrUr1EvVLh1magyoB4I_LprziRaybKsGHhrX4';
var sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);
var tenantId=null,userId=null;
var allProjects=[],allVendors=[];
var currentProjectId=null,currentProject=null;
var editingVendorId=null;

function toast(m){var t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove('show');},2400);}
async function doLogout(){await sb.auth.signOut();localStorage.removeItem('sb_access_token');localStorage.removeItem('sb_refresh_token');location.replace('/');}
async function checkAuth(){var r=await sb.auth.getSession();var s=r.data.session;if(!s){var t=localStorage.getItem('sb_access_token'),rf=localStorage.getItem('sb_refresh_token');if(t&&rf){var sr=await sb.auth.setSession({access_token:t,refresh_token:rf});s=sr.data?.session;}if(!s){location.replace('/');return null;}}return s;}
function getCurrentEvent(){return localStorage.getItem('elp_current_event');}
function setCurrentEvent(id,name,date){localStorage.setItem('elp_current_event',id||'');localStorage.setItem('elp_current_event_name',name||'');localStorage.setItem('elp_current_event_date',date||'');updateEventBadge();}
function clearCurrentEvent(){localStorage.removeItem('elp_current_event');localStorage.removeItem('elp_current_event_name');localStorage.removeItem('elp_current_event_date');updateEventBadge();}
function updateEventBadge(){var name=localStorage.getItem('elp_current_event_name')||'';var badge=document.getElementById('dEventBadge'),mBadge=document.getElementById('mEventBadge');if(name){if(badge){document.getElementById('dEventName').textContent=name;badge.style.display='flex';}if(mBadge){mBadge.textContent='📍 '+name;mBadge.style.display='block';}}else{if(badge)badge.style.display='none';if(mBadge)mBadge.style.display='none';}}
function openMoreSheet(){document.getElementById('sheetOverlay').classList.add('open');document.getElementById('moreSheet').classList.add('open');}
function closeMoreSheet(){document.getElementById('sheetOverlay').classList.remove('open');document.getElementById('moreSheet').classList.remove('open');}

async function init(){
  var session=await checkAuth();if(!session)return;
  userId=session.user.id;
  var email=session.user.email||'';
  var ur=await sb.from('users').select('tenant_id').eq('email',email).maybeSingle();
  if(ur.data)tenantId=ur.data.tenant_id;
  if(!tenantId){var bs=await sb.from('business_settings').select('tenant_id').limit(1).maybeSingle();if(bs.data)tenantId=bs.data.tenant_id;}
  if(!tenantId){toast('Cannot determine tenant');return;}
  var biz=await sb.from('business_settings').select('business_name,display_name').eq('tenant_id',tenantId).maybeSingle();
  if(biz.data){var bn=biz.data.display_name||biz.data.business_name||'Event Logic Pro';document.getElementById('dBiz').textContent=bn;}
  updateEventBadge();
  await loadProjects();
  populateEventSelect();
  var savedId=getCurrentEvent();
  if(savedId&&allProjects.find(function(p){return p.event_project_id===savedId;})){
    currentProjectId=savedId;
    document.getElementById('eventSelect').value=savedId;
    await loadAndRender();
  }
}

async function loadProjects(){var r=await sb.from('event_projects').select('*').eq('tenant_id',tenantId);allProjects=r.data||[];allProjects.sort(function(a,b){if(!a.event_date&&!b.event_date)return(a.event_name||'').localeCompare(b.event_name||'');if(!a.event_date)return 1;if(!b.event_date)return-1;return a.event_date.localeCompare(b.event_date);});}
function populateEventSelect(){var sel=document.getElementById('eventSelect');sel.innerHTML='<option value="">— Select an event —</option>';allProjects.forEach(function(p){var o=document.createElement('option');o.value=p.event_project_id;o.textContent=p.event_name+(p.event_date?' ('+p.event_date+')':'');sel.appendChild(o);});}

async function switchEvent(){
  var sel=document.getElementById('eventSelect');
  currentProjectId=sel.value||null;
  if(currentProjectId){var p=allProjects.find(function(x){return x.event_project_id===currentProjectId;});if(p)setCurrentEvent(p.event_project_id,p.event_name,p.event_date||'');await loadAndRender();}
  else{clearCurrentEvent();document.getElementById('mainContent').innerHTML='<div class="no-event">Select an event above to view and edit its details.</div>';}
}

async function loadAndRender(){
  if(!currentProjectId)return;
  currentProject=allProjects.find(function(p){return p.event_project_id===currentProjectId;})||null;
  var vr=await sb.from('event_vendors').select('*').eq('event_project_id',currentProjectId).order('created_at');
  allVendors=vr.data||[];
  renderPage();
}

function fmtDate(str){if(!str)return'';var d=new Date(str+'T00:00:00');return d.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}

function renderPage(){
  var p=currentProject;if(!p)return;
  var dateStr=p.event_date?fmtDate(p.event_date):'Date TBD';
  if(p.event_end_date)dateStr+=' – '+fmtDate(p.event_end_date);
  var status=p.status||'planning';
  var html='';
  html+='<div class="status-bar"><span class="event-name">'+esc(p.event_name||'Untitled')+'</span><span class="status-chip s-'+status+'">'+status+'</span><span class="event-date">'+dateStr+'</span></div>';
  // Core details
  html+='<div class="section-card"><div class="sc-header"><div class="sc-title">Core Event Info</div></div><div class="sc-body"><div class="form-grid">';
  html+='<div class="form-group"><label class="form-label">Event Name</label><input class="form-input" id="edName" value="'+esc(p.event_name||'')+'" placeholder="Event name"></div>';
  html+='<div class="form-group"><label class="form-label">Status</label><select class="form-select" id="edStatus"><option value="planning"'+(status==='planning'?' selected':'')+'>Planning</option><option value="active"'+(status==='active'?' selected':'')+'>Active</option><option value="completed"'+(status==='completed'?' selected':'')+'>Completed</option><option value="cancelled"'+(status==='cancelled'?' selected':'')+'>Cancelled</option></select></div>';
  html+='<div class="form-group"><label class="form-label">Start Date</label><input class="form-input" type="date" id="edDate" value="'+(p.event_date||'')+'"></div>';
  html+='<div class="form-group"><label class="form-label">End Date</label><input class="form-input" type="date" id="edEndDate" value="'+(p.event_end_date||'')+'"></div>';
  html+='<div class="form-group"><label class="form-label">Total Budget ($)</label><input class="form-input" type="number" id="edBudget" value="'+(p.total_budget||0)+'" step="0.01"></div>';
  html+='<div class="form-group"><label class="form-label">Expected Attendance</label><input class="form-input" type="number" id="edAttendance" value="'+(p.expected_attendance||'')+'"></div>';
  html+='<div class="form-full form-group"><label class="form-label">Description / Notes</label><textarea class="form-textarea" id="edDesc">'+esc(p.description||'')+'</textarea></div>';
  html+='</div><div class="save-row"><button class="btn-primary" onclick="saveCoreDetails()">Save Core Info</button></div></div></div>';
  // Venue
  html+='<div class="section-card"><div class="sc-header"><div class="sc-title">Venue</div></div><div class="sc-body"><div class="form-grid">';
  html+='<div class="form-group"><label class="form-label">Venue Name</label><input class="form-input" id="edVenue" value="'+esc(p.venue||'')+'" placeholder="Venue name"></div>';
  html+='<div class="form-group"><label class="form-label">Venue Cost ($)</label><input class="form-input" type="number" id="edVenueCost" value="'+(p.venue_cost||0)+'" step="0.01"></div>';
  html+='<div class="form-full form-group"><label class="form-label">Address</label><input class="form-input" id="edVenueAddr" value="'+esc(p.venue_address||'')+'" placeholder="Full address"></div>';
  html+='<div class="form-group"><label class="form-label">Contact Name</label><input class="form-input" id="edVenueContact" value="'+esc(p.venue_contact||'')+'" placeholder="Contact person"></div>';
  html+='<div class="form-group"><label class="form-label">Phone</label><input class="form-input" id="edVenuePhone" value="'+esc(p.venue_phone||'')+'" placeholder="555-0100"></div>';
  html+='<div class="form-group"><label class="form-label">Email</label><input class="form-input" type="email" id="edVenueEmail" value="'+esc(p.venue_email||'')+'" placeholder="venue@example.com"></div>';
  html+='<div class="form-full form-group"><label class="form-label">Requirements / Notes</label><textarea class="form-textarea" id="edVenueReqs">'+esc(p.venue_requirements||'')+'</textarea></div>';
  html+='</div><div class="save-row"><button class="btn-primary" onclick="saveVenueDetails()">Save Venue</button></div></div></div>';
  // Vendors
  html+='<div class="section-card"><div class="sc-header"><div class="sc-title">Vendors &amp; Contacts</div><button class="btn-primary" onclick="openAddVendorModal()">+ Add Vendor</button></div>';
  html+='<div class="sc-body">';
  if(!allVendors.length){html+='<div style="text-align:center;padding:20px;color:var(--t2);font-size:13px;">No vendors added yet. Add vendors, sponsors, and key contacts for this event.</div>';}
  else{
    html+='<div style="overflow-x:auto;"><table class="vendor-table"><thead><tr><th>Name</th><th>Type</th><th>Contact</th><th>Phone / Email</th><th>Cost</th><th></th></tr></thead><tbody>';
    allVendors.forEach(function(v){
      html+='<tr><td><strong>'+esc(v.vendor_name||v.company_name||'')+'</strong></td>';
      html+='<td><span class="vendor-badge">'+esc(v.vendor_type||v.type||'vendor')+'</span></td>';
      html+='<td>'+esc(v.contact_name||'')+'</td>';
      html+='<td>'+(v.phone?esc(v.phone):'')+(v.email?'<br><small style="color:var(--t2)">'+esc(v.email)+'</small>':'')+'</td>';
      html+='<td>'+(parseFloat(v.cost)>0?'$'+(parseFloat(v.cost)).toLocaleString():'—')+'</td>';
      html+='<td><div class="vendor-actions"><button class="vbtn" onclick="openEditVendorModal(\''+v.vendor_id+'\')">Edit</button><button class="vbtn danger" onclick="if(confirm(\'Delete this vendor?\'))deleteVendorById(\''+v.vendor_id+'\')">Del</button></div></td>';
      html+='</tr>';
    });
    html+='</tbody></table></div>';
  }
  html+='</div></div>';
  document.getElementById('mainContent').innerHTML=html;
}

async function saveCoreDetails(){
  if(!currentProjectId)return;
  var data={event_name:document.getElementById('edName').value.trim(),status:document.getElementById('edStatus').value,event_date:document.getElementById('edDate').value||null,event_end_date:document.getElementById('edEndDate').value||null,total_budget:parseFloat(document.getElementById('edBudget').value)||0,expected_attendance:parseInt(document.getElementById('edAttendance').value)||null,description:document.getElementById('edDesc').value.trim()||null,updated_at:new Date().toISOString()};
  var r=await sb.from('event_projects').update(data).eq('event_project_id',currentProjectId);
  if(r.error){toast('Error: '+r.error.message);return;}
  Object.assign(currentProject,data);
  if(data.event_name)setCurrentEvent(currentProjectId,data.event_name,data.event_date||'');
  toast('Core info saved');renderPage();
}
async function saveVenueDetails(){
  if(!currentProjectId)return;
  var data={venue:document.getElementById('edVenue').value.trim()||null,venue_cost:parseFloat(document.getElementById('edVenueCost').value)||0,venue_address:document.getElementById('edVenueAddr').value.trim()||null,venue_contact:document.getElementById('edVenueContact').value.trim()||null,venue_phone:document.getElementById('edVenuePhone').value.trim()||null,venue_email:document.getElementById('edVenueEmail').value.trim()||null,venue_requirements:document.getElementById('edVenueReqs').value.trim()||null,updated_at:new Date().toISOString()};
  var r=await sb.from('event_projects').update(data).eq('event_project_id',currentProjectId);
  if(r.error){toast('Error: '+r.error.message);return;}
  Object.assign(currentProject,data);toast('Venue saved');renderPage();
}

/* VENDOR MODAL */
function openAddVendorModal(){editingVendorId=null;document.getElementById('vendorModalTitle').textContent='Add Vendor';['vmName','vmContact','vmPhone','vmEmail','vmNotes'].forEach(function(id){document.getElementById(id).value='';});document.getElementById('vmCost').value='';document.getElementById('vmType').value='vendor';document.getElementById('vendorDeleteBtn').style.display='none';document.getElementById('vendorModal').classList.add('show');}
function openEditVendorModal(id){var v=allVendors.find(function(x){return x.vendor_id===id;});if(!v)return;editingVendorId=id;document.getElementById('vendorModalTitle').textContent='Edit Vendor';document.getElementById('vmName').value=v.vendor_name||v.company_name||'';document.getElementById('vmContact').value=v.contact_name||'';document.getElementById('vmPhone').value=v.phone||'';document.getElementById('vmEmail').value=v.email||'';document.getElementById('vmCost').value=v.cost||'';document.getElementById('vmNotes').value=v.notes||'';document.getElementById('vmType').value=v.vendor_type||v.type||'vendor';document.getElementById('vendorDeleteBtn').style.display='block';document.getElementById('vendorModal').classList.add('show');}
function closeVendorModal(){document.getElementById('vendorModal').classList.remove('show');}
async function saveVendor(){var name=document.getElementById('vmName').value.trim();if(!name){toast('Name required');return;}var data={vendor_name:name,contact_name:document.getElementById('vmContact').value.trim()||null,phone:document.getElementById('vmPhone').value.trim()||null,email:document.getElementById('vmEmail').value.trim()||null,cost:parseFloat(document.getElementById('vmCost').value)||0,notes:document.getElementById('vmNotes').value.trim()||null,vendor_type:document.getElementById('vmType').value};if(editingVendorId){await sb.from('event_vendors').update(data).eq('vendor_id',editingVendorId);}else{data.tenant_id=tenantId;data.event_project_id=currentProjectId;await sb.from('event_vendors').insert(data);}closeVendorModal();toast(editingVendorId?'Vendor updated':'Vendor added');await loadAndRender();}
async function deleteVendor(){if(!editingVendorId||!confirm('Delete this vendor?'))return;await deleteVendorById(editingVendorId);closeVendorModal();}
async function deleteVendorById(id){await sb.from('event_vendors').delete().eq('vendor_id',id);toast('Vendor deleted');await loadAndRender();}

function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
init();
</script>
</body>
</html>
