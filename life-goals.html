<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Goals — Life Logic</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#f4f5f7;--bg2:#eceef2;--card:#fff;--hover:#f0f1f5;
  --border:#e2e4ea;--text:#18181b;--muted:#6b7280;
  --accent:#4F46E5;--accent2:#4338CA;--accent-bg:rgba(79,70,229,.08);
  --green:#16a34a;--red:#dc2626;--amber:#d97706;--orange:#ea580c;
  --shadow:0 1px 8px rgba(0,0,0,.07);--shadow-md:0 4px 20px rgba(0,0,0,.10);
  --input:#fafafa;--overlay:rgba(0,0,0,.45);
  --r:12px;--r-sm:8px;--r-lg:16px;
}
body.dark{
  --bg:#0f0f10;--bg2:#18181b;--card:#1e1e21;--hover:#26262a;
  --border:#2e2e32;--text:#f4f4f5;--muted:#71717a;
  --accent:#6366f1;--accent2:#818cf8;--accent-bg:rgba(99,102,241,.12);
  --shadow:0 1px 8px rgba(0,0,0,.3);--shadow-md:0 4px 20px rgba(0,0,0,.4);
  --input:#18181b;--overlay:rgba(0,0,0,.7);
}
html{background:var(--bg);}
body{font-family:system-ui,-apple-system,'Segoe UI',sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:100px;}

/* DESKTOP HEADER */
.dh{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.dh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 24px;}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:34px;height:34px;background:var(--accent);border-radius:9px;
  display:flex;align-items:center;justify-content:center;color:#fff;}
.brand-mark svg{width:18px;height:18px;stroke:#fff;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;}
.brand-name{font-size:17px;font-weight:800;letter-spacing:-.3px;}
.brand-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.6px;text-transform:uppercase;}
.dh-actions{display:flex;align-items:center;gap:8px;}
.icon-btn{width:32px;height:32px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;display:flex;align-items:center;
  justify-content:center;transition:.15s;}
.icon-btn:hover{color:var(--text);background:var(--hover);}
.icon-btn svg{width:16px;height:16px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.text-btn{font-size:13px;color:var(--muted);background:none;border:none;cursor:pointer;
  padding:4px 8px;border-radius:6px;}
.text-btn:hover{color:var(--text);background:var(--hover);}
.dh-nav{display:flex;justify-content:space-between;align-items:center;
  padding:0 24px;border-top:1px solid var(--border);}
.dh-links{display:flex;gap:2px;}
.nav-link{display:flex;align-items:center;gap:6px;padding:9px 14px;font-size:13px;
  font-weight:500;color:var(--muted);text-decoration:none;border-radius:var(--r-sm);transition:.15s;}
.nav-link svg{width:15px;height:15px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.nav-link:hover{color:var(--text);background:var(--hover);}
.nav-link.active{color:var(--accent);font-weight:700;}
.dh-right{display:flex;gap:8px;padding:6px 0;}
.btn-primary{padding:7px 16px;background:var(--accent);color:#fff;border:none;
  border-radius:var(--r-sm);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;}
.btn-primary:hover{background:var(--accent2);}

/* MOBILE HEADER */
.mh{display:none;position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);}
.mh-top{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;}
.mh-title{font-size:17px;font-weight:800;}
.mh-sub{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:.5px;text-transform:uppercase;}
.mh-actions{display:flex;gap:8px;}

/* MOBILE BOTTOM NAV */
.mn{display:none;position:fixed;bottom:0;left:0;right:0;z-index:200;
  background:var(--card);border-top:1px solid var(--border);
  padding:8px 8px max(20px,env(safe-area-inset-bottom));
  box-shadow:0 -4px 24px rgba(0,0,0,.08);}
.mn-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:2px;}
.mn-btn{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;
  border-radius:10px;text-decoration:none;color:var(--muted);
  font-size:9px;font-weight:600;letter-spacing:.3px;text-transform:uppercase;transition:.15s;}
.mn-btn svg{width:22px;height:22px;stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round;}
.mn-btn.active{color:var(--accent);}
.fab{position:fixed;bottom:88px;right:18px;z-index:300;width:50px;height:50px;
  background:var(--accent);color:#fff;border:none;border-radius:50%;font-size:22px;
  cursor:pointer;box-shadow:0 4px 16px rgba(79,70,229,.45);display:none;
  align-items:center;justify-content:center;transition:.2s;}
.fab:hover{background:var(--accent2);}
.fab svg{width:22px;height:22px;stroke:#fff;fill:none;stroke-width:2.2;stroke-linecap:round;}

/* PAGE */
.page{max-width:960px;margin:0 auto;padding:20px 24px;}

/* CARDS */
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);box-shadow:var(--shadow);}

/* FORMS */
.fg{margin-bottom:14px;}
.fl{display:block;font-size:11px;font-weight:700;color:var(--muted);margin-bottom:5px;
  text-transform:uppercase;letter-spacing:.5px;}
.fi,.fs,.fta{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:var(--r-sm);
  background:var(--input);color:var(--text);font-size:14px;outline:none;
  transition:border-color .2s;font-family:inherit;}
.fi:focus,.fs:focus,.fta:focus{border-color:var(--accent);}
.fta{resize:vertical;min-height:72px;}
.fr{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.fa{display:flex;gap:10px;margin-top:20px;}
.btn-lg{flex:1;padding:12px;border:none;border-radius:var(--r-sm);font-size:15px;font-weight:700;cursor:pointer;transition:.15s;}
.btn-sub{background:var(--accent);color:#fff;}
.btn-sub:hover{background:var(--accent2);}
.btn-can{background:var(--hover);color:var(--text);border:1px solid var(--border);}
.btn-can:hover{background:var(--bg2);}
.btn-del{padding:11px 16px;background:rgba(220,38,38,.08);color:var(--red);
  border:1.5px solid rgba(220,38,38,.18);border-radius:var(--r-sm);
  font-size:13px;font-weight:700;cursor:pointer;}

/* MODAL */
.mw{display:none;position:fixed;inset:0;background:var(--overlay);z-index:500;
  align-items:flex-end;justify-content:center;}
.mw.open{display:flex;}
.modal{background:var(--card);width:100%;max-width:500px;border-radius:20px 20px 0 0;
  padding:24px;max-height:90vh;overflow-y:auto;}
@media(min-width:560px){.modal{border-radius:var(--r-lg);margin-bottom:24px;}}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;}
.modal-x{width:30px;height:30px;border-radius:var(--r-sm);border:1px solid var(--border);
  background:transparent;color:var(--muted);cursor:pointer;font-size:18px;
  display:flex;align-items:center;justify-content:center;}

/* TOAST */
#toast{position:fixed;bottom:120px;left:50%;transform:translateX(-50%) translateY(8px);
  background:#18181b;color:#fff;padding:10px 20px;border-radius:40px;
  font-size:13px;font-weight:600;z-index:9999;opacity:0;pointer-events:none;
  transition:opacity .25s,transform .25s;white-space:nowrap;}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
body.dark #toast{background:#f4f4f5;color:#18181b;}

/* BADGES */
.badge{font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;display:inline-block;}
.b-urgent{background:rgba(220,38,38,.1);color:var(--red);}
.b-high{background:rgba(234,88,12,.1);color:var(--orange);}
.b-medium{background:rgba(79,70,229,.1);color:var(--accent);}
.b-low{background:var(--bg2);color:var(--muted);}
.b-done{background:rgba(22,163,74,.1);color:var(--green);}
.b-prog{background:rgba(79,70,229,.1);color:var(--accent);}

/* ICON / COLOR PICKERS (used in category modals) */
.icon-picker{display:grid;grid-template-columns:repeat(6,1fr);gap:6px;margin-top:8px;}
.ip-opt{width:40px;height:40px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:.15s;color:var(--muted);}
.ip-opt svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.ip-opt:hover{border-color:var(--accent);color:var(--accent);}
.ip-opt.sel{border-color:var(--accent);background:var(--accent-bg);color:var(--accent);}
.color-picker{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.cp-opt{width:28px;height:28px;border-radius:6px;cursor:pointer;border:3px solid transparent;transition:.15s;}
.cp-opt.sel{border-color:var(--text);transform:scale(1.15);}

/* EMPTY */
.empty-state{text-align:center;padding:52px 20px;color:var(--muted);}
.empty-state svg{width:44px;height:44px;stroke:var(--border);fill:none;stroke-width:1.5;margin-bottom:12px;}
.empty-state h3{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}

/* SECTION TITLE */
.sec-title{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;
  letter-spacing:.6px;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.sec-title svg{width:13px;height:13px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}

/* DATE CHIPS */
.date-chips{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;}
.dc{padding:5px 10px;border:1.5px solid var(--border);border-radius:20px;
  font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;transition:.15s;}
.dc:hover{border-color:var(--accent);color:var(--accent);}

@media(max-width:768px){
  .dh{display:none;}
  .mh,.mn{display:block;}
  .fab{display:flex;}
  .page{padding:12px;}
  .fr{grid-template-columns:1fr;}
}
@media(min-width:769px){.mh,.mn,.fab{display:none!important;}}


.demo-bar{background:linear-gradient(135deg,#1e1b4b,#312e81);
  border-bottom:1px solid rgba(255,255,255,.08);padding:8px 24px;
  display:flex;align-items:center;gap:10px;flex-wrap:wrap;flex-shrink:0;}
.demo-bar-label{font-size:10px;font-weight:800;color:rgba(255,255,255,.45);
  text-transform:uppercase;letter-spacing:.8px;white-space:nowrap;}
.demo-personas{display:flex;gap:6px;flex-wrap:wrap;flex:1;}
.persona-group{display:flex;align-items:center;}
.persona-btn{display:flex;align-items:center;gap:6px;padding:6px 14px;
  border-radius:20px 0 0 20px;border:1.5px solid rgba(255,255,255,.2);
  border-right:none;background:rgba(255,255,255,.07);color:rgba(255,255,255,.85);
  font-size:12px;font-weight:700;cursor:pointer;transition:.2s;white-space:nowrap;}
.persona-btn:hover{background:rgba(255,255,255,.15);}
.persona-btn.active{background:rgba(255,255,255,.22);color:#fff;
  border-color:rgba(255,255,255,.4);}
.persona-avatar{width:20px;height:20px;border-radius:50%;display:flex;
  align-items:center;justify-content:center;font-size:10px;font-weight:800;
  color:#fff;flex-shrink:0;}
.persona-del-btn{padding:6px 10px;border-radius:0 20px 20px 0;
  border:1.5px solid rgba(220,38,38,.5);background:rgba(220,38,38,.15);
  color:#fca5a5;font-size:11px;font-weight:700;cursor:pointer;transition:.2s;}
.persona-del-btn:hover{background:rgba(220,38,38,.4);color:#fff;
  border-color:rgba(220,38,38,.8);}
.demo-bar-right{display:flex;align-items:center;gap:8px;}
.demo-back-btn{display:flex;align-items:center;gap:5px;padding:6px 14px;
  border-radius:20px;border:1.5px solid rgba(255,255,255,.2);
  background:rgba(255,255,255,.07);color:rgba(255,255,255,.7);
  font-size:12px;font-weight:700;cursor:pointer;transition:.2s;
  text-decoration:none;}
.demo-back-btn:hover{background:rgba(255,255,255,.15);color:#fff;}
@media(max-width:768px){.demo-bar{padding:8px 12px;}}


.goal-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:20px;scrollbar-width:none;}
.goal-tabs::-webkit-scrollbar{display:none;}
.gtab{flex-shrink:0;display:flex;align-items:center;gap:6px;padding:8px 16px;
  border-radius:20px;border:1.5px solid var(--border);background:var(--card);
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:.2s;}
.gtab svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;}
.gtab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.gtab-cnt{font-size:11px;font-weight:800;padding:1px 6px;border-radius:10px;background:rgba(255,255,255,.25);}
.goals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(270px,1fr));gap:14px;}
.gcard{background:var(--card);border:1px solid var(--border);border-radius:var(--r-lg);
  overflow:hidden;cursor:pointer;transition:.2s;box-shadow:var(--shadow);}
.gcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-md);}
.gcard-stripe{height:3px;}
.gcard-body{padding:16px 16px 12px;}
.gcard-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;}
.gtype-ico{width:36px;height:36px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.gtype-ico svg{width:18px;height:18px;fill:none;stroke:#fff;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;}
.gstatus-badge{font-size:10px;font-weight:700;padding:3px 10px;border-radius:20px;}
.gcard-name{font-size:15px;font-weight:800;margin-bottom:4px;}
.gcard-desc{font-size:12px;color:var(--muted);line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.gcard-foot{padding:10px 16px 14px;border-top:1px solid var(--border);
  display:flex;justify-content:space-between;align-items:center;}
.gmeta{font-size:11px;color:var(--muted);}
.gcost{font-size:14px;font-weight:800;color:var(--green);}
.gadd-card{background:var(--card);border:2px dashed var(--border);border-radius:var(--r-lg);
  padding:32px;text-align:center;cursor:pointer;color:var(--muted);font-size:13px;font-weight:600;
  transition:.2s;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px;}
.gadd-card:hover{border-color:var(--accent);color:var(--accent);}
.gadd-card svg{width:28px;height:28px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linecap:round;}
.type-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px;}
.topt{padding:12px 6px;border-radius:var(--r-sm);border:1.5px solid var(--border);
  text-align:center;cursor:pointer;transition:.15s;}
.topt:hover{border-color:var(--accent);}
.topt.sel{border-color:var(--accent);background:var(--accent-bg);}
.topt svg{width:20px;height:20px;fill:none;stroke:var(--muted);stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round;display:block;margin:0 auto 4px;}
.topt.sel svg{stroke:var(--accent);}
.topt-lbl{font-size:10px;font-weight:700;color:var(--muted);}
.topt.sel .topt-lbl{color:var(--accent);}
@media(max-width:768px){.goals-grid{grid-template-columns:1fr;}}

</style>
</head>

.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg> Settings</a></div><div class="dh-right"><button class="btn-primary" onclick="openGoalModal()">+ Add Goal</button></div></div>
</div>
<div class="mh">
  <div class="mh-top">
    <div><div class="mh-title">Goals</div><div class="mh-sub">Life Logic</div></div>
    <div class="mh-actions">

function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function todayStr(){return new Date().toISOString().split('T')[0];}
function fmtDate(d){if(!d)return'';var dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric'});}
function fmtDateFull(d){if(!d)return'';var dt=new Date(d+'T00:00:00');return dt.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});}
function isOverdue(due,status){return status!=='done'&&due&&due<todayStr();}
function isToday(due){return due===todayStr();}
function addDays(n){var d=new Date();d.setDate(d.getDate()+n);return d.toISOString().split('T')[0];}

// ── Cat icon/color picker helpers ──
function buildIconPicker(pid,selIcon){
  var h='';CAT_ICONS.forEach(function(n){
    h+='<div class="ip-opt'+(n===selIcon?' sel':'')+'" data-icon="'+n+'" onclick="pickIcon(this,this.dataset.icon)">'+icon(n,18)+'</div>';
  });document.getElementById(pid).innerHTML=h;
}
function buildColorPicker(pid,selColor){
  var h='';CAT_COLORS.forEach(function(c){
    h+='<div class="cp-opt'+(c===selColor?' sel':'')+'" data-color="'+c+'" style="background:'+c+'" onclick="pickColor(this,this.dataset.color)"></div>';
  });document.getElementById(pid).innerHTML=h;
}
function pickIcon(el,n){document.querySelectorAll('.ip-opt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');_selIcon=n;}
function pickColor(el,c){document.querySelectorAll('.cp-opt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');_selColor=c;}
var _selIcon='clipboard',_selColor='#4F46E5';


var PERSONA_INFO={
  bobby:  {name:'Bobby',   initials:'B',  color:'#2563EB'},
  brenda: {name:'Brenda',  initials:'Br', color:'#DB2777'},
  bigmatt:{name:'Big Matt',initials:'BM', color:'#374151'}
};
function getActivePid(){
  var p=localStorage.getItem('ll_active_persona');
  return(p&&!localStorage.getItem('ll_demo_deleted_'+p))?p:null;
}
function getActiveCatIds(){
  var p=getActivePid();if(!p)return null;
  var raw=localStorage.getItem('ll_demo_ids_'+p);if(!raw)return null;
  var ids=JSON.parse(raw);return(ids.cats&&ids.cats.length)?ids.cats:null;
}
function filterByCat(arr){
  var cats=getActiveCatIds();
  return cats?arr.filter(function(x){return cats.indexOf(x.category_id)>=0;}):arr;
}
function filterCats(arr){
  var cats=getActiveCatIds();
  return cats?arr.filter(function(x){return cats.indexOf(x.id)>=0;}):arr;
}
function renderDemoBar(onRefresh){
  var active=['bobby','brenda','bigmatt'].filter(function(p){
    return !localStorage.getItem('ll_demo_deleted_'+p);
  });
  var bar=document.getElementById('demoBar');if(!bar)return;
  bar.style.display=active.length?'flex':'none';
  if(!active.length)return;
  var pid=getActivePid(),h='';
  active.forEach(function(p){
    var P=PERSONA_INFO[p],isAct=pid===p;
    h+='<div class="persona-group">';
    h+='<button class="persona-btn'+(isAct?' active':'')+'" data-pid="'+p+'">';
    h+='<div class="persona-avatar" style="background:'+P.color+'">'+P.initials+'</div>'+P.name;
    h+='</button>';
    h+='<button class="persona-del-btn" data-pid="'+p+'">&#215; Delete</button>';
    h+='</div>';
  });
  document.getElementById('demoPersonas').innerHTML=h;
  document.querySelectorAll('.persona-btn[data-pid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      localStorage.setItem('ll_active_persona',this.dataset.pid);
      renderDemoBar(onRefresh);if(onRefresh)onRefresh();
    });
  });
  document.querySelectorAll('.persona-del-btn[data-pid]').forEach(function(btn){
    btn.addEventListener('click',function(){
      var p=this.dataset.pid;
      if(!confirm('Permanently delete '+PERSONA_INFO[p].name+"'s demo data?"))return;
      deletePersona(p,onRefresh);
    });
  });
}
async function deletePersona(pid,onRefresh){
  var raw=localStorage.getItem('ll_demo_ids_'+pid);
  if(raw){
    var ids=JSON.parse(raw),catIds=ids.cats||[];
    if(catIds.length){
      await sb.from('life_goals').delete().in('category_id',catIds);
      await sb.from('life_tasks').delete().in('category_id',catIds);
      await sb.from('life_categories').delete().in('id',catIds);
    }
    if(ids.goals&&ids.goals.length)await sb.from('life_goals').delete().in('id',ids.goals);
    if(ids.tasks&&ids.tasks.length)await sb.from('life_tasks').delete().in('id',ids.tasks);
  }
  localStorage.setItem('ll_demo_deleted_'+pid,'1');
  localStorage.removeItem('ll_demo_ids_'+pid);
  localStorage.removeItem('ll_demo_seeded_'+pid);
  if(localStorage.getItem('ll_active_persona')===pid){
    var nxt=['bobby','brenda','bigmatt'].find(function(p){
      return p!==pid&&!localStorage.getItem('ll_demo_deleted_'+p);
    });
    if(nxt)localStorage.setItem('ll_active_persona',nxt);
    else localStorage.removeItem('ll_active_persona');
  }
  toast('Demo data removed');
  renderDemoBar(onRefresh);if(onRefresh)onRefresh();
}

var _cats=[],_goals=[],_editGoal=null,_selType='goal',_activeTab='all';
var TCFG={goal:{color:'#4F46E5'},vacation:{color:'#2563EB'},bucket_list:{color:'#7C3AED'},someday:{color:'#D97706'}};
var SCFG={dreaming:{cls:'b-medium',lbl:'Dreaming'},planning:{cls:'b-prog',lbl:'Planning'},
  in_progress:{cls:'b-prog',lbl:'In Progress'},booked:{cls:'b-done',lbl:'Booked'},done:{cls:'b-done',lbl:'Done'}};
var TICON={goal:'target',vacation:'plane',bucket_list:'trophy',someday:'clock'};

async function init(){
  var s=await checkAuth();if(!s)return;userId=s.user.id;
  var cr=await sb.from('life_categories').select('*').eq('user_id',userId).eq('is_active',true);_cats=cr.data||[];
  var gr=await sb.from('life_goals').select('*').eq('user_id',userId).eq('is_active',true).order('created_at',{ascending:false});_goals=gr.data||[];
  renderDemoBar(function(){renderGoals();});
  renderGoals();
}

function switchTab(btn){
  document.querySelectorAll('.gtab').forEach(function(b){b.classList.remove('active');});
  btn.classList.add('active');_activeTab=btn.dataset.t;renderGoals();
}

function renderGoals(){
  var catIds=getActiveCatIds();
  var allG=catIds?_goals.filter(function(g){return catIds.indexOf(g.category_id)>=0;}):_goals;
  ['goal','vacation','bucket_list','someday'].forEach(function(t){
    var el=document.getElementById('cnt-'+t);
    if(el)el.textContent=allG.filter(function(g){return g.type===t&&g.status!=='done';}).length;
  });
  document.getElementById('cnt-all').textContent=allG.filter(function(g){return g.status!=='done';}).length;
  document.getElementById('cnt-done').textContent=allG.filter(function(g){return g.status==='done';}).length;
  var list=allG;
  if(_activeTab==='done')list=list.filter(function(g){return g.status==='done';});
  else if(_activeTab!=='all')list=list.filter(function(g){return g.type===_activeTab&&g.status!=='done';});
  else list=list.filter(function(g){return g.status!=='done';});
  var grid=document.getElementById('goalsGrid');
  if(!list.length){
    grid.innerHTML='<div class="gadd-card" style="grid-column:1/-1;" onclick="openGoalModal()">'+icon('plus',28)+'<span>Add your first goal</span></div>';
    return;
  }
  grid.innerHTML=list.map(function(g){
    var tc=TCFG[g.type]||TCFG.goal;
    var sc=SCFG[g.status]||SCFG.dreaming;
    var cat=_cats.find(function(c){return c.id===g.category_id;})||{};
    var gid=g.id;
    return '<div class="gcard" data-id="'+gid+'" onclick="openGoalModal(this.dataset.id)">'+
      '<div class="gcard-stripe" style="background:'+tc.color+'"></div>'+
      '<div class="gcard-body">'+
        '<div class="gcard-top">'+
          '<div class="gtype-ico" style="background:'+tc.color+'">'+icon(TICON[g.type]||'target',18)+'</div>'+
          '<span class="gstatus-badge '+sc.cls+'">'+sc.lbl+'</span>'+
        '</div>'+
        '<div class="gcard-name">'+esc(g.name)+'</div>'+
        (g.description?'<div class="gcard-desc">'+esc(g.description)+'</div>':'')+
      '</div>'+
      '<div class="gcard-foot">'+
        '<div class="gmeta">'+
          (g.target_date?'<div>'+fmtDateFull(g.target_date)+'</div>':'')+
          (cat.name?'<div>'+esc(cat.name)+'</div>':'')+
        '</div>'+
        (g.estimated_cost?'<div class="gcost">$'+Number(g.estimated_cost).toLocaleString()+'</div>':'')+
      '</div>'+
    '</div>';
  }).join('')+'<div class="gadd-card" onclick="openGoalModal()">'+icon('plus',28)+'<span>Add new</span></div>';
}

function pickType(el){document.querySelectorAll('.topt').forEach(function(x){x.classList.remove('sel');});el.classList.add('sel');_selType=el.dataset.t;}

function openGoalModal(id){
  _editGoal=id||null;_selType='goal';
  document.getElementById('gmTitle').textContent=id?'Edit Goal':'New Goal';
  document.getElementById('gmDel').style.display=id?'block':'none';
  document.getElementById('gmName').value='';document.getElementById('gmDesc').value='';
  document.getElementById('gmStatus').value='dreaming';document.getElementById('gmDate').value='';
  document.getElementById('gmCost').value='';
  document.getElementById('gmCat').innerHTML='<option value="">None</option>'+_cats.map(function(c){return '<option value="'+c.id+'">'+esc(c.name)+'</option>';}).join('');
  document.querySelectorAll('.topt').forEach(function(x){x.classList.remove('sel');});
  document.querySelector('.topt[data-t="goal"]').classList.add('sel');
  if(id){
    var g=_goals.find(function(x){return x.id===id;});
    if(g){
      document.getElementById('gmName').value=g.name||'';
      document.getElementById('gmDesc').value=g.description||'';
      document.getElementById('gmStatus').value=g.status||'dreaming';
      document.getElementById('gmDate').value=g.target_date||'';
      document.getElementById('gmCost').value=g.estimated_cost||'';
      document.getElementById('gmCat').value=g.category_id||'';
      _selType=g.type||'goal';
      var te=document.querySelector('.topt[data-t="'+_selType+'"]');
      if(te){document.querySelectorAll('.topt').forEach(function(x){x.classList.remove('sel');});te.classList.add('sel');}
    }
  }
  document.getElementById('goalModal').classList.add('open');
}
function closeGoalModal(){document.getElementById('goalModal').classList.remove('open');}

async function saveGoal(){
  var name=document.getElementById('gmName').value.trim();if(!name){toast('Name required');return;}
  var d={name:name,description:document.getElementById('gmDesc').value.trim()||null,
    type:_selType,status:document.getElementById('gmStatus').value,
    target_date:document.getElementById('gmDate').value||null,
    estimated_cost:document.getElementById('gmCost').value?parseFloat(document.getElementById('gmCost').value):null,
    category_id:document.getElementById('gmCat').value||null,user_id:userId,is_active:true};
  var r;
  if(_editGoal){r=await sb.from('life_goals').update(d).eq('id',_editGoal).select().single();if(!r.error){var i=_goals.findIndex(function(g){return g.id===_editGoal;});if(i>=0)_goals[i]=r.data;}}
  else{r=await sb.from('life_goals').insert(d).select().single();if(!r.error)_goals.push(r.data);}
  if(r.error){toast('Error: '+r.error.message);return;}
  toast(_editGoal?'Updated!':'Goal added!');closeGoalModal();renderGoals();
}
async function deleteGoal(){
  if(!_editGoal||!confirm('Delete this goal?'))return;
  await sb.from('life_goals').update({is_active:false}).eq('id',_editGoal);
  _goals=_goals.filter(function(g){return g.id!==_editGoal;});
  closeGoalModal();renderGoals();toast('Deleted');
}
init();
</script>
